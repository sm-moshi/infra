apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ollama
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: ollama
    app.kubernetes.io/instance: ollama
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: user
  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/ollama
    helm:
      releaseName: ollama
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  info:
    - name: description
      value: "Ollama LLM inference server (CPU-only)."
    - name: source
      value: "https://github.com/ollama/ollama"
    - name: docs
      value: "https://ollama.com"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
