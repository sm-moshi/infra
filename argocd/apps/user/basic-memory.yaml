apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: basic-memory
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: basic-memory
    app.kubernetes.io/instance: basic-memory
  annotations:
    argocd.argoproj.io/sync-wave: "34"
    # ArgoCD Image Updater — livesync-bridge image auto-update
    argocd-image-updater.argoproj.io/image-list: "livesync=harbor.m0sh1.cc/apps/livesync-bridge"
    argocd-image-updater.argoproj.io/livesync.update-strategy: "latest"
    argocd-image-updater.argoproj.io/livesync.helm.image-name: "mcpShim.image.repository"
    argocd-image-updater.argoproj.io/livesync.helm.image-tag: "mcpShim.image.tag"
    argocd-image-updater.argoproj.io/write-back-method: "git:repocreds"
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues"
    argocd-image-updater.argoproj.io/git-branch: "main"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/basic-memory
    helm:
      releaseName: basic-memory
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "Basic Memory MCP server for persistent knowledge building with LLMs."
    - name: source
      value: "https://github.com/basicmachines-co/basic-memory"
    - name: docs
      value: "https://docs.basicmemory.com/"

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
