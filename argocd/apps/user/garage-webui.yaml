apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: garage-webui
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: garage-webui
    app.kubernetes.io/instance: garage-webui
  annotations:
    argocd.argoproj.io/sync-wave: "31"
spec:
  project: default
  info:
    - name: Description
      value: Web UI for Garage S3 object storage management.
    - name: Docs
      value: https://github.com/khairul169/garage-webui

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/garage-webui
    helm:
      releaseName: garage-webui
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: garage

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
