apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uptime-kuma
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/instance: uptime-kuma
  annotations:
    argocd.argoproj.io/sync-wave: "35"
    # ArgoCD Image Updater — uptime-kuma image auto-update
    argocd-image-updater.argoproj.io/image-list: "kuma=harbor.m0sh1.cc/apps/uptime-kuma"
    argocd-image-updater.argoproj.io/kuma.update-strategy: "latest"
    argocd-image-updater.argoproj.io/kuma.helm.image-name: "uptime-kuma.image.repository"
    argocd-image-updater.argoproj.io/kuma.helm.image-tag: "uptime-kuma.image.tag"
    argocd-image-updater.argoproj.io/write-back-method: "git:repocreds"
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues"
    argocd-image-updater.argoproj.io/git-branch: "main"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/uptime-kuma
    helm:
      releaseName: uptime-kuma
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "Uptime-Kuma monitoring UI (SQLite-backed)."
    - name: source
      value: "https://github.com/louislam/uptime-kuma"
    - name: docs
      value: "https://github.com/louislam/uptime-kuma/wiki"

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
