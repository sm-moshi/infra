apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubescape-operator
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: kubescape-operator
    app.kubernetes.io/instance: kubescape-operator
  annotations:
    argocd.argoproj.io/sync-wave: "23"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/kubescape-operator
    helm:
      releaseName: kubescape-operator
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: kubescape

  info:
    - name: description
      value: "Kubescape operator (phase-1 baseline: operator + configuration scan)."
    - name: source
      value: "https://github.com/kubescape/kubescape"
    - name: docs
      value: "https://kubescape.io/docs/install-operator/"

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

  # Ignore the storage APIService due to OpenAPI schema issues
  # See: https://github.com/kubescape/helm-charts/issues/XXX
  ignoreDifferences:
    - group: apiregistration.k8s.io
      kind: APIService
      name: v1beta1.spdx.softwarecomposition.kubescape.io
      jsonPointers:
        - /spec
