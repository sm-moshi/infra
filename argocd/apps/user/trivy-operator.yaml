apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trivy-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: trivy-operator
    app.kubernetes.io/instance: trivy-operator
  annotations:
    argocd.argoproj.io/sync-wave: "22"
spec:
  project: user

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/trivy-operator
    helm:
      releaseName: trivy-operator
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "Trivy Operator (runtime Kubernetes scanning) using DHI-hardened Trivy scanner image."
    - name: upstream
      value: "https://aquasecurity.github.io/trivy-operator/latest/"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
