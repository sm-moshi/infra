apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scanopy
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: scanopy
    app.kubernetes.io/instance: scanopy
  annotations:
    argocd.argoproj.io/sync-wave: "33"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/scanopy

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "Scanopy network discovery server with hybrid daemon topology support."
    - name: source
      value: "https://github.com/scanopy/scanopy"
    - name: docs
      value: "https://scanopy.net/docs/"

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
