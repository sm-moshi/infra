apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: qdrant
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: qdrant
    app.kubernetes.io/instance: qdrant
  annotations:
    argocd.argoproj.io/sync-wave: "50"
spec:
  project: default
  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/qdrant
    helm:
      releaseName: qdrant
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: apps
  info:
    - name: description
      value: "Qdrant vector database for RAG (Open WebUI)."
    - name: source
      value: "https://github.com/qdrant/qdrant"
    - name: docs
      value: "https://qdrant.tech/documentation/"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true

  # Qdrant's Helm chart generates a random API key with randAlphaNum on every
  # render (lookup fails in ArgoCD's repo-server). Ignore the Secret data so
  # the value set on first deploy is preserved.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: qdrant-apikey
      namespace: apps
      jsonPointers:
        - /data
