apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: termix
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: termix
    app.kubernetes.io/instance: termix
  annotations:
    argocd.argoproj.io/sync-wave: "34"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/termix
    helm:
      releaseName: termix
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "Termix SSH management server (terminal, tunnels, file manager, Docker management)."
    - name: source
      value: "https://github.com/lukegus/termix"

  syncPolicy:
    automated:
      prune: true
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
