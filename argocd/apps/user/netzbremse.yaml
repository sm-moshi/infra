apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netzbremse
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: netzbremse
    app.kubernetes.io/instance: netzbremse
  annotations:
    argocd.argoproj.io/sync-wave: "36"
spec:
  project: user

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/netzbremse
    helm:
      releaseName: netzbremse
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "Netzbremse bandwidth measurement service and dashboard."
    - name: measurement-source
      value: "https://github.com/AKVorrat/netzbremse-measurement"
    - name: dashboard-source
      value: "https://github.com/lwndp/netzbremse-dashboard"

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
