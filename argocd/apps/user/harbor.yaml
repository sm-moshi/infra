apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: harbor
    app.kubernetes.io/instance: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "31"
spec:
  project: user

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/harbor
    helm:
      releaseName: harbor
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true

  # Harbor's Helm chart regenerates secret fields with randAlphaNum/genSelfSignedCert
  # on every render. This causes two problems:
  #   1. Secret objects show as OutOfSync (fixed by ignoring Secret /data/* fields)
  #   2. Deployment checksum/secret* annotations change → Deployments show OutOfSync
  #      → ArgoCD triggers rolling restart on every commit to main
  # Both layers must be ignored so ArgoCD treats first-deploy values as authoritative.
  ignoreDifferences:
    # Layer 1: Secret object data fields
    - group: ""
      kind: Secret
      name: harbor-core
      namespace: apps
      jsonPointers:
        - /data/CSRF_KEY
        - /data/secret
        - /data/tls.crt
        - /data/tls.key
    - group: ""
      kind: Secret
      name: harbor-registry
      namespace: apps
      jsonPointers:
        - /data/REGISTRY_HTTP_SECRET
    - group: ""
      kind: Secret
      name: harbor-jobservice
      namespace: apps
      jsonPointers:
        - /data/JOBSERVICE_SECRET
    # Layer 2: Deployment checksum annotations that hash the random secrets
    - group: apps
      kind: Deployment
      name: harbor-core
      namespace: apps
      jqPathExpressions:
        - .spec.template.metadata.annotations["checksum/secret"]
    - group: apps
      kind: Deployment
      name: harbor-jobservice
      namespace: apps
      jqPathExpressions:
        - .spec.template.metadata.annotations["checksum/secret-core"]
    - group: apps
      kind: Deployment
      name: harbor-registry
      namespace: apps
      jqPathExpressions:
        - .spec.template.metadata.annotations["checksum/secret"]
        - .spec.template.metadata.annotations["checksum/secret-core"]
