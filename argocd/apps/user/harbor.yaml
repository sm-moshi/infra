apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: harbor
    app.kubernetes.io/instance: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "31"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/harbor
    helm:
      releaseName: harbor
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true

  # Harbor's Helm chart regenerates these fields with randAlphaNum/genSelfSignedCert
  # on every render, causing an infinite selfHeal restart loop. Ignore them so
  # ArgoCD treats the values set on first deploy as authoritative.
  #
  # The jobservice ConfigMap contains Redis URLs rendered via lookup() which
  # always returns empty under ArgoCD's helm template. The live ConfigMap is
  # patched with correct credentials; RespectIgnoreDifferences prevents overwrite.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: harbor-core
      namespace: apps
      jsonPointers:
        - /data/CSRF_KEY
        - /data/tls.crt
        - /data/tls.key
    - group: ""
      kind: Secret
      name: harbor-registry
      namespace: apps
      jsonPointers:
        - /data/REGISTRY_HTTP_SECRET
    - group: ""
      kind: ConfigMap
      name: harbor-jobservice
      namespace: apps
      jsonPointers:
        - /data/config.yml
