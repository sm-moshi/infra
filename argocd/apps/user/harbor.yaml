apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: harbor
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: harbor
    app.kubernetes.io/instance: harbor
  annotations:
    argocd.argoproj.io/sync-wave: "31"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/harbor
    helm:
      releaseName: harbor
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true
      - ServerSideApply=true

  # Harbor's Helm chart regenerates these fields with randAlphaNum/genSelfSignedCert
  # on every render, causing an infinite selfHeal restart loop. Ignore them so
  # ArgoCD treats the values set on first deploy as authoritative.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: harbor-core
      namespace: apps
      jsonPointers:
        - /data/CSRF_KEY
        - /data/tls.crt
        - /data/tls.key
    - group: ""
      kind: Secret
      name: harbor-registry
      namespace: apps
      jsonPointers:
        - /data/REGISTRY_HTTP_SECRET
    # The harbor-trivy Secret is generated by the Helm chart with an
    # unauthenticated redisURL (lookup() fails under ArgoCD). A SealedSecret
    # in secrets-apps overwrites it with the authenticated Valkey URL.
    # Ignore the diff so ArgoCD doesn't revert the SealedSecret's value.
    - group: ""
      kind: Secret
      name: harbor-trivy
      namespace: apps
      jsonPointers:
        - /data/redisURL
