apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: netbox
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: netbox
    app.kubernetes.io/instance: netbox
  annotations:
    argocd.argoproj.io/sync-wave: "37"
    # ArgoCD Image Updater — netbox image auto-update
    argocd-image-updater.argoproj.io/image-list: "netbox=harbor.m0sh1.cc/apps/netbox"
    argocd-image-updater.argoproj.io/netbox.update-strategy: "latest"
    argocd-image-updater.argoproj.io/netbox.helm.image-name: "netbox.image.repository"
    argocd-image-updater.argoproj.io/netbox.helm.image-tag: "netbox.image.tag"
    argocd-image-updater.argoproj.io/write-back-method: "git:repocreds"
    argocd-image-updater.argoproj.io/write-back-target: "helmvalues"
    argocd-image-updater.argoproj.io/git-branch: "main"
spec:
  project: default

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/user/netbox
    helm:
      releaseName: netbox
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: apps

  info:
    - name: description
      value: "NetBox IPAM/DCIM."
    - name: source
      value: "https://github.com/netbox-community/netbox"
    - name: docs
      value: "https://netboxlabs.com/docs/netbox/"

  # Intentionally not automated until SealedSecrets are committed under
  # apps/user/secrets-apps/ (netbox-existing, netbox-superuser, etc.).
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
