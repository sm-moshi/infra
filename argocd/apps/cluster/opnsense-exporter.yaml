apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opnsense-exporter
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: opnsense-exporter
    app.kubernetes.io/instance: opnsense-exporter
  annotations:
    argocd.argoproj.io/sync-wave: "35"
spec:
  project: cluster

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/cluster/opnsense-exporter
    helm:
      releaseName: opnsense-exporter
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
