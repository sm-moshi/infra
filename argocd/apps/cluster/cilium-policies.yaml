apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium-policies-cluster
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: cilium-policies-cluster
    app.kubernetes.io/instance: cilium-policies-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: cluster

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/cluster/cilium-policies

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ApplyOutOfSyncOnly=true
