apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: crowdsec
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: crowdsec
    app.kubernetes.io/instance: crowdsec
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: cluster

  destination:
    server: https://kubernetes.default.svc
    namespace: crowdsec

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/cluster/crowdsec

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
      - RespectIgnoreDifferences=true

  # CrowdSec's Helm chart generates random csLapiSecret (randAscii 64) and
  # registrationToken (randAlphaNum 48) on every render (lookup fails in
  # ArgoCD's repo-server). Ignore the Secret data AND the LAPI Deployment
  # checksum/lapi-secret annotation so ArgoCD doesn't trigger a rolling
  # restart on every commit to main.
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: crowdsec-lapi-secrets
      namespace: crowdsec
      jsonPointers:
        - /data
    - group: apps
      kind: Deployment
      name: crowdsec-lapi
      namespace: crowdsec
      jqPathExpressions:
        - .spec.template.metadata.annotations["checksum/lapi-secret"]
