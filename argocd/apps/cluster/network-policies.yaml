apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: network-policies-cluster
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: apps-root
    app.kubernetes.io/name: network-policies-cluster
    app.kubernetes.io/instance: network-policies-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "60"
spec:
  project: default

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: apps/cluster/network-policies
    helm:
      releaseName: network-policies-cluster
      valueFiles:
        - values.yaml

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
