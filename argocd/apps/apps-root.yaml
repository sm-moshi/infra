apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: infra
    app.kubernetes.io/name: apps-root
    app.kubernetes.io/instance: apps-root
spec:
  project: root
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/sm-moshi/infra.git
    targetRevision: main
    path: argocd/apps
    directory:
      recurse: true
      include: "{apps-root.yaml,cluster/*.yaml,user/*.yaml}"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
