---
# handlers file for roles/k3s_control_plane
- name: Restart k3s service
  ansible.builtin.systemd:
    name: k3s-lab
    state: restarted
  become: true

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  become: true
  failed_when: false

- name: Restart systemd-networkd
  ansible.builtin.systemd:
    name: systemd-networkd
    state: restarted
  become: true
  failed_when: false
