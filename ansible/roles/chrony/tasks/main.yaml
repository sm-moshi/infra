---
- name: "Chrony | Configure NTP time synchronisation"
  when:
    - chrony_enabled | bool
    - ansible_facts['os_family'] == "Debian"
  block:
    - name: "Chrony | Install chrony"
      ansible.builtin.apt:
        name: chrony
        state: present
        update_cache: true
      become: true

    - name: "Chrony | Disable systemd-timesyncd (replaced by chrony)"
      ansible.builtin.systemd:
        name: systemd-timesyncd
        enabled: false
        state: stopped
      become: true
      failed_when: false

    - name: "Chrony | Deploy chrony.conf"
      ansible.builtin.template:
        src: chrony.conf.j2
        dest: /etc/chrony/chrony.conf
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Restart chrony

    - name: "Chrony | Enable and start chrony"
      ansible.builtin.systemd:
        name: "{{ chrony_service_name }}"
        enabled: true
        state: started
      become: true
