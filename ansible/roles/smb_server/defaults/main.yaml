---
# SPDX-License-Identifier: MIT-0
# ansible-lint: ignore[var-naming]
smb_server_global_username: "tmuser"
# SECURITY: Password must be provided via vault or secure mechanism
# Do not use default passwords in production
smb_server_global_password: "" # Must be overridden with secure password
smb_server_global_hostname: "TIMEMACHINE"
smb_server_global_workgroup: "WORKGROUP"
smb_server_cockpit_enabled: false
smb_server_global_cockpit_admin_user: "admin"
# SECURITY: Password must be provided via vault or secure mechanism
# Do not use default passwords in production
smb_server_global_cockpit_admin_password: "" # Must be overridden with secure password
smb_server_global_cockpit_admin_update_password: "on_create"
smb_server_samba_password_force_update: false

# Time Machine share (LXC-internal)
# ansible-lint: ignore[var-naming]
smb_server_timemachine_enabled: false
smb_server_timemachine_path: "/srv/timemachine"
smb_server_timemachine_dataset: "timemachine/tm-smb"
smb_server_timemachine_user: "tmuser"
smb_server_timemachine_group: "tmuser"
smb_server_timemachine_quota: "500G"
smb_server_timemachine_volume_name: "TimeMachine"

# SMB tuning for Time Machine (SLOG-friendly but not over-strict)
# Let macOS decide when to fsync; ZFS+SLOG handles those safely.
# ansible-lint: ignore[var-naming]
smb_server_timemachine_strict_sync: "yes"
smb_server_timemachine_sync_always: "no"
smb_server_timemachine_vfs_fruit: true

# Archive share (DMG / disk image archive)
# ansible-lint: ignore[var-naming]
smb_server_archive_enabled: false
smb_server_archive_path: "/srv/archive"
smb_server_archive_dataset: "datengrab/archive"
smb_server_archive_user: "tmuser"
smb_server_archive_group: "tmuser"

# SMB tuning for Archive (async, high-throughput)
# ansible-lint: ignore[var-naming]
smb_server_archive_strict_sync: "no"
smb_server_archive_sync_always: "no"
smb_server_archive_vfs_fruit: false

# Media share
smb_server_media_enabled: false
smb_server_media_path: "/srv/media"
smb_server_media_dataset: "datengrab/media"
smb_server_media_user: "{{ smb_server_global_username }}"
smb_server_media_group: "{{ smb_server_global_username }}"

# Media sync behaviour (async by default – rely on ZFS, not Samba)
smb_server_media_strict_sync: "no"
smb_server_media_sync_always: "no"

# Paperless SMB inbox share and host-side API ingest bridge
smb_server_paperless_enabled: false
smb_server_paperless_share_name: "PaperlessInbox"
smb_server_paperless_root_path: "/srv/paperless"
smb_server_paperless_incoming_path: "{{ smb_server_paperless_root_path }}/incoming"
smb_server_paperless_processed_path: "{{ smb_server_paperless_root_path }}/processed"
smb_server_paperless_failed_path: "{{ smb_server_paperless_root_path }}/failed"
smb_server_paperless_user: "{{ smb_server_global_username }}"
smb_server_paperless_group: "{{ smb_server_global_username }}"
smb_server_paperless_strict_sync: "no"
smb_server_paperless_sync_always: "no"

smb_server_paperless_ingest_enabled: "{{ smb_server_paperless_enabled }}"
smb_server_paperless_ingest_service_name: "paperless-ingest"
smb_server_paperless_ingest_env_file: "/etc/paperless-ingest.env"
smb_server_paperless_ingest_script_path: "/usr/local/sbin/paperless-ingest.sh"
smb_server_paperless_ingest_on_boot_sec: "2m"
smb_server_paperless_ingest_on_unit_active_sec: "5m"
smb_server_paperless_ingest_randomized_delay_sec: "30s"
smb_server_paperless_api_url: "{{ vault_smb_server_paperless_api_url | default('') }}"
smb_server_paperless_api_username: "{{ vault_smb_server_paperless_api_username | default('') }}"
smb_server_paperless_api_password: "{{ vault_smb_server_paperless_api_password | default('') }}"
smb_server_paperless_metrics_enabled: true
smb_server_paperless_metrics_textfile_dir: "/var/lib/node_exporter/textfile_collector"
smb_server_paperless_metrics_file: "{{ smb_server_paperless_metrics_textfile_dir }}/paperless_ingest.prom"
smb_server_paperless_recursive_import: true
smb_server_paperless_folder_tags_enabled: true
smb_server_paperless_folder_tag_depth: 1
smb_server_paperless_allowed_extensions:
  - pdf
  - png
  - jpg
  - jpeg
  - tif
  - tiff
  - webp
