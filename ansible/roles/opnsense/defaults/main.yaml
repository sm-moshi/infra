---
# defaults file for opnsense

# Local directory for storing configuration backups
opnsense_backup_dir: /tmp/opnsense-backups

# Number of days to retain local backups
opnsense_backup_retention_days: 30

# Timeout for command execution (seconds)
opnsense_command_timeout: 300

# Whether to perform automatic config backup before changes
opnsense_auto_backup: true

# Directory for utility scripts on OPNsense host
opnsense_scripts_dir: /usr/local/bin/opn-scripts

# OPNsense API connection (supports vault vars or exported environment vars)
opnsense_api_url: "https://{{ ansible_host }}"
opnsense_api_key: "{{ vault_opnsense_api_key | default(lookup('ansible.builtin.env', 'OPNSENSE_API_KEY')) }}"
opnsense_api_secret: "{{ vault_opnsense_api_secret | default(lookup('ansible.builtin.env', 'OPNSENSE_API_SECRET')) }}"

# Git-managed Unbound app DNS sync
opnsense_unbound_app_domain: m0sh1.cc
opnsense_unbound_app_vip_ipv4: ""
opnsense_unbound_app_vip_ipv6: ""
opnsense_unbound_managed_description: Managed by infra GitOps
