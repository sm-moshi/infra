---
# Main tasks file for opnsense role

- name: Include script deployment tasks
  ansible.builtin.include_tasks:
    file: scripts.yaml
  tags:
    - opnsense
    - opnsense_scripts

- name: Ensure local backup directory exists
  ansible.builtin.file:
    path: "{{ opnsense_backup_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  tags:
    - opnsense
    - opnsense_backup

- name: Include ClamAV management tasks
  ansible.builtin.include_tasks:
    file: clamav.yaml
  tags:
    - opnsense
    - opnsense_clamav

- name: Include Suricata IDS management tasks
  ansible.builtin.include_tasks:
    file: suricata.yaml
  tags:
    - opnsense
    - opnsense_suricata

- name: Include Unbound app DNS sync tasks
  ansible.builtin.include_tasks:
    file: dns.yaml
  tags:
    - opnsense
    - opnsense_dns

- name: Include monitoring firewall sync tasks
  ansible.builtin.include_tasks:
    file: monitoring.yaml
  tags:
    - opnsense
    - opnsense_monitoring

- name: Display OPNsense management role info
  ansible.builtin.debug:
    msg: |
      OPNsense management role loaded for {{ inventory_hostname }}
      Available tags:
        - opnsense_scripts: Deploy utility scripts
        - opnsense_backup: Configuration backup operations
        - opnsense_update: System and package updates
        - opnsense_service: Service management
        - opnsense_status: Status checks
        - opnsense_clamav: Disable ClamAV (memory hog on 4GB VM)
        - opnsense_suricata: Suricata IDS rule updates
        - opnsense_dns: Reconcile Git-managed Unbound app DNS overrides
        - opnsense_monitoring: Reconcile Git-managed firewall rules for monitoring reachability

      Use --tags to run specific operations.
      Example: ansible-playbook opnsense.yaml --tags opnsense_backup
  tags:
    - opnsense
    - always
