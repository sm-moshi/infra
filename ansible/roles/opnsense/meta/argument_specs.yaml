---
argument_specs:
  main:
    short_description: Manage OPNsense firewall routine operations
    description:
      - Role for executing common OPNsense management tasks
      - Supports configuration backups, service management, and system updates
      - All tasks are idempotent and support check mode
    author:
      - Infrastructure Team
    options:
      opnsense_backup_dir:
        description:
          - Local directory path for storing configuration backups
        type: str
        default: /tmp/opnsense-backups
      opnsense_backup_retention_days:
        description:
          - Number of days to retain local configuration backups
        type: int
        default: 30
      opnsense_command_timeout:
        description:
          - Timeout in seconds for command execution
        type: int
        default: 300
      opnsense_auto_backup:
        description:
          - Whether to automatically backup configuration before changes
        type: bool
        default: true
      opnsense_scripts_dir:
        description:
          - Directory on OPNsense host for utility scripts
        type: str
        default: /usr/local/bin/opn-scripts
      opnsense_api_url:
        description:
          - Base URL for the OPNsense API
        type: str
      opnsense_api_key:
        description:
          - OPNsense API key for mutable API operations
        type: str
      opnsense_api_secret:
        description:
          - OPNsense API secret for mutable API operations
        type: str
      opnsense_unbound_app_domain:
        description:
          - DNS zone managed by the Git-driven Unbound app DNS sync
        type: str
        default: m0sh1.cc
      opnsense_unbound_app_vip_ipv4:
        description:
          - IPv4 Traefik VIP used for internal application A records
        type: str
      opnsense_unbound_app_vip_ipv6:
        description:
          - IPv6 Traefik VIP used for internal application AAAA records
        type: str
      opnsense_unbound_managed_description:
        description:
          - Description prefix used to mark Git-managed Unbound host overrides
        type: str
        default: Managed by infra GitOps
      opnsense_monitoring_managed_description:
        description:
          - Description prefix used to mark Git-managed firewall monitoring rules
        type: str
        default: Managed by infra GitOps
      opnsense_monitoring_smb_node_exporter_rule_enabled:
        description:
          - Whether to enforce the managed firewall rule that allows Prometheus to scrape SMB node_exporter
        type: bool
        default: false
      opnsense_monitoring_smb_node_exporter_rule_description:
        description:
          - Rule description used to identify the managed SMB node_exporter firewall rule
        type: str
      opnsense_monitoring_smb_node_exporter_interface:
        description:
          - OPNsense interface where the SMB node_exporter allow rule must be applied
        type: str
      opnsense_monitoring_smb_node_exporter_source_net:
        description:
          - Source CIDR allowed to reach SMB node_exporter
        type: str
      opnsense_monitoring_smb_node_exporter_destination_net:
        description:
          - Destination host/IP for SMB node_exporter scrape
        type: str
      opnsense_monitoring_smb_node_exporter_destination_port:
        description:
          - Destination TCP port for SMB node_exporter scrape
        type: str
      opnsense_monitoring_smb_node_exporter_protocol:
        description:
          - Layer 4 protocol used by the SMB node_exporter rule
        type: str
      opnsense_monitoring_smb_node_exporter_ipprotocol:
        description:
          - IP protocol family for the SMB node_exporter firewall rule
        type: str
