---
# SPDX-License-Identifier: MIT-0

- name: Add EFI disk (OVMF) if missing
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --efidisk0
      - "{{ proxmox_template_fedora_storage }}:0,pre-enrolled-keys=1,efitype=4m"
  when: "'efidisk0:' not in proxmox_template_fedora_qm_config_current.stdout"
  changed_when: true

- name: Add cloud-init drive if missing
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --ide2
      - "{{ proxmox_template_fedora_storage }}:cloudinit"
  when: "'ide2:' not in proxmox_template_fedora_qm_config_current.stdout"
  changed_when: true

- name: Set cloud-init user
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --ciuser
      - "{{ proxmox_template_fedora_ciuser }}"
  when: proxmox_template_fedora_ciuser | length > 0
  changed_when: true

- name: Set cloud-init password (when provided)
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --cipassword
      - "{{ proxmox_template_fedora_cipassword }}"
  when: proxmox_template_fedora_cipassword | length > 0
  changed_when: true
  no_log: true

- name: Normalise SSH public keys input
  ansible.builtin.set_fact:
    proxmox_template_fedora_ssh_public_keys_normalized: >-
      {{
        (proxmox_template_fedora_ssh_public_keys
         if proxmox_template_fedora_ssh_public_keys is sequence
         else proxmox_template_fedora_ssh_public_keys | splitlines())
        | map('trim')
        | reject('equalto', '')
        | list
      }}
  changed_when: false

- name: Write temporary SSH keys file for cloud-init
  ansible.builtin.copy:
    dest: "/tmp/proxmox-sshkeys-{{ proxmox_template_fedora_vmid }}"
    content: |-
      {% for k in proxmox_template_fedora_ssh_public_keys_normalized %}
      {{ k }}
      {% endfor %}
    owner: root
    group: root
    mode: "0600"
  when: proxmox_template_fedora_ssh_public_keys_normalized | length > 0

- name: Inject SSH public keys into cloud-init
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --sshkeys
      - "/tmp/proxmox-sshkeys-{{ proxmox_template_fedora_vmid }}"
  when: proxmox_template_fedora_ssh_public_keys_normalized | length > 0
  changed_when: true

- name: Remove temporary SSH keys file
  ansible.builtin.file:
    path: "/tmp/proxmox-sshkeys-{{ proxmox_template_fedora_vmid }}"
    state: absent
  when: proxmox_template_fedora_ssh_public_keys_normalized | length > 0

- name: Configure VGA device
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --vga
      - "{{ proxmox_template_fedora_vga }}"
  changed_when: true

- name: Configure serial console (optional)
  ansible.builtin.command:
    argv:
      - qm
      - set
      - "{{ proxmox_template_fedora_vmid }}"
      - --serial0
      - "{{ proxmox_template_fedora_serial0 }}"
  when: proxmox_template_fedora_serial0 | length > 0
  changed_when: true
