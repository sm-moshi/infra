---
- name: "Unattended Upgrades | Configure automatic security patching"
  when:
    - unattended_upgrades_enabled | bool
    - ansible_facts['os_family'] == "Debian"
  block:
    - name: "Unattended Upgrades | Install packages"
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - apt-listchanges
        state: present
        update_cache: true
      become: true

    - name: "Unattended Upgrades | Deploy APT periodic config"
      ansible.builtin.template:
        src: 20auto-upgrades.j2
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        owner: root
        group: root
        mode: "0644"
      become: true

    - name: "Unattended Upgrades | Deploy unattended-upgrades config"
      ansible.builtin.template:
        src: 50unattended-upgrades.j2
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        owner: root
        group: root
        mode: "0644"
      become: true
      notify: Restart unattended-upgrades

    - name: "Unattended Upgrades | Ensure dependencies for notifications"
      ansible.builtin.apt:
        name:
          - curl
          - jq
        state: present
      become: true
      when: unattended_upgrades_webhook_url | length > 0

    - name: "Unattended Upgrades | Deploy notification script"
      ansible.builtin.template:
        src: unattended-upgrades-notify.sh.j2
        dest: /usr/local/sbin/unattended-upgrades-notify.sh
        owner: root
        group: root
        mode: "0755"
      become: true
      when: unattended_upgrades_webhook_url | length > 0

    - name: "Unattended Upgrades | Deploy notification service"
      ansible.builtin.template:
        src: unattended-upgrades-notify.service.j2
        dest: /etc/systemd/system/unattended-upgrades-notify.service
        owner: root
        group: root
        mode: "0644"
      become: true
      when: unattended_upgrades_webhook_url | length > 0
      notify: Reload systemd

    - name: "Unattended Upgrades | Deploy notification timer"
      ansible.builtin.template:
        src: unattended-upgrades-notify.timer.j2
        dest: /etc/systemd/system/unattended-upgrades-notify.timer
        owner: root
        group: root
        mode: "0644"
      become: true
      when: unattended_upgrades_webhook_url | length > 0
      notify: Reload systemd

    - name: "Unattended Upgrades | Flush handlers before enabling services"
      ansible.builtin.meta: flush_handlers

    - name: "Unattended Upgrades | Enable unattended-upgrades service"
      ansible.builtin.systemd:
        name: unattended-upgrades
        enabled: true
        state: started
      become: true

    - name: "Unattended Upgrades | Enable notification timer"
      ansible.builtin.systemd:
        name: unattended-upgrades-notify.timer
        enabled: true
        state: started
      become: true
      when: unattended_upgrades_webhook_url | length > 0
