---
# Role: proxmox_oidc_realm
#
# Configures an OpenID Connect realm on Proxmox VE / PBS nodes
# using Authentik as the identity provider.

proxmox_oidc_realm_enabled: false

# Realm configuration
proxmox_oidc_realm_name: "authentik"
proxmox_oidc_realm_issuer_url: "https://auth.m0sh1.cc/application/o/proxmox/"

# Credentials — MUST be provided via Ansible Vault, never in defaults
# proxmox_oidc_realm_client_id: ""
# proxmox_oidc_realm_client_secret: ""

# OIDC claim used for the Proxmox username (user@realm)
# Official Authentik docs recommend "username" (not "preferred_username")
proxmox_oidc_realm_username_claim: "username"

# Auto-create users on first login
proxmox_oidc_realm_autocreate: true

# Set as default realm (false = users must explicitly select it)
proxmox_oidc_realm_default: false

# OIDC scopes to request
# NOTE: Do NOT include "openid" — Proxmox's OIDC library adds it automatically.
# Including it causes scope duplication (openid appears twice in the auth URL).
proxmox_oidc_realm_scopes: "email profile"

# Force delete+recreate the realm (needed when changing username-claim,
# which can only be set at creation time, not via modify/update)
proxmox_oidc_realm_force_recreate: false

# Service management
proxmox_oidc_realm_restart_services: true
