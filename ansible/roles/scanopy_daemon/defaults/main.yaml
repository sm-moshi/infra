---
# Default variables for scanopy_daemon role

# Scanopy daemon version (GitHub release tag)
scanopy_daemon_version: v0.14.5

# Architecture for binary download (amd64 or arm64)
scanopy_daemon_arch: amd64

# Install path for the daemon binary
scanopy_daemon_bin: /usr/local/bin/scanopy-daemon

# Scanopy server URL
scanopy_daemon_server_url: https://scanopy.m0sh1.cc

# Scanopy network ID (required)
scanopy_daemon_network_id: ""

# Scanopy user ID (required)
scanopy_daemon_user_id: ""

# Daemon display name in Scanopy UI
scanopy_daemon_name: scanopy-daemon

# Daemon polling mode
scanopy_daemon_mode: daemon_poll

# Heartbeat interval in seconds
scanopy_daemon_heartbeat_interval: 30

# Log level
scanopy_daemon_log_level: info

# /etc/hosts override IP for scanopy.m0sh1.cc (bypasses DNS for musl/hickory-resolver)
# Set to a K8s worker IP when the daemon can't resolve via DNS or reach VLAN 30 directly.
scanopy_daemon_hosts_ip: ""

# Whether to configure static routes for VLAN access via eth1
scanopy_daemon_configure_routes: false

# Restrict scanning to specific network interfaces (comma-separated).
# Empty list = scan all interfaces (default daemon behavior).
scanopy_daemon_interfaces: []
