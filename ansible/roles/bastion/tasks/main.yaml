- name: Include base system tasks
  ansible.builtin.import_tasks: base.yaml
  tags: [bastion, base]

- name: Include /etc/hosts tasks
  ansible.builtin.import_tasks: hosts.yaml
  tags: [bastion, hosts]

- name: Include SSH hardening tasks
  ansible.builtin.import_tasks: ssh.yaml
  tags: [bastion, ssh]

- name: Include journald tasks
  ansible.builtin.import_tasks: journald.yaml
  tags: [bastion, journald]

- name: Include firewalld tasks
  ansible.builtin.import_tasks: firewalld.yaml
  tags: [bastion, firewall]

- name: Include fail2ban tasks
  ansible.builtin.import_tasks: fail2ban.yaml
  tags: [bastion, fail2ban]

- name: Include bash enhancements
  ansible.builtin.import_tasks: bash.yaml
