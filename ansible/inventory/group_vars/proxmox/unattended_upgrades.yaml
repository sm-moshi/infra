---
# Proxmox hypervisors: enable unattended upgrades with safety guards
unattended_upgrades_enabled: true
unattended_upgrades_auto_reboot: false

unattended_upgrades_blacklist:
  - "pve-kernel-.*"
  - "proxmox-ve"
  - "pve-manager"
  - "pve-firmware"
  - "pve-ha-.*"
  - "qemu-server"
  - "libpve-.*"
  - "ceph.*"
  - "corosync"
