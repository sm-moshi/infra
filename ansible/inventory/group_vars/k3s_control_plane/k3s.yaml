k3s_service_name: "lab"
k3s_version: "v1.35.2+k3s1"
k3s_disable:
  - servicelb
  - coredns

# Dual-stack CIDRs (IPv4 defaults + IPv6 ULA overlay)
# Pod overlay: fd00:42::/48 gives 65536 /64 subnets (one per node)
# Service overlay: fd00:43::/112 gives 65536 ClusterIPs
# K3s still needs these for API server service IP allocation,
# even though Cilium handles pod IPAM separately via cluster-pool mode.
k3s_cluster_cidr: "10.42.0.0/16,fd00:42::/48"
k3s_service_cidr: "10.43.0.0/16,fd00:43::/112"

# Cilium CNI: disable flannel, built-in network policy, and kube-proxy
k3s_flannel_backend: "none"
k3s_disable_network_policy: true
k3s_disable_kube_proxy: true

k3s_server_tls_sans:
  - labctrl.m0sh1.cc
  #  - lab-ctrl.xerus-nominal.ts.net
  - 10.0.20.20
  - fd00:1:20::20
  - 10.43.0.1
  - 127.0.0.1
  - ::1
#  - 100.120.6.30
# TEMP: disable Harbor mirrors until harbor.m0sh1.cc connectivity is fixed
k3s_enable_harbor_mirrors: true
k3s_registry_tls_insecure_skip_verify: false
k3s_registry_auth_required: true
k3s_registry_tls_ca_file: /usr/local/share/ca-certificates/harbor-ca.crt

# Prevent rootfs exhaustion from unbounded container logs and keep more headroom
# for sudden image pulls on ~50GiB nodes.
k3s_kubelet_args_common:
  - "container-log-max-size=10Mi"
  - "container-log-max-files=3"
  - "image-gc-high-threshold=70"
  - "image-gc-low-threshold=60"

# OIDC configuration for Headlamp via Authentik
k3s_oidc_issuer_url: "https://auth.m0sh1.cc/application/o/headlamp/"
k3s_oidc_client_id: "78ac94bb-5ea4-4aa9-86e5-8fa5aa40"
k3s_oidc_username_claim: "preferred_username"
k3s_oidc_groups_claim: "groups"
