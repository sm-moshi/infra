k3s_service_name: "lab"
k3s_version: "v1.35.0+k3s1"
k3s_disable:
  - servicelb
  - coredns
k3s_server_tls_sans:
  - labctrl.m0sh1.cc
  #  - lab-ctrl.xerus-nominal.ts.net
  - 10.0.20.20
  - 10.43.0.1
  - 127.0.0.1
  - ::1
#  - 100.120.6.30
# TEMP: disable Harbor mirrors until harbor.m0sh1.cc connectivity is fixed
k3s_enable_harbor_mirrors: true
k3s_registry_tls_insecure_skip_verify: false
k3s_registry_auth_required: true
k3s_registry_tls_ca_file: /usr/local/share/ca-certificates/harbor-ca.crt

# Prevent rootfs exhaustion from unbounded container logs and keep more headroom
# for sudden image pulls on ~50GiB nodes.
k3s_kubelet_args_common:
  - "container-log-max-size=10Mi"
  - "container-log-max-files=3"
  - "image-gc-high-threshold=70"
  - "image-gc-low-threshold=60"
