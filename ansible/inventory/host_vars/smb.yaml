---
# SMB host-specific configuration

# Keep this LXC minimal: no legacy Time Machine/archive/media shares and no Cockpit.
smb_server_global_username: "paperlessdrop"
smb_server_global_hostname: "PAPERLESSSMB"
smb_server_cockpit_enabled: false
smb_server_timemachine_enabled: false
smb_server_archive_enabled: false
smb_server_media_enabled: false
node_exporter_extra_args:
  - "--collector.textfile.directory=/var/lib/node_exporter/textfile_collector"
node_exporter_textfile_dir_mode: "2775"
node_exporter_cleanup_downloads: false

# Enable the Paperless SMB inbox share and host-side API ingest bridge.
smb_server_paperless_enabled: true
smb_server_paperless_ingest_enabled: true
