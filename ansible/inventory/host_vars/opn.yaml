---
# OPNsense host-specific variables

# Connection settings (already defined in hosts.ini, but documented here)
# ansible_host: 10.0.10.1
# ansible_user: smeya
# ansible_ssh_private_key_file: /Users/smeya/.ssh/m0sh1

# OPNsense role configuration
opnsense_backup_dir: /tmp/opnsense-backups
opnsense_backup_retention_days: 30
opnsense_command_timeout: 300
opnsense_auto_backup: true
opnsense_unbound_app_domain: m0sh1.cc
opnsense_unbound_app_vip_ipv4: 10.0.30.10
opnsense_unbound_app_vip_ipv6: fd00:1:30::10
opnsense_unbound_managed_description: Managed by infra GitOps
opnsense_monitoring_smb_node_exporter_rule_enabled: true
opnsense_monitoring_smb_node_exporter_interface: opt2
opnsense_monitoring_smb_node_exporter_source_net: 10.42.0.0/16
opnsense_monitoring_smb_node_exporter_destination_net: 10.0.10.100
opnsense_monitoring_smb_node_exporter_destination_port: "9100"

# Optional: Define specific actions for service management
# opnsense_action: reload_all  # Options: reload_all, reload_filter, reload_firewall, update_packages
