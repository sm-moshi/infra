---
# Playbook: Deploy Scanopy network discovery daemon
# Purpose: Install Scanopy daemon binary on hosts in the scanopy_daemon group
# Targets:
#   - scanopy-daemon LXC (VMID 106): WiFi subnet scanner (10.0.0.0/24)
#   - pve01: Tailscale network scanner (tailscale0 interface)
#
# Prerequisites:
#   - Scanopy credentials stored in Ansible Vault (group_vars/all/vault.yaml)
#   - Host configuration in host_vars/<hostname>.yaml
#
# Usage:
#   ansible-playbook ansible/playbooks/scanopy-daemon.yaml
#   ansible-playbook ansible/playbooks/scanopy-daemon.yaml --limit pve01

- name: Deploy Scanopy daemon
  hosts: scanopy_daemon
  become: true

  roles:
    - role: scanopy_daemon

  post_tasks:
    - name: Verify daemon service is active
      ansible.builtin.systemd:
        name: scanopy-daemon
      register: scanopy_service

    - name: Display deployment info
      ansible.builtin.debug:
        msg:
          - "Scanopy daemon deployed successfully!"
          - "Binary: {{ scanopy_daemon_bin }}"
          - "Service: scanopy-daemon ({{ scanopy_service.status.ActiveState }})"
          - "Server: {{ scanopy_daemon_server_url }}"
          - "Name: {{ scanopy_daemon_name }}"
          - "Interfaces: {{ scanopy_daemon_interfaces | default([]) | join(', ') | default('all', true) }}"
