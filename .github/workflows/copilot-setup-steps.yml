name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
    - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
    - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - uses: jdx/mise-action@c1ecc8f748cd28cdeabf76dab3cccde4ce692fe4 # v4
      with:
        version: 2026.2.19
      env:
        MISE_TRUSTED_CONFIG: "1"

    - name: Install Mise Tools
      env:
        MISE_TRUSTED_CONFIG: "1"
      run: mise install

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
      with:
        python-version: "3.14.3"

    - name: Install Python tooling (Ansible, linters)
      run: |
        python -m pip install --upgrade pip
        pip install ansible ansible-lint yamllint

    - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
      with:
        terraform_version: "1.14.3"

    - name: Print tool versions
      run: |
        python --version
        ansible --version
        ansible-lint --version
        yamllint --version
        terraform version
        helm version || true
        kubectl version --client || true
