min_version = "2026.2.19"

[settings]
auto_install           = true
not_found_auto_install = true

[settings.status]
show_tools = true
show_env   = false
truncate   = true

[tools]
docker-cli   = "29.2.1"
node         = "25.8.0"
ansible      = { version = "13.4.0", pipx_args = "--include-deps", uvx = "false" }
ansible-core = "2.20.3"
kubectl      = "1.35.2"
kustomize    = "5.8.1"
kubeconform  = "0.7.0"
kube-linter  = "0.8.1"
kubeseal     = "0.36.0"
trivy        = "0.69.3"
terraform    = "1.14.6"
python       = "3.14.3"
shellcheck   = "0.11.0"
yamllint     = "1.38.0"
eza          = "0.23.4"
fd           = "10.3.0"
rg           = "15.1.0"
git-cliff    = "2.12.0"
yq           = "4.52.4"
prek         = "0.3.4"
go           = "1.26.1"
helm = "4.1.1"
uv = "0.10.8"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.hooks-install]
description = "Install prek hooks"
run         = "prek install -f"

[tasks.pre-commit-run]
description = "Run prek hooks"
run         = "prek run --all-files"

[tasks.markdown-lint]
description = "Lint Markdown files"
run         = "rumdl --config .rumdl.toml check ."

[tasks.markdown-fix]
description = "Fix Markdown files"
run         = "rumdl --config .rumdl.toml fmt ."

[tasks.guard-build]
description = "Build the infra-guard binary"
run         = "go build -C tools/cli -o ../../tools/ci/infra-guard ./cmd/infra-guard"

[tasks.path-drift]
description = "Check for path drift and deprecated references"
depends     = ["guard-build"]
run         = "tools/ci/infra-guard path-drift"

[tasks.sensitive-files]
description = "Check for sensitive filenames"
depends     = ["guard-build"]
run         = "tools/ci/infra-guard sensitive-files"

[tasks.gitkeep-clean]
description = "Find and remove .gitkeep files from the repo"
depends     = ["guard-build"]
run         = "tools/ci/infra-guard gitkeep --remove"

[tasks.supply-chain]
description = "Supply chain guard checks"
depends     = ["guard-build"]
run         = "tools/ci/infra-guard supply-chain"

[tasks.cleanup]
description = "Find .DS_Store, *.lock, *.tgz files (dry-run)"
depends     = ["guard-build"]
run         = "tools/ci/infra-guard cleanup"

[tasks.cleanup-remove]
description = "Remove .DS_Store, *.lock, *.tgz files"
depends     = ["guard-build"]
run         = "tools/ci/infra-guard cleanup --remove"

[tasks.helm-deps-update]
description = "Update Helm chart dependencies"
run = """
set -euo pipefail
for chart in apps/cluster/*/ apps/user/*/; do
  [ -f "${chart}Chart.yaml" ] || continue
  if ! helm dependency update --skip-refresh "${chart}" 2>/dev/null; then
    echo "  cache miss for ${chart} — refreshing repos"
    helm dependency update "${chart}"
  fi
done
"""

[tasks.helm-lint]
description = "Lint Helm charts (builds missing deps automatically)"
run = """
set -euo pipefail
for chart in apps/cluster/*/ apps/user/*/; do
  [ -f "${chart}Chart.yaml" ] || continue
  if [ -f "${chart}Chart.lock" ] && { [ ! -d "${chart}charts" ] || [ -z "$(ls -A "${chart}charts/" 2>/dev/null)" ]; }; then
    if ! helm dependency build --skip-refresh "${chart}" >/dev/null 2>&1; then
      helm dependency build "${chart}" >/dev/null
    fi
  fi
  helm lint "${chart}"
done
"""

[tasks.k8s-lint]
description = "Lint Helm charts and validate Kubernetes manifests"
run         = "tools/ci/k8s-lint.sh"

[tasks.k8s-lint-changed]
description = "Lint only charts changed vs base branch"
run         = "tools/ci/k8s-lint.sh --changed"

[tasks.ansible-idempotency]
description = "Check Ansible playbooks for idempotency issues"
depends     = ["guard-build"]
run = """
set -euo pipefail
if [ ! -d ansible/playbooks ]; then
  echo "ansible/playbooks not found; skipping."
  exit 0
fi
files=$(find ansible/playbooks -maxdepth 1 -type f -name "*.yml"; find ansible/playbooks -maxdepth 1 -type f -name "*.yaml")
if [ -z "$files" ]; then
  echo "No playbooks found; skipping."
  exit 0
fi
tools/ci/infra-guard idempotency $files
"""

[tasks.terraform-validate]
description = "Terraform fmt+validate (lab env, no backend)"
run = """
set -euo pipefail
terraform -chdir=terraform fmt -check -recursive
terraform -chdir=terraform/envs/lab init -backend=false
terraform -chdir=terraform/envs/lab validate
"""

[tasks.changelog]
description = "Generate CHANGELOG.md from conventional commits"
run         = "git-cliff --config cliff.toml --output CHANGELOG.md"

[tasks.changelog-unreleased]
description = "Preview unreleased changelog entries"
run         = "git-cliff --config cliff.toml --unreleased"

[tasks.harbor-warm]
description = "Stage and warm Harbor proxy cache from manifest"
run         = "tools/patching/scripts/warm-all.sh"

[tasks.harbor-warm-dry]
description = "Dry-run: show what harbor-warm would do"
run         = "tools/patching/scripts/warm-all.sh --dry-run"

[tasks.harbor-stage]
description = "Stage base images only (no cache warming)"
run         = "tools/patching/scripts/stage-base-images.sh"

[tasks.harbor-stage-oci]
description = "Stage OCI artifacts (charts) via Harbor proxy cache"
run         = "tools/patching/scripts/stage-oci-artifacts.sh"

[tasks.harbor-stage-oci-dry]
description = "Dry-run: show what harbor-stage-oci would do"
run         = "tools/patching/scripts/stage-oci-artifacts.sh --dry-run"

# ── DHI Catalog Tracker ──────────────────────────────────────────────

[tasks.dhi-create]
description = "Bootstrap DHI catalog database from seed data + live registry"
dir         = "tools/cli"
run         = "go run ./cmd/dhi-db create"

[tasks.dhi-check]
description = "Compare local DHI catalog against live registry (read-only)"
dir         = "tools/cli"
run         = "go run ./cmd/dhi-db check"

[tasks.dhi-update]
description = "Refresh local DHI catalog with latest from registry"
dir         = "tools/cli"
run         = "go run ./cmd/dhi-db update"

[tasks.dhi-upgrade]
description = "Show available DHI version bumps for deployed apps (dry-run)"
dir         = "tools/cli"
run         = "go run ./cmd/dhi-db upgrade"

[tasks.dhi-export]
description = "Export DHI catalog database to YAML"
dir         = "tools/cli"
run         = "go run ./cmd/dhi-db export -o data/dhi-db/dhi-catalog.yaml"
