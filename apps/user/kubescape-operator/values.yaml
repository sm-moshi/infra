kubescape-operator:
  clusterName: lab
  ksNamespace: kubescape
  global:
    overrideRuntimePath: "/host/var/lib/rancher/k3s/data/current/bin/runc"
  capabilities:
    # Functional baseline:
    # - enable operator + posture scanning
    # - keep vulnerability/node/runtime features off for now
    #
    # CRITICAL: backend-storage must be OMITTED (not set to enable/disable).
    # Setting "enable" disables ALL scanners (kubescape, kubevuln, hostScanner)
    # because the chart gates them on (not backendStorageEnabled).
    # Omitting it causes the chart to render storage Deployment + APIService,
    # but ArgoCD syncOptions Exclude blocks those resources from being applied.
    # See argocd/apps/user/kubescape-operator.yaml for the exclusion rules.
    operator: enable
    configurationScan: enable
    continuousScan: enable
    networkEventsStreaming: disable
    nodeScan: disable
    # Stage-1 safe baseline: keep image vulnerability features off until
    # storage-free posture scanning proves stable again.
    nodeSbomGeneration: disable
    vulnerabilityScan: disable
    relevancy: disable
    runtimeObservability: disable
    runtimeDetection: disable
    malwareDetection: disable
    networkPolicyService: disable
    nodeProfileService: disable
    admissionController: disable
    httpDetection: disable
    seccompProfileService: disable
    autoUpgrading: disable
    prometheusExporter: disable

  # Storage API and pods MUST be disabled to prevent APIService cluster hangs.
  # Chart logic: omit backend-storage capability + storage.enabled=false
  storage:
    enabled: false

  kubescape:
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 750m
        memory: 512Mi

  # kubevuln defaults to 5Gi memory limit; that is unnecessary for our current
  # workload and can contribute to node pressure. Keep enough headroom for
  # image scans, but cap it below the upstream default.
  kubevuln:
    resources:
      requests:
        cpu: 300m
        memory: 1Gi
        ephemeral-storage: 5Gi
      limits:
        cpu: 1500m
        memory: 2Gi
        ephemeral-storage: 10Gi
    config:
      # Large images can take longer than the default; keep timeout aligned
      # with our slower, stability-first scan profile.
      scanTimeout: 10m

  # Stagger image-vuln scans away from posture scans to reduce scan bursts.
  kubevulnScheduler:
    scanSchedule: "42 3 * * *"
  configurations:
    priorityClass:
      enabled: false
  operator:
    # Explicitly size the controller deployment (this is the chart key used by
    # the rendered `operator` Deployment).
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
