trivy-operator:
  fullnameOverride: trivy-operator
  # Empty targetNamespaces means cluster-wide scan scope.
  targetNamespaces: ""
  image:
    registry: harbor.m0sh1.cc
    repository: hub/aquasec/trivy-operator
    tag: "0.30.0"

  # Note: This file is values for the *subchart* `trivy-operator`.
  # Keys under `trivy-operator:` must match upstream `helm show values aquasecurity/trivy-operator`.

  operator:
    # Least privilege: don't let scan jobs scrape arbitrary secrets/serviceaccounts
    # from the namespace. This prevents accidental credential mismatch.
    accessGlobalSecretsAndServiceAccount: false
    # Scan jobs need registry credentials to pull private images (e.g. DHI).
    # Provide a namespace->secret(s) map used when workloads don't declare imagePullSecrets.
    privateRegistryScanSecretsNames:
      apps: "kubernetes-dhi,trivy-scan-regcred"
      argocd: "kubernetes-dhi,trivy-scan-regcred"
      cert-manager: "kubernetes-dhi,trivy-scan-regcred"
      cnpg-system: "kubernetes-dhi,trivy-scan-regcred"
      external-dns: "kubernetes-dhi,trivy-scan-regcred"
      metallb-system: "kubernetes-dhi,trivy-scan-regcred"
      monitoring: "kubernetes-dhi,trivy-scan-regcred"
      traefik: "kubernetes-dhi,trivy-scan-regcred"
    # Force operator pod template refresh so updated OPERATOR_* configmap-backed
    # env values are applied immediately on sync.
    podLabels:
      trivy-config-rev: "20260212-2"
    replicas: 1
    # Keep concurrency moderate to reduce parallel DB/download pressure and scan flakiness.
    scanJobsConcurrentLimit: 1
    scanNodeCollectorLimit: 1
    scanJobTimeout: 15m
    # Back off failed scans to avoid tight error loops hammering registries/Harbor.
    scanJobsRetryDelay: 2m
    # Use a single in-cluster Trivy server so scan jobs don't all re-download
    # vulnerability DB layers during init.
    builtInTrivyServer: true
    # Keep failed/succeeded scan pods around only briefly to reduce namespace clutter.
    scanJobTTL: 10m

  # Operator Deployment resources / security settings live at the chart root (not under `operator:`).
  resources:
    requests:
      cpu: 150m
      memory: 384Mi
    limits:
      cpu: 1
      memory: 768Mi

  serviceAccount:
    create: true

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

  trivyOperator:
    # Keep scan logs plain text so failures are diagnosable via `kubectl logs`.
    scanJobCompressLogs: false
    # Init containers are often short-lived helpers and were a frequent source of noisy retries.
    # Prioritize stable coverage of primary workload containers first.
    skipInitContainers: true
    # Avoid recursive/self-referential scanning pressure on Harbor components.
    # Harbor already has its own Trivy integration for registry artifacts.
    excludeImages: "goharbor/*,docker.io/goharbor/*,index.docker.io/goharbor/*,harbor.m0sh1.cc/goharbor/*,harbor.m0sh1.cc/hub/goharbor/*"
    # Run scan jobs on worker nodes only.
    # This avoids scheduling scans on the control-plane node, where remote image
    # pulls have been flaky for some registries.
    scanJobNodeSelector:
      node-role.kubernetes.io/worker: "true"
    scanJobTolerations: []
    scanJobCustomVolumes:
      - name: trivy-cache
        emptyDir: {}
    scanJobCustomVolumesMount:
      - name: trivy-cache
        mountPath: /tmp/trivy
  trivy:
    image:
      registry: harbor.m0sh1.cc
      # Use a known-good upstream Trivy image via Harbor's Docker Hub proxy.
      # (We can re-introduce the custom DHI experiment later.)
      repository: hub/aquasec/trivy
      tag: "0.69.1"
    imageScanCacheDir: "/tmp/trivy/.cache"
    filesystemScanCacheDir: "/tmp/trivy/.cache"
    # Route scan-time registry access through Harbor proxies to avoid
    # Docker Hub / GHCR rate-limits on anonymous pulls.
    registry:
      mirror:
        "docker.io": harbor.m0sh1.cc/hub
    # mirror.gcr.io has intermittently returned BLOB_UNKNOWN for trivy-db;
    # pull DB artifacts via Harbor's GHCR proxy instead.
    dbRegistry: harbor.m0sh1.cc
    dbRepository: ghcr/aquasecurity/trivy-db
    javaDbRegistry: harbor.m0sh1.cc
    javaDbRepository: ghcr/aquasecurity/trivy-java-db
    # ResourceQuota config-audit reports are high-churn and frequently collide
    # with optimistic locking updates. Keep the higher-signal kinds enabled and
    # drop ResourceQuota from config-audit scope to reduce controller noise.
    supportedConfigAuditKinds: "Workload,Service,Role,ClusterRole,NetworkPolicy,Ingress,LimitRange"
    ignoreUnfixed: true
    # Align Trivy timeout with operator scan job timeout to reduce premature scan failures.
    timeout: "10m0s"
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 1
        memory: 2Gi
  nodeCollector:
    # node-collector is published on GHCR; prefer Harbor's GHCR proxy.
    registry: harbor.m0sh1.cc
    repository: ghcr/aquasecurity/node-collector
    tag: "0.3.1"
    tolerations:
      - operator: Exists
