trivy-operator:
  fullnameOverride: trivy-operator
  # Empty targetNamespaces means cluster-wide scan scope.
  targetNamespaces: ""
  image:
    registry: harbor.m0sh1.cc
    repository: hub/aquasec/trivy-operator
    tag: "0.29.0"

  # Note: This file is values for the *subchart* `trivy-operator`.
  # Keys under `trivy-operator:` must match upstream `helm show values aquasecurity/trivy-operator`.

  operator:
    # Scan jobs need registry credentials to pull private images (e.g. DHI).
    # Provide a namespace->secret(s) map used when workloads don't declare imagePullSecrets.
    privateRegistryScanSecretsNames:
      apps: "kubernetes-dhi,trivy-scan-regcred"
    replicas: 1
    scanJobsConcurrentLimit: 1
    scanNodeCollectorLimit: 1
    scanJobTimeout: 5m
    # Keep failed/succeeded scan pods around only briefly to reduce namespace clutter.
    scanJobTTL: 10m

  # Operator Deployment resources / security settings live at the chart root (not under `operator:`).
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 512Mi

  serviceAccount:
    create: true

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    capabilities:
      drop:
        - ALL

  trivyOperator:
    # Keep scan logs plain text so failures are diagnosable via `kubectl logs`.
    scanJobCompressLogs: false
    scanJobTolerations:
      - operator: Exists
    scanJobCustomVolumes:
      - name: trivy-cache
        emptyDir: {}
    scanJobCustomVolumesMount:
      - name: trivy-cache
        mountPath: /tmp/trivy
  trivy:
    image:
      registry: harbor.m0sh1.cc
      # Use a known-good upstream Trivy image via Harbor's Docker Hub proxy.
      # (We can re-introduce the custom DHI experiment later.)
      repository: hub/aquasec/trivy
      tag: "0.69.1"
    imageScanCacheDir: "/tmp/trivy/.cache"
    filesystemScanCacheDir: "/tmp/trivy/.cache"
    # Use in-memory cache backend for scan jobs to avoid fs cache lock contention
    # when a single scan job runs multiple container scans in parallel.
    configFile:
      cache:
        backend: memory
    # Route scan-time registry access through Harbor proxies to avoid
    # Docker Hub / GHCR rate-limits on anonymous pulls.
    registry:
      mirror:
        "docker.io": harbor.m0sh1.cc/hub
        "ghcr.io": harbor.m0sh1.cc/ghcr
    ignoreUnfixed: true
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 768m
        memory: 2Gi
  nodeCollector:
    # node-collector is published on GHCR; prefer Harbor's GHCR proxy.
    registry: harbor.m0sh1.cc
    repository: ghcr/aquasecurity/node-collector
    tag: "0.3.1"
    tolerations:
      - operator: Exists
