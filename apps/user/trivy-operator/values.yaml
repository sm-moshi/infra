authentikMode: public
trivy-operator:
  fullnameOverride: trivy-operator
  # Empty targetNamespaces means cluster-wide scan scope.
  targetNamespaces: ""
  image:
    registry: dhi.io
    repository: trivy-operator
    tag: "0.30.0-debian13"

  # Note: This file is values for the *subchart* `trivy-operator`.
  # Keys under `trivy-operator:` must match upstream `helm show values aquasecurity/trivy-operator`.

  operator:
    # Required for private-registry image scanning: allow vulnerability scan jobs
    # to resolve namespace pull secrets/service accounts. Scope remains bounded by
    # privateRegistryScanSecretsNames mapping below.
    accessGlobalSecretsAndServiceAccount: true
    # Config-audit + compliance + vulnerability scanning enabled.
    # Scan concurrency limited to 1 to control registry/Harbor load.
    vulnerabilityScannerEnabled: true
    # Only scan current active revisions (not old ReplicaSets).
    vulnerabilityScannerScanOnlyCurrentRevisions: true
    # Only scan current active revisions for config-audit as well.
    configAuditScannerScanOnlyCurrentRevisions: true
    configAuditScannerEnabled: true
    rbacAssessmentScannerEnabled: true
    infraAssessmentScannerEnabled: false
    clusterComplianceEnabled: true
    exposedSecretScannerEnabled: false
    # Temporarily disable SBOM generation to unblock vulnerability scanning.
    # When sbomGenerationEnabled=true on operator v0.30.0, the vulnerability
    # report controller can remain silent even when OPERATOR_VULNERABILITY_SCANNER_ENABLED
    # is true. Re-enable after confirming VulnerabilityReports are created.
    sbomGenerationEnabled: false
    clusterSbomCacheEnabled: false # Disable cache to reduce storage pressure
    # Scan jobs need registry credentials to pull private images (e.g. DHI).
    # Provide a namespace->secret(s) map used when workloads don't declare imagePullSecrets.
    privateRegistryScanSecretsNames:
      apps: "kubernetes-dhi,trivy-scan-regcred"
      argocd: "kubernetes-dhi"
      cert-manager: "kubernetes-dhi"
      cnpg-system: "kubernetes-dhi"
      external-dns: "kubernetes-dhi"
      monitoring: "kubernetes-dhi"
      traefik: "kubernetes-dhi"
      woodpecker: "kubernetes-dhi"
    # Force operator pod template refresh so updated OPERATOR_* configmap-backed
    # env values are applied immediately on sync.
    podLabels:
      trivy-config-rev: "20260310-9"
    replicas: 1
    # Keep concurrency moderate to reduce parallel DB/download pressure and scan flakiness.
    scanJobsConcurrentLimit: 1
    scanNodeCollectorLimit: 1
    scanJobTimeout: 30m
    # Back off failed scans to avoid tight error loops hammering registries/Harbor.
    scanJobsRetryDelay: 2m
    # Built-in Trivy server: centralizes DB downloads into a persistent
    # StatefulSet. Scan jobs use client-server mode (--server), eliminating
    # per-container cache lock contention that occurs on multi-container
    # workloads in standalone mode.
    builtInTrivyServer: true
    # Keep failed/succeeded scan pods around long enough for troubleshooting.
    scanJobTTL: 30m

  # CIS + NSA + PSS compliance benchmarks (no image pulls required).
  # Spec names must match upstream chart template conditionals exactly.
  compliance:
    reportType: all
    cron: "0 */6 * * *"
    specs:
    - k8s-cis-1.23
    - k8s-nsa-1.0
    - k8s-pss-baseline-0.1
    - k8s-pss-restricted-0.1

  # Operator Deployment resources / security settings live at the chart root (not under `operator:`).
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

  serviceAccount:
    create: true

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 10000
    capabilities:
      drop:
      - ALL

  trivyOperator:
    # Keep scan logs plain text so failures are diagnosable via `kubectl logs`.
    scanJobCompressLogs: false
    # Disable GCR-specific auth injection for scan jobs. The upstream chart
    # defaults this to true, which injects Google Cloud metadata-based auth
    # into vulnerability scan job pods. On non-GKE clusters this silently
    # prevents the vulnerability controller from creating scan jobs.
    useGCRServiceAccount: false
    # Init containers are often short-lived helpers and were a frequent source of noisy retries.
    # Prioritize stable coverage of primary workload containers first.
    skipInitContainers: true
    # Avoid recursive/self-referential scanning pressure on Harbor components.
    # Harbor already has its own Trivy integration for registry artifacts.
    # Exclude Harbor (has own Trivy) and common init-container utility images.
    # Init container images must be excluded because scanJob.skipInitContainers
    # is broken in operator 0.30.0 — init containers still appear in scan jobs,
    # causing a shared /tmp race condition that fails every multi-container scan.
    excludeImages: "goharbor/*,docker.io/goharbor/*,index.docker.io/goharbor/*,busybox:*,docker.io/library/busybox:*,python:3.13-slim,docker.io/library/python:3.13-slim"
    # Run scan jobs on worker nodes only.
    # This avoids scheduling scans on the control-plane node, where remote image
    # pulls have been flaky for some registries.
    scanJobNodeSelector:
      node-role.kubernetes.io/worker: "true"
    scanJobTolerations: []
    # Scan job pods run with readOnlyRootFilesystem by default (upstream
    # security hardening). Mount an emptyDir at /tmp so Trivy can create
    # per-layer working directories (/tmp/trivy-N) during image analysis.
    # Without this, scans FATAL with "unable to create temporary directory".
    scanJobCustomVolumes:
    - name: tmp
      emptyDir:
        sizeLimit: 512Mi
    scanJobCustomVolumesMount:
    - name: tmp
      mountPath: /tmp
    # Override built-in KSV-0125 trusted-registry data with an explicit
    # cluster allow-list. This keeps the check active while aligning with
    # our actual trusted registry domains.
    policiesConfig: |
      policy.ksv0125_trusted_registries.kinds: "Workload"
      policy.ksv0125_trusted_registries.rego: |
        package ksv0125

        import rego.v1

        trusted_registries := [
          "harbor.m0sh1.cc",
          "ghcr.io",
          "quay.io",
          "docker.io",
          "registry.k8s.io",
          "dhi.io",
          "gcr.io",
          "azurecr.io",
          "amazonaws.com",
        ]
  trivy:
    image:
      registry: dhi.io
      # DHI hardened Trivy image (zero CVEs, signed provenance).
      # -dev variant required: scan jobs use /bin/sh for init/discovery scripts.
      repository: trivy
      tag: "0.69.3-debian13-dev"
    # Keep built-in policy checks enabled; external policy config augments them.
    useBuiltinRegoPolicies: "true"
    useEmbeddedRegoPolicies: "false"
    # Enable loading custom external Rego policies/config data from
    # trivy-operator-policies-config.
    externalRegoPoliciesEnabled: true
    # Use direct upstream registry references. Transparent proxy caches handle
    # local indirection without baking Harbor-prefixed pull URLs into values.
    dbRegistry: ghcr.io
    dbRepository: aquasecurity/trivy-db
    javaDbRegistry: ghcr.io
    javaDbRepository: aquasecurity/trivy-java-db
    # Keep default local cache paths; active scan mode is client-server.
    imageScanCacheDir: /tmp/trivy/.cache
    filesystemScanCacheDir: /tmp/trivy/.cache
    env:
    - name: TRIVY_PARALLEL
      value: "1"
    # ResourceQuota config-audit reports are high-churn and frequently collide
    # with optimistic locking updates. Keep the higher-signal kinds enabled and
    # drop ResourceQuota from config-audit scope to reduce controller noise.
    supportedConfigAuditKinds: "Workload,Service,Role,ClusterRole,NetworkPolicy,Ingress,LimitRange"
    ignoreUnfixed: true
    # Align Trivy timeout with operator scan job timeout to reduce premature scan failures.
    timeout: "10m0s"
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 1
        memory: 2Gi
  nodeCollector:
    # node-collector is published on GHCR; keep the direct upstream reference.
    registry: ghcr.io
    repository: aquasecurity/node-collector
    tag: "0.3.1"
    tolerations:
    - operator: Exists
