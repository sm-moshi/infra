# Diode deployment for NetBox ingestion in the apps namespace.
# Uses shared CNPG + Valkey instead of deploying bundled DB/cache.
authentikMode: public

diode:
  diode:
    environment: production

  externalPostgresql:
    hostname: cnpg-main-rw.apps.svc.cluster.local
    port: 5432
    database: diode
    username: diode
    existingSecretName: diode-postgres-auth
    existingSecretKey: password
    sslMode: "prefer"

  externalRedis:
    hostname: valkey.apps.svc.cluster.local
    port: 6379
    username: ""
    tls:
      enabled: false

  redis:
    enabled: false

  postgresql:
    enabled: false

  diodeAuth:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 500m
        memory: 512Mi

  hydra:
    enabled: true
    secret:
      enabled: false
      nameOverride: diode-hydra-secret
    # ArgoCD does not reliably execute post-install Helm hooks for this chart
    # path in our environment; run migrations in an initContainer instead.
    hydra:
      automigration:
        enabled: true
        type: initContainer
    deployment:
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi
    hydra-maester:
      deployment:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 512Mi

  # Keep a local in-cluster ingress-nginx for unified /diode + /diode/auth routing.
  ingressNginx:
    enabled: true
    hostname: ""
    ingressClass: nginx
    controller:
      enabled: true
      admissionWebhooks:
        enabled: false

  certManager:
    enabled: false

  # Pass directly to the ingress-nginx subchart of diode
  ingress-nginx:
    controller:
      admissionWebhooks:
        enabled: false
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 500m
          memory: 512Mi
      service:
        ipFamilyPolicy: PreferDualStack
        ipFamilies:
          - IPv4
          - IPv6
        annotations:
          lbipam.cilium.io/ips: "10.0.30.15,fd00:1:30::15"
        internal:
          ipFamilyPolicy: PreferDualStack

  diodeAuthBootstrap:
    enabled: true
    job:
      annotations:
        "helm.sh/hook": post-install, post-upgrade
        "helm.sh/hook-weight": "2"
        "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded

  diodeIngester:
    existingSecret: diode-ingester-secret
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 500m
        memory: 512Mi

  diodeReconciler:
    existingSecret: diode-reconciler-secret
    resources:
      requests:
        cpu: 10m
        memory: 48Mi
      limits:
        cpu: 500m
        memory: 512Mi
    config:
      netboxDiodePluginApiBaseUrl: http://netbox.apps.svc.cluster.local/api/plugins/diode
      netboxDiodePluginSkipTlsVerify: false
      diodeToNetBoxClientId: diode-to-netbox

# OrbAgent — network discovery agent feeding Diode.
# Runs as a Deployment with hostNetwork for NMAP scanning.
orbAgent:
  enabled: true
  revisionHistoryLimit: 1
  image:
    repository: netboxlabs/orb-agent
    tag: latest
    pullPolicy: IfNotPresent

  # Retry loop delay when upstream dependencies are temporarily unavailable
  restartBackoffSeconds: 10

  diode:
    target: grpc://diode-ingress-nginx-controller.apps.svc.cluster.local:80/diode
    agentName: orb-homelab
    existingSecret: orb-agent-diode

  discovery:
    schedule: "0 */6 * * *"
    timeout: 30
    defaults:
      description: "Discovered by OrbAgent network scanner"
      tags:
        - orb-discovery
        - homelab
    targets:
      - 10.0.0.0/24 # Home network
      - 10.0.10.0/24 # Infrastructure VLAN 10
      - 10.0.20.0/24 # Kubernetes VLAN 20
      # 10.0.30.0/24 removed — LB VLAN contains mostly virtual IPs
      # that pollute NetBox IPAM with 254 unassigned entries.
    scanTypes:
      - connect
    skipHost: true
    ports:
      - 22
      - 53
      - 80
      - 443
      - 3000
      - 5432
      - 6379
      - 8006
      - 8080
      - 8443
      - 9090
      - 9100

  hostNetwork: true

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 1Gi

  nodeSelector: {}
  tolerations: []
  affinity: {}
