{{- if .Values.orbAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orb-agent
  labels:
    app.kubernetes.io/name: orb-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.orbAgent.revisionHistoryLimit | default 1 }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: orb-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orb-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/orb-agent-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostNetwork: {{ .Values.orbAgent.hostNetwork }}
      {{- if .Values.orbAgent.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.orbAgent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orbAgent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orbAgent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: render-config
          image: busybox:1.37
          command: ['sh', '-c']
          args:
            - |
              sed \
                -e "s|\${DIODE_CLIENT_ID}|$DIODE_CLIENT_ID|g" \
                -e "s|\${DIODE_CLIENT_SECRET}|$DIODE_CLIENT_SECRET|g" \
                /opt/orb-template/agent.yaml > /opt/orb/agent.yaml
          env:
            - name: DIODE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orbAgent.diode.existingSecret }}
                  key: DIODE_CLIENT_ID
            - name: DIODE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orbAgent.diode.existingSecret }}
                  key: DIODE_CLIENT_SECRET
          volumeMounts:
            - name: config-template
              mountPath: /opt/orb-template
              readOnly: true
            - name: config-rendered
              mountPath: /opt/orb
      containers:
        - name: orb-agent
          image: "{{ .Values.orbAgent.image.repository }}:{{ .Values.orbAgent.image.tag }}"
          imagePullPolicy: {{ .Values.orbAgent.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
          args:
            - |
              backoff="{{ .Values.orbAgent.restartBackoffSeconds }}"
              while true; do
                /usr/local/bin/orb-agent run -c /opt/orb/agent.yaml
                code="$?"
                echo "orb-agent exited with code ${code}; retrying in ${backoff}s..."
                sleep "${backoff}"
              done
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: false
          startupProbe:
            exec:
              command: ["bash", "-c", "echo > /dev/tcp/127.0.0.1/8073"]
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            exec:
              command: ["bash", "-c", "echo > /dev/tcp/127.0.0.1/8073"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["bash", "-c", "echo > /dev/tcp/127.0.0.1/8073"]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 2
            failureThreshold: 6
          resources:
            {{- toYaml .Values.orbAgent.resources | nindent 12 }}
          volumeMounts:
            - name: config-rendered
              mountPath: /opt/orb
              readOnly: true
      volumes:
        - name: config-template
          configMap:
            name: orb-agent-config
        - name: config-rendered
          emptyDir: {}
{{- end }}
