apiVersion: apps/v1
kind: Deployment
metadata:
  name: orb-agent
  labels:
    app.kubernetes.io/name: orb-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orb-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orb-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/orb-agent-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      hostNetwork: {{ .Values.orbAgent.hostNetwork }}
      {{- if .Values.orbAgent.hostNetwork }}
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      {{- with .Values.orbAgent.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orbAgent.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.orbAgent.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: orb-agent
          image: "{{ .Values.orbAgent.image.repository }}:{{ .Values.orbAgent.image.tag }}"
          imagePullPolicy: {{ .Values.orbAgent.image.pullPolicy }}
          args:
            - run
            - -c
            - /opt/orb/agent.yaml
          env:
            - name: DIODE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orbAgent.diode.existingSecret }}
                  key: DIODE_CLIENT_ID
            - name: DIODE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.orbAgent.diode.existingSecret }}
                  key: DIODE_CLIENT_SECRET
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: false
          resources:
            {{- toYaml .Values.orbAgent.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /opt/orb/agent.yaml
              subPath: agent.yaml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: orb-agent-config
