nameOverride: ""
fullnameOverride: ""

image:
  server:
    repository: ghcr.io/scanopy/scanopy/server
    tag: "v0.14.5"
    pullPolicy: IfNotPresent
  daemon:
    repository: ghcr.io/scanopy/scanopy/daemon
    tag: "v0.14.5"
    pullPolicy: IfNotPresent

server:
  replicaCount: 1
  revisionHistoryLimit: 1
  port: 60072
  logLevel: debug
  webExternalPath: /app/static
  publicUrl: https://scanopy.m0sh1.cc
  disableRegistration: false # Keep local admin fallback while enabling OIDC.
  secureSessionCookies: true
  clientIpSource: ""
  integratedDaemonUrl: ""
  podAnnotations:
    scanopy.m0sh1.cc/restart-token: "2026-02-16T12:50:00Z"
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 18
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 6
  readinessProbe:
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6

  service:
    type: ClusterIP
    port: 60072
    ipFamilyPolicy: SingleStack

  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      external-dns.alpha.kubernetes.io/ignore: "true"
    hosts:
      - host: scanopy.m0sh1.cc
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: wildcard-m0sh1-cc
        hosts:
          - scanopy.m0sh1.cc

  database:
    # Shared CNPG connection URI secret (example key format):
    # uri: postgresql://scanopy:<password>@cnpg-main-rw.apps.svc.cluster.local:5432/scanopy
    existingSecret: scanopy-postgres-auth
    uriKey: uri

  oidc:
    enabled: true
    # Secret must provide key `oidc.toml` containing [[oidc_providers]] config.
    existingSecret: scanopy-oidc
    key: oidc.toml

  metrics:
    existingSecret: ""
    tokenKey: token

  persistence:
    enabled: true
    storageClass: proxmox-csi-zfs-nvme-general-retain
    size: 5Gi
    accessMode: ReadWriteOnce
    mountPath: /data

  extraEnv: []

daemon:
  inCluster:
    # Enabled with daemon API key for network discovery
    enabled: false
    hostNetwork: true
    privileged: true
    port: 60073
    bindAddress: 0.0.0.0
    mode: daemon_poll
    heartbeatInterval: 60
    name: scanopy-daemon-k8s
    networkId: "69f05863-b942-4004-9173-466999379810"
    configHostPath: /var/lib/scanopy-daemon-v7
    # Use ClusterIP directly — hickory-resolver (compiled into the daemon binary)
    # fails when AAAA DNS queries return NXDOMAIN, preventing all DNS-based
    # connections. This is a known hickory-resolver dual-stack bug.
    # Exception per AGENTS.md §4.1: daemon binary cannot resolve Service DNS.
    # See: docs/diaries/scanopy-daemon-dns-workaround.md
    serverUrl: "http://10.43.41.175:60072"
    allowSelfSignedCerts: false
    # Only scan eth0; excludes cni0/flannel.1/veth* (pod IPs) and
    # eth1/VLAN 30 (avoids duplicate host entries — every node has
    # both a VLAN 20 and VLAN 30 IP, and Cilium LB VIPs on VLAN 30
    # get misdetected as Neo4j by banner fingerprinting).
    interfaces:
      - eth0   # VLAN 20 (K8s nodes)
    dockerSocket:
      enabled: false
      hostPath: /var/run/docker.sock
    daemonApiKey:
      existingSecret: "scanopy-daemon-api-key"
      key: SCANOPY_DAEMON_API_KEY
    userId: "52763220-64ee-4f65-bcd6-b946318e79dc"
    podAnnotations: {}
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 12
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 20
      timeoutSeconds: 10
      failureThreshold: 12

nodeSelector:
  node-role.kubernetes.io/worker: "true"

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values: ["horse04"]
