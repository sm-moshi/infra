{{- if .Values.server.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "scanopy.fullname" . }}
  labels:
    {{- include "scanopy.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
  annotations:
    {{- toYaml .Values.server.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.server.ingress.className }}
  rules:
    {{- range .Values.server.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "scanopy.fullname" $ }}
                port:
                  number: {{ $.Values.server.service.port }}
          {{- end }}
    {{- end }}
  {{- if .Values.server.ingress.tls }}
  tls:
    {{- toYaml .Values.server.ingress.tls | nindent 4 }}
  {{- end }}
{{- end }}
