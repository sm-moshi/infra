apiVersion: batch/v1
kind: CronJob
metadata:
  name: harbor-scanner
  labels:
    app.kubernetes.io/name: harbor-scanner
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  schedule: {{ .Values.cronJob.schedule | quote }}
  {{- if .Values.cronJob.timeZone }}
  timeZone: {{ .Values.cronJob.timeZone | quote }}
  {{- end }}
  suspend: {{ .Values.cronJob.suspend }}
  concurrencyPolicy: {{ .Values.cronJob.concurrencyPolicy | quote }}
  startingDeadlineSeconds: {{ .Values.cronJob.startingDeadlineSeconds }}
  successfulJobsHistoryLimit: {{ .Values.cronJob.successfulJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ .Values.cronJob.failedJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.job.backoffLimit }}
      ttlSecondsAfterFinished: {{ .Values.job.ttlSecondsAfterFinished }}
      activeDeadlineSeconds: {{ .Values.job.activeDeadlineSeconds }}
      template:
        metadata:
          labels:
            app.kubernetes.io/name: harbor-scanner
            app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
          automountServiceAccountToken: {{ .Values.pod.automountServiceAccountToken }}
          restartPolicy: {{ .Values.pod.restartPolicy }}
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          {{- with .Values.nodeSelector }}
          nodeSelector:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.tolerations }}
          tolerations:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.affinity }}
          affinity:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          initContainers:
            # Copy cosign binary into shared volume. trivy is already present
            # in the main container (dhi/trivy-dev).
            - name: copy-cosign
              image: "{{ .Values.cosign.image.registry }}/{{ .Values.cosign.image.repository }}:{{ .Values.cosign.image.tag }}"
              imagePullPolicy: {{ .Values.cosign.image.pullPolicy }}
              command: ["/usr/bin/cp"]
              args: ["/usr/local/bin/cosign", "/tools/cosign"]
              volumeMounts:
                - name: tools
                  mountPath: /tools
              # No readOnlyRootFilesystem: Debian DHI base needs writable /var/run.
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: false
                capabilities:
                  drop: ["ALL"]
              resources:
                requests:
                  cpu: 10m
                  memory: 128Mi
                limits:
                  cpu: 100m
                  memory: 256Mi
          containers:
            # Main container: dhi/trivy-dev (Debian/glibc) — trivy built-in,
            # proper K8s DNS, bash with /dev/tcp for Harbor API HTTP calls.
            - name: scanner
              image: "{{ .Values.trivy.image.registry }}/{{ .Values.trivy.image.repository }}:{{ .Values.trivy.image.tag }}"
              imagePullPolicy: {{ .Values.trivy.image.pullPolicy }}
              command: ["bash", "/scripts/scan.sh"]
              env:
                - name: HARBOR_USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.harbor.credentialsSecret }}
                      key: username
                - name: HARBOR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.harbor.credentialsSecret }}
                      key: password
                - name: COSIGN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.cosignKey.secretName }}
                      key: {{ .Values.cosignKey.passwordKey }}
              volumeMounts:
                - name: tools
                  mountPath: /tools
                  readOnly: true
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
                - name: cosign-key
                  mountPath: /cosign-keys
                  readOnly: true
                - name: trivy-cache
                  mountPath: /tmp/trivy
                - name: tmp
                  mountPath: /tmp
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.resources | nindent 16 }}
          volumes:
            - name: tools
              emptyDir: {}
            - name: trivy-cache
              emptyDir: {}
            - name: tmp
              emptyDir: {}
            - name: scripts
              configMap:
                name: harbor-scanner-script
                defaultMode: 0555
            - name: cosign-key
              secret:
                secretName: {{ .Values.cosignKey.secretName }}
                items:
                  - key: {{ .Values.cosignKey.keyFile }}
                    path: cosign.key
