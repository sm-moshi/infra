apiVersion: v1
kind: ConfigMap
metadata:
  name: harbor-scanner-script
  labels:
    app.kubernetes.io/name: harbor-scanner
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  scan.sh: |
    #!/bin/bash
    set -euo pipefail

    TRIVY=/usr/local/bin/trivy
    COSIGN=/tools/cosign
    export TRIVY_CACHE_DIR=/tmp/trivy
    # cosign writes TUF metadata to $HOME/.sigstore; /root is read-only.
    export HOME=/tmp
    HARBOR_HOST="harbor-core.apps.svc.cluster.local"
    HARBOR_PORT=80
    HARBOR_API="/api/v2.0"
    # OCI registry reference needs hostname only (no scheme).
    HARBOR_REGISTRY="{{ .Values.harbor.externalUrl | trimPrefix "https://" | trimPrefix "http://" }}"
    SCAN_DELAY="{{ .Values.scanning.delay }}"
    MAX_IMAGES="{{ .Values.scanning.maxImages }}"
    SKIP_PATTERNS="{{ .Values.scanning.skipTagPatterns }}"
    SCAN_VULN="{{ .Values.scanning.vulnerabilities }}"
    SCAN_SBOM="{{ .Values.scanning.sbom }}"

    # Build basic auth header for Harbor API.
    AUTH=$(printf '%s:%s' "$HARBOR_USERNAME" "$HARBOR_PASSWORD" | base64 -w0)
    # Write Docker config so trivy and cosign both use it for registry auth.
    # Set DOCKER_CONFIG explicitly — cosign/ORAS uses this env var for credential lookup.
    export DOCKER_CONFIG=/tmp/.docker
    mkdir -p /tmp/.docker
    printf '{"auths":{"%s":{"auth":"%s"}}}' "$HARBOR_REGISTRY" "$AUTH" > /tmp/.docker/config.json

    # Counters
    scanned=0
    failed=0
    skipped=0

    log() { printf '[%s] %s\n' "$(date -u +%H:%M:%S)" "$1"; }

    # HTTP GET via bash /dev/tcp (no curl/wget needed). Uses HTTP/1.0 to avoid
    # chunked transfer encoding. Returns response body only (strips headers).
    harbor_get() {
      local path="$1"
      local response
      exec 3<>/dev/tcp/${HARBOR_HOST}/${HARBOR_PORT}
      printf "GET %s HTTP/1.0\r\nHost: %s\r\nAuthorization: Basic %s\r\nConnection: close\r\n\r\n" \
        "$path" "$HARBOR_HOST" "$AUTH" >&3
      response=$(cat <&3)
      exec 3>&-
      # Strip HTTP status line and headers; return body after blank line.
      printf '%s' "$response" | awk 'found{print} /^\r?$/{found=1}'
    }

    # Extract JSON string values for a given key using grep/sed.
    # Usage: echo "$json" | json_values "name"
    json_values() {
      grep -o "\"${1}\":\"[^\"]*\"" | sed "s/\"${1}\":\"//;s/\"$//"
    }

    log "Harbor Scanner starting"
    log "Registry: ${HARBOR_REGISTRY}"
    log "Projects: {{ join " " .Values.harbor.projects }}"

    {{- range .Values.harbor.projects }}
    # --- Project: {{ . }} ---
    log "Scanning project: {{ . }}"

    repos=$(harbor_get "${HARBOR_API}/projects/{{ . }}/repositories?page_size=100" | json_values "name")
    if [ -z "$repos" ]; then
      log "  No repositories found in {{ . }}, skipping"
    fi

    for full_repo in $repos; do
      # Harbor API returns "project/repo", URL-encode slashes for nested repos.
      repo_path=$(printf '%s' "$full_repo" | sed "s|^{{ . }}/||")
      repo_encoded=$(printf '%s' "$repo_path" | sed 's|/|%2F|g')

      tags=$(harbor_get "${HARBOR_API}/projects/{{ . }}/repositories/${repo_encoded}/artifacts?page_size=100&with_tag=true" | json_values "name")
      if [ -z "$tags" ]; then
        log "  ${full_repo}: no tags, skipping"
        continue
      fi

      for tag in $tags; do
        # Skip attestation/signature artifacts.
        if printf '%s' "$tag" | grep -qE "$SKIP_PATTERNS"; then
          skipped=$((skipped + 1))
          continue
        fi

        # Enforce max images limit.
        if [ "$MAX_IMAGES" -gt 0 ] && [ "$scanned" -ge "$MAX_IMAGES" ]; then
          log "Reached max images limit (${MAX_IMAGES}), stopping"
          break 3
        fi

        image="${HARBOR_REGISTRY}/${full_repo}:${tag}"
        log "  Scanning: ${image}"

        # --- Vulnerability attestation ---
        if [ "$SCAN_VULN" = "true" ]; then
          if $TRIVY image --quiet --format cosign-vuln "$image" 2>/tmp/trivy-err.log | \
             $COSIGN attest --key /cosign-keys/cosign.key --type vuln \
               --predicate - --yes "$image" >/dev/null 2>/tmp/cosign-err.log; then
            log "    vuln: attested"
          else
            log "    vuln: FAILED (trivy: $(head -1 /tmp/trivy-err.log) cosign: $(head -1 /tmp/cosign-err.log))"
            failed=$((failed + 1))
          fi
        fi

        # --- SBOM attestation ---
        if [ "$SCAN_SBOM" = "true" ]; then
          if $TRIVY image --quiet --format spdx-json "$image" > /tmp/sbom.json 2>/tmp/trivy-err.log && \
             $COSIGN attest --key /cosign-keys/cosign.key --type spdxjson \
               --predicate /tmp/sbom.json --yes "$image" >/dev/null 2>/tmp/cosign-err.log; then
            log "    sbom: attested"
          else
            log "    sbom: FAILED (trivy: $(head -1 /tmp/trivy-err.log) cosign: $(head -1 /tmp/cosign-err.log))"
            failed=$((failed + 1))
          fi
          rm -f /tmp/sbom.json
        fi

        scanned=$((scanned + 1))
        sleep "$SCAN_DELAY"
      done
    done
    {{- end }}

    log "Complete: scanned=${scanned} failed=${failed} skipped=${skipped}"
    if [ "$failed" -gt 0 ]; then
      log "WARNING: ${failed} attestation(s) failed"
      exit 1
    fi
