pdb:
  enabled: true
  maxUnavailable: 1
authentikMode: oidc
oidcContract:
  providerName: Authentik
  discoveryURL: https://auth.m0sh1.cc/application/o/forgejo/.well-known/openid-configuration
  secretName: forgejo-oidc
  clientIdKey: client_id
  clientSecretKey: client_secret
  groupsClaim: groups
  adminGroup: authentik Admins
forgejo:
  replicaCount: 1
  strategy:
    type: Recreate
  image:
    registry: "harbor.m0sh1.cc"
    repository: "apps/forgejo"
    tag: "f65a092a"
    pullPolicy: IfNotPresent
    rootless: true
    fullOverride: harbor.m0sh1.cc/apps/forgejo
  # --- Ingress ---
  ingress:
    enabled: true
    className: traefik
    annotations:
      external-dns.alpha.kubernetes.io/ignore: "true"
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
    - host: forge.m0sh1.cc
      paths:
      - path: /
        pathType: Prefix
    tls:
    - hosts:
      - forge.m0sh1.cc
      secretName: wildcard-m0sh1-cc
  # --- Services ---
  service:
    http:
      type: ClusterIP
      port: 3000
      ipFamilyPolicy: PreferDualStack
    ssh:
      type: ClusterIP
      port: 22
      ipFamilyPolicy: PreferDualStack
  # --- Persistence ---
  persistence:
    enabled: true
    create: true
    mount: true
    claimName: forgejo-data
    size: 10Gi
    accessModes:
    - ReadWriteOnce
    storageClass: proxmox-csi-zfs-nvme-general-retain
    annotations:
      helm.sh/resource-policy: keep
  # --- Security ---
  podSecurityContext:
    fsGroup: 1000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
  # --- Admin user ---
  gitea:
    podAnnotations:
      trivy-refresh-rev: "20260223-5"
    admin:
      existingSecret: forgejo-admin-secret
    # --- OAuth2 / OIDC ---
    oauth:
    - name: authentik
      provider: openidConnect
      existingSecret: forgejo-oidc
      autoDiscoverUrl: https://auth.m0sh1.cc/application/o/forgejo/.well-known/openid-configuration
      iconUrl: https://auth.m0sh1.cc/static/dist/assets/icons/icon.png
      scopes: openid email profile
      requiredClaimName: ""
      adminGroup: authentik Admins
      groupClaimName: groups
    # Metrics for Prometheus
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
    # --- app.ini configuration ---
    config:
      server:
        PROTOCOL: http
        ROOT_URL: "https://forge.m0sh1.cc/"
        DOMAIN: forge.m0sh1.cc
        HTTP_PORT: 3000
        SSH_PORT: 22
        SSH_LISTEN_PORT: 2222
        SSH_DOMAIN: forge.m0sh1.cc
        START_SSH_SERVER: true
        DISABLE_SSH: false
      security:
        INSTALL_LOCK: true
      service:
        DISABLE_REGISTRATION: false
        ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      # External CNPG PostgreSQL
      database:
        DB_TYPE: postgres
        HOST: cnpg-main-rw.apps.svc.cluster.local:5432
        NAME: forgejo
        USER: forgejo
        SSL_MODE: require
      # External Valkey for session/cache/queue
      session:
        PROVIDER: redis
      cache:
        ADAPTER: redis
        INTERVAL: 60
        ITEM_TTL: 16h
      queue:
        TYPE: redis
      webhook:
        ALLOWED_HOST_LIST: "ci.m0sh1.cc"
    # Inject secrets from environment
    additionalConfigFromEnvs:
    # Database password from SealedSecret
    - name: FORGEJO__DATABASE__PASSWD
      valueFrom:
        secretKeyRef:
          name: forgejo-db-secret
          key: password
    # Valkey connection strings (no auth — Valkey ACLs disabled)
    - name: FORGEJO__SESSION__PROVIDER_CONFIG
      value: redis://valkey.apps.svc.cluster.local:6379/3
    - name: FORGEJO__CACHE__HOST
      value: redis://valkey.apps.svc.cluster.local:6379/4
    - name: FORGEJO__QUEUE__CONN_STR
      value: redis://valkey.apps.svc.cluster.local:6379/5
  # Inject internal token + secret key
  extraEnvFrom:
  - secretRef:
      name: forgejo-secrets
  # --- Disable all bundled databases ---
  postgresql:
    enabled: false
  postgresql-ha:
    enabled: false
  redis:
    enabled: false
  redis-cluster:
    enabled: false
  valkey:
    enabled: false
  valkey-cluster:
    enabled: false
  # --- Resources ---
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      # cpu: 1000m
      memory: 512Mi
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-02"]
