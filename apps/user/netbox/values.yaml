dbInit:
  image: harbor.m0sh1.cc/dhi/postgres:18.3
  imagePullPolicy: IfNotPresent
authentikMode: oidc
oidcContract:
  providerName: Authentik
  configSecretName: netbox-oidc-config
  configKey: oidc.yaml
netbox:
  # Single-replica + PVC-bound: Recreate avoids double-memory scheduling failures.
  updateStrategy:
    type: Recreate
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values: ["horse01"]
      - weight: 60
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values: ["horse02"]
  # Custom image with plugin support (built from tools/cli/docker/netbox/).
  image:
    registry: ""
    repository: harbor.m0sh1.cc/apps/netbox
    tag: "f65a092a"
  # Enable installed plugins. Each entry is the Python module name.
  plugins:
  - netbox_bgp
  - netbox_topology_views
  # - netbox_qrcode
  # netbox_config_diff — requires USERNAME/PASSWORD (NAPALM device creds); re-add when configured
  # netbox_routing — conflicts with netbox_bgp (duplicate CommunityType GraphQL type)
  - netbox_security
  - netbox_ipcalculator
  # validity — disabled: MissingArgumentsAnnotationsError on "info" in validity_nameset_list
  #   (upstream strawberry-graphql incompatibility, validity plugin needs update)
  # - validity
  - netbox_diode_plugin
  - netbox_prometheus_sd
  # netbox_acls — requires NetBox ≤4.4.99; incompatible with 4.5.x (upstream issue #298)
  - netbox_inventory
  # Plugin configuration. Each key is a plugin module name, value is a dict.
  # Plugins work with empty config (sensible defaults). Tune as needed.
  pluginsConfig:
    netbox_bgp: {}
    netbox_topology_views: {}
    # netbox_qrcode: {}
    # netbox_config_diff: requires USERNAME + PASSWORD (NAPALM); disabled until creds are provisioned
    # netbox_routing: conflicts with netbox_bgp (duplicate CommunityType)
    netbox_security: {}
    netbox_ipcalculator: {}
    # validity: {} — disabled (see plugins list above)
    netbox_diode_plugin:
      # Unified in-cluster Diode endpoint (gRPC + /auth introspection path)
      # served by the Diode ingress-nginx controller.
      diode_target_override: grpc://diode-ingress-nginx-controller.apps.svc.cluster.local:80/diode
      # Keep file-based secret loading (no plaintext client secret in values).
      # Do not mount into /run/secrets to avoid collisions with chart-managed
      # secret and service-account mounts.
      secrets_path: /run/diode-secrets/
      netbox_to_diode_client_secret_name: netbox_to_diode
    netbox_prometheus_sd: {}
    # netbox_acls: {} — disabled; requires NetBox ≤4.4.99 (see upstream #298)
    netbox_inventory: {}
  resources:
    requests:
      cpu: 100m
      memory: 1152Mi
    limits:
      memory: 1536Mi
  # SSO via Authentik OIDC (social-auth-app-django, bundled in upstream image).
  remoteAuth:
    enabled: true
    backends:
    - social_core.backends.open_id_connect.OpenIdConnectAuth
    autoCreateUser: true
    autoCreateGroups: true
    defaultGroups: []
    defaultPermissions: {}
    groupSyncEnabled: true
    superuserGroups:
    - "NetBox Admins"
    superusers:
    - m0sh1
    staffGroups:
    - "NetBox Admins"
    staffUsers:
    - m0sh1
  # NetBox v4+ runs the app server directly (granian on :8080). The upstream chart
  # defaults its liveness probe to the NGINX Unit status endpoint (:8081), which
  # causes needless restarts when Unit is not active. Override to probe /login/.
  customLivenessProbe:
    httpGet:
      path: /login/
      port: http
      httpHeaders:
      - name: Host
        value: netbox.m0sh1.cc
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 6
  allowedHosts:
  - netbox.m0sh1.cc
  - netbox
  - netbox.apps.svc
  - netbox.apps.svc.cluster.local
  - localhost
  - 127.0.0.1
  # Do not generate secrets at render-time. Provide Secret key and superuser
  # credentials via SealedSecrets in apps/user/secrets-apps.
  service:
    ipFamilyPolicy: PreferDualStack
  existingSecret: netbox-existing
  superuser:
    existingSecret: netbox-superuser
  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
    - host: netbox.m0sh1.cc
      paths:
      - /
    tls:
    - secretName: wildcard-m0sh1-cc
      hosts:
      - netbox.m0sh1.cc
  # Use the shared CNPG cluster (apps/cnpg-main).
  postgresql:
    enabled: false
  externalDatabase:
    host: cnpg-main-rw.apps.svc.cluster.local
    port: 5432
    database: netbox
    username: netbox
    existingSecretName: netbox-postgres-auth
    existingSecretKey: password
    options:
      sslmode: "prefer"
      target_session_attrs: "read-write"
  # Use the shared Valkey instance (no auth).
  valkey:
    enabled: false
  tasksDatabase:
    host: valkey.apps.svc.cluster.local
    port: 6379
    database: 0
    ssl: false
  cachingDatabase:
    host: valkey.apps.svc.cluster.local
    port: 6379
    database: 1
    ssl: false
  # S3 storage is configured via extraConfig secret (loaded from /run/config/extra/*).
  storages: {}
  extraConfig:
  - secret:
      secretName: netbox-extra-config
      items:
      - key: storages.yaml
        path: storages.yaml
  - secret:
      secretName: netbox-oidc-config
      items:
      - key: oidc.yaml
        path: oidc.yaml
  - secret:
      secretName: netbox-api-peppers
      items:
      - key: api_token_peppers.yaml
        path: api_token_peppers.yaml
  extraEnvs:
  - name: OPNSENSE_URL
    value: "https://10.0.10.1"
  - name: OPNSENSE_API_KEY
    valueFrom:
      secretKeyRef:
        name: opnsense-api-key
        key: OPNSENSE_API_KEY
  - name: OPNSENSE_API_SECRET
    valueFrom:
      secretKeyRef:
        name: opnsense-api-key
        key: OPNSENSE_API_SECRET
  extraVolumes:
  - name: netbox-diode-client
    secret:
      secretName: netbox-diode-client
  extraVolumeMounts:
  - name: netbox-diode-client
    mountPath: /run/diode-secrets
    readOnly: true
  worker:
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 384Mi
    podAnnotations:
      trivy-refresh-rev: "20260223-5"
    waitForBackend:
      enabled: false
    extraEnvs:
    - name: OPNSENSE_URL
      value: "https://10.0.10.1"
    - name: OPNSENSE_API_KEY
      valueFrom:
        secretKeyRef:
          name: opnsense-api-key
          key: OPNSENSE_API_KEY
    - name: OPNSENSE_API_SECRET
      valueFrom:
        secretKeyRef:
          name: opnsense-api-key
          key: OPNSENSE_API_SECRET
    extraVolumes:
    - name: netbox-diode-client
      secret:
        secretName: netbox-diode-client
    extraVolumeMounts:
    - name: netbox-diode-client
      mountPath: /run/diode-secrets
      readOnly: true
  housekeeping:
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 1
    extraEnvs: []
    extraVolumes: []
    extraVolumeMounts: []
# OPNsense → Netbox security plugin sync.
# The custom script is baked into the Netbox image (tools/cli/docker/netbox/).
# Schedule it via the Netbox UI: Customization → Scripts → OPNsense Sync.
opnsenseSync:
  enabled: true
