{{- if .Values.opnsenseSync.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: opnsense-netbox-sync
  labels:
    app.kubernetes.io/name: netbox
    app.kubernetes.io/component: opnsense-sync
spec:
  schedule: {{ .Values.opnsenseSync.schedule | quote }}
  timeZone: {{ .Values.opnsenseSync.timeZone | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: netbox
            app.kubernetes.io/component: opnsense-sync
        spec:
          restartPolicy: Never
          containers:
            - name: sync
              image: {{ .Values.opnsenseSync.image.repository }}:{{ .Values.opnsenseSync.image.tag }}
              imagePullPolicy: {{ .Values.opnsenseSync.image.pullPolicy | default "IfNotPresent" }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
              env:
                - name: NETBOX_URL
                  value: {{ .Values.opnsenseSync.netboxUrl | quote }}
                - name: NETBOX_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.opnsenseSync.netboxSecret.name }}
                      key: {{ .Values.opnsenseSync.netboxSecret.tokenKey }}
                - name: OPNSENSE_URL
                  value: {{ .Values.opnsenseSync.opnsenseUrl | quote }}
                - name: OPNSENSE_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.opnsenseSync.opnsenseSecret.name }}
                      key: {{ .Values.opnsenseSync.opnsenseSecret.keyField }}
                - name: OPNSENSE_API_SECRET
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.opnsenseSync.opnsenseSecret.name }}
                      key: {{ .Values.opnsenseSync.opnsenseSecret.secretField }}
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
{{- end }}
