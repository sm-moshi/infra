# apps/user/ollama/values.yaml
#
# Ollama LLM inference server — CPU-only deployment.
# Pinned to horse-01 (6 cores, 10 GB RAM) for best CPU performance.
#
# GPU passthrough not configured on this cluster. For 7B+ models or
# multi-user concurrency, GPU hardware + Proxmox PCI passthrough is needed.
# Current model: lfm2.5-thinking:1.2b (Liquid Foundation Model, ~1 GB weights).
authentikMode: public

ollama:
  ollama:
    gpu:
      enabled: false

    models:
      pull:
      - lfm2.5-thinking:1.2b

  image:
    repository: ollama/ollama
    pullPolicy: IfNotPresent

  replicaCount: 1

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi

  persistentVolume:
    enabled: true
    size: 30Gi
    storageClass: proxmox-csi-zfs-nvme-ai-retain
    accessModes:
    - ReadWriteOnce

  service:
    type: ClusterIP
    port: 11434
    ipFamilyPolicy: PreferDualStack

  livenessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6

  startupProbe:
    enabled: true
    path: /
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30

  readinessProbe:
    enabled: true
    path: /
    initialDelaySeconds: 45
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12

  nodeSelector:
    kubernetes.io/hostname: horse01

  tolerations: []

  affinity: {}

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    readOnlyRootFilesystem: false
    runAsNonRoot: false
