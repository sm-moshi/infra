apiVersion: apps/v1
kind: Deployment
metadata:
  name: garage-webui
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage-webui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: garage-webui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-webui
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: garage-webui
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3909
              protocol: TCP
          env:
            - name: API_BASE_URL
              value: {{ .Values.garageAdminUrl | quote }}
            - name: S3_ENDPOINT_URL
              value: {{ .Values.garageS3Url | quote }}
            - name: API_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.adminTokenSecret.name }}
                  key: {{ .Values.adminTokenSecret.key }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
