authentikMode: forward-auth
image:
  repository: khairul169/garage-webui
  tag: "1.1.0"
  pullPolicy: IfNotPresent

replicas: 1

resources:
  requests:
    cpu: 10m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Garage admin API endpoint (cluster-internal HTTP)
garageAdminUrl: "http://garage.garage.svc.cluster.local:3903"

# Garage S3 endpoint (cluster-internal HTTP)
garageS3Url: "http://garage.garage.svc.cluster.local:3900"

# Reference to the GarageAdminToken secret
adminTokenSecret:
  name: garage-admin-token
  key: admin-token

service:
  type: ClusterIP
  port: 3909
  ipFamilyPolicy: PreferDualStack

ingress:
  enabled: true
  className: traefik
  host: s3-console.m0sh1.cc
  tls:
    secretName: wildcard-m0sh1-cc

outpostIngress:
  enabled: true
  host: s3-console.m0sh1.cc
  tlsSecretName: wildcard-m0sh1-cc

forwardAuth:
  enabled: true
  address: http://authentik-server.apps.svc.cluster.local/outpost.goauthentik.io/auth/traefik
  trustForwardHeader: true
  authResponseHeaders:
    - X-Forwarded-User
    - X-Forwarded-Email
    - X-authentik-uid
    - X-authentik-username
    - X-authentik-email
    - X-authentik-name

nodeSelector:
  node-role.kubernetes.io/worker: "true"
