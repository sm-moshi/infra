image:
  registry: "ghcr.io"
  repository: renovatebot/renovate
  tag: "43.64.3"
  pullPolicy: IfNotPresent
authentikMode: outpost-only

# Secret of type kubernetes.io/dockerconfigjson containing auth for registries that
# Renovate needs to query (e.g. `dhi.io/*` images).
# Used for Renovate's docker datasource lookups (tags/digests).
dockerConfigSecretName: kubernetes-dhi

# Secret containing a `hostRules` JSON document (key: `hostRules`) for
# authenticating Renovate's docker datasource against registries like `dhi.io`.
hostRulesSecretName: renovate-host-rules
hostRulesSecretKey: hostRules

github:
  gitAuthor: "Renovate Bot <renovate@m0sh1.cc>"

logLevel: debug

podAnnotations: {}

extraEnv:
  NODE_OPTIONS: "--max-old-space-size=3584"
  RENOVATE_CONCURRENT_LIMIT: "2"
  RENOVATE_WORKER_COUNT: "2"
  RENOVATE_CACHE_DIR: "/tmp/renovate-cache"
  RENOVATE_REDIS_URL: "redis://valkey.apps.svc.cluster.local:6379/0"
  RENOVATE_REPOSITORY_CACHE: "enabled"

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 2
    memory: 2Gi

tolerations: []

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: node-role.kubernetes.io/worker
          operator: Exists
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 80
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-01"]
    - weight: 60
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-02"]

topologySpreadConstraints:
- maxSkew: 2
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway
  labelSelector:
    matchLabels:
      app.kubernetes.io/name: renovate

persistence:
  cache:
    enabled: true
    nameSuffix: "v2"
    storageClass: garage-s3-rwx
    storageSize: 5Gi
    accessModes:
    - ReadWriteMany
    mountPath: /tmp/renovate-cache

# RenovateJob CRD — managed by renovate-operator.
renovateJob:
  enabled: true
  schedule: "0 * * * *"
  secretRef: renovate-operator-secret
  provider:
    name: github
  discoveryFilter: "/^sm-moshi\\/(infra|infra-cli|livesync-bridge|act|helm-charts|virtual-environments-fork|apple-mail-mcp)$/"
  parallelism: 1

# Authentik outpost callback route retained as a documented outpost-only exception.
# This chart does not define a wrapper-level forwardAuth middleware.
outpostIngress:
  enabled: true
  host: renovate.m0sh1.cc
  tlsSecretName: wildcard-m0sh1-cc
