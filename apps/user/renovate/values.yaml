image:
  registry: "harbor.m0sh1.cc/ghcr"
  repository: renovatebot/renovate
  tag: "43.31.1@sha256:99198d61d3c837085bdc94e0eafb1d57de3ecbfdc2e5e994817e589f71eacd16"
  pullPolicy: IfNotPresent

# Secret of type kubernetes.io/dockerconfigjson containing auth for registries that
# Renovate needs to query (e.g. `dhi.io/*` images).
# Used for Renovate's docker datasource lookups (tags/digests).
dockerConfigSecretName: kubernetes-dhi

# Secret containing a `hostRules` JSON document (key: `hostRules`) for
# authenticating Renovate's docker datasource against registries like `dhi.io`.
hostRulesSecretName: renovate-host-rules
hostRulesSecretKey: hostRules

github:
  gitAuthor: "Renovate Bot <renovate@m0sh1.cc>"

logLevel: debug

podAnnotations: {}

extraEnv:
  NODE_OPTIONS: "--max-old-space-size=3584"
  RENOVATE_CONCURRENT_LIMIT: "2"
  RENOVATE_WORKER_COUNT: "2"
  RENOVATE_CACHE_DIR: "/tmp/renovate-cache"

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 2
    memory: 2Gi

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 90
      preference:
        matchExpressions:
        - key: node-role.kubernetes.io/worker
          operator: Exists
    - weight: 100
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: [ "pve-03" ]
    - weight: 60
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: [ "pve-02" ]

persistence:
  cache:
    enabled: true
    storageClass: proxmox-csi-zfs-nvme-fast-retain
    storageSize: 5Gi
    accessModes:
    - ReadWriteOnce
    mountPath: /tmp/renovate-cache

# RenovateJob CRD — managed by renovate-operator.
renovateJob:
  enabled: true
  schedule: "0 * * * *"
  secretRef: renovate-operator-secret
  discoveryFilter: "/^sm-moshi\\/(infra|infra-cli|act|helm-charts)$/"
  parallelism: 1

# Authentik outpost callback route for Renovate forwardAuth.
# Must exist on the same host used in forwardAuth address.
outpostIngress:
  enabled: true
  host: renovate.m0sh1.cc
  tlsSecretName: wildcard-m0sh1-cc
