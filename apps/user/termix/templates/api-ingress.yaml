{{- if .Values.apiIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "termix.fullname" . }}-api
  labels:
    {{- include "termix.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/ignore: "true"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.apiIngress.host }}
      secretName: wildcard-m0sh1-cc
  rules:
    - host: {{ .Values.apiIngress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "termix.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
