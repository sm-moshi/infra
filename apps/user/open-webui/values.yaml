pdb:
  enabled: true
  maxUnavailable: 1
authentikMode: oidc
oidcContract:
  providerName: Authentik
  discoveryURL: https://auth.m0sh1.cc/application/o/open-webui/.well-known/openid-configuration
  secretName: openwebui-oidc
  clientIdKey: OAUTH_CLIENT_ID
  clientSecretKey: OAUTH_CLIENT_SECRET
  groupsClaim: groups
  adminGroup: authentik Admins

# apps/user/open-webui/values.yaml
#
# Open WebUI — unified AI chat platform.
# Backend: Ollama (CPU-only LLM inference)
# Database: CNPG PostgreSQL (shared cnpg-main cluster)
# Vector DB: Qdrant (RAG / document search)
# Cache: Valkey (WebSocket + session)
# Storage: Garage S3 (file uploads)
# Auth: Authentik OIDC SSO
# Ingress: Traefik at ai.m0sh1.cc (no Authentik forwardAuth middleware in this wrapper)

open-webui:
  # Disable bundled subcharts — we deploy these separately
  ollama:
    enabled: false
  pipelines:
    enabled: false
  tika:
    enabled: false

  # Single replica does not need the chart's Redis-backed websocket/session path.
  # Leaving websocket.enabled on still injects REDIS_URL and triggers the failing
  # session-cleanup lock path in the application.
  websocket:
    enabled: false

  # Single replica remains sufficient; startup now uses lazy model caching.
  replicaCount: 1
  ollamaUrls:
  - http://ollama.apps.svc.cluster.local:11434

  image:
    repository: ghcr.io/open-webui/open-webui
    pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 250m
      memory: 1Gi
    limits:
      cpu: "1"
      memory: 2Gi

  # Harden startup against transient dependency outages (DB/Redis) after reboots/rollouts
  extraInitContainers:
  - name: wait-for-postgres
    image: dhi.io/busybox:1.37.0-debian13
    command: [ "sh", "-ec" ]
    args:
    - |
      until nc -w 2 cnpg-main-rw.apps.svc.cluster.local 5432 < /dev/null; do
        echo "waiting for PostgreSQL..."
        sleep 2
      done
  startupProbe:
    httpGet:
      path: /api/version
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 90

  readinessProbe:
    httpGet:
      path: /api/version
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 12

  livenessProbe:
    httpGet:
      path: /api/version
      port: http
    initialDelaySeconds: 120
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6

  # Persist /app/backend/data — holds sentence-transformer model cache and
  # runtime assets. Models are populated lazily at runtime to avoid blocking pod
  # startup on large Hugging Face downloads or init-container memory spikes.
  persistence:
    enabled: true
    size: 16Gi
    storageClass: proxmox-csi-zfs-nvme-general-retain
    existingClaim: open-webui-data-v2

  # Ingress handled by wrapper templates (Traefik IngressRoute + Authentik middleware)
  ingress:
    enabled: false

  service:
    type: ClusterIP
    port: 80

  # --- Environment configuration ---
  # Secrets are injected via extraEnvFrom (SealedSecrets)
  extraEnvVars:
  # Bind to dual-stack (IPv4+IPv6) — uvicorn defaults to 0.0.0.0 (IPv4 only),
  # which causes 502s when Traefik routes via the IPv6 Service endpoint.
  - name: HOST
    value: "::"
  # Single replica does not need websocket fan-out. Open WebUI defaults back to
  # a Redis manager when these are absent, so set both explicitly.
  - name: ENABLE_WEBSOCKET_SUPPORT
    value: "False"
  - name: WEBSOCKET_MANAGER
    value: "memory"
  # Persist transformer and embedding caches on the PVC so restarts do not
  # redownload model artifacts before the server binds its health endpoint.
  - name: HF_HOME
    value: /app/backend/data/cache/huggingface
  - name: TRANSFORMERS_CACHE
    value: /app/backend/data/cache/huggingface
  - name: SENTENCE_TRANSFORMERS_HOME
    value: /app/backend/data/cache/embedding/models
  - name: RAG_EMBEDDING_MODEL
    value: sentence-transformers/all-MiniLM-L6-v2
  - name: RAG_EMBEDDING_MODEL_AUTO_UPDATE
    value: "false"
  - name: RAG_RERANKING_MODEL
    value: BAAI/bge-reranker-v2-m3
  - name: RAG_RERANKING_MODEL_AUTO_UPDATE
    value: "false"

  # Database — PostgreSQL via CNPG (connection string in secret)
  # DATABASE_URL is set via extraEnvFrom secret

  # Vector database — Qdrant for RAG
  - name: VECTOR_DB
    value: "qdrant"
  - name: QDRANT_URI
    value: "http://qdrant.apps.svc.cluster.local:6333"
  # QDRANT_API_KEY is set via extraEnvFrom secret
  - name: ENABLE_QDRANT_MULTITENANCY_MODE
    value: "true"

  # S3 storage via Garage (file uploads, documents)
  - name: STORAGE_PROVIDER
    value: "s3"
  - name: S3_ENDPOINT_URL
    value: "http://garage.garage.svc.cluster.local:3900"
  - name: S3_BUCKET_NAME
    value: "openwebui-data"
  - name: S3_REGION_NAME
    value: "garage"
  # S3_ACCESS_KEY_ID and S3_SECRET_ACCESS_KEY set via extraEnvFrom secret

  # SSO — Authentik OIDC
  - name: ENABLE_OAUTH_SIGNUP
    value: "true"
  - name: OAUTH_PROVIDER_NAME
    value: "Authentik"
  - name: OPENID_PROVIDER_URL
    value: "https://auth.m0sh1.cc/application/o/open-webui/.well-known/openid-configuration"
  - name: OAUTH_SCOPES
    value: "openid email profile"
  - name: ENABLE_OAUTH_ROLE_MANAGEMENT
    value: "true"
  - name: OAUTH_ROLES_CLAIM
    value: "groups"
  - name: OAUTH_ADMIN_ROLES
    value: "authentik Admins"
  # OAUTH_CLIENT_ID and OAUTH_CLIENT_SECRET set via extraEnvFrom secret

  # Application settings
  - name: ENABLE_PERSISTENT_CONFIG
    value: "false"
  - name: WEBUI_URL
    value: "https://ai.m0sh1.cc"
  # Inject secrets from SealedSecrets
  extraEnvFrom:
  - secretRef:
      name: openwebui-config
  - secretRef:
      name: openwebui-oidc
  - secretRef:
      name: openwebui-garage-s3

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values: ["horse02"]
      - weight: 90
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values: ["horse03"]
      - weight: 80
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values: ["horse04"]
      - weight: 10
        preference:
          matchExpressions:
          - key: kubernetes.io/hostname
            operator: In
            values: ["horse01"]

  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

# --- Wrapper-level ingress configuration ---
ingress:
  enabled: true
  className: traefik
  host: ai.m0sh1.cc
  tls:
    secretName: wildcard-m0sh1-cc
