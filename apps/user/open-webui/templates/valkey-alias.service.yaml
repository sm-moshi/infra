{{- if (index .Values "open-webui" "websocket" "enabled") }}
# Open WebUI defaults to using `open-webui-redis` for REDIS_URL unless explicitly configured.
# When websocket support is enabled, provide a DNS alias for the shared Valkey service.
apiVersion: v1
kind: Service
metadata:
  name: open-webui-redis
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: open-webui
    app.kubernetes.io/component: cache
spec:
  type: ExternalName
  externalName: valkey.apps.svc.cluster.local
  ports:
    - name: redis
      protocol: TCP
      port: 6379
      targetPort: 6379
{{- end }}
