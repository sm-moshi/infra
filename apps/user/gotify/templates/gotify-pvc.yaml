{{- if .Values.gotify.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gotify.fullname" . }}-data
  labels:
    {{- include "gotify.labels" . | nindent 4 }}
    app.kubernetes.io/component: gotify
spec:
  accessModes:
    - {{ .Values.gotify.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.gotify.persistence.size }}
  storageClassName: {{ .Values.gotify.persistence.storageClass }}
{{- end }}
