{{- if .Values.igotify.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "gotify.fullname" . }}-igotify
  labels:
    {{- include "gotify.labels" . | nindent 4 }}
    app.kubernetes.io/component: igotify
spec:
  type: {{ .Values.igotify.service.type }}
  ipFamilyPolicy: {{ .Values.igotify.service.ipFamilyPolicy }}
  selector:
    {{- include "gotify.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: igotify
  ports:
    - name: http
      port: {{ .Values.igotify.service.port }}
      targetPort: http
{{- end }}
