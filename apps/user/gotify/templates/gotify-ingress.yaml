{{- if .Values.gotify.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "gotify.fullname" . }}
  labels:
    {{- include "gotify.labels" . | nindent 4 }}
    app.kubernetes.io/component: gotify
  annotations:
    {{- toYaml .Values.gotify.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.gotify.ingress.className }}
  tls:
    - hosts:
        - {{ .Values.gotify.ingress.host }}
      secretName: {{ .Values.gotify.ingress.tls.secretName }}
  rules:
    - host: {{ .Values.gotify.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "gotify.fullname" . }}
                port:
                  number: {{ .Values.gotify.service.port }}
{{- end }}
