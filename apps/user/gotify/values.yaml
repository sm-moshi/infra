nameOverride: ""
fullnameOverride: ""

gotify:
  replicaCount: 1
  revisionHistoryLimit: 1
  image:
    repository: gotify/server
    tag: "2.9.1"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    ipFamilyPolicy: PreferDualStack
  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      external-dns.alpha.kubernetes.io/ignore: "true"
    host: gotify.m0sh1.cc
    tls:
      secretName: wildcard-m0sh1-cc
  persistence:
    enabled: true
    storageClass: proxmox-csi-zfs-nvme-general-retain
    size: 5Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data
  adminSecret:
    name: gotify-admin
    passwordKey: GOTIFY_DEFAULTUSER_PASS
  env:
    - name: TZ
      value: Europe/Berlin
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi
  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 24
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

igotify:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  image:
    repository: ghcr.io/androidseb25/igotify-notification-assist
    tag: "v1.5.1.3"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
    ipFamilyPolicy: PreferDualStack
  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      external-dns.alpha.kubernetes.io/ignore: "true"
    host: igotify.m0sh1.cc
    tls:
      secretName: wildcard-m0sh1-cc
  persistence:
    enabled: true
    storageClass: proxmox-csi-zfs-nvme-general-retain
    size: 1Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data
  configSecret:
    name: igotify-config
  env:
    - name: TZ
      value: Europe/Berlin
  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 300m
      memory: 256Mi
  startupProbe:
    httpGet:
      path: /Version
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 24
  livenessProbe:
    httpGet:
      path: /Version
      port: http
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /Version
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

podSecurityContext:
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

nodeSelector:
  node-role.kubernetes.io/worker: "true"

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-02"]
