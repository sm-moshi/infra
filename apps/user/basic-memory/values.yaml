replicaCount: 1
revisionHistoryLimit: 2
image:
  repository: harbor.m0sh1.cc/ghcr/basicmachines-co/basic-memory
  tag: "0.18.5"
  pullPolicy: IfNotPresent
service:
  type: ClusterIP
  port: 8000
  targetPort: 8000
# Basic Memory upstream server (bound inside the pod network namespace).
# We front it with an MCP shim so older/buggy MCP clients can connect.
basicMemory:
  upstreamPort: 8001
# MCP compatibility shim (Deno) that fronts `/mcp` and normalizes slightly
# non-compliant JSON-RPC requests before proxying to the upstream server.
mcpShim:
  image:
    repository: harbor.m0sh1.cc/apps/livesync-bridge
    tag: "1b46fe6c"
    pullPolicy: IfNotPresent
  # Cap in-flight tools/call requests forwarded to upstream.
  # Prevents request bursts from exhausting Basic Memory's DB pool.
  # Limit for throttled/expensive tools only (mutations by default).
  maxToolCallConcurrency: 8
  # Fail fast when the throttled tool queue is saturated.
  toolCallQueueTimeoutMs: 12000
  # Guard against long-hanging upstream requests.
  upstreamTimeoutMs: 45000
  # Throttle only expensive mutating tools so simple reads stay snappy.
  throttledTools:
  - write_note
  - edit_note
  - move_note
  - delete_note
  # Guardrails for automated clients writing to Basic Memory via MCP.
  # Keeps content organized and prevents accidental deletions.
  policy:
    allowedNoteDirs:
    - kubernetes
    - sessions
    - decisions
    allowDeleteNote: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    # Ensure MCP clients can negotiate streamable responses.
    traefik.ingress.kubernetes.io/router.middlewares: apps-basic-memory-mcp-accept@kubernetescrd
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
  hosts:
  - host: basic-memory.m0sh1.cc
    paths:
    - path: /
      pathType: Prefix
  tls:
  - hosts:
    - basic-memory.m0sh1.cc
    secretName: wildcard-m0sh1-cc
env:
  BASIC_MEMORY_DEFAULT_PROJECT: "main"
  BASIC_MEMORY_LOG_LEVEL: "INFO"
  # Reduce background sync pressure during churn-heavy file event bursts.
  BASIC_MEMORY_SYNC_THREAD_POOL_SIZE: "2"
  BASIC_MEMORY_SYNC_MAX_CONCURRENT_FILES: "4"
  BASIC_MEMORY_WATCH_PROJECT_RELOAD_INTERVAL: "900"
persistence:
  enabled: true
  storageClass: proxmox-csi-zfs-nvme-general-retain
  size: 5Gi
  mountPath: /app/data
  accessMode: ReadWriteOnce
resources:
  requests:
    cpu: 300m
    memory: 768Mi
  limits:
    cpu: 1200m
    memory: 1536Mi
# Prefer lab-ctrl (pve01) — lightweight but important service benefits from
# the most powerful node. PVCs resync from GitHub via livesync-bridge.
nodeSelector:
  node-role.kubernetes.io/worker: "true"
tolerations: []
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values: ["lab-ctrl"]
    - weight: 80
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-02"]
    - weight: 60
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-03"]
# Recreate strategy for PVC-backed workload
strategy:
  type: Recreate
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  # Health checks - use TCP socket since no dedicated health endpoint
  # Startup probe allows slow initialization before liveness/readiness kick in.
  # 5s initial delay + 30 failures * 5s period = up to 155s startup time.
startupProbe:
  tcpSocket:
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 5
  failureThreshold: 30
livenessProbe:
  tcpSocket:
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  tcpSocket:
    port: 8000
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
# CouchDB for Obsidian LiveSync
couchdb:
  enabled: true
  image:
    repository: harbor.m0sh1.cc/dhi/couchdb
    tag: "3.5.1"
    pullPolicy: IfNotPresent
  existingSecret:
    name: basic-memory-couchdb
    userKey: COUCHDB_USER
    passwordKey: COUCHDB_PASSWORD
  persistence:
    size: 2Gi
    storageClass: proxmox-csi-zfs-nvme-general-retain
  service:
    port: 5984
  ingress:
    enabled: true
    host: livesync.m0sh1.cc
  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 700m
      memory: 768Mi
# livesync-bridge: CouchDB <-> filesystem bidirectional sync
livesync:
  enabled: true
  # Image used for the config initContainer. Needs JSON-safe templating (no sed/awk)
  # because the CouchDB password can contain characters like '/' or '&'.
  configInitImage:
    # Use the built livesync-bridge image (contains Deno)
    repository: harbor.m0sh1.cc/apps/livesync-bridge
    tag: "1b46fe6c"
    pullPolicy: IfNotPresent
  image:
    repository: harbor.m0sh1.cc/apps/livesync-bridge
    tag: "1b46fe6c"
    pullPolicy: IfNotPresent
  database: obsidian
  passphrase: ""
  # Keep Deno localStorage/cache outside the watched "data/" tree to avoid
  # self-triggering sync loops on local_storage-wal files.
  denoDir: /tmp/.deno
  # Scan for offline changes on startup. Disable to prevent race condition when
  # many files need syncing - causes "database is closed" errors in livesync-bridge.
  scanOfflineChanges: false
  # Glob patterns for directories/files to skip during scanning and watching.
  # Matched against each path segment, so ".git" ignores ".git/" at any depth.
  ignorePaths:
  - ".git"
  - ".obsidian"
  - ".smart-env"
  - ".trash"
  - ".deno"
  - "node_modules"
  - "*.tmp"
  resources:
    requests:
      cpu: 100m
      memory: 192Mi
    limits:
      cpu: 350m
      memory: 640Mi
