apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "basic-memory.fullname" . }}-config
  labels:
    {{- include "basic-memory.labels" . | nindent 4 }}
data:
  config.json: |
    {
      "projects": {
        "main": {
          "path": "/app/data/basic-memory",
          "mode": "local"
        }
      },
      "default_project": "main"
    }
