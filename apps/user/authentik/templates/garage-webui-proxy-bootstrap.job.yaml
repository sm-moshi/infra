apiVersion: batch/v1
kind: Job
metadata:
  name: garage-webui-proxy-bootstrap
  labels:
    app.kubernetes.io/name: garage-webui
    app.kubernetes.io/component: garage-webui-proxy-bootstrap
    app.kubernetes.io/part-of: authentik-bootstrap
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "10"
    argocd.argoproj.io/sync-options: Replace=true
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: garage-webui
        app.kubernetes.io/component: garage-webui-proxy-bootstrap
        app.kubernetes.io/part-of: authentik-bootstrap
    spec:
      restartPolicy: Never
      containers:
        - name: bootstrap
          image: ghcr.io/goauthentik/server:2025.12.3
          imagePullPolicy: IfNotPresent
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
          env:
            - name: AUTHENTIK_BOOTSTRAP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-config
                  key: bootstrap_token
            - name: AUTHENTIK_BASE_URL
              value: http://authentik-server.apps.svc.cluster.local
          command:
            - /bin/sh
            - -ec
            - |
              # Wait for network policy propagation (kube-router race)
              for i in $(seq 1 30); do
                python3 -c "import socket; s=socket.socket(); s.settimeout(2); s.connect(('authentik-server', 80)); s.close()" 2>/dev/null && break
                echo "Waiting for Authentik server... ($i/30)"
                sleep 2
              done
              python - <<'PY'
              import json
              import os
              import urllib.parse
              import urllib.request

              base = os.environ["AUTHENTIK_BASE_URL"].rstrip("/")
              token = os.environ["AUTHENTIK_BOOTSTRAP_TOKEN"].strip()

              EXTERNAL_HOST = "https://s3-console.m0sh1.cc"
              APP_SLUG = "garage-webui"
              APP_NAME = "Garage WebUI"
              PROVIDER_NAME = "m0sh1-garage-webui-proxy"

              if not token:
                raise SystemExit("AUTHENTIK_BOOTSTRAP_TOKEN is empty")

              def req(method, path, body=None, query=None):
                url = base + path
                if query:
                  url += "?" + urllib.parse.urlencode(query)
                data = None
                headers = {
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/json",
                }
                if body is not None:
                  data = json.dumps(body).encode("utf-8")
                  headers["Content-Type"] = "application/json"
                r = urllib.request.Request(url, data=data, headers=headers, method=method)
                try:
                  with urllib.request.urlopen(r, timeout=30) as resp:
                    raw = resp.read().decode("utf-8") if resp.length != 0 else ""
                    return resp.status, (json.loads(raw) if raw else None)
                except urllib.error.HTTPError as e:
                  raw = e.read().decode("utf-8") if e.fp else ""
                  raise RuntimeError(f"{method} {url} -> {e.code}: {raw[:800]}")

              def list_all(path, key="results", page_size=200):
                status, body = req("GET", path, query={"page_size": page_size})
                if status != 200:
                  raise RuntimeError(f"GET {path} unexpected status {status}")
                return body.get(key, [])

              # Resolve flows by slug.
              flows = list_all("/api/v3/flows/instances/")
              auth_flow = next((f for f in flows if f.get("slug") == "default-authentication-flow"), None)
              if not auth_flow:
                raise RuntimeError("default-authentication-flow not found")
              authz_flow = next((f for f in flows if f.get("slug") == "default-provider-authorization-implicit-consent"), None)
              if not authz_flow:
                raise RuntimeError("default-provider-authorization-implicit-consent not found")
              invalidation_flow = next((f for f in flows if f.get("slug") == "default-provider-invalidation-flow"), None)
              if not invalidation_flow:
                raise RuntimeError("default-provider-invalidation-flow not found")

              # Ensure proxy provider exists.
              providers = list_all("/api/v3/providers/proxy/")
              provider = next((p for p in providers if p.get("name") == PROVIDER_NAME), None)

              desired = {
                "name": PROVIDER_NAME,
                "authorization_flow": authz_flow["pk"],
                "authentication_flow": auth_flow["pk"],
                "invalidation_flow": invalidation_flow["pk"],
                "mode": "forward_single",
                "external_host": EXTERNAL_HOST,
              }

              if provider:
                pk = provider["pk"]
                patch = {
                  "external_host": EXTERNAL_HOST,
                  "mode": "forward_single",
                }
                if any(provider.get(k) != v for k, v in patch.items()):
                  req("PATCH", f"/api/v3/providers/proxy/{pk}/", body=patch)
                  print(f"updated provider pk={pk}")
                else:
                  print(f"provider pk={pk} already up-to-date")
              else:
                _, created = req("POST", "/api/v3/providers/proxy/", body=desired)
                pk = created["pk"]
                print(f"created provider pk={pk}")

              # Ensure application exists and points to this provider.
              apps = list_all("/api/v3/core/applications/")
              app = next((a for a in apps if a.get("slug") == APP_SLUG), None)
              if app:
                app_pk = app["pk"]
                if app.get("provider") != pk:
                  req("PATCH", f"/api/v3/core/applications/{app_pk}/", body={"provider": pk})
                  print(f"updated application pk={app_pk}")
                else:
                  print(f"application pk={app_pk} already up-to-date")
              else:
                body = {
                  "name": APP_NAME,
                  "slug": APP_SLUG,
                  "provider": pk,
                  "meta_launch_url": EXTERNAL_HOST,
                  "open_in_new_tab": True,
                }
                req("POST", "/api/v3/core/applications/", body=body)
                print("created application")

              # Assign to embedded outpost.
              outposts = list_all("/api/v3/outposts/instances/")
              embedded = next((o for o in outposts if o.get("name") == "authentik Embedded Outpost"), None)
              if not embedded:
                raise RuntimeError("embedded outpost not found")

              outpost_pk = embedded["pk"]
              current_providers = [p["pk"] if isinstance(p, dict) else p for p in embedded.get("providers", [])]
              if pk not in current_providers:
                current_providers.append(pk)
                req("PATCH", f"/api/v3/outposts/instances/{outpost_pk}/", body={"providers": current_providers})
                print(f"added provider to embedded outpost")
              else:
                print("provider already in embedded outpost")

              print("ok")
              PY
