dbInit:
  image: harbor.m0sh1.cc/dhi/postgres:18.3
  imagePullPolicy: IfNotPresent

authentik:
  # All Authentik configuration is provided via SealedSecrets in apps/user/secrets-apps.
  authentik:
    existingSecret:
      secretName: authentik-config

  # Use the shared CNPG cluster (apps/cnpg-main).
  postgresql:
    enabled: false

  global:
    env:
      # Authentik config is sourced from SealedSecrets (generic keys) and mapped into
      # the expected AUTHENTIK_* env vars here to avoid storing those env var names
      # in SealedSecret manifests (SonarCloud Security Hotspots false-positives).
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-config
            key: secret_key
      - name: AUTHENTIK_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-config
            key: bootstrap_pw
      - name: AUTHENTIK_BOOTSTRAP_TOKEN
        valueFrom:
          secretKeyRef:
            name: authentik-config
            key: bootstrap_token

      # CNPG (shared cluster)
      - name: AUTHENTIK_POSTGRESQL__HOST
        value: cnpg-main-rw.apps.svc.cluster.local
      - name: AUTHENTIK_POSTGRESQL__PORT
        value: "5432"
      - name: AUTHENTIK_POSTGRESQL__NAME
        value: authentik
      - name: AUTHENTIK_POSTGRESQL__USER
        value: authentik
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-auth
            key: password

      # S3-backed storage (Garage, internal HTTP)
      - name: AUTHENTIK_STORAGE__BACKEND
        value: s3
      - name: AUTHENTIK_STORAGE__S3__ENDPOINT
        value: http://garage.garage.svc.cluster.local:3900
      - name: AUTHENTIK_STORAGE__S3__BUCKET_NAME
        value: authentik-media
      - name: AUTHENTIK_STORAGE__S3__ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-garage-s3
            key: s3_access
      - name: AUTHENTIK_STORAGE__S3__SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-garage-s3
            key: s3_secret
      - name: AUTHENTIK_STORAGE__S3__REGION
        value: garage
      - name: AUTHENTIK_STORAGE__S3__USE_SSL
        value: "false"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

  server:
    podAnnotations:
      security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 700Mi
      limits:
        # cpu: "1"
        memory: 1250Mi
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    replicas: 2
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: topology.kubernetes.io/zone
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
                  app.kubernetes.io/component: server

    # Reduce restart storms during brief DB/API hiccups (see cluster probe failures).
    livenessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      httpGet:
        path: "{{ .Values.authentik.web.path }}-/health/live/"
        port: http
    readinessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      httpGet:
        path: "{{ .Values.authentik.web.path }}-/health/ready/"
        port: http
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        kubernetes.io/ingress.class: traefik
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - auth.m0sh1.cc
      tls:
        - secretName: wildcard-m0sh1-cc
          hosts:
            - auth.m0sh1.cc

  worker:
    podAnnotations:
      security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 700Mi
      limits:
        # cpu: "1"
        memory: 1250Mi
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    replicas: 2
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: topology.kubernetes.io/zone
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
                  app.kubernetes.io/component: worker

    livenessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      exec:
        command:
          - ak
          - healthcheck
    readinessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      exec:
        command:
          - ak
          - healthcheck

  # GitOps-managed Authentik configuration via Blueprints (mounted from wrapper chart templates).
  blueprints:
    configMaps:
      - authentik-blueprints
