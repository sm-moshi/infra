dbInit:
  image: harbor.m0sh1.cc/dhi/postgres:18.3
  imagePullPolicy: IfNotPresent
  ttlSecondsAfterFinished: 600
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi

authentik:
  # All Authentik configuration is provided via SealedSecrets in apps/user/secrets-apps.
  authentik:
    existingSecret:
      secretName: authentik-config

  # Use the shared CNPG cluster (apps/cnpg-main).
  postgresql:
    enabled: false

  global:
    env:
      # Authentik config is sourced from SealedSecrets (generic keys) and mapped into
      # the expected AUTHENTIK_* env vars here to avoid storing those env var names
      # in SealedSecret manifests (SonarCloud Security Hotspots false-positives).
      - name: AUTHENTIK_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-config
            key: secret_key
      - name: AUTHENTIK_BOOTSTRAP_PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-config
            key: bootstrap_pw
      - name: AUTHENTIK_BOOTSTRAP_TOKEN
        valueFrom:
          secretKeyRef:
            name: authentik-config
            key: bootstrap_token

      # CNPG (shared cluster)
      - name: AUTHENTIK_POSTGRESQL__HOST
        value: cnpg-main-rw.apps.svc.cluster.local
      - name: AUTHENTIK_POSTGRESQL__PORT
        value: "5432"
      - name: AUTHENTIK_POSTGRESQL__NAME
        value: authentik
      - name: AUTHENTIK_POSTGRESQL__USER
        value: authentik
      - name: AUTHENTIK_POSTGRESQL__PASSWORD
        valueFrom:
          secretKeyRef:
            name: authentik-postgres-auth
            key: password

      # S3-backed storage (Garage, internal HTTP)
      - name: AUTHENTIK_STORAGE__BACKEND
        value: s3
      - name: AUTHENTIK_STORAGE__S3__ENDPOINT
        value: http://garage.garage.svc.cluster.local:3900
      - name: AUTHENTIK_STORAGE__S3__BUCKET_NAME
        value: authentik-media
      - name: AUTHENTIK_STORAGE__S3__ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-garage-s3
            key: s3_access
      - name: AUTHENTIK_STORAGE__S3__SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: authentik-garage-s3
            key: s3_secret
      - name: AUTHENTIK_STORAGE__S3__REGION
        value: garage
      - name: AUTHENTIK_STORAGE__S3__USE_SSL
        value: "false"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

  server:
    podAnnotations:
      security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 700Mi
      limits:
        # cpu: "1"
        memory: 1250Mi
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    replicas: 2
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: authentik
            app.kubernetes.io/component: server
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: topology.kubernetes.io/zone
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
                  app.kubernetes.io/component: server

    # Reduce restart storms during brief DB/API hiccups (see cluster probe failures).
    livenessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      httpGet:
        path: "{{ .Values.authentik.web.path }}-/health/live/"
        port: http
    readinessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      httpGet:
        path: "{{ .Values.authentik.web.path }}-/health/ready/"
        port: http
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        kubernetes.io/ingress.class: traefik
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
        - auth.m0sh1.cc
      tls:
        - secretName: wildcard-m0sh1-cc
          hosts:
            - auth.m0sh1.cc

  worker:
    podAnnotations:
      security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
    containerSecurityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    resources:
      requests:
        cpu: 100m
        memory: 700Mi
      limits:
        # cpu: "1"
        memory: 1250Mi
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    replicas: 2
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: authentik
            app.kubernetes.io/component: worker
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              topologyKey: topology.kubernetes.io/zone
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: authentik
                  app.kubernetes.io/component: worker

    livenessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      exec:
        command:
          - ak
          - healthcheck
    readinessProbe:
      failureThreshold: 6
      initialDelaySeconds: 5
      periodSeconds: 10
      successThreshold: 1
      timeoutSeconds: 10
      exec:
        command:
          - ak
          - healthcheck

  # GitOps-managed Authentik configuration via Blueprints (mounted from wrapper chart templates).
  blueprints:
    configMaps:
      - authentik-blueprints

bootstrap:
  ttlSecondsAfterFinished: 600
  integrations:
    - kind: oidc
      jobName: argocd-oidc-bootstrap
      kubernetesName: argocd
      syncWave: "10"
      providerName: m0sh1-argocd-oidc
      subMode: user_username
      signingKey: self-signed
      propertyMappingScopes: [openid, profile, email, groups]
      app:
        slug: argocd
        name: ArgoCD
        launchUrl: https://argocd.m0sh1.cc
      secretRef:
        name: argocd-dex-authentik
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://argocd.m0sh1.cc/api/dex/callback
        - http://localhost:8085/auth/callback

    - kind: oidc
      jobName: forgejo-oidc-bootstrap
      kubernetesName: forgejo
      syncWave: "10"
      providerName: m0sh1-forgejo-oidc
      subMode: user_username
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: forgejo
        name: Forgejo
        launchUrl: https://forge.m0sh1.cc
      secretRef:
        name: forgejo-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://forge.m0sh1.cc/user/oauth2/authentik/callback

    - kind: proxy
      jobName: garage-webui-proxy-bootstrap
      kubernetesName: garage-webui
      syncWave: "10"
      providerName: m0sh1-garage-webui-proxy
      mode: forward_single
      attachEmbeddedOutpost: true
      app:
        slug: garage-webui
        name: Garage WebUI
        launchUrl: https://s3-console.m0sh1.cc
      externalHost: https://s3-console.m0sh1.cc

    - kind: oidc
      jobName: grafana-oidc-bootstrap
      kubernetesName: grafana
      syncWave: "10"
      providerName: m0sh1-grafana-oidc
      subMode: user_username
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: grafana
        name: Grafana
        launchUrl: https://grafana.m0sh1.cc
      secretRef:
        name: grafana-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://grafana.m0sh1.cc/login/generic_oauth

    - kind: oidc
      jobName: harbor-oidc-bootstrap
      kubernetesName: harbor
      syncWave: "10"
      providerName: m0sh1-harbor-oidc
      subMode: user_username
      signingKey: self-signed
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: harbor
        name: Harbor
        launchUrl: https://harbor.m0sh1.cc
      secretRef:
        name: harbor-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://harbor.m0sh1.cc/c/oidc/callback

    - kind: oidc
      jobName: authentik-headlamp-oidc-bootstrap
      kubernetesName: headlamp
      syncWave: "10"
      providerName: m0sh1-headlamp-oidc
      subMode: user_username
      signingKey: self-signed
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: headlamp
        name: Headlamp
        launchUrl: https://headlamp.m0sh1.cc
      secretRef:
        name: headlamp-oidc
        clientIdKey: OIDC_CLIENT_ID
        clientSecretKey: OIDC_CLIENT_SECRET
      redirectUris:
        - https://headlamp.m0sh1.cc/oidc-callback

    - kind: proxy
      jobName: authentik-hubble-ui-forwardauth-bootstrap
      kubernetesName: authentik
      syncWave: "11"
      providerName: m0sh1-hubble-ui-forwardauth
      mode: forward_domain
      attachEmbeddedOutpost: true
      app:
        slug: hubble-ui
        name: Hubble UI
        launchUrl: https://hubble.m0sh1.cc
      externalHost: https://hubble.m0sh1.cc
      internalHost: http://hubble-ui.kube-system.svc.cluster.local:80
      cookieDomain: .m0sh1.cc

    - kind: oidc
      jobName: netbox-oidc-bootstrap
      kubernetesName: netbox
      syncWave: "10"
      providerName: m0sh1-netbox-oidc
      subMode: user_username
      signingKey: self-signed
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: netbox
        name: NetBox
        launchUrl: https://netbox.m0sh1.cc
      secretRef:
        name: netbox-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://netbox.m0sh1.cc/oauth/complete/oidc/

    - kind: oidc
      jobName: paperless-oidc-bootstrap
      kubernetesName: paperless-ngx
      syncWave: "10"
      providerName: m0sh1-paperless-oidc
      subMode: user_username
      signingKey: self-signed
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: paperless
        name: Paperless-ngx
        launchUrl: https://paperless.m0sh1.cc
      secretRef:
        name: paperless-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://paperless.m0sh1.cc/accounts/oidc/authentik/login/callback/

    - kind: oidc
      jobName: authentik-opkssh-oidc-bootstrap
      kubernetesName: authentik
      syncWave: "10"
      providerName: m0sh1-opkssh
      subMode: user_username
      signingKey: none
      app:
        slug: opkssh
        name: OPKSSH
        launchUrl: https://termix.m0sh1.cc
      secretRef:
        name: termix-opkssh
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://termix.m0sh1.cc/ssh/opkssh-callback

    - kind: proxy
      jobName: authentik-pgadmin4-forwardauth-bootstrap
      kubernetesName: authentik
      syncWave: "10"
      providerName: m0sh1-pgadmin4-forwardauth
      mode: forward_domain
      attachEmbeddedOutpost: true
      app:
        slug: pgadmin4
        name: pgAdmin4
        launchUrl: https://pgadmin4.m0sh1.cc
      externalHost: https://pgadmin.m0sh1.cc
      internalHost: http://pgadmin4-v2.apps.svc.cluster.local
      cookieDomain: .m0sh1.cc

    - kind: oidc
      jobName: proxmox-oidc-bootstrap
      kubernetesName: proxmox
      syncWave: "10"
      providerName: m0sh1-proxmox-oidc
      subMode: user_username
      signingKey: self-signed
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: proxmox
        name: Proxmox
        launchUrl: https://pve01.m0sh1.cc:8006
      secretRef:
        name: proxmox-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://pve01.m0sh1.cc:8006
        - https://pve02.m0sh1.cc:8006
        - https://pve03.m0sh1.cc:8006
        - https://pbs.m0sh1.cc:8007

    - kind: proxy
      jobName: authentik-renovate-operator-forwardauth-bootstrap
      kubernetesName: authentik
      syncWave: "11"
      providerName: m0sh1-renovate-operator-forwardauth
      mode: forward_domain
      attachEmbeddedOutpost: true
      app:
        slug: renovate-operator
        name: Renovate Operator
        launchUrl: https://renovate.m0sh1.cc
      externalHost: https://renovate.m0sh1.cc
      internalHost: http://renovate-operator.renovate-operator.svc.cluster.local:8081
      cookieDomain: .m0sh1.cc

    - kind: oidc
      jobName: authentik-termix-oidc-bootstrap
      kubernetesName: authentik
      syncWave: "10"
      providerName: m0sh1-termix-oidc
      subMode: user_username
      app:
        slug: termix
        name: Termix
        launchUrl: https://termix.m0sh1.cc
      secretRef:
        name: termix-oidc
        clientIdKey: client_id
        clientSecretKey: client_secret
      redirectUris:
        - https://termix.m0sh1.cc/users/oidc/callback

    - kind: proxy
      jobName: authentik-paperless-ai-forwardauth-bootstrap
      kubernetesName: authentik
      syncWave: "10"
      providerName: m0sh1-paperless-ai-forwardauth
      mode: forward_domain
      attachEmbeddedOutpost: true
      app:
        slug: paperless-ai
        name: Paperless-AI
        launchUrl: https://paperless-ai.m0sh1.cc
      externalHost: https://paperless-ai.m0sh1.cc
      internalHost: http://paperless-ai-paperless-ai.apps.svc.cluster.local:3000
      cookieDomain: .m0sh1.cc

    - kind: proxy
      jobName: authentik-uptime-kuma-forwardauth-bootstrap
      kubernetesName: authentik
      syncWave: "10"
      providerName: m0sh1-uptime-kuma-forwardauth
      mode: forward_domain
      attachEmbeddedOutpost: true
      app:
        slug: uptime-kuma
        name: Uptime Kuma
        launchUrl: https://uptime.m0sh1.cc
      externalHost: https://uptime.m0sh1.cc
      internalHost: http://uptime-kuma.apps.svc.cluster.local:3001
      cookieDomain: .m0sh1.cc

    - kind: oidc
      jobName: vaultwarden-oidc-bootstrap
      kubernetesName: vaultwarden
      syncWave: "10"
      providerName: m0sh1-vaultwarden-oidc
      subMode: user_email
      propertyMappingScopes: [openid, profile, email]
      app:
        slug: vaultwarden
        name: Vaultwarden
        launchUrl: https://vault.m0sh1.cc
      secretRef:
        name: vaultwarden-oidc
        clientIdKey: SSO_CLIENT_ID
        clientSecretKey: SSO_CLIENT_SECRET
      redirectUris:
        - https://vault.m0sh1.cc/identity/connect/oidc-signin
