# Centralized network policies for the apps namespace.
# Policies are deployed incrementally — default-deny is added last.

global:
  # policyMode controls stability-vs-strict behavior for selected policies.
  # - stable: enables probe-friendly ingress allowances
  # - strict: disables stability allowances
  policyMode: stable

  # Node subnet used by kubelet/node-origin health probes.
  nodeSubnetCidr: 10.0.20.0/24
