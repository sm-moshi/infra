# NetBox Operator — needs NetBox API and K8s API server access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-netbox-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: netbox-operator
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # NetBox API (pod port 8080)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: netbox
              app.kubernetes.io/component: netbox
      ports:
        - protocol: TCP
          port: 8080
    # Kubernetes API server (for CRD reconciliation)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 6443
