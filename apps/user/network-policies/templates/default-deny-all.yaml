# Default deny all ingress and egress traffic for the apps namespace.
# IMPORTANT: This must be deployed AFTER all per-app allow policies are in place.
# Every pod needs an explicit allow policy or it will lose connectivity.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
