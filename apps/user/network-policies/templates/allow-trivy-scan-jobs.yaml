# Trivy scan jobs: needs DNS + HTTPS (registries, vuln DBs) + K8s API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-trivy-scan-jobs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/managed-by: trivy-operator
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS (container registries, vuln DB downloads)
    - ports:
        - protocol: TCP
          port: 443
    # Trivy server (in-cluster, same namespace)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trivy-server
      ports:
        - protocol: TCP
          port: 4954
