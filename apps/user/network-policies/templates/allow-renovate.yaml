# Renovate operator jobs: needs DNS + HTTPS (Forgejo API, npm, etc).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-renovate
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: renovate
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS (Forgejo API, package registries, GitHub)
    - ports:
        - protocol: TCP
          port: 443
    # HTTP (some registries)
    - ports:
        - protocol: TCP
          port: 80
