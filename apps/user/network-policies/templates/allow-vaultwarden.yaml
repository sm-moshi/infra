# Vaultwarden: CNPG database + HTTPS (push notifications) + SMTP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-vaultwarden
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # HTTPS (push notifications, icon fetching)
    - ports:
        - protocol: TCP
          port: 443
    # SMTP
    - ports:
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
