# Diode stack (auth/ingester/reconciler + subcharts) network policy.
# This keeps Diode internal while allowing NetBox plugin connectivity.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-diode
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: diode
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Internal Diode component communication
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: diode
    # orb-agent uses hostNetwork — traffic appears from node IPs, not pod CIDR.
    # podSelector can't match hostNetwork pods, so allow by node subnet.
    - from:
        - ipBlock:
            cidr: 10.0.20.0/24
      ports:
        - protocol: TCP
          port: 80
    # NetBox reaches Diode via diode-ingress-nginx-controller on HTTP/HTTPS.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: netbox
              app.kubernetes.io/component: netbox
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # NetBox diode plugin API
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: netbox
              app.kubernetes.io/component: netbox
      ports:
        - protocol: TCP
          port: 8080
    # Internal Diode component communication (auth/ingester/reconciler/hydra/ingress)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: diode
    # HTTPS fallback (telemetry, image endpoints, etc.)
    - ports:
        - protocol: TCP
          port: 443
