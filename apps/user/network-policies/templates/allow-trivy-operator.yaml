# Trivy Operator: K8s API + HTTPS (registry/vuln DB).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-trivy-operator
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trivy-operator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Metrics scraping from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # K8s API server
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 6443
    # HTTPS (Harbor registry, vuln DB)
    - ports:
        - protocol: TCP
          port: 443
    # Trivy server (health checks + scan coordination)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trivy-server
      ports:
        - protocol: TCP
          port: 4954
