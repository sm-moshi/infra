# Authentik bootstrap jobs (OIDC + forward-auth): DNS + Authentik server HTTP.
# All bootstrap jobs share the label app.kubernetes.io/part-of=authentik-bootstrap.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-bootstrap-jobs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: authentik-bootstrap
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Authentik server pods (post-DNAT destination)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
              app.kubernetes.io/component: server
      ports:
        - protocol: TCP
          port: 9000
    # Authentik ClusterIP service (pre-DNAT destination)
    - to:
        - ipBlock:
            cidr: 10.43.0.0/16
      ports:
        - protocol: TCP
          port: 80
