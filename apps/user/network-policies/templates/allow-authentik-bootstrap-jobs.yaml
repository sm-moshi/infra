# Authentik bootstrap jobs (OIDC + forward-auth): DNS + Authentik server HTTP.
# All bootstrap jobs share the label app.kubernetes.io/part-of=authentik-bootstrap.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-bootstrap-jobs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: authentik-bootstrap
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Authentik server HTTP API (service port 80, pod port 9000)
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 9000
