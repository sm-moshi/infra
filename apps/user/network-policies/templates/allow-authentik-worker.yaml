# Authentik worker: CNPG + Valkey + HTTPS + SMTP.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-worker
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: authentik
      app.kubernetes.io/component: worker
  policyTypes:
    - Ingress
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # HTTPS
    - ports:
        - protocol: TCP
          port: 443
    # SMTP
    - ports:
        - protocol: TCP
          port: 465
        - protocol: TCP
          port: 587
    # Authentik server (task results)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
              app.kubernetes.io/component: server
      ports:
        - protocol: TCP
          port: 9000
