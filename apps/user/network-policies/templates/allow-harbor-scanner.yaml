# Harbor scanner CronJob: needs DNS + harbor-core + trivy.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-scanner
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: harbor-scanner
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Harbor core + trivy (intra-harbor communication)
    - to:
        - podSelector:
            matchLabels:
              app: harbor
      ports:
        - protocol: TCP
          port: 8080
    # HTTPS
    - ports:
        - protocol: TCP
          port: 443
