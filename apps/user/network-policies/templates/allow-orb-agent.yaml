# OrbAgent — network discovery agent scanning VLANs and feeding Diode.
# Requires broad egress for NMAP scanning + Diode gRPC ingestion.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-orb-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: orb-agent
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Diode ingress-nginx (gRPC ingestion endpoint)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: diode
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # NMAP scanning — all VLAN subnets (hostNetwork pods need egress)
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8
