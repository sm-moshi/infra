{{- if eq (default "stable" .Values.global.policyMode) "stable" }}
# Stability safeguard: allow node-origin traffic for kubelet health probes.
# This prevents false liveness/readiness failures under restrictive ingress policies.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probes
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.global.nodeSubnetCidr | quote }}
{{- end }}
