# Harbor core: CNPG + Valkey + Garage S3 + Authentik OIDC + HTTPS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-core
spec:
  podSelector:
    matchLabels:
      app: harbor
      component: core
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
    # Allow from other Harbor components
    - from:
        - podSelector:
            matchLabels:
              app: harbor
      ports:
        - protocol: TCP
          port: 8080
    # Allow from harbor-bootstrap Job (no 'app: harbor' label)
    - from:
        - podSelector:
            matchExpressions:
              - key: job-name
                operator: In
                values:
                  - harbor-bootstrap
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # Garage S3
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: garage
      ports:
        - protocol: TCP
          port: 3900
    # Authentik OIDC
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
      ports:
        - protocol: TCP
          port: 9000
    # HTTPS (webhooks, external registries)
    - ports:
        - protocol: TCP
          port: 443
    # Other Harbor components in same namespace
    - to:
        - podSelector:
            matchLabels:
              app: harbor
