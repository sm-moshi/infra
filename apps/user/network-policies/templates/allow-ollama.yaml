# Ollama: accepts connections from Open WebUI
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ollama
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: open-webui
      ports:
        - protocol: TCP
          port: 11434
{{- if eq (default "stable" .Values.global.policyMode) "stable" }}
    # Stability-first: explicit node-origin allowance on service port (probes + ops tooling)
    - from:
        - ipBlock:
            cidr: {{ .Values.global.nodeSubnetCidr | quote }}
      ports:
        - protocol: TCP
          port: 11434
{{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTP + HTTPS (model downloads from registry.ollama.ai uses port 80)
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
