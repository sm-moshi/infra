# Built-in Trivy server (StatefulSet): serves vuln DB to scan jobs.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-trivy-server
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: trivy-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Scan job pods connect on port 4954 (client-server mode)
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/managed-by: trivy-operator
      ports:
        - protocol: TCP
          port: 4954
    # Operator health/readiness probes
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: trivy-operator
      ports:
        - protocol: TCP
          port: 4954
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # HTTPS (Harbor registry for vuln DB downloads)
    - ports:
        - protocol: TCP
          port: 443
