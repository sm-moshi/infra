# NetBox housekeeping CronJob: needs DNS + CNPG + Valkey.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-netbox-housekeeping
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: netbox
      app.kubernetes.io/component: housekeeping
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
