# CNPG database pods: accept connections from app workloads, replicate between nodes.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: cnpg-main
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow database connections from any pod in apps namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 5432
    # Allow CNPG instance-manager peer checks (/failsafe) between CNPG pods
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 8000
    # Allow metrics from monitoring namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9187
    # CNPG operator from cnpg-system namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Replication between CNPG pods
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 8000
    # Garage S3 for backups
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: garage
      ports:
        - protocol: TCP
          port: 3900
    # Kubernetes API (instance manager needs it for failover coordination)
    - ports:
        - protocol: TCP
          port: 6443
    # HTTPS (barman cloud backups)
    - ports:
        - protocol: TCP
          port: 443
