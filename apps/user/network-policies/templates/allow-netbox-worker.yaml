# NetBox worker: same egress as netbox (CNPG + Valkey + HTTPS).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-netbox-worker
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: netbox
      app.kubernetes.io/component: worker
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # K8s API (init container wait-for-backend)
    - ports:
        - protocol: TCP
          port: 6443
    # NetBox API (scripts run on worker, call back to netbox service)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: netbox
              app.kubernetes.io/component: netbox
      ports:
        - protocol: TCP
          port: 8080
    # HTTPS
    - ports:
        - protocol: TCP
          port: 443
