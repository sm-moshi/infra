# Valkey: internal-only cache, accepts connections from apps in same namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-valkey
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: valkey
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow connections from pods within the apps namespace
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 6379
  egress:
    # DNS only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
