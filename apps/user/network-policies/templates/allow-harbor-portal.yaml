# Harbor portal: ingress-only web UI, no egress needed.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-portal
spec:
  podSelector:
    matchLabels:
      app: harbor
      component: portal
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
    # Allow health checks from harbor-core
    - from:
        - podSelector:
            matchLabels:
              app: harbor
              component: core
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS only
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
