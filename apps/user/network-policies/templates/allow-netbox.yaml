# NetBox: CNPG + Valkey + HTTPS.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-netbox
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: netbox
      app.kubernetes.io/component: netbox
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
    # Diode reconciler writes ingestion changes via the NetBox diode plugin API.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: diode
              app.kubernetes.io/component: diode-reconciler
      ports:
        - protocol: TCP
          port: 8080
    # NetBox Operator reads custom-fields and reconciles CRDs against the API.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: netbox-operator
      ports:
        - protocol: TCP
          port: 8080
    # NetBox worker runs custom scripts that call back to the REST API.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: netbox
              app.kubernetes.io/component: worker
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # Diode ingress controller (single in-cluster endpoint for /diode + /diode/auth)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/instance: diode
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
    # HTTPS
    - ports:
        - protocol: TCP
          port: 443
