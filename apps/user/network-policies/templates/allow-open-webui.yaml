# Open WebUI: CNPG, Valkey, Ollama, Qdrant, Garage S3, Authentik, HTTPS
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-open-webui
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 8080
{{- if eq (default "stable" .Values.global.policyMode) "stable" }}
    # Stability-first: explicit node-origin probe allowance on app port
    - from:
        - ipBlock:
            cidr: {{ .Values.global.nodeSubnetCidr | quote }}
      ports:
        - protocol: TCP
          port: 8080
{{- end }}
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Valkey (Redis)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # Ollama
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: ollama
      ports:
        - protocol: TCP
          port: 11434
    # Qdrant
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: qdrant
      ports:
        - protocol: TCP
          port: 6333
    # Garage S3
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: garage
      ports:
        - protocol: TCP
          port: 3900
    # Authentik (OIDC)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: authentik
      ports:
        - protocol: TCP
          port: 9000
    # HTTPS (external model APIs, web search)
    - to: []
      ports:
        - protocol: TCP
          port: 443
