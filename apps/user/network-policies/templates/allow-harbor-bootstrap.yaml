# Harbor bootstrap job: needs DNS + CNPG + harbor-core API.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-bootstrap
spec:
  podSelector:
    matchLabels:
      job-name: harbor-bootstrap
  policyTypes:
    - Egress
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # CNPG database
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: cnpg-main
      ports:
        - protocol: TCP
          port: 5432
    # Harbor core API
    - to:
        - podSelector:
            matchLabels:
              app: harbor
              component: core
      ports:
        - protocol: TCP
          port: 8080
    # HTTPS (Harbor API via ingress)
    - ports:
        - protocol: TCP
          port: 443
