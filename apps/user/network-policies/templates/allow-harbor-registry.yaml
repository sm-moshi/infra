# Harbor registry: Garage S3 storage backend.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-harbor-registry
spec:
  podSelector:
    matchLabels:
      app: harbor
      component: registry
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: harbor
      ports:
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 8080
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
      ports:
        - protocol: TCP
          port: 5000
        - protocol: TCP
          port: 8080
  egress:
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Garage S3
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: garage
      ports:
        - protocol: TCP
          port: 3900
    # Valkey (layer cache, db 2)
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
      ports:
        - protocol: TCP
          port: 6379
    # Other Harbor components
    - to:
        - podSelector:
            matchLabels:
              app: harbor
