# apps/user/qdrant/values.yaml
#
# Qdrant vector database for RAG (Retrieval-Augmented Generation).
# Single-instance deployment for homelab scale.
authentikMode: public

qdrant:
  replicaCount: 1

  # Disable chown init container — fsGroup handles ownership on CSI volumes
  updateVolumeFsOwnership: false

  image:
    repository: docker.io/qdrant/qdrant
    pullPolicy: IfNotPresent

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: proxmox-csi-zfs-nvme-fast-retain
    accessModes:
      - ReadWriteOnce

  resources:
    requests:
      cpu: 250m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 1Gi

  service:
    type: ClusterIP
    ports:
      - name: http
        port: 6333
        targetPort: 6333
        protocol: TCP
        checksEnabled: true
      - name: grpc
        port: 6334
        targetPort: 6334
        protocol: TCP
        checksEnabled: false
      - name: p2p
        port: 6335
        targetPort: 6335
        protocol: TCP
        checksEnabled: false

  # API key authentication via environment variable
  apiKey: true

  config:
    cluster:
      enabled: false
    storage:
      performance:
        optimizer_cpu_budget: 2

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: Always
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    privileged: false
    readOnlyRootFilesystem: true

  tolerations: []
