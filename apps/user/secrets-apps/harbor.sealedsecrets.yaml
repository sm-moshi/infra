## Harbor SealedSecrets
## All harbor-namespace credentials consolidated. Each document decrypts
## to its own named Kubernetes Secret — names are cryptographically bound
## and cannot be merged.

# ── Component internal secrets ────────────────────────────────────────────────
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-core-internal
  namespace: apps
spec:
  encryptedData:
    secret: 
  template:
    metadata:
      name: harbor-core-internal
      namespace: apps
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-core-secret
  namespace: apps
spec:
  encryptedData:
    secretKey: 
  template:
    metadata:
      name: harbor-core-secret
      namespace: apps
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: harbor-jobservice-internal
  namespace: apps
spec:
  encryptedData:
    JOBSERVICE_SECRET: 
  template:
    metadata:
      name: harbor-jobservice-internal
      namespace: apps

# ── External service credentials ──────────────────────────────────────────────
---
apiVersion: bitnami.com/v1alpha1
