  name: harbor-postgres-auth
  namespace: apps
spec:
  encryptedData:
    password: 
    postgres-password: 
    replication-password: 
    username: 
  template:
    metadata:
      labels:
        cnpg.io/reload: "true"
      name: harbor-postgres-auth
      namespace: apps
    type: kubernetes.io/basic-auth
