# Vaultwarden (Bitwarden-compatible server) configuration
# Uses shared CNPG cluster (cnpg-main)
authentikMode: oidc
oidcContract:
  providerName: Authentik
  issuerURL: https://auth.m0sh1.cc/application/o/vaultwarden/
  secretName: vaultwarden-oidc
  clientIdKey: SSO_CLIENT_ID
  clientSecretKey: SSO_CLIENT_SECRET
vaultwarden:
  # Domain configuration (REQUIRED for proper functionality)
  domain: "https://vault.m0sh1.cc"
  # Image configuration (custom CVE-patched build)
  # Using Debian image instead of Alpine due to DNS resolution issues with musl libc
  # Alpine has problems resolving Kubernetes internal DNS (cnpg-main-rw.apps.svc.cluster.local)
  image:
    registry: harbor.m0sh1.cc
    repository: apps/vaultwarden
    tag: "6f8994b2"
    pullPolicy: IfNotPresent
  # Recreate strategy required for RWO PVC volumes (avoids rollout deadlock)
  strategy:
    type: Recreate
  # Replicas
  replicas: 1
  # Database configuration (shared CNPG cluster)
  database:
    type: postgresql
    existingSecret: vaultwarden-postgres-auth
    existingSecretKey: uri
    connectionRetries: 60
    maxConnections: 10
  # Persistent storage
  storage:
    data:
      name: vaultwarden-data
      size: 5Gi
      class: proxmox-csi-zfs-nvme-general-retain
      accessMode: ReadWriteOnce
    attachments:
      name: vaultwarden-attachments
      size: 10Gi
      class: proxmox-csi-zfs-nvme-general-retain
      accessMode: ReadWriteOnce
  # Admin token (argon2 hashed)
  adminToken:
    existingSecret: vaultwarden-admin-token
    existingSecretKey: token
  # SSO / OpenID Connect (Authentik)
  extraVars:
  - key: SSO_ENABLED
    value: "true"
  - key: SSO_AUTHORITY
    value: "https://auth.m0sh1.cc/application/o/vaultwarden/"
  - key: SSO_SIGNUPS_MATCH_EMAIL
    value: "true"
  - key: SSO_PKCE
    value: "true"
  extraVarsSecret: "vaultwarden-oidc"
  # Ingress configuration (Traefik)
  ingress:
    enabled: true
    class: traefik
    nginxIngressAnnotations: false
    additionalAnnotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    tls: true
    hostname: vault.m0sh1.cc
    tlsSecret: wildcard-m0sh1-cc
  # General settings
  signupsAllowed: false # Disable public signups
  invitationsAllowed: true # Allow invites from existing users
  # If SMTP is broken/misconfigured, verification/device emails will block logins and signups.
  # Keep these off until SMTP is confirmed working, then consider turning them back on.
  signupsVerify: "false"
  showPassHint: false
  webVaultEnabled: "true"
  # Security settings
  requireDeviceEmail: "false"
  # Logging
  extendedLogging: "true"
  logging:
    logLevel: "info"
  # Icon service
  iconService: "internal"
  iconBlacklistNonGlobalIps: "true"
  # SMTP configuration (Proton Mail direct SMTP submission)
  smtp:
    host: "smtp.protonmail.ch"
    from: "vault@m0sh1.cc"
    port: 587
    security: "starttls"
    # SMTP credentials are stored in a SealedSecret-backed Secret (see apps/user/secrets-apps).
    existingSecret: "vaultwarden-smtp"
    username:
      existingSecretKey: "SMTP_USERNAME"
    password:
      existingSecretKey: "SMTP_PASSWORD"
  # Service configuration
  service:
    type: ClusterIP
    ipFamilyPolicy: SingleStack
    ipFamilies:
    - IPv4
    sessionAffinity: ClientIP
    sessionAffinityConfig:
      clientIP:
        timeoutSeconds: 10800
  # Rocket (web server) configuration
  rocket:
    address: "0.0.0.0"
    port: "8080"
    workers: "10"
  # Probes
  livenessProbe:
    enabled: true
    path: /alive
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 10
  readinessProbe:
    enabled: true
    path: /alive
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 3
  startupProbe:
    enabled: true
    path: /alive
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 96Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # Node placement
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-02"]
  # Security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext:
    fsGroup: 1000
