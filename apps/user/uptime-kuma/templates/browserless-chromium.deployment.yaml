{{- if .Values.browserless.chromium.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: browserless-chromium
  labels:
    app.kubernetes.io/name: browserless-chromium
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: remote-browser
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: browserless-chromium
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: browserless-chromium
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: remote-browser
    spec:
      {{- with .Values.browserless.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: chromium
          image: "{{ .Values.browserless.chromium.image.repository }}:{{ .Values.browserless.chromium.image.tag }}"
          imagePullPolicy: {{ .Values.browserless.chromium.image.pullPolicy }}
          {{- with .Values.browserless.chromium.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          {{- with .Values.browserless.chromium.env }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /json/version
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /json/version
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          {{- if .Values.browserless.tmpVolume.enabled }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.browserless.homeVolume.enabled }}
            - name: home
              mountPath: {{ .Values.browserless.homeVolume.mountPath }}
            {{- end }}
          {{- else if .Values.browserless.homeVolume.enabled }}
          volumeMounts:
            - name: home
              mountPath: {{ .Values.browserless.homeVolume.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.browserless.chromium.resources | nindent 12 }}
      {{- if .Values.browserless.tmpVolume.enabled }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.browserless.homeVolume.enabled }}
        - name: home
          emptyDir: {}
        {{- end }}
      {{- else if .Values.browserless.homeVolume.enabled }}
      volumes:
        - name: home
          emptyDir: {}
      {{- end }}
      {{- with .Values.browserless.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.browserless.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
