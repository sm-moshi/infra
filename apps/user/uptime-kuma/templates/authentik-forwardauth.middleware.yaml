apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: uptime-kuma-authentik-forwardauth
  namespace: apps
  labels:
    app.kubernetes.io/name: uptime-kuma
    app.kubernetes.io/component: auth
spec:
  forwardAuth:
    address: https://uptime.m0sh1.cc/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Forwarded-User
      - X-Forwarded-Email
      - X-authentik-uid
      - X-authentik-username
      - X-authentik-email
      - X-authentik-name
