{{- if and .Values.forwardAuth .Values.forwardAuth.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ .Release.Name }}-authentik-forwardauth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: auth
spec:
  forwardAuth:
    address: {{ .Values.forwardAuth.address | quote }}
    trustForwardHeader: {{ .Values.forwardAuth.trustForwardHeader }}
    maxBodySize: 4096
    authResponseHeaders:
      {{- range .Values.forwardAuth.authResponseHeaders }}
      - {{ . | quote }}
      {{- end }}
{{- end }}
