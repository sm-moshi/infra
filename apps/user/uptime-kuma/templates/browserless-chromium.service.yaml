{{- if .Values.browserless.chromium.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: browserless-chromium
  labels:
    app.kubernetes.io/name: browserless-chromium
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: remote-browser
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: browserless-chromium
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
