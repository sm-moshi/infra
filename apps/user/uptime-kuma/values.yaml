pdb:
  enabled: true
  maxUnavailable: 1
authentikMode: forward-auth
uptime-kuma:
  useDeploy: false
  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: apps-uptime-kuma-authentik-forwardauth@kubernetescrd
      external-dns.alpha.kubernetes.io/ignore: "true"
    hosts:
    - host: uptime.m0sh1.cc
      paths:
      - path: /
        pathType: Prefix
    tls:
    - hosts:
      - uptime.m0sh1.cc
      secretName: wildcard-m0sh1-cc
  image:
    repository: harbor.m0sh1.cc/apps/uptime-kuma
    tag: "27303600"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
  additionalVolumes:
  - name: tmp
    emptyDir: {}
  additionalVolumeMounts:
  - name: tmp
    mountPath: /tmp
  volume:
    enabled: true
    size: 5Gi
    storageClassName: proxmox-csi-zfs-nvme-fast-retain
  resources:
    requests:
      cpu: 100m
      memory: 300Mi
    limits:
      cpu: 400m
      memory: 512Mi
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
    exec:
      command: []
    httpGet:
      path: /api/status
      port: 3001
      scheme: HTTP
      httpHeaders: []
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-02"]
            # tolerations:
            # - key: node-role.kubernetes.io/control-plane
            #   operator: Exists
            #   effect: NoSchedule
apiIngress:
  enabled: true
  host: uptime-api.m0sh1.cc
statusIngress:
  enabled: true
  host: status.m0sh1.cc
  rateLimit:
    average: 100
    burst: 200
# --- Browserless Remote Browsers ---
# Companion browser services for Uptime-Kuma "Real Browser" monitor type.
# Register in UI: Settings → Remote Browsers
#   Chromium: ws://browserless-chromium:3000/chromium/playwright
browserless:
  revisionHistoryLimit: 1
  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault
  podAnnotations:
    security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
  tmpVolume:
    enabled: true
  homeVolume:
    enabled: true
    mountPath: /home/blessuser
  chromium:
    enabled: true
    image:
      repository: harbor.m0sh1.cc/ghcr/browserless/chromium
      tag: v2.42.0
      pullPolicy: IfNotPresent
    securityContext:
      runAsUser: 999
      runAsGroup: 999
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 25m
        memory: 128Mi
      limits:
        cpu: 750m
        memory: 750Mi
    env:
    - name: CONCURRENT
      value: "2"
    - name: TIMEOUT
      value: "30000"
  # WebKit disabled: re-enable when needed (custom image has compatible
  # playwright-core v1.54 — WebKit would work with this overlay).
  webkit:
    enabled: false
    image:
      repository: harbor.m0sh1.cc/ghcr/browserless/webkit
      tag: v2.42.0
      pullPolicy: IfNotPresent
    securityContext:
      runAsUser: 999
      runAsGroup: 999
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
      seccompProfile:
        type: RuntimeDefault
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    env:
    - name: CONCURRENT
      value: "2"
    - name: TIMEOUT
      value: "30000"
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: ["pve-02"]
outpostIngress:
  enabled: true
  host: uptime.m0sh1.cc
  tlsSecretName: wildcard-m0sh1-cc
forwardAuth:
  enabled: true
  address: https://uptime.m0sh1.cc/outpost.goauthentik.io/auth/traefik
  trustForwardHeader: true
  authResponseHeaders:
  - X-Forwarded-User
  - X-Forwarded-Email
  - X-authentik-uid
  - X-authentik-username
  - X-authentik-email
  - X-authentik-name
