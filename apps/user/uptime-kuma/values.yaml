uptime-kuma:
  useDeploy: false

  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: apps-uptime-kuma-authentik-forwardauth@kubernetescrd
    hosts:
    - host: uptime.m0sh1.cc
      paths:
      - path: /
        pathType: Prefix
    tls:
    - hosts:
      - uptime.m0sh1.cc
      secretName: wildcard-m0sh1-cc

  image:
    repository: dhi.io/uptime-kuma
    tag: 2.1.1-dev
    pullPolicy: Always

  imagePullSecrets:
  - name: kubernetes-dhi

  volume:
    enabled: true
    size: 5Gi
    storageClassName: proxmox-csi-zfs-nvme-fast-retain

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 400m
      memory: 512Mi

  livenessProbe:
    enabled: false

  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 1
    failureThreshold: 3
    successThreshold: 1
    exec:
      command: []
    httpGet:
      path: /api/status
      port: 3001
      scheme: HTTP
      httpHeaders: []

  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: [ "pve-01" ]
      - weight: 60
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: [ "pve-02" ]
  # tolerations:
  # - key: node-role.kubernetes.io/control-plane
  #   operator: Exists
  #   effect: NoSchedule

  # --- Browserless Remote Browsers ---
  # Companion browser services for Uptime-Kuma "Real Browser" monitor type.
  # Register in UI: Settings → Remote Browsers
  #   Chromium: ws://browserless-chromium:3000
  #   WebKit:   ws://browserless-webkit:3000/webkit/playwright

browserless:
  chromium:
    enabled: true
    image:
      repository: harbor.m0sh1.cc/ghcr/browserless/chromium
      tag: v2.40.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    env:
    - name: CONCURRENT
      value: "2"
    - name: TIMEOUT
      value: "30000"

  # WebKit disabled: Uptime-Kuma DHI ships playwright-core v1.39 which is
  # incompatible with browserless v2.40.0 (Playwright v1.58). Chromium works
  # via CDP (no version check). Re-enable when Uptime-Kuma bumps playwright.
  webkit:
    enabled: false
    image:
      repository: harbor.m0sh1.cc/ghcr/browserless/webkit
      tag: v2.40.0
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    env:
    - name: CONCURRENT
      value: "2"
    - name: TIMEOUT
      value: "30000"

  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: [ "pve-01" ]
      - weight: 60
        preference:
          matchExpressions:
          - key: topology.kubernetes.io/zone
            operator: In
            values: [ "pve-02" ]
