---
{{- if (index .Values.apps "kopia").enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kopia
spec:
  enableDefaultDeny:
    ingress: {{ (index .Values.apps "kopia").enforce }}
    egress: {{ (index .Values.apps "kopia").enforce }}
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kopia
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "51515"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "51515"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
    - toEndpoints:
        - matchLabels:
            garage.rajsingh.info/cluster: garage
            k8s:io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
{{- end }}
