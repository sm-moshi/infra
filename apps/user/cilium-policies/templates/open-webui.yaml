{{- if (index .Values.apps "open-webui").enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-open-webui
spec:
  enableDefaultDeny:
    ingress: {{ (index .Values.apps "open-webui").enforce }}
    egress: {{ (index .Values.apps "open-webui").enforce }}
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: open-webui
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
    # CNPG PostgreSQL
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: cnpg-main
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Valkey
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # Ollama
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: ollama
      toPorts:
        - ports:
            - port: "11434"
              protocol: TCP
    # Qdrant
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: qdrant
      toPorts:
        - ports:
            - port: "6333"
              protocol: TCP
    # Garage S3
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
    # Authentik (OIDC)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: authentik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
{{- include "cilium-policies.world-https-egress" . | nindent 4 }}
{{- end }}
