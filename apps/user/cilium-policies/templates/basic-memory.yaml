{{- if (index .Values.apps "basic-memory").enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-basic-memory
spec:
  enableDefaultDeny:
    ingress: {{ (index .Values.apps "basic-memory").enforce }}
    egress: {{ (index .Values.apps "basic-memory").enforce }}
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: basic-memory
  ingress:
    # Traefik → MCP shim (container port 8000, not service port)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
    # Traefik → CouchDB LiveSync (container port 5984)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "5984"
              protocol: TCP
    # Intra-app: couchdb-init job → CouchDB sidecar
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: basic-memory
      toPorts:
        - ports:
            - port: "5984"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
{{- include "cilium-policies.world-https-egress" . | nindent 4 }}
    # CouchDB livesync (same pod/service)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: basic-memory
      toPorts:
        - ports:
            - port: "5984"
              protocol: TCP
{{- end }}
