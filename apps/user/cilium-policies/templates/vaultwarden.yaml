{{- if (index .Values.apps "vaultwarden").enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vaultwarden
spec:
  enableDefaultDeny:
    ingress: {{ (index .Values.apps "vaultwarden").enforce }}
    egress: {{ (index .Values.apps "vaultwarden").enforce }}
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vaultwarden
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
    # CNPG database
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: cnpg-main
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
{{- include "cilium-policies.world-https-egress" . | nindent 4 }}
    # SMTP
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "465"
              protocol: TCP
            - port: "587"
              protocol: TCP
{{- end }}
