{{- if (index .Values.apps "harbor-core").enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-harbor-core
spec:
  enableDefaultDeny:
    ingress: {{ (index .Values.apps "harbor-core").enforce }}
    egress: {{ (index .Values.apps "harbor-core").enforce }}
  endpointSelector:
    matchLabels:
      app: harbor
      component: core
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Other Harbor components
    - fromEndpoints:
        - matchLabels:
            app: harbor
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # harbor-bootstrap Job
    - fromEndpoints:
        - matchExpressions:
            - key: job-name
              operator: In
              values:
                - harbor-bootstrap
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
    # CNPG database
    - toEndpoints:
        - matchLabels:
            cnpg.io/cluster: cnpg-main
      toPorts:
        - ports:
            - port: "5432"
              protocol: TCP
    # Valkey
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
    # Garage S3
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
    # Authentik OIDC
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: authentik
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
{{- include "cilium-policies.world-https-egress" . | nindent 4 }}
    # Other Harbor components
    - toEndpoints:
        - matchLabels:
            app: harbor
{{- end }}
---
