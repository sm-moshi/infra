{{- if (index .Values.apps "renovate").enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-renovate
spec:
  enableDefaultDeny:
    ingress: {{ (index .Values.apps "renovate").enforce }}
    egress: {{ (index .Values.apps "renovate").enforce }}
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: renovate
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
{{- include "cilium-policies.world-https-egress" . | nindent 4 }}
    # HTTP (some registries)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "80"
              protocol: TCP
    # harbor.m0sh1.cc resolves to Traefik LB (10.0.30.10) inside the cluster;
    # Cilium DNAT routes this to the Traefik pod, so toEntities: world won't match.
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # Valkey — shared package/datasource cache (same namespace)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: valkey
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
{{- end }}
