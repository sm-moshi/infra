# CiliumNetworkPolicy configuration for the apps namespace.
# enforce: false → policies are loaded but don't trigger implicit deny (Phase 4a).
# enforce: true  → enables default deny for that app (Phase 4c).

# Foundation policies (namespace-wide, always enableDefaultDeny: false)
foundation:
  enabled: true

# Per-app policies
apps:
  authentik-server:
    enabled: true
    enforce: false
