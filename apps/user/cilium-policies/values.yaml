# CiliumNetworkPolicy configuration for the apps namespace.
# enforce: false → policies are loaded but don't trigger implicit deny.
# enforce: true  → enables default deny for that app.

# Foundation policies (namespace-wide, always enableDefaultDeny: false)
foundation:
  enabled: true

# Per-app policies
apps:
  # --- Simple standalone apps (enforced) ---
  basic-memory:
    enabled: true
    enforce: true
  browserless-chromium:
    enabled: true
    enforce: true
  headlamp:
    enabled: true
    enforce: true
  netzbremse:
    enabled: true
    enforce: true
  ollama:
    enabled: true
    enforce: true
  open-webui:
    enabled: true
    enforce: true
  orb-agent:
    enabled: true
    enforce: true
  pgadmin4:
    enabled: true
    enforce: true
  qdrant:
    enabled: true
    enforce: true
  termix:
    enabled: true
    enforce: true
  uptime-kuma:
    enabled: true
    enforce: true
  valkey:
    enabled: true
    enforce: true
  vaultwarden:
    enabled: true
    enforce: true
  renovate:
    enabled: true
    enforce: true

  # --- Trivy components (enforced — well-understood scanner pattern) ---
  trivy-operator:
    enabled: true
    enforce: true
  trivy-scan-jobs:
    enabled: true
    enforce: true
  trivy-server:
    enabled: true
    enforce: true

  # --- Forgejo (enforced — single app, clear traffic pattern) ---
  forgejo:
    enabled: true
    enforce: true

  # --- Netbox (enforced — well-defined multi-component) ---
  netbox:
    enabled: true
    enforce: true
  netbox-worker:
    enabled: true
    enforce: true
  netbox-housekeeping:
    enabled: true
    enforce: true
  netbox-db-init:
    enabled: true
    enforce: true
  netbox-operator:
    enabled: true
    enforce: true

  # --- Authentik (enforced) ---
  authentik-server:
    enabled: true
    enforce: true
  authentik-worker:
    enabled: true
    enforce: true
  authentik-bootstrap-jobs:
    enabled: true
    enforce: true
  authentik-db-init:
    enabled: true
    enforce: true

  # --- CNPG (enforced) ---
  cnpg:
    enabled: true
    enforce: true
  cnpg-init-roles:
    enabled: true
    enforce: true

  # --- Diode (enforced) ---
  diode:
    enabled: true
    enforce: true

  # --- Harbor (enforced) ---
  harbor-core:
    enabled: true
    enforce: true
  harbor-portal:
    enabled: true
    enforce: true
  harbor-registry:
    enabled: true
    enforce: true
  harbor-jobservice:
    enabled: true
    enforce: true
  harbor-trivy:
    enabled: true
    enforce: true
  harbor-bootstrap:
    enabled: true
    enforce: true
