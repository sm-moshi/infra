authentikMode: public
woodpecker:
  # --- Server ---
  server:
    enabled: true
    statefulSet:
      replicaCount: 1
      revisionHistoryLimit: 3
    updateStrategy:
      type: RollingUpdate
    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    podAnnotations:
      security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
    extraVolumes:
    - name: tmp
      emptyDir: {}
    extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    image:
      repository: woodpeckerci/woodpecker-server
      tag: "next"
      pullPolicy: IfNotPresent
    env:
      WOODPECKER_ADMIN: "m0sh1"
      WOODPECKER_HOST: "https://ci.m0sh1.cc"
      WOODPECKER_OPEN: "true"
      WOODPECKER_FORGEJO: "true"
      WOODPECKER_FORGEJO_URL: "https://forge.m0sh1.cc"
      WOODPECKER_LOG_LEVEL: "info"
      WOODPECKER_PLUGINS_PRIVILEGED: "woodpeckerci/plugin-docker-buildx"
    extraSecretNamesForEnvFrom:
    - woodpecker-server-secret
    # Disable auto-generated agent secret — we manage our own
    createAgentSecret: false
    persistentVolume:
      enabled: true
      size: 5Gi
      mountPath: "/var/lib/woodpecker"
      storageClass: proxmox-csi-zfs-nvme-general-retain
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
      - host: ci.m0sh1.cc
        paths:
        - path: /
          backend:
            serviceName: woodpecker-server
            servicePort: 80
      tls:
      - secretName: wildcard-m0sh1-cc
        hosts:
        - ci.m0sh1.cc
    service:
      type: ClusterIP
      port: 80
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    nodeSelector:
      node-role.kubernetes.io/worker: "true"

  # --- Agent ---
  agent:
    enabled: true
    replicaCount: 3
    initContainers:
    - name: wait-for-woodpecker-server
      image: dhi.io/busybox:1.37.0-debian13
      imagePullPolicy: IfNotPresent
      command:
      - sh
      - -ec
      - |
        i=0
        until sh -c 'echo > /dev/tcp/woodpecker-server/9000' 2>/dev/null; do
          i=$((i + 1))
          if [ "$i" -ge 60 ]; then
            echo "timed out waiting for woodpecker-server:9000"
            exit 1
          fi
          echo "waiting for woodpecker-server:9000 ($i/60)"
          sleep 2
        done
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
          - ALL
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
    podSecurityContext:
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/instance: woodpecker
          app.kubernetes.io/name: agent
    podAnnotations:
      security.m0sh1.cc/rollout-trigger: "2026-02-22T23:34:49Z"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
    extraVolumes:
    - name: tmp
      emptyDir: {}
    extraVolumeMounts:
    - name: tmp
      mountPath: /tmp
    image:
      repository: woodpeckerci/woodpecker-agent
      tag: "next"
      pullPolicy: IfNotPresent
    env:
      WOODPECKER_SERVER: "woodpecker-server:9000"
      WOODPECKER_BACKEND: kubernetes
      WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
      WOODPECKER_BACKEND_K8S_STORAGE_CLASS: proxmox-csi-zfs-nvme-general-delete
      WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 5G
      WOODPECKER_BACKEND_K8S_STORAGE_RWX: false
      WOODPECKER_CONNECT_RETRY_COUNT: "3"
      WOODPECKER_PLUGINS_PRIVILEGED: "woodpeckerci/plugin-docker-buildx"
    extraSecretNamesForEnvFrom:
    - woodpecker-agent-secret
    persistence:
      enabled: true
      size: 1Gi
      mountPath: "/etc/woodpecker"
      storageClass: proxmox-csi-zfs-nvme-general-retain
      accessModes:
      - ReadWriteOnce
    serviceAccount:
      create: true
      rbac:
        create: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    nodeSelector:
      node-role.kubernetes.io/worker: "true"

# Optional in-cluster MCP endpoint for Woodpecker.
# Upstream j04n-f/woodpecker-mcp currently uses stdio transport only.
# Deploy a fork/custom image that serves streamable HTTP before enabling.
mcp:
  enabled: true
  fullnameOverride: woodpecker-mcp
  replicaCount: 1
  revisionHistoryLimit: 2
  image:
    repository: harbor.m0sh1.cc/apps/woodpecker-mcp
    tag: "695443af"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  woodpeckerUrl: "http://woodpecker-server"
  basePath: "/mcp"
  port: 8000
  auth:
    existingSecret:
      name: woodpecker-mcp-secret
      woodpeckerTokenKey: WOODPECKER_TOKEN
      mcpAuthTokenKey: MCP_AUTH_TOKEN
  env:
    MCP_LOG_LEVEL: "info"
  podAnnotations: {}
  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
  service:
    enabled: true
    type: ClusterIP
    port: 8000
    targetPort: 8000
  ingress:
    enabled: true
    className: traefik
    annotations:
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: woodpecker-woodpecker-mcp-accept@kubernetescrd
    hosts:
    - host: woodpecker-mcp.m0sh1.cc
      paths:
      - path: /mcp
        pathType: Prefix
    tls:
    - secretName: wildcard-m0sh1-cc
      hosts:
      - woodpecker-mcp.m0sh1.cc
  probes:
    readiness:
      httpGet:
        path: /healthz
        port: mcp-http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 2
      failureThreshold: 3
    liveness:
      httpGet:
        path: /healthz
        port: mcp-http
      initialDelaySeconds: 15
      periodSeconds: 20
      timeoutSeconds: 2
      failureThreshold: 3
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity: {}
