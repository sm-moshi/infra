woodpecker:
  # --- Server ---
  server:
    enabled: true
    statefulSet:
      replicaCount: 1
      revisionHistoryLimit: 3
    updateStrategy:
      type: RollingUpdate
    image:
      registry: docker.io
      repository: woodpeckerci/woodpecker-server
      pullPolicy: IfNotPresent
    env:
      WOODPECKER_ADMIN: "m0sh1"
      WOODPECKER_HOST: "https://ci.m0sh1.cc"
      WOODPECKER_OPEN: "true"
      WOODPECKER_FORGEJO: "true"
      WOODPECKER_FORGEJO_URL: "https://forge.m0sh1.cc"
      WOODPECKER_LOG_LEVEL: "info"
      WOODPECKER_PLUGINS_PRIVILEGED: "woodpeckerci/plugin-docker-buildx"
    extraSecretNamesForEnvFrom:
    - woodpecker-server-secret
    # Disable auto-generated agent secret — we manage our own
    createAgentSecret: false
    persistentVolume:
      enabled: true
      size: 5Gi
      mountPath: "/var/lib/woodpecker"
      storageClass: proxmox-csi-zfs-nvme-general-retain
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
      hosts:
      - host: ci.m0sh1.cc
        paths:
        - path: /
          backend:
            serviceName: woodpecker-server
            servicePort: 80
      tls:
      - secretName: wildcard-m0sh1-cc
        hosts:
        - ci.m0sh1.cc
    service:
      type: ClusterIP
      port: 80
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
  # --- Agent ---
  agent:
    enabled: true
    replicaCount: 1
    image:
      registry: docker.io
      repository: woodpeckerci/woodpecker-agent
      pullPolicy: IfNotPresent
    env:
      WOODPECKER_SERVER: "woodpecker-server:9000"
      WOODPECKER_BACKEND: kubernetes
      WOODPECKER_BACKEND_K8S_NAMESPACE: woodpecker
      WOODPECKER_BACKEND_K8S_STORAGE_CLASS: proxmox-csi-zfs-nvme-general-retain
      WOODPECKER_BACKEND_K8S_VOLUME_SIZE: 5G
      WOODPECKER_BACKEND_K8S_STORAGE_RWX: false
      WOODPECKER_CONNECT_RETRY_COUNT: "3"
      WOODPECKER_PLUGINS_PRIVILEGED: "woodpeckerci/plugin-docker-buildx"
    extraSecretNamesForEnvFrom:
    - woodpecker-agent-secret
    persistence:
      enabled: true
      size: 1Gi
      mountPath: "/etc/woodpecker"
      storageClass: proxmox-csi-zfs-nvme-general-retain
      accessModes:
      - ReadWriteOnce
    serviceAccount:
      create: true
      rbac:
        create: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
