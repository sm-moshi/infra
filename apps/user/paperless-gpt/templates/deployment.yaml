apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paperless-gpt.fullname" . }}
  labels:
    {{- include "paperless-gpt.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "paperless-gpt.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "paperless-gpt.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: paperless-gpt
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- toYaml .Values.env | nindent 12 }}
            {{- range .Values.secretEnv.keys }}
            - name: {{ .envName }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.secretEnv.secretName }}
                  key: {{ .secretKey }}
            {{- end }}
          volumeMounts:
            - name: prompts
              mountPath: /app/prompts
            - name: tmp
              mountPath: /tmp
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: prompts
          persistentVolumeClaim:
            claimName: {{ include "paperless-gpt.fullname" . }}-prompts
        - name: tmp
          emptyDir: {}
