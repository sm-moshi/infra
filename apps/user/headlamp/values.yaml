headlamp:
  config:
    inCluster: true
    watchPlugins: true
    oidc:
      secret:
        create: false
      externalSecret:
        enabled: true
        name: headlamp-oidc
      clientID: ""
      clientSecret: ""
      issuerURL: "https://auth.m0sh1.cc/application/o/headlamp/"
      scopes: "openid profile email"
      callbackURL: "https://headlamp.m0sh1.cc/oidc-callback"
  imagePullSecrets:
    - name: kubernetes-dhi
  serviceAccount:
    create: true
    name: headlamp-admin

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: headlamp.m0sh1.cc
        paths:
          - path: /
            type: Prefix
    tls:
      - hosts:
          - headlamp.m0sh1.cc
        secretName: wildcard-m0sh1-cc

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    privileged: false
    runAsUser: 100
    runAsGroup: 101
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  volumes:
    - name: tmp
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp

  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["lab-ctrl"]
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-03"]

  # tolerations:
  #   - key: node-role.kubernetes.io/control-plane
  #     operator: Exists
  #     effect: NoSchedule

  clusterRoleBinding:
    clusterRoleName: cluster-admin

  # Load kubescape + sealed-secrets plugins from our own Harbor image.
  # Both are forked (sm-moshi/headlamp-plugin, sm-moshi/headlamp-sealed-secrets-plugin)
  # and built via Woodpecker CI (tools/cli/docker/headlamp/).
  initContainers:
    - name: custom-plugins
      image: harbor.m0sh1.cc/apps/headlamp-plugins:latest
      imagePullPolicy: Always
      command:
        - /bin/sh
        - -c
        - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      volumeMounts:
        - name: plugins-dir
          mountPath: /build/plugins
        - name: tmp
          mountPath: /tmp

  pluginsManager:
    enabled: true
    # Use DHI Node (glibc) for pluginctl/npm execution.
    baseImage: dhi.io/node:25.6.1-debian13-dev
    version: latest
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    configContent: |
      plugins:
        - name: trivy
          source: https://artifacthub.io/packages/headlamp/headlamp-trivy/headlamp_trivy
          version: 0.3.1
        - name: kompose
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_kompose
          version: 0.1.0-beta-1
        - name: cert-manager
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
          version: 0.1.0
        - name: ai-assistant
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_ai_assistant
          version: 0.1.0-alpha
        - name: opencost
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_opencost
          version: 0.1.3
        # Preserve custom plugins loaded by initContainer from Harbor image.
        # pluginctl cleanup uses last URL segment as folder name to keep.
        # These 404 on install but prevent deletion of our pre-loaded plugins.
        - name: kubescape-custom
          source: https://artifacthub.io/packages/headlamp/custom/kubescape
          version: 0.0.1
        - name: sealed-secrets-custom
          source: https://artifacthub.io/packages/headlamp/custom/sealed-secrets
          version: 0.0.1
      installOptions:
        parallel: true
        maxConcurrent: 3
