authentikMode: oidc
oidcContract:
  providerName: Authentik
  issuerURL: https://auth.m0sh1.cc/application/o/headlamp/
  callbackURL: https://headlamp.m0sh1.cc/oidc-callback
  secretName: headlamp-oidc
  clientIdKey: OIDC_CLIENT_ID
  clientSecretKey: OIDC_CLIENT_SECRET
  scopes: openid profile email
headlamp:
  config:
    inCluster: true
    watchPlugins: true
    # Headlamp v0.40.1 binary removed -session-ttl flag but chart 0.40.1
    # added it as a default. Setting null suppresses the hasKey check.
    sessionTTL: null
    oidc:
      secret:
        create: false
      externalSecret:
        enabled: true
        name: headlamp-oidc
      clientID: ""
      clientSecret: ""
      issuerURL: "https://auth.m0sh1.cc/application/o/headlamp/"
      scopes: "openid profile email"
      callbackURL: "https://headlamp.m0sh1.cc/oidc-callback"
  imagePullSecrets:
    - name: kubernetes-dhi
  serviceAccount:
    create: true
    name: headlamp-admin

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: headlamp.m0sh1.cc
        paths:
          - path: /
            type: Prefix
    tls:
      - hosts:
          - headlamp.m0sh1.cc
        secretName: wildcard-m0sh1-cc

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    privileged: false
    runAsUser: 100
    runAsGroup: 101
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  volumes:
    - name: tmp
      emptyDir: {}
    - name: plugins-dir
      emptyDir: {}
    - name: headlamp-config
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: plugins-dir
      mountPath: /headlamp/plugins
    - name: headlamp-config
      mountPath: /home/headlamp/.config

  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-03"]

  # tolerations:
  #   - key: node-role.kubernetes.io/control-plane
  #     operator: Exists
  #     effect: NoSchedule

  clusterRoleBinding:
    clusterRoleName: cluster-admin

  # Inspektor Gadget is the only plugin not on ArtifactHub — load via initContainer.
  # All other plugins (custom + upstream) are managed by pluginsManager below.
  initContainers:
    - name: inspektor-gadget
      image: ghcr.io/inspektor-gadget/headlamp-plugin:0.1.0-beta.2@sha256:d0de653ac7a266ba3a136a8472fcd834d08fd0dd69dd8f4a5cde53c3e4d82a56
      command:
        - /bin/sh
        - -c
        - cp -r /plugins/* /headlamp/plugins/
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi
      volumeMounts:
        - name: plugins-dir
          mountPath: /headlamp/plugins

  # ArtifactHub plugins — installed by pluginsManager sidecar via pluginctl.
  # Custom forks: sealed-secrets (sm-moshi), kubescape (sm-moshi)
  # Upstream: trivy, kompose, cert-manager, ai-assistant, opencost
  # Versions are declarative — Renovate can bump them.
  pluginsManager:
    enabled: true
    configContent: |
      plugins:
        - name: sealed-secrets
          source: https://artifacthub.io/packages/headlamp/headlamp-sealed-secrets-plugin/headlamp-sealed-secrets
          version: 0.2.24
        - name: kubescape
          source: https://artifacthub.io/packages/headlamp/headlamp-kubescape-plugin/headlamp-kubescape
          version: 0.10.5
        - name: trivy
          source: https://artifacthub.io/packages/headlamp/headlamp-trivy/headlamp_trivy
          version: 0.3.1
        - name: kompose
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_kompose
          version: 0.1.0-beta-1
        - name: cert-manager
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
          version: 0.1.0
        - name: ai-assistant
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_ai_assistant
          version: 0.1.0-alpha
        - name: opencost
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_opencost
          version: 0.1.3
