headlamp:
  config:
    inCluster: true
    watchPlugins: true
  imagePullSecrets:
    - name: kubernetes-dhi
  serviceAccount:
    create: true
    name: headlamp-admin

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      # external-dns.alpha.kubernetes.io/hostname: headlamp.m0sh1.cc
    hosts:
      - host: headlamp.m0sh1.cc
        paths:
          - path: /
            type: Prefix
    tls:
      - hosts:
          - headlamp.m0sh1.cc
        secretName: wildcard-m0sh1-cc

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  # tolerations:
  #   - key: node-role.kubernetes.io/control-plane
  #     operator: Exists
  #     effect: NoSchedule

  clusterRoleBinding:
    clusterRoleName: cluster-admin

  pluginsManager:
    enabled: true
    # Use DHI Node (glibc) for pluginctl/npm execution.
    baseImage: dhi.io/node:24-debian13-dev
    configContent: |
      plugins:
        - name: kubescape-plugin
          source: https://artifacthub.io/packages/headlamp/kubescape-headlamp-plugin/headlamp_kubescape
          # NOTE: 0.10.4 currently throws a frontend runtime error in Headlamp
          # ("Dynamic require of @dagrejs/graphlib is not supported").
          # We still pin to 0.10.4 because ArtifactHub/pluginctl currently exposes
          # only this version for this package; 0.10.3 cannot be resolved by pluginctl.
          version: 0.10.4
        - name: trivy
          source: https://artifacthub.io/packages/headlamp/headlamp-trivy/headlamp_trivy
          version: 0.3.1
        - name: kompose
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_kompose
          version: 0.1.0-beta-1
        - name: cert-manager
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
          version: 0.1.0
        - name: ai-assistant
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_ai_assistant
          version: 0.1.0-alpha
        - name: opencost
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_opencost
          version: 0.1.3
      installOptions:
        parallel: true
        maxConcurrent: 3
