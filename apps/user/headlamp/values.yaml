authentikMode: oidc
oidcContract:
  providerName: Authentik
  issuerURL: https://auth.m0sh1.cc/application/o/headlamp/
  callbackURL: https://headlamp.m0sh1.cc/oidc-callback
  secretName: headlamp-oidc
  clientIdKey: OIDC_CLIENT_ID
  clientSecretKey: OIDC_CLIENT_SECRET
  scopes: openid profile email
headlamp:
  config:
    inCluster: true
    watchPlugins: true
    oidc:
      secret:
        create: false
      externalSecret:
        enabled: true
        name: headlamp-oidc
      clientID: ""
      clientSecret: ""
      issuerURL: "https://auth.m0sh1.cc/application/o/headlamp/"
      scopes: "openid profile email"
      callbackURL: "https://headlamp.m0sh1.cc/oidc-callback"
  imagePullSecrets:
    - name: kubernetes-dhi
  serviceAccount:
    create: true
    name: headlamp-admin

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
    hosts:
      - host: headlamp.m0sh1.cc
        paths:
          - path: /
            type: Prefix
    tls:
      - hosts:
          - headlamp.m0sh1.cc
        secretName: wildcard-m0sh1-cc

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Image Updater writes the detected tag here, forcing a pod restart.
  # The initContainer uses :latest with Always pull policy — the annotation
  # records which build triggered the deployment for audit purposes.
  podAnnotations:
    plugins-image-version: "6f6b4bd3"

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    runAsNonRoot: true
    privileged: false
    runAsUser: 100
    runAsGroup: 101
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  volumes:
    - name: tmp
      emptyDir: {}
    - name: plugins-dir
      emptyDir: {}
    - name: headlamp-config
      emptyDir: {}
  volumeMounts:
    - name: tmp
      mountPath: /tmp
    - name: plugins-dir
      mountPath: /headlamp/plugins
    - name: headlamp-config
      mountPath: /home/headlamp/.config

  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-03"]

  # tolerations:
  #   - key: node-role.kubernetes.io/control-plane
  #     operator: Exists
  #     effect: NoSchedule

  clusterRoleBinding:
    clusterRoleName: cluster-admin

  # Load ALL plugins (custom + ArtifactHub + external) from our own Harbor image.
  # Custom plugins: kubescape (sm-moshi/headlamp-plugin fork),
  #   sealed-secrets (sm-moshi/headlamp-sealed-secrets-plugin fork)
  # External plugins: inspektor-gadget (ghcr.io/inspektor-gadget/headlamp-plugin)
  # ArtifactHub plugins: trivy, kompose, cert-manager, ai-assistant, opencost
  # Built via Woodpecker CI (tools/cli/docker/headlamp/).
  initContainers:
    - name: plugins
      image: harbor.m0sh1.cc/apps/headlamp-plugins:latest
      imagePullPolicy: Always
      command:
        - /bin/sh
        - -c
        - cp -r /plugins/* /build/plugins/
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 100m
          memory: 128Mi
      volumeMounts:
        - name: plugins-dir
          mountPath: /build/plugins
        - name: tmp
          mountPath: /tmp

  # Disabled: all plugins are baked into the initContainer image.
  # ArtifactHub plugin versions are pinned in tools/cli/docker/headlamp/plugin.yml.
  pluginsManager:
    enabled: false
