headlamp:
  config:
    inCluster: true
    watchPlugins: true
  imagePullSecrets:
    - name: kubernetes-dhi
  serviceAccount:
    create: true
    name: headlamp-admin

  ingress:
    enabled: true
    ingressClassName: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: apps-headlamp-authentik-forwardauth@kubernetescrd
    hosts:
      - host: headlamp.m0sh1.cc
        paths:
          - path: /
            type: Prefix
    tls:
      - hosts:
          - headlamp.m0sh1.cc
        secretName: wildcard-m0sh1-cc

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector:
    node-role.kubernetes.io/worker: "true"
  tolerations: []
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  # tolerations:
  #   - key: node-role.kubernetes.io/control-plane
  #     operator: Exists
  #     effect: NoSchedule

  clusterRoleBinding:
    clusterRoleName: cluster-admin

  # Load Kubescape plugin from a fixed image tag instead of pluginctl/ArtifactHub,
  # because v0.10.4 crashes at runtime due to @dagrejs/graphlib CJS incompatibility.
  # See: https://github.com/kubescape/headlamp-plugin/issues/62
  initContainers:
    - name: kubescape-plugin
      # renovate: ignore
      image: quay.io/kubescape/headlamp-plugin:v0.10.3
      imagePullPolicy: IfNotPresent
      command:
        - /bin/sh
        - -c
        - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/
      volumeMounts:
        - name: plugins-dir
          mountPath: /build/plugins

  pluginsManager:
    enabled: true
    # Use DHI Node (glibc) for pluginctl/npm execution.
    baseImage: dhi.io/node:24-debian13-dev
    configContent: |
      plugins:
        - name: trivy
          source: https://artifacthub.io/packages/headlamp/headlamp-trivy/headlamp_trivy
          version: 0.3.1
        - name: kompose
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_kompose
          version: 0.1.0-beta-1
        - name: cert-manager
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_cert-manager
          version: 0.1.0
        - name: ai-assistant
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_ai_assistant
          version: 0.1.0-alpha
        - name: opencost
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_opencost
          version: 0.1.3
        - name: app-catalog
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_app-catalog
          version: 0.8.0
        - name: plugin-catalog
          source: https://artifacthub.io/packages/headlamp/headlamp-plugins/headlamp_plugin-catalog
          version: 0.4.3
        - name: sealed-secrets
          source: https://artifacthub.io/packages/headlamp/sealed-secrets/sealed-secrets
          version: 0.2.18
      installOptions:
        parallel: true
        maxConcurrent: 3
