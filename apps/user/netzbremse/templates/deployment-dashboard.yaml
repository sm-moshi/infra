apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netzbremse.fullname" . }}-dashboard
  labels:
    {{- include "netzbremse.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "netzbremse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        {{- include "netzbremse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: dashboard
      {{- with .Values.dashboard.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: dashboard
          {{- if eq .Values.backend.type "postgres" }}
          image: "{{ .Values.dashboard.postgresImage.repository }}:{{ .Values.dashboard.postgresImage.tag }}"
          imagePullPolicy: {{ .Values.dashboard.postgresImage.pullPolicy }}
          {{- else }}
          image: "{{ .Values.dashboard.image.repository }}:{{ .Values.dashboard.image.tag }}"
          imagePullPolicy: {{ .Values.dashboard.image.pullPolicy }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.dashboard.service.port }}
          {{- if eq .Values.backend.type "postgres" }}
          env:
            - name: NETZBREMSE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.database.existingSecret }}
                  key: {{ .Values.backend.database.uriKey }}
            {{- toYaml .Values.dashboard.postgresEnv | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.dashboard.probes.startup | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.dashboard.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.dashboard.probes.readiness | nindent 12 }}
          {{- else if .Values.dashboard.env }}
          env:
            {{- toYaml .Values.dashboard.env | nindent 12 }}
          {{- end }}
          {{- with .Values.dashboard.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.dashboard.resources | nindent 12 }}
          volumeMounts:
            {{- if eq .Values.backend.type "filesystem" }}
            - name: data
              mountPath: {{ .Values.persistence.dashboardMountPath }}
              readOnly: true
            {{- end }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        {{- if eq .Values.backend.type "filesystem" }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "netzbremse.fullname" .)) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
