apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netzbremse.fullname" . }}-measurement
  labels:
    {{- include "netzbremse.labels" . | nindent 4 }}
    app.kubernetes.io/component: measurement
spec:
  replicas: {{ .Values.measurement.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "netzbremse.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: measurement
  template:
    metadata:
      labels:
        {{- include "netzbremse.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: measurement
      {{- with .Values.measurement.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: measurement
          {{- if eq .Values.backend.type "postgres" }}
          image: "{{ .Values.measurement.postgresImage.repository }}:{{ .Values.measurement.postgresImage.tag }}"
          imagePullPolicy: {{ .Values.measurement.postgresImage.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
          {{- else }}
          image: "{{ .Values.measurement.image.repository }}:{{ .Values.measurement.image.tag }}"
          imagePullPolicy: {{ .Values.measurement.image.pullPolicy }}
          {{- end }}
          {{- if eq .Values.backend.type "postgres" }}
          env:
            - name: NETZBREMSE_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.database.existingSecret }}
                  key: {{ .Values.backend.database.uriKey }}
            {{- toYaml .Values.measurement.postgresEnv | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.measurement.probes.startup | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.measurement.probes.liveness | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.measurement.probes.readiness | nindent 12 }}
          {{- else if .Values.measurement.env }}
          env:
            {{- toYaml .Values.measurement.env | nindent 12 }}
          {{- end }}
          {{- with .Values.measurement.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.measurement.resources | nindent 12 }}
          {{- if eq .Values.backend.type "filesystem" }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.measurementMountPath }}
          {{- else }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          {{- end }}
      volumes:
        {{- if eq .Values.backend.type "filesystem" }}
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-data" (include "netzbremse.fullname" .)) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- else }}
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 512Mi
        {{- end }}
