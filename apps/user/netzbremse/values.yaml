nameOverride: ""
fullnameOverride: ""
authentikMode: public
revisionHistoryLimit: 1
imagePullSecrets:
- name: netzbremse-ghcr-pull
backend:
  type: postgres
  database:
    existingSecret: netzbremse-postgres-auth
    uriKey: uri
measurement:
  replicaCount: 1
  image:
    repository: ghcr.io/akvorrat/netzbremse-measurement
    tag: "latest@sha256:d5fa4026f817abaf301c8bca153412e718b3295f9219b3f83930139377e74fe2"
    pullPolicy: IfNotPresent
  postgresImage:
    # GHCR-backed custom image managed by ArgoCD Image Updater.
    repository: ghcr.io/sm-moshi/netzbremse-measurement
    tag: "1.8.2"
    pullPolicy: IfNotPresent
  env:
  - name: NB_SPEEDTEST_ACCEPT_POLICY
    value: "true"
  - name: NB_SPEEDTEST_JSON_OUT_DIR
    value: "/app/json-results"
  - name: NB_SPEEDTEST_INTERVAL
    value: "3600"
  - name: NB_SPEEDTEST_TIMEOUT
    value: "3600"
  - name: NB_SPEEDTEST_RETRY_INTERVAL
    value: "900"
  - name: NB_SPEEDTEST_RETRY_COUNT
    value: "3"
  postgresEnv:
  - name: NB_SPEEDTEST_ACCEPT_POLICY
    value: "true"
  - name: NB_SPEEDTEST_URL
    value: "https://netzbremse.de/speed"
  - name: NETZBREMSE_MEASUREMENT_INTERVAL
    value: "1h"
  - name: NETZBREMSE_ENDPOINT
    value: "https://netzbremse.de/speed"
  - name: NETZBREMSE_SPEEDTEST_TIMEOUT
    value: "4m"
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      # cpu: 100m
      memory: 512Mi
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
      - ALL
  podAnnotations: {}
  probes:
    startup:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
    liveness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
dashboard:
  replicaCount: 1
  image:
    repository: ghcr.io/lwndp/netzbremse-dashboard
    tag: "latest@sha256:13eb0a02e4f6376a88d8beffe6025c189461a8e7a1cc79c69d6da0143bbecf57"
    pullPolicy: IfNotPresent
  postgresImage:
    # GHCR-backed custom image managed by ArgoCD Image Updater.
    repository: ghcr.io/sm-moshi/netzbremse-dashboard
    tag: "1.8.2"
    pullPolicy: IfNotPresent
  env:
  - name: REFRESH_INTERVAL_SECONDS
    value: "3600"
  - name: LOG_LEVEL
    value: "INFO"
  - name: DATA_DIR
    value: "/data"
  postgresEnv:
  - name: NETZBREMSE_DASHBOARD_LIMIT
    value: "100"
  service:
    type: ClusterIP
    port: 8501
    ipFamilyPolicy: SingleStack
    ipFamilies:
    - IPv4
  resources:
    limits:
      cpu: 25m
      memory: 128Mi
    requests:
      # cpu: 100m
      memory: 64Mi
  securityContext:
    runAsUser: 10001
    runAsGroup: 10001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
      - ALL
  podAnnotations: {}
  probes:
    startup:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 12
    liveness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 10
      periodSeconds: 30
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      httpGet:
        path: /healthz
        port: http
      initialDelaySeconds: 5
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
persistence:
  enabled: true
  existingClaim: ""
  storageClassName: "local-path"
  accessModes:
  - ReadWriteOnce
  size: 1Gi
  annotations: {}
  measurementMountPath: /app/json-results
  dashboardMountPath: /data
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
nodeSelector:
  node-role.kubernetes.io/worker: "true"
tolerations: []
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-02"]
    - weight: 80
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-03"]
    - weight: 20
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: ["pve-01"]
ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/ignore: "true"
  hosts:
  - host: bremse.m0sh1.cc
    paths:
    - path: /
      pathType: Prefix
  tls:
  - secretName: wildcard-m0sh1-cc
    hosts:
    - bremse.m0sh1.cc
