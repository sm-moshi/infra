nameOverride: ""
fullnameOverride: ""
authentikMode: oidc
oidcContract:
  providerName: Authentik
  configSecretName: paperless-oidc
  configKey: providers.json

dbInit:
  image: harbor.m0sh1.cc/dhi/postgres:18.3
  imagePullPolicy: IfNotPresent

replicaCount: 1
revisionHistoryLimit: 1

image:
  repository: ghcr.io/paperless-ngx/paperless-ngx
  tag: "2.20.10"
  pullPolicy: IfNotPresent

service:
  port: 8000
  ipFamilyPolicy: PreferDualStack

ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: paperless.m0sh1.cc
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wildcard-m0sh1-cc
      hosts:
        - paperless.m0sh1.cc

internalDns:
  enabled: true
  source: ingress
  recordTypes:
    - A
    - AAAA
  target: traefik-vip

paperless:
  url: https://paperless.m0sh1.cc
  timeZone: Europe/Berlin
  ocrLanguage: deu+eng
  ocrMode: skip
  ocrClean: clean-final
  ocrDeskew: true
  ocrRotatePages: true
  ocrOutputType: pdfa
  consumerPollingSeconds: 15
  tika:
    enabled: true
    gotenbergEndpoint: http://gotenberg.apps.svc.cluster.local:3000
    tikaEndpoint: http://tika.apps.svc.cluster.local:9998
  redisUrl: redis://valkey.apps.svc.cluster.local:6379
  secretKey:
    secretName: paperless-config
    key: secret_key
  admin:
    secretName: paperless-admin
    usernameKey: username
    passwordKey: password
  database:
    host: cnpg-main-rw.apps.svc.cluster.local
    port: 5432
    name: paperless
    user: paperless
    secretName: paperless-postgres-auth
    passwordKey: password
  oidc:
    enabled: true
    secretName: paperless-oidc
    providersKey: providers.json
    appsValue: allauth.socialaccount.providers.openid_connect
    autoSignup: true
    allowSignups: true
    disableRegularLogin: false
    redirectLoginToSso: false
    defaultGroups:
      - paperless-users
    defaultPermissionApps:
      - documents
      - paperless_mail
    adminUsernames:
      - m0sh1
    adminBootstrapEnabled: true
  smbIngest:
    enabled: true
    secretName: paperless-smb-ingest
    usernameKey: username
    passwordKey: password
    groupName: paperless-smb-ingest
    permissionCodenames:
      - add_document
      - view_document
  aiAssistant:
    enabled: true
    secretName: paperless-ai-config
    usernameKey: paperless_username
    passwordKey: paperless_password
    makeSuperuser: true
  backup:
    enabled: true
    export:
      intervalSeconds: 21600
      targetPath: /usr/src/paperless/export/backup
      commandArgs:
        - --delete
        - --use-folder-prefix
        - --split-manifest
        - --no-progress-bar
    kopia:
      enabled: true
      intervalSeconds: 21600
      initialDelaySeconds: 180
      snapshotPath: /usr/src/paperless/export/backup
      auth:
        existingSecret: kopia-auth
        repositoryPasswordKey: KOPIA_PASSWORD
      repository:
        bucket: kopia-backups
        prefix: ""
        s3:
          existingSecret: kopia-garage-s3
          accessKeyIdKey: access-key-id
          secretAccessKeyKey: secret-access-key
          endpointKey: endpoint
          regionKey: region
          disableTls: true
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
  persistence:
    data:
      enabled: true
      storageClass: proxmox-csi-zfs-nvme-general-retain
      size: 2Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/data
    media:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 25Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/media
    export:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 5Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/export
    consume:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 5Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/consume

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: "2"
    memory: 1792Mi

backupResources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

exporter:
  enabled: true
  image:
    repository: ghcr.io/hansmi/prometheus-paperless-exporter
    tag: "v0.0.9"
    pullPolicy: IfNotPresent
  tokenInitImage:
    repository: python
    tag: "3.14-slim"
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  serviceMonitor:
    enabled: true
    interval: 60s
    additionalLabels:
      release: kube-prometheus-stack

nodeSelector:
  node-role.kubernetes.io/worker: "true"

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-02"]

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# ---------------------------------------------------------------------------
# Companion services — toggle with enabled: true/false
# ---------------------------------------------------------------------------

tika:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  fullnameOverride: "tika"

  image:
    repository: docker.io/apache/tika
    tag: "3.2.3.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9998
    ipFamilyPolicy: PreferDualStack

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  strategy:
    type: Recreate

  startupProbe:
    httpGet:
      path: /tika
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18

  livenessProbe:
    httpGet:
      path: /tika
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /tika
      port: http
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

gotenberg:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  fullnameOverride: "gotenberg"

  image:
    repository: docker.io/gotenberg/gotenberg
    tag: "8.17.3"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    ipFamilyPolicy: PreferDualStack

  args:
    - gotenberg
    - --chromium-disable-javascript
    - --api-timeout=120s
    - --log-level=warn

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  strategy:
    type: Recreate

  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 12

  livenessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

paperlessAi:
  enabled: true
  fullnameOverride: "paperless-ai"
  authentikMode: forward-auth

  replicaCount: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate

  image:
    repository: docker.io/clusterzx/paperless-ai
    tag: "3.0.9"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    ipFamilyPolicy: PreferDualStack

  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: apps-paperless-ai-authentik-forwardauth@kubernetescrd
      external-dns.alpha.kubernetes.io/ignore: "true"
    hosts:
      - host: paperless-ai.m0sh1.cc
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: wildcard-m0sh1-cc
        hosts:
          - paperless-ai.m0sh1.cc

  outpostIngress:
    enabled: true
    host: paperless-ai.m0sh1.cc
    tlsSecretName: wildcard-m0sh1-cc

  forwardAuth:
    enabled: true
    address: https://paperless-ai.m0sh1.cc/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Forwarded-User
      - X-Forwarded-Email
      - X-authentik-uid
      - X-authentik-username
      - X-authentik-email
      - X-authentik-name

  internalDns:
    enabled: true
    source: ingress
    recordTypes:
      - A
      - AAAA
    target: traefik-vip

  paperless:
    baseUrl: http://paperless-ngx.apps.svc.cluster.local:8000
  ollama:
    apiUrl: http://ollama.apps.svc.cluster.local:11434
    model: lfm2.5-thinking:1.2b
  configSecret:
    name: paperless-ai-config
    usernameKey: paperless_username
    passwordKey: paperless_password
    apiKeyKey: api_key
    jwtSecretKey: jwt_secret
  config:
    PAPERLESS_AI_INITIAL_SETUP: "no"
    AI_PROVIDER: ollama
    SCAN_INTERVAL: "*/30 * * * *"
    PROCESS_PREDEFINED_DOCUMENTS: "yes"
    TAGS: ai-review
    ADD_AI_PROCESSED_TAG: "yes"
    AI_PROCESSED_TAG_NAME: ai-processed
    USE_PROMPT_TAGS: "no"
    PROMPT_TAGS: ""
    USE_EXISTING_DATA: "yes"
    PROCESS_ONLY_NEW_DOCUMENTS: "yes"
    DISABLE_AUTOMATIC_PROCESSING: "no"
    RESTRICT_TO_EXISTING_TAGS: "yes"
    RESTRICT_TO_EXISTING_CORRESPONDENTS: "yes"
    RESTRICT_TO_EXISTING_DOCUMENT_TYPES: "yes"
    ACTIVATE_TAGGING: "yes"
    ACTIVATE_CORRESPONDENTS: "yes"
    ACTIVATE_DOCUMENT_TYPE: "yes"
    ACTIVATE_TITLE: "yes"
    ACTIVATE_CUSTOM_FIELDS: "yes"
    TOKEN_LIMIT: "64000"
    RESPONSE_TOKENS: "1200"
    SYSTEM_PROMPT: >-
      You are a document analysis assistant. Return strict JSON with title,
      correspondent, tags, document_type, document_date, and language. Keep
      titles concise, use the document language, avoid addresses, and prefer
      existing Paperless taxonomy over inventing new values.

  persistence:
    enabled: true
    storageClass: proxmox-csi-zfs-nvme-general-retain
    size: 10Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1536Mi

  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
