nameOverride: ""
fullnameOverride: ""
authentikMode: oidc
oidcContract:
  providerName: Authentik
  configSecretName: paperless-oidc
  configKey: providers.json

dbInit:
  image: harbor.m0sh1.cc/dhi/postgres:18.3
  imagePullPolicy: IfNotPresent

replicaCount: 1
revisionHistoryLimit: 1

image:
  repository: ghcr.io/paperless-ngx/paperless-ngx
  tag: "2.20.10"
  pullPolicy: IfNotPresent

service:
  port: 8000
  ipFamilyPolicy: PreferDualStack

ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: paperless.m0sh1.cc
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wildcard-m0sh1-cc
      hosts:
        - paperless.m0sh1.cc

internalDns:
  enabled: true
  source: ingress
  recordTypes:
    - A
    - AAAA
  target: traefik-vip

paperless:
  url: https://paperless.m0sh1.cc
  timeZone: Europe/Berlin
  ocrLanguage: deu+eng
  consumerPollingSeconds: 15
  redisUrl: redis://valkey.apps.svc.cluster.local:6379
  secretKey:
    secretName: paperless-config
    key: secret_key
  admin:
    secretName: paperless-admin
    usernameKey: username
    passwordKey: password
  database:
    host: cnpg-main-rw.apps.svc.cluster.local
    port: 5432
    name: paperless
    user: paperless
    secretName: paperless-postgres-auth
    passwordKey: password
  oidc:
    enabled: true
    secretName: paperless-oidc
    providersKey: providers.json
    appsValue: allauth.socialaccount.providers.openid_connect
    autoSignup: true
    allowSignups: true
    disableRegularLogin: false
    redirectLoginToSso: false
    defaultGroups:
      - paperless-users
    defaultPermissionApps:
      - documents
      - paperless_mail
    adminUsernames:
      - m0sh1
  smbIngest:
    enabled: true
    secretName: paperless-smb-ingest
    usernameKey: username
    passwordKey: password
    groupName: paperless-smb-ingest
    permissionCodenames:
      - add_document
      - view_document
  backup:
    enabled: true
    export:
      intervalSeconds: 21600
      targetPath: /usr/src/paperless/export/backup
      commandArgs:
        - --delete
        - --use-folder-prefix
        - --split-manifest
        - --no-progress-bar
    kopia:
      enabled: true
      intervalSeconds: 21600
      initialDelaySeconds: 180
      snapshotPath: /usr/src/paperless/export/backup
      auth:
        existingSecret: kopia-auth
        repositoryPasswordKey: KOPIA_PASSWORD
      repository:
        bucket: kopia-backups
        prefix: ""
        s3:
          existingSecret: kopia-garage-s3
          accessKeyIdKey: access-key-id
          secretAccessKeyKey: secret-access-key
          endpointKey: endpoint
          regionKey: region
          disableTls: true
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
  persistence:
    data:
      enabled: true
      storageClass: proxmox-csi-zfs-nvme-general-retain
      size: 2Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/data
    media:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 25Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/media
    export:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 5Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/export
    consume:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 5Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/consume

resources:
  requests:
    cpu: 250m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 3Gi

backupResources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

exporter:
  enabled: true
  image:
    repository: ghcr.io/hansmi/prometheus-paperless-exporter
    tag: "v0.0.9"
    pullPolicy: IfNotPresent
  tokenInitImage:
    repository: python
    tag: "3.13-slim"
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  serviceMonitor:
    enabled: true
    interval: 60s
    additionalLabels:
      release: kube-prometheus-stack

nodeSelector:
  node-role.kubernetes.io/worker: "true"

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-02"]

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
