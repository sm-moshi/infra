nameOverride: ""
fullnameOverride: ""
authentikMode: oidc
oidcContract:
  providerName: Authentik
  configSecretName: paperless-oidc
  configKey: providers.json

dbInit:
  image: harbor.m0sh1.cc/dhi/postgres:18.3
  imagePullPolicy: IfNotPresent

replicaCount: 1
revisionHistoryLimit: 1

image:
  repository: ghcr.io/paperless-ngx/paperless-ngx
  tag: "2.20.10"
  pullPolicy: IfNotPresent

service:
  port: 8000
  ipFamilyPolicy: PreferDualStack

ingress:
  enabled: true
  className: traefik
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - host: paperless.m0sh1.cc
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: wildcard-m0sh1-cc
      hosts:
        - paperless.m0sh1.cc

internalDns:
  enabled: true
  source: ingress
  recordTypes:
    - A
    - AAAA
  target: traefik-vip

paperless:
  url: https://paperless.m0sh1.cc
  timeZone: Europe/Berlin
  ocrLanguage: deu+eng
  ocrMode: skip
  ocrClean: clean-final
  ocrDeskew: true
  ocrRotatePages: true
  ocrOutputType: pdfa
  filenameDateOrder: YMD
  consumerPollingSeconds: 15
  tika:
    enabled: true
    gotenbergEndpoint: http://gotenberg.apps.svc.cluster.local:3000
    tikaEndpoint: http://tika.apps.svc.cluster.local:9998
  redisUrl: redis://valkey.apps.svc.cluster.local:6379
  secretKey:
    secretName: paperless-config
    key: secret_key
  admin:
    secretName: paperless-admin
    usernameKey: username
    passwordKey: password
  database:
    host: cnpg-main-rw.apps.svc.cluster.local
    port: 5432
    name: paperless
    user: paperless
    secretName: paperless-postgres-auth
    passwordKey: password
  oidc:
    enabled: true
    secretName: paperless-oidc
    providersKey: providers.json
    appsValue: allauth.socialaccount.providers.openid_connect
    autoSignup: true
    allowSignups: true
    disableRegularLogin: false
    redirectLoginToSso: false
    defaultGroups:
      - paperless-users
    defaultPermissionApps:
      - documents
      - paperless_mail
    adminUsernames:
      - m0sh1
    adminBootstrapEnabled: true
  smbIngest:
    enabled: true
    secretName: paperless-smb-ingest
    usernameKey: username
    passwordKey: password
    groupName: paperless-smb-ingest
    permissionCodenames:
      - add_document
      - view_document
      - add_tag
      - view_tag
  bootstrap:
    enabled: true
    correspondents: []
    tags:
      - name: ai-review
        color: "#fb9a99"
      - name: ai-processed
        color: "#33a02c"
      - name: FolderBatch
        color: "#6a3d9a"
      - name: medical
        color: "#1f78b4"
      - name: lab-results
        color: "#a6cee3"
      - name: legal
        color: "#e31a1c"
      - name: employment
        color: "#ff7f00"
      - name: finance
        color: "#b15928"
      - name: housing
        color: "#cab2d6"
      - name: identity
        color: "#b2df8a"
      - name: urgent
        color: "#fdbf6f"
    documentTypes:
      - name: Medical / Clinical
      - name: Lab Results
      - name: Legal / Administrative
      - name: Employment / Contract
      - name: Finance / Billing
      - name: Housing / Tenancy
      - name: Identity / Government
    storagePaths:
      - name: Medical
        path: Medical
      - name: Legal
        path: Legal
      - name: Contracts
        path: Contracts
      - name: Finance
        path: Finance
    savedViews:
      - name: Inbox
        showOnDashboard: true
        showInSidebar: true
        sortField: added
        sortReverse: true
        displayMode: table
        pageSize: 25
        filterRules:
          - ruleType: is_inbox
      - name: AI Pending
        showOnDashboard: true
        showInSidebar: true
        sortField: added
        sortReverse: true
        displayMode: table
        pageSize: 25
        filterRules:
          - ruleType: has_tag
            tag: ai-review
          - ruleType: does_not_have_tag
            tag: ai-processed
      - name: AI Processed
        showOnDashboard: false
        showInSidebar: true
        sortField: added
        sortReverse: true
        displayMode: table
        pageSize: 25
        filterRules:
          - ruleType: has_tag
            tag: ai-processed
      - name: SMB FolderBatch
        showOnDashboard: false
        showInSidebar: true
        sortField: added
        sortReverse: true
        displayMode: table
        pageSize: 25
        filterRules:
          - ruleType: has_tag
            tag: FolderBatch
      - name: Recent Uploads
        showOnDashboard: true
        showInSidebar: false
        sortField: added
        sortReverse: true
        displayMode: table
        pageSize: 25
        filterRules: []
    workflows:
      - name: New document -> AI Review
        order: 10
        enabled: true
        trigger:
          type: document_added
          doesNotHaveTags:
            - ai-review
            - ai-processed
        action:
          type: assignment
          assignTags:
            - ai-review
    backfill:
      enabled: true
      aiReviewTag: ai-review
      aiProcessedTag: ai-processed
      tagUnclassifiedDocuments: true
      fixCreatedDateFromTitlePrefix: true
      legacyAiDocumentTypes:
        - Invoice/Contract/...
        - Contract/Invoice/...
        - Contract/Document
      requeueLegacyAiDocuments: true
      resetLegacyAiDocumentTitleFromOriginalFilename: true
      resetLegacyAiDocumentCreatedDate: true
    obsoleteWorkflows:
      - FolderBatch -> AI Review
  aiAssistant:
    enabled: true
    secretName: paperless-ai-config
    usernameKey: paperless_username
    passwordKey: paperless_password
    makeSuperuser: true
  backup:
    enabled: true
    export:
      intervalSeconds: 21600
      targetPath: /usr/src/paperless/export/backup
      commandArgs:
        - --delete
        - --use-folder-prefix
        - --split-manifest
        - --no-progress-bar
    kopia:
      enabled: true
      intervalSeconds: 21600
      initialDelaySeconds: 180
      snapshotPath: /usr/src/paperless/export/backup
      auth:
        existingSecret: kopia-auth
        repositoryPasswordKey: KOPIA_PASSWORD
      repository:
        bucket: kopia-backups
        prefix: ""
        s3:
          existingSecret: kopia-garage-s3
          accessKeyIdKey: access-key-id
          secretAccessKeyKey: secret-access-key
          endpointKey: endpoint
          regionKey: region
          disableTls: true
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
  persistence:
    data:
      enabled: true
      storageClass: proxmox-csi-zfs-nvme-general-retain
      size: 2Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/data
    media:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 25Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/media
    export:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 5Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/export
    consume:
      enabled: true
      storageClass: proxmox-csi-zfs-sata-general-retain
      size: 5Gi
      accessMode: ReadWriteOnce
      mountPath: /usr/src/paperless/consume

resources:
  requests:
    cpu: 250m
    memory: 768Mi
  limits:
    cpu: "2"
    memory: 1792Mi

backupResources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

startupProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 18

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6

exporter:
  enabled: true
  image:
    repository: ghcr.io/hansmi/prometheus-paperless-exporter
    tag: "v0.0.9"
    pullPolicy: IfNotPresent
  tokenInitImage:
    repository: python
    tag: "3.14-slim"
    pullPolicy: IfNotPresent
  service:
    port: 8081
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 256Mi
  serviceMonitor:
    enabled: true
    interval: 60s
    additionalLabels:
      release: kube-prometheus-stack

nodeSelector:
  node-role.kubernetes.io/worker: "true"

tolerations: []

affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-01"]
      - weight: 60
        preference:
          matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values: ["pve-02"]

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: false
  runAsUser: 0
  runAsGroup: 0
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false

# ---------------------------------------------------------------------------
# Companion services — toggle with enabled: true/false
# ---------------------------------------------------------------------------

tika:
  enabled: true
  replicaCount: 0
  revisionHistoryLimit: 1
  fullnameOverride: "tika"

  image:
    repository: docker.io/apache/tika
    tag: "3.2.3.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9998
    ipFamilyPolicy: PreferDualStack

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  strategy:
    type: Recreate

  startupProbe:
    httpGet:
      path: /tika
      port: http
    initialDelaySeconds: 15
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18

  livenessProbe:
    httpGet:
      path: /tika
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /tika
      port: http
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

gotenberg:
  enabled: true
  replicaCount: 1
  revisionHistoryLimit: 1
  fullnameOverride: "gotenberg"

  image:
    repository: docker.io/gotenberg/gotenberg
    tag: "8.27.0"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    ipFamilyPolicy: PreferDualStack

  serviceMonitor:
    enabled: true
    interval: 60s
    additionalLabels:
      release: kube-prometheus-stack

  args:
    - gotenberg
    - --chromium-disable-javascript
    - --chromium-max-concurrency=2
    - --chromium-restart-after=100
    - --api-timeout=120s
    - --gotenberg-build-debug-data=false
    - --log-level=warn
    - --prometheus-collect-interval=1s

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  strategy:
    type: Recreate

  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 12

  livenessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: http
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  podSecurityContext:
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1001
    runAsGroup: 1001
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop:
        - ALL

paperlessAi:
  enabled: true
  fullnameOverride: "paperless-ai"
  authentikMode: forward-auth

  replicaCount: 1
  revisionHistoryLimit: 1
  strategy:
    type: Recreate

  image:
    repository: docker.io/clusterzx/paperless-ai
    tag: "3.0.9"
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 3000
    ipFamilyPolicy: PreferDualStack

  ingress:
    enabled: true
    className: traefik
    annotations:
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.entrypoints: websecure
      traefik.ingress.kubernetes.io/router.tls: "true"
      traefik.ingress.kubernetes.io/router.middlewares: apps-paperless-ai-authentik-forwardauth@kubernetescrd
      external-dns.alpha.kubernetes.io/ignore: "true"
    hosts:
      - host: paperless-ai.m0sh1.cc
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: wildcard-m0sh1-cc
        hosts:
          - paperless-ai.m0sh1.cc

  outpostIngress:
    enabled: true
    host: paperless-ai.m0sh1.cc
    tlsSecretName: wildcard-m0sh1-cc

  forwardAuth:
    enabled: true
    address: https://paperless-ai.m0sh1.cc/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-Forwarded-User
      - X-Forwarded-Email
      - X-authentik-uid
      - X-authentik-username
      - X-authentik-email
      - X-authentik-name

  internalDns:
    enabled: true
    source: ingress
    recordTypes:
      - A
      - AAAA
    target: traefik-vip

  paperless:
    baseUrl: http://paperless-ngx.apps.svc.cluster.local:8000
  ollama:
    apiUrl: http://ollama.apps.svc.cluster.local:11434
    model: lfm2.5-thinking:1.2b
  configSecret:
    name: paperless-ai-config
    usernameKey: paperless_username
    passwordKey: paperless_password
    apiKeyKey: api_key
    jwtSecretKey: jwt_secret
  config:
    PAPERLESS_AI_INITIAL_SETUP: "no"
    AI_PROVIDER: ollama
    SCAN_INTERVAL: "*/30 * * * *"
    PROCESS_PREDEFINED_DOCUMENTS: "yes"
    TAGS: ai-review
    ADD_AI_PROCESSED_TAG: "yes"
    AI_PROCESSED_TAG_NAME: ai-processed
    USE_PROMPT_TAGS: "no"
    PROMPT_TAGS: ""
    USE_EXISTING_DATA: "yes"
    PROCESS_ONLY_NEW_DOCUMENTS: "no"
    DISABLE_AUTOMATIC_PROCESSING: "no"
    RESTRICT_TO_EXISTING_TAGS: "yes"
    RESTRICT_TO_EXISTING_CORRESPONDENTS: "yes"
    RESTRICT_TO_EXISTING_DOCUMENT_TYPES: "yes"
    ACTIVATE_TAGGING: "yes"
    ACTIVATE_CORRESPONDENTS: "no"
    ACTIVATE_DOCUMENT_TYPE: "yes"
    ACTIVATE_TITLE: "yes"
    ACTIVATE_CUSTOM_FIELDS: "no"
    CUSTOM_FIELDS: '{"custom_fields":[]}'
    TOKEN_LIMIT: "64000"
    RESPONSE_TOKENS: "1200"
    SYSTEM_PROMPT: >-
      You are a document analysis assistant for Paperless-ngx. Return strict
      JSON with title, correspondent, tags, document_type, document_date, and
      language. Use only existing shared Paperless taxonomy values. Do not use
      deprecated legacy document types such as "Invoice/Contract/...",
      "Contract/Invoice/...", or "Contract/Document". Allowed document_type
      values are exactly: "Medical / Clinical", "Lab Results",
      "Legal / Administrative", "Employment / Contract",
      "Finance / Billing", "Housing / Tenancy", and "Identity / Government".
      Choose "Medical / Clinical" for patient records, admission paperwork,
      discharge summaries, doctor letters, diagnoses, treatment notes, and
      clinical correspondence. Choose "Lab Results" for blood tests, lab
      values, pathology, and measurement reports. If no allowed document type
      clearly fits, return null for document_type. Allowed tags are exactly:
      "medical", "lab-results", "legal", "employment", "finance", "housing",
      "identity", and "urgent". Use "medical" for clinical letters, discharge
      records, diagnoses, psychiatric records, hospital stays, and treatment
      paperwork. Use "lab-results" for lab reports, bloodwork, and measurement
      results. Use "legal" for legal, police, court, or formal administrative
      notices. Use "employment" for employment contracts, onboarding forms, and
      HR records. Use "finance" for invoices, billing, insurance payment
      notices, and account statements. Use "housing" for tenancy, landlord, or
      residence paperwork. Use "identity" for passports, IDs, residence
      permits, and official personal identification records. Use "urgent" only
      for explicitly acute, emergency, crisis, or time-critical medical
      situations. Never invent correspondents; always return null for
      correspondent unless a shared existing correspondent is already known in
      Paperless. Keep titles concise and in the dominant source language of the
      document. Never translate a German title into English. If the document is
      primarily German, the title must be German. If the document is primarily
      English, the title must be English. Preserve specific subject matter from
      the document heading or filename stem, retain important original wording
      and umlauts, and avoid generic titles like "Document Analysis" or
      "Medical Report" when a more specific title is available. Set
      document_date only when the document explicitly contains an unambiguous
      document date. Never use birthdays, patient identifiers, personal ID
      numbers, or guessed dates as the document_date. If the date is unclear,
      return null for document_date.

  persistence:
    enabled: true
    storageClass: proxmox-csi-zfs-nvme-general-retain
    size: 10Gi
    accessMode: ReadWriteOnce
    mountPath: /app/data

  resetCache:
    enabled: true
    image:
      repository: docker.io/library/busybox
      tag: "1.37.0"
      pullPolicy: IfNotPresent

  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1536Mi

  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 20
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 36

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 5

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 12

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  tolerations: []

  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-01"]
        - weight: 60
          preference:
            matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["pve-02"]

  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    runAsNonRoot: false
    runAsUser: 0
    runAsGroup: 0
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
