apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paperless-ngx.fullname" . }}
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "paperless-ngx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "paperless-ngx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: paperless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: PAPERLESS_URL
              value: {{ .Values.paperless.url | quote }}
            - name: PAPERLESS_TIME_ZONE
              value: {{ .Values.paperless.timeZone | quote }}
            - name: PAPERLESS_OCR_LANGUAGE
              value: {{ .Values.paperless.ocrLanguage | quote }}
            - name: PAPERLESS_REDIS
              value: {{ .Values.paperless.redisUrl | quote }}
            - name: PAPERLESS_DBHOST
              value: {{ .Values.paperless.database.host | quote }}
            - name: PAPERLESS_DBPORT
              value: {{ .Values.paperless.database.port | quote }}
            - name: PAPERLESS_DBNAME
              value: {{ .Values.paperless.database.name | quote }}
            - name: PAPERLESS_DBUSER
              value: {{ .Values.paperless.database.user | quote }}
            - name: PAPERLESS_DBPASS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.database.secretName }}
                  key: {{ .Values.paperless.database.passwordKey }}
            - name: PAPERLESS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.secretKey.secretName }}
                  key: {{ .Values.paperless.secretKey.key }}
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.admin.secretName }}
                  key: {{ .Values.paperless.admin.usernameKey }}
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.admin.secretName }}
                  key: {{ .Values.paperless.admin.passwordKey }}
            - name: PAPERLESS_MEDIA_ROOT
              value: {{ .Values.paperless.persistence.media.mountPath | quote }}
            - name: PAPERLESS_DATA_DIR
              value: {{ .Values.paperless.persistence.data.mountPath | quote }}
            - name: PAPERLESS_CONSUMPTION_DIR
              value: {{ .Values.paperless.persistence.consume.mountPath | quote }}
            - name: PAPERLESS_CONSUMER_POLLING
              value: {{ .Values.paperless.consumerPollingSeconds | quote }}
            - name: USERMAP_UID
              value: "1000"
            - name: USERMAP_GID
              value: "1000"
            {{- if .Values.paperless.oidc.enabled }}
            - name: PAPERLESS_APPS
              value: {{ .Values.paperless.oidc.appsValue | quote }}
            - name: PAPERLESS_SOCIALACCOUNT_PROVIDERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.oidc.secretName }}
                  key: {{ .Values.paperless.oidc.providersKey }}
            - name: PAPERLESS_SOCIAL_AUTO_SIGNUP
              value: {{ .Values.paperless.oidc.autoSignup | quote }}
            - name: PAPERLESS_SOCIALACCOUNT_ALLOW_SIGNUPS
              value: {{ .Values.paperless.oidc.allowSignups | quote }}
            - name: PAPERLESS_SOCIAL_ACCOUNT_DEFAULT_GROUPS
              value: {{ .Values.paperless.oidc.defaultGroups | join "," | quote }}
            - name: PAPERLESS_DISABLE_REGULAR_LOGIN
              value: {{ .Values.paperless.oidc.disableRegularLogin | quote }}
            - name: PAPERLESS_REDIRECT_LOGIN_TO_SSO
              value: {{ .Values.paperless.oidc.redirectLoginToSso | quote }}
            {{- end }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paperless.persistence.data.mountPath }}
            - name: media
              mountPath: {{ .Values.paperless.persistence.media.mountPath }}
            - name: export
              mountPath: {{ .Values.paperless.persistence.export.mountPath }}
            - name: consume
              mountPath: {{ .Values.paperless.persistence.consume.mountPath }}
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-data
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-media
        - name: export
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-export
        - name: consume
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-consume
        - name: tmp
          emptyDir: {}
