apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "paperless-ngx.fullname" . }}
  labels:
    {{- include "paperless-ngx.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "paperless-ngx.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "paperless-ngx.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: paperless
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
{{ include "paperless-ngx.runtimeEnv" . | nindent 12 }}
            - name: PAPERLESS_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.admin.secretName }}
                  key: {{ .Values.paperless.admin.usernameKey }}
            - name: PAPERLESS_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.admin.secretName }}
                  key: {{ .Values.paperless.admin.passwordKey }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paperless.persistence.data.mountPath }}
            - name: media
              mountPath: {{ .Values.paperless.persistence.media.mountPath }}
            - name: export
              mountPath: {{ .Values.paperless.persistence.export.mountPath }}
            - name: consume
              mountPath: {{ .Values.paperless.persistence.consume.mountPath }}
            - name: tmp
              mountPath: /tmp
        {{- if .Values.paperless.backup.enabled }}
        - name: paperless-export-runner
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          command:
            - /bin/bash
            - -ec
            - |
              interval="{{ .Values.paperless.backup.export.intervalSeconds }}"
              target_dir="{{ .Values.paperless.backup.export.targetPath }}"
              mkdir -p "${target_dir}"
              while true; do
                echo "Running Paperless export to ${target_dir}"
                if ! document_exporter "${target_dir}"{{- range .Values.paperless.backup.export.commandArgs }} {{ . | quote }}{{- end }}; then
                  echo "Paperless export run failed" >&2
                fi
                sleep "${interval}"
              done
          env:
{{ include "paperless-ngx.runtimeEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.backupResources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.paperless.persistence.data.mountPath }}
            - name: media
              mountPath: {{ .Values.paperless.persistence.media.mountPath }}
            - name: export
              mountPath: {{ .Values.paperless.persistence.export.mountPath }}
            - name: consume
              mountPath: {{ .Values.paperless.persistence.consume.mountPath }}
            - name: tmp
              mountPath: /tmp
        {{- if .Values.paperless.backup.kopia.enabled }}
        - name: paperless-kopia-snapshotter
          image: "kopia/kopia:0.22.3"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          command:
            - /bin/sh
            - -ec
            - |
              interval="{{ .Values.paperless.backup.kopia.intervalSeconds }}"
              initial_delay="{{ .Values.paperless.backup.kopia.initialDelaySeconds }}"
              snapshot_path="{{ .Values.paperless.backup.kopia.snapshotPath }}"
              export HOME=/tmp/kopia
              export KOPIA_CONFIG_PATH=/tmp/kopia/repository.config
              export KOPIA_CACHE_DIRECTORY=/tmp/kopia/cache
              export KOPIA_LOG_DIR=/tmp/kopia/logs
              mkdir -p "${HOME}" "${KOPIA_CACHE_DIRECTORY}" "${KOPIA_LOG_DIR}" "${snapshot_path}"
              sleep "${initial_delay}"
              while true; do
                endpoint="${KOPIA_S3_ENDPOINT#http://}"
                endpoint="${endpoint#https://}"
                endpoint="${endpoint%%/*}"
                if [ ! -s "${KOPIA_CONFIG_PATH}" ]; then
                  set -- \
                    --config-file="${KOPIA_CONFIG_PATH}" \
                    repository connect s3 \
                    --bucket="${KOPIA_BUCKET}" \
                    --endpoint="${endpoint}" \
                    --access-key="${KOPIA_S3_ACCESS_KEY_ID}" \
                    --secret-access-key="${KOPIA_S3_SECRET_ACCESS_KEY}"
                  if [ -n "${KOPIA_S3_REGION}" ]; then
                    set -- "$@" --region="${KOPIA_S3_REGION}"
                  fi
                  if [ -n "${KOPIA_REPOSITORY_PREFIX}" ]; then
                    set -- "$@" --prefix="${KOPIA_REPOSITORY_PREFIX}"
                  fi
                  {{- if .Values.paperless.backup.kopia.repository.s3.disableTls }}
                  set -- "$@" --disable-tls
                  {{- end }}
                  kopia "$@"
                fi
                echo "Creating Kopia snapshot for ${snapshot_path}"
                if ! kopia --config-file="${KOPIA_CONFIG_PATH}" snapshot create "${snapshot_path}" --tags=app:paperless-ngx,component:export; then
                  echo "Kopia snapshot run failed" >&2
                fi
                sleep "${interval}"
              done
          env:
            - name: KOPIA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.backup.kopia.auth.existingSecret }}
                  key: {{ .Values.paperless.backup.kopia.auth.repositoryPasswordKey }}
            - name: KOPIA_BUCKET
              value: {{ .Values.paperless.backup.kopia.repository.bucket | quote }}
            - name: KOPIA_REPOSITORY_PREFIX
              value: {{ .Values.paperless.backup.kopia.repository.prefix | quote }}
            - name: KOPIA_S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.backup.kopia.repository.s3.existingSecret }}
                  key: {{ .Values.paperless.backup.kopia.repository.s3.accessKeyIdKey }}
            - name: KOPIA_S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.backup.kopia.repository.s3.existingSecret }}
                  key: {{ .Values.paperless.backup.kopia.repository.s3.secretAccessKeyKey }}
            - name: KOPIA_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.backup.kopia.repository.s3.existingSecret }}
                  key: {{ .Values.paperless.backup.kopia.repository.s3.endpointKey }}
            - name: KOPIA_S3_REGION
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.paperless.backup.kopia.repository.s3.existingSecret }}
                  key: {{ .Values.paperless.backup.kopia.repository.s3.regionKey }}
          resources:
            {{- toYaml .Values.paperless.backup.kopia.resources | nindent 12 }}
          volumeMounts:
            - name: export
              mountPath: {{ .Values.paperless.persistence.export.mountPath }}
            - name: tmp
              mountPath: /tmp
        {{- end }}
        {{- end }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-data
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-media
        - name: export
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-export
        - name: consume
          persistentVolumeClaim:
            claimName: {{ include "paperless-ngx.fullname" . }}-consume
        - name: tmp
          emptyDir: {}
