{{- if and .Values.paperlessAi.enabled .Values.paperlessAi.outpostIngress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "paperless-ai.fullname" . }}-authentik-outpost
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "paperless-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: auth
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.priority: "200"
    external-dns.alpha.kubernetes.io/ignore: "true"
spec:
  rules:
    - host: {{ .Values.paperlessAi.outpostIngress.host | quote }}
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.paperlessAi.outpostIngress.host | quote }}
      secretName: {{ .Values.paperlessAi.outpostIngress.tlsSecretName | quote }}
{{- end }}
