{{- if .Values.paperlessAi.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperless-ai.fullname" . }}
  labels:
    {{- include "paperless-ai.labels" . | nindent 4 }}
spec:
  type: {{ .Values.paperlessAi.service.type }}
  ipFamilyPolicy: {{ .Values.paperlessAi.service.ipFamilyPolicy }}
  selector:
    {{- include "paperless-ai.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.paperlessAi.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
