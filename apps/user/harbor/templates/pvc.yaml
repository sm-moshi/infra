{{- $imageChart := .Values.harbor.persistence.imageChartStorage | default dict -}}
{{- if eq (default "filesystem" $imageChart.type) "filesystem" }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-registry
  namespace: apps
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
spec:
  storageClassName: proxmox-csi-zfs-sata-object-retain
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
{{- end }}

---
{{- $jobLoggers := .Values.harbor.jobservice.jobLoggers | default (list "file") -}}
{{- $legacyJobPvc := .Values.harbor.jobservice.legacyJobservicePvc | default dict -}}
{{- $keepLegacyJobPvc := default false $legacyJobPvc.enabled -}}
{{- if and .Values.harbor.persistence.enabled (or (has "file" $jobLoggers) $keepLegacyJobPvc) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-jobservice
  namespace: apps
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
spec:
  storageClassName: {{ default "proxmox-csi-zfs-nvme-fast-retain" $legacyJobPvc.storageClass }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ default "5Gi" $legacyJobPvc.size }}
{{- end }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: harbor-trivy
  namespace: apps
  annotations:
    helm.sh/resource-policy: keep
    argocd.argoproj.io/sync-options: Prune=false
spec:
  storageClassName: proxmox-csi-zfs-nvme-fast-retain
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
