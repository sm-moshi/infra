{{- if and .Values.logsViewer .Values.logsViewer.enabled }}
{{- $sub := index .Values "renovate-operator" -}}
{{- $svcName := ($sub.fullnameOverride | default .Release.Name) -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $svcName }}-logs-viewer
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: renovate-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: logs-viewer
data:
  nginx.conf: |
    events {}
    pid /tmp/nginx.pid;
    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      keepalive_timeout  65;
      client_body_temp_path /tmp/client_temp;
      proxy_temp_path /tmp/proxy_temp;
      fastcgi_temp_path /tmp/fastcgi_temp;
      uwsgi_temp_path /tmp/uwsgi_temp;
      scgi_temp_path /tmp/scgi_temp;

      server {
        listen 8080;
        server_name _;

        location = /healthz {
          add_header Content-Type text/plain;
          return 200 "ok\n";
        }

        location = {{ .Values.logsViewer.routePath }} {
          add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;
          default_type text/html;
          root /usr/share/nginx/html;
          try_files /index.html =404;
        }

        location = {{ .Values.logsViewer.routePath }}/ {
          add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;
          add_header Pragma "no-cache" always;
          add_header Expires "0" always;
          default_type text/html;
          root /usr/share/nginx/html;
          try_files /index.html =404;
        }

        location / {
          return 404;
        }
      }
    }
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>Renovate Logs Viewer</title>
      <style>
        :root {
          color-scheme: dark;
          --bg: #0b1324;
          --panel: #121c33;
          --panel-alt: #1a2744;
          --text: #dbe9ff;
          --muted: #8aa2c8;
          --accent: #3fb4ff;
          --border: #243453;
          --danger: #ff7c87;
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
          background: radial-gradient(circle at 15% 20%, #10203e 0%, var(--bg) 55%);
          color: var(--text);
          min-height: 100vh;
        }
        .layout {
          display: grid;
          grid-template-columns: 320px 1fr;
          min-height: 100vh;
        }
        .side {
          border-right: 1px solid var(--border);
          background: linear-gradient(180deg, var(--panel-alt), var(--panel));
          padding: 16px;
        }
        .main {
          padding: 16px;
          display: grid;
          grid-template-rows: auto auto 1fr;
          gap: 12px;
          min-height: 100vh;
        }
        .card {
          border: 1px solid var(--border);
          background: rgba(18, 28, 51, 0.8);
          border-radius: 12px;
          padding: 12px;
          box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
        }
        h1 {
          font-size: 18px;
          margin: 0 0 10px;
          letter-spacing: 0.5px;
        }
        .kv { margin: 0; display: grid; gap: 6px; }
        .kv dt { color: var(--muted); font-size: 12px; }
        .kv dd { margin: 0; font-size: 13px; word-break: break-word; }
        .controls {
          display: flex;
          flex-wrap: wrap;
          gap: 8px;
          align-items: center;
        }
        .controls input[type="text"] {
          min-width: 280px;
          background: #0a1429;
          color: var(--text);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 9px 10px;
          outline: none;
        }
        .controls input[type="number"] {
          width: 90px;
          background: #0a1429;
          color: var(--text);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 6px 8px;
          outline: none;
        }
        .controls select {
          background: #0a1429;
          color: var(--text);
          border: 1px solid var(--border);
          border-radius: 8px;
          padding: 6px 8px;
          outline: none;
        }
        .controls label {
          display: inline-flex;
          align-items: center;
          gap: 6px;
          font-size: 12px;
          color: var(--muted);
          padding: 6px 8px;
          border: 1px solid var(--border);
          border-radius: 8px;
          background: #0a1429;
        }
        button {
          border: 1px solid var(--border);
          color: var(--text);
          background: #102140;
          border-radius: 8px;
          padding: 9px 12px;
          font-size: 12px;
          cursor: pointer;
        }
        button:hover { border-color: var(--accent); }
        .status {
          font-size: 12px;
          color: var(--muted);
          padding-top: 2px;
        }
        .status.err { color: var(--danger); }
        .output {
          margin: 0;
          border: 1px solid var(--border);
          border-radius: 12px;
          background: #060d1f;
          padding: 14px;
          overflow: auto;
          line-height: 1.45;
          font-size: 12px;
          white-space: pre;
          font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
        }
        .output.wrap { white-space: pre-wrap; }
        mark {
          background: #f9dd62;
          color: #101010;
          border-radius: 3px;
          padding: 0 1px;
        }
        .json-key { color: #8ec5ff; }
        .json-string { color: #99f0b2; }
        .json-number { color: #f5d07a; }
        .json-boolean { color: #ffb88b; }
        .json-null { color: #c7b3ff; }
        .log-structured {
          display: flex;
          flex-direction: column;
          gap: 8px;
          white-space: normal;
        }
        .log-row {
          display: grid;
          grid-template-columns: 165px 70px minmax(120px, 220px) 1fr;
          grid-template-areas:
            "time level repo msg"
            "meta meta meta meta";
          gap: 4px 10px;
          padding: 8px 10px;
          border: 1px solid var(--border);
          border-radius: 8px;
          background: rgba(10, 20, 41, 0.72);
          border-left: 3px solid transparent;
        }
        .log-row .time {
          grid-area: time;
          font-size: 11px;
          color: var(--muted);
          white-space: nowrap;
        }
        .log-row .level { grid-area: level; }
        .log-row .repo {
          grid-area: repo;
          color: #9fc3ff;
          font-size: 12px;
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
        .log-row .msg {
          grid-area: msg;
          font-size: 12px;
          white-space: pre-wrap;
          word-break: break-word;
        }
        .log-row .meta {
          grid-area: meta;
          font-size: 11px;
          color: var(--muted);
          white-space: pre-wrap;
        }
        .badge {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          min-width: 54px;
          padding: 2px 7px;
          border-radius: 999px;
          font-size: 10px;
          font-weight: 700;
          letter-spacing: 0.4px;
          border: 1px solid transparent;
          text-transform: uppercase;
        }
        .badge-trace { background: rgba(143, 161, 196, 0.15); color: #9cb2dc; border-color: rgba(143, 161, 196, 0.3); }
        .badge-debug { background: rgba(63, 180, 255, 0.16); color: #8dd8ff; border-color: rgba(63, 180, 255, 0.3); }
        .badge-info { background: rgba(95, 214, 158, 0.16); color: #90f0bd; border-color: rgba(95, 214, 158, 0.3); }
        .badge-warn { background: rgba(249, 199, 79, 0.15); color: #f8d785; border-color: rgba(249, 199, 79, 0.3); }
        .badge-error { background: rgba(255, 107, 127, 0.16); color: #ff98a8; border-color: rgba(255, 107, 127, 0.35); }
        .badge-fatal { background: rgba(255, 78, 105, 0.2); color: #ff9faf; border-color: rgba(255, 78, 105, 0.4); }
        .badge-raw { background: rgba(167, 179, 205, 0.14); color: #b9c7e2; border-color: rgba(167, 179, 205, 0.28); }
        .log-row.lvl-error { border-left-color: #ff6b7f; }
        .log-row.lvl-warn { border-left-color: #f9c74f; }
        .log-row.lvl-info { border-left-color: #5fd69e; }
        .log-row.lvl-debug { border-left-color: #3fb4ff; }
        .log-row.lvl-trace { border-left-color: #8fa1c4; }
        .log-line {
          display: block;
          border-left: 2px solid transparent;
          padding-left: 8px;
          margin-left: -8px;
        }
        .log-line.lvl-error {
          border-left-color: #ff6b7f;
          background: rgba(255, 82, 114, 0.08);
        }
        .log-line.lvl-warn {
          border-left-color: #f9c74f;
          background: rgba(249, 199, 79, 0.06);
        }
        .log-line.lvl-info {
          border-left-color: #3fb4ff;
          background: rgba(63, 180, 255, 0.05);
        }
        @media (max-width: 960px) {
          .layout { grid-template-columns: 1fr; }
          .side { border-right: 0; border-bottom: 1px solid var(--border); }
          .controls input[type="text"] { min-width: 160px; flex: 1; }
          .log-row {
            grid-template-columns: 1fr;
            grid-template-areas:
              "time"
              "level"
              "repo"
              "msg"
              "meta";
          }
        }
      </style>
    </head>
    <body>
      <div class="layout">
        <aside class="side">
          <h1>Renovate Logs</h1>
          <div class="card">
            <dl class="kv">
              <dt>Renovate Job</dt><dd id="renovate">-</dd>
              <dt>Namespace</dt><dd id="namespace">-</dd>
              <dt>Project</dt><dd id="project">-</dd>
              <dt>Source Endpoint</dt><dd id="source">{{ .Values.logsViewer.rawPath }}</dd>
            </dl>
          </div>
        </aside>
        <main class="main">
          <section class="card controls">
            <button id="refresh">Refresh</button>
            <label><input id="auto" type="checkbox" checked /> Auto ({{ div .Values.logsViewer.pollIntervalMs 1000 }}s)</label>
            <label><input id="follow" type="checkbox" checked /> Follow</label>
            <label>View
              <select id="highlightMode">
                <option value="structured" selected>Structured</option>
                <option value="json">JSON</option>
                <option value="plain">Plain</option>
              </select>
            </label>
            <label>Min level
              <select id="minLevel">
                <option value="10">Trace+</option>
                <option value="20" selected>Debug+</option>
                <option value="30">Info+</option>
                <option value="40">Warn+</option>
                <option value="50">Error+</option>
              </select>
            </label>
            <label><input id="wrap" type="checkbox" /> Wrap lines</label>
            <label>Tail lines <input id="tailLines" type="number" min="100" step="100" value="{{ .Values.logsViewer.tailLinesDefault }}" /></label>
            <input id="search" type="text" placeholder="Search in logs..." />
            <button id="copy">Copy</button>
          </section>
          <section class="status" id="status">Loading...</section>
          <div id="output" class="output"></div>
        </main>
      </div>
      <script>
        const params = new URLSearchParams(window.location.search);
        const rawPath = {{ .Values.logsViewer.rawPath | quote }};
        const pollIntervalMs = {{ .Values.logsViewer.pollIntervalMs }};
        const tailLinesDefault = {{ .Values.logsViewer.tailLinesDefault }};
        const query = params.toString();
        const endpoint = query ? `${rawPath}?${query}` : rawPath;

        const el = {
          renovate: document.getElementById("renovate"),
          namespace: document.getElementById("namespace"),
          project: document.getElementById("project"),
          source: document.getElementById("source"),
          status: document.getElementById("status"),
          output: document.getElementById("output"),
          refresh: document.getElementById("refresh"),
          auto: document.getElementById("auto"),
          follow: document.getElementById("follow"),
          highlightMode: document.getElementById("highlightMode"),
          minLevel: document.getElementById("minLevel"),
          wrap: document.getElementById("wrap"),
          tailLines: document.getElementById("tailLines"),
          search: document.getElementById("search"),
          copy: document.getElementById("copy")
        };

        el.renovate.textContent = params.get("renovate") || "-";
        el.namespace.textContent = params.get("namespace") || "-";
        el.project.textContent = params.get("project") || "-";
        el.source.textContent = endpoint;

        let rawText = "";
        let fetchInFlight = false;
        let timer;

        function escapeHtml(str) {
          return str
            .replaceAll("&", "&amp;")
            .replaceAll("<", "&lt;")
            .replaceAll(">", "&gt;");
        }

        function isNearBottom() {
          return (el.output.scrollHeight - el.output.scrollTop - el.output.clientHeight) < 28;
        }

        function parseJsonLine(line) {
          try {
            return JSON.parse(line);
          } catch (_) {
            return null;
          }
        }

        function normalizedLevel(value) {
          if (typeof value === "number" && Number.isFinite(value)) return value;
          if (typeof value === "string") {
            const mapped = {
              trace: 10,
              debug: 20,
              info: 30,
              warn: 40,
              warning: 40,
              error: 50,
              fatal: 60
            };
            return mapped[value.toLowerCase()] || 0;
          }
          return 0;
        }

        function levelLabel(level) {
          if (level >= 60) return "fatal";
          if (level >= 50) return "error";
          if (level >= 40) return "warn";
          if (level >= 30) return "info";
          if (level >= 20) return "debug";
          if (level >= 10) return "trace";
          return "raw";
        }

        function levelBadgeClass(level) {
          if (level >= 60) return "badge-fatal";
          if (level >= 50) return "badge-error";
          if (level >= 40) return "badge-warn";
          if (level >= 30) return "badge-info";
          if (level >= 20) return "badge-debug";
          if (level >= 10) return "badge-trace";
          return "badge-raw";
        }

        function levelClassForValue(level) {
          if (level >= 50) return "lvl-error";
          if (level >= 40) return "lvl-warn";
          if (level >= 30) return "lvl-info";
          if (level >= 20) return "lvl-debug";
          if (level >= 10) return "lvl-trace";
          return "";
        }

        function formatTimestamp(ts) {
          if (!ts) return "-";
          const parsed = new Date(ts);
          if (Number.isNaN(parsed.getTime())) return String(ts);
          return parsed.toLocaleString();
        }

        function levelClassForParsed(parsed) {
          if (parsed) {
            return levelClassForValue(normalizedLevel(parsed.level));
          }
          return "";
        }

        function syntaxHighlightJsonLine(line) {
          const escaped = escapeHtml(line);
          return escaped.replace(
            /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
            (match) => {
              let cls = "json-number";
              if (/^"/.test(match)) {
                cls = /:$/.test(match) ? "json-key" : "json-string";
              } else if (/true|false/.test(match)) {
                cls = "json-boolean";
              } else if (/null/.test(match)) {
                cls = "json-null";
              }
              return `<span class="${cls}">${match}</span>`;
            }
          );
        }

        function renderSyntaxBlock(text, term, mode) {
          const lowerTerm = term ? term.toLowerCase() : "";
          const lines = text.split("\n");
          const rendered = [];
          for (const line of lines) {
            if (lowerTerm && !line.toLowerCase().includes(lowerTerm)) {
              continue;
            }
            const parsed = parseJsonLine(line);
            const cls = levelClassForParsed(parsed);
            let html = "&nbsp;";
            if (line) {
              const useJson = mode === "json" || (mode === "auto" && parsed !== null);
              html = useJson ? syntaxHighlightJsonLine(line) : escapeHtml(line);
            }
            rendered.push(`<span class="log-line ${cls}">${html}</span>`);
          }
          if (rendered.length === 0) {
            return "(no matching lines)";
          }
          return rendered.join("\n");
        }

        function renderStructuredBlock(text, term, minLevel) {
          const lowerTerm = term ? term.toLowerCase() : "";
          const rows = [];
          const lines = text.split("\n");
          for (const line of lines) {
            if (!line) continue;
            if (lowerTerm && !line.toLowerCase().includes(lowerTerm)) {
              continue;
            }

            const parsed = parseJsonLine(line);
            if (!parsed) {
              if (minLevel <= 0) {
                rows.push(
                  `<div class="log-row"><span class="time">-</span><span class="level"><span class="badge badge-raw">raw</span></span><span class="repo">-</span><span class="msg">${escapeHtml(line)}</span></div>`
                );
              }
              continue;
            }

            const level = normalizedLevel(parsed.level);
            if (level < minLevel) continue;
            const levelText = levelLabel(level);
            const levelCls = levelClassForValue(level);
            const badgeCls = levelBadgeClass(level);
            const ts = formatTimestamp(parsed.time || parsed.timestamp);
            const repo = parsed.repository || parsed.repo || "-";
            const msg = parsed.msg || parsed.message || "(no message)";

            const metaFields = [];
            if (parsed.logContext) metaFields.push(`context=${parsed.logContext}`);
            if (typeof parsed.durationMs !== "undefined") metaFields.push(`duration=${parsed.durationMs}ms`);
            if (parsed.packageFile) metaFields.push(`file=${parsed.packageFile}`);
            if (parsed.depName) metaFields.push(`dep=${parsed.depName}`);
            if (parsed.branch) metaFields.push(`branch=${parsed.branch}`);
            const meta = metaFields.join(" | ");

            rows.push(
              `<div class="log-row ${levelCls}"><span class="time">${escapeHtml(String(ts))}</span><span class="level"><span class="badge ${badgeCls}">${escapeHtml(levelText)}</span></span><span class="repo">${escapeHtml(String(repo))}</span><span class="msg">${escapeHtml(String(msg))}</span>${meta ? `<span class="meta">${escapeHtml(meta)}</span>` : ""}</div>`
            );
          }

          if (rows.length === 0) {
            return "(no matching lines)";
          }
          return `<div class="log-structured">${rows.join("")}</div>`;
        }

        function getTailWindow(text) {
          const requested = Number.parseInt(el.tailLines.value, 10);
          const maxLines = Number.isFinite(requested) && requested >= 100 ? requested : tailLinesDefault;
          const lines = text.split("\n");
          if (lines.length <= maxLines) {
            return { text, total: lines.length, trimmed: 0, shown: lines.length };
          }
          const trimmed = lines.length - maxLines;
          const shownText = lines.slice(trimmed).join("\n");
          return { text: shownText, total: lines.length, trimmed, shown: maxLines };
        }

        function renderOutput(forceScroll = false) {
          const nearBottom = isNearBottom();
          const term = el.search.value.trim();
          const { text, total, trimmed, shown } = getTailWindow(rawText);
          const mode = el.highlightMode.value || "structured";
          const minLevel = Number.parseInt(el.minLevel.value, 10) || 0;
          if (mode === "plain") {
            const escaped = escapeHtml(text);
            if (!term) {
              el.output.innerHTML = escaped || "(empty)";
            } else {
              const pattern = new RegExp(term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi");
              el.output.innerHTML = (escaped || "(empty)").replace(pattern, (m) => `<mark>${m}</mark>`);
            }
          } else if (mode === "structured") {
            el.output.innerHTML = renderStructuredBlock(text, term, minLevel);
          } else {
            el.output.innerHTML = renderSyntaxBlock(text, term, mode);
          }
          if (forceScroll || (el.follow.checked && nearBottom && !term)) {
            el.output.scrollTop = el.output.scrollHeight;
          }
          return { total, trimmed, shown };
        }

        async function loadLogs() {
          if (fetchInFlight) return;
          fetchInFlight = true;
          const ts = new Date().toLocaleTimeString();
          el.status.classList.remove("err");
          el.status.textContent = `Fetching ${endpoint} at ${ts}...`;
          try {
            const previous = rawText;
            const res = await fetch(endpoint, { credentials: "same-origin" });
            if (!res.ok) {
              const body = await res.text();
              let detail = "";
              try {
                const json = JSON.parse(body);
                detail = json?.Message || json?.Error?.ErrStatus?.message || body;
              } catch (_) {
                detail = body;
              }
              if (res.status === 500 && /not found|cleaned up|no pods found/i.test(detail)) {
                throw new Error("No logs are currently available for this project yet (or they already expired).");
              }
              throw new Error(`HTTP ${res.status}${detail ? `: ${detail}` : ""}`);
            }
            rawText = await res.text();
            const appended = previous && rawText.startsWith(previous)
              ? rawText.length - previous.length
              : null;
            const rotated = previous && appended === null;
            const windowMeta = renderOutput(appended !== null && appended > 0);
            const tailInfo = windowMeta.trimmed > 0
              ? ` | showing ${windowMeta.shown}/${windowMeta.total} lines`
              : ` | ${windowMeta.total} lines`;
            if (rotated) {
              el.status.textContent = `Updated at ${ts} | log source changed/reloaded${tailInfo}`;
            } else if (appended !== null) {
              el.status.textContent = `Updated at ${ts} | +${appended} bytes${tailInfo}`;
            } else {
              el.status.textContent = `Updated at ${ts}${tailInfo}`;
            }
          } catch (err) {
            el.status.classList.add("err");
            el.status.textContent = `Failed to load logs: ${err.message}`;
          } finally {
            fetchInFlight = false;
          }
        }

        function setupAutoRefresh() {
          if (timer) clearInterval(timer);
          if (el.auto.checked) {
            timer = setInterval(loadLogs, pollIntervalMs);
          }
        }

        el.refresh.addEventListener("click", loadLogs);
        el.auto.addEventListener("change", setupAutoRefresh);
        el.follow.addEventListener("change", () => renderOutput(el.follow.checked));
        el.highlightMode.addEventListener("change", () => renderOutput(false));
        el.minLevel.addEventListener("change", () => renderOutput(false));
        el.wrap.addEventListener("change", () => {
          el.output.classList.toggle("wrap", el.wrap.checked);
        });
        el.tailLines.addEventListener("change", () => renderOutput(false));
        el.search.addEventListener("input", () => renderOutput(false));
        el.copy.addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(rawText);
            el.status.classList.remove("err");
            el.status.textContent = "Copied logs to clipboard";
          } catch (err) {
            el.status.classList.add("err");
            el.status.textContent = `Clipboard copy failed: ${err.message}`;
          }
        });

        loadLogs();
        setupAutoRefresh();
      </script>
    </body>
    </html>
{{- end }}
