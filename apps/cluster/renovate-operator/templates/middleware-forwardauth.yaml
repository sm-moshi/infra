{{- if and .Values.forwardAuth .Values.forwardAuth.enabled }}
{{- $sub := index .Values "renovate-operator" -}}
{{- $svcName := ($sub.fullnameOverride | default .Release.Name) -}}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: {{ $svcName }}-forwardauth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: renovate-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  forwardAuth:
    address: {{ .Values.forwardAuth.address | quote }}
    trustForwardHeader: {{ .Values.forwardAuth.trustForwardHeader }}
    maxBodySize: 4096
    authResponseHeaders:
      {{- range .Values.forwardAuth.authResponseHeaders }}
      - {{ . | quote }}
      {{- end }}
{{- end }}
