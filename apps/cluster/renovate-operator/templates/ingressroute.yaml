{{- if .Values.ingressRoute.enabled }}
{{- $sub := index .Values "renovate-operator" -}}
{{- $svcName := ($sub.fullnameOverride | default .Release.Name) -}}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ $svcName }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: renovate-operator
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.ingressRoute.host }}
spec:
  entryPoints:
{{- range .Values.ingressRoute.entryPoints }}
    - {{ . }}
{{- end }}
  routes:
    # Web UI — protected by Authentik forwardAuth.
    - match: Host(`{{ .Values.ingressRoute.host }}`)
      kind: Rule
{{- if and .Values.forwardAuth .Values.forwardAuth.enabled }}
      middlewares:
        - name: {{ $svcName }}-forwardauth
{{- end }}
      services:
        - name: {{ $svcName }}
          port: {{ .Values.ingressRoute.servicePort }}
{{- if and .Values.ingressRoute.tls .Values.ingressRoute.tls.enabled }}
  tls:
{{- if .Values.ingressRoute.tls.secretName }}
    secretName: {{ .Values.ingressRoute.tls.secretName }}
{{- end }}
{{- end }}
{{- end }}
