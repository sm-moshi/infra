proxmox-csi-plugin:
  fullnameOverride: proxmox-csi-plugin

  # Required for pulls from dhi.io in this namespace.
  imagePullSecrets:
    - name: kubernetes-dhi

  options:
    enableCapacity: true

  controller:
    replicas: 2
    revisionHistoryLimit: 1
    podAnnotations:
      trivy-refresh-rev: "20260223-5"
    plugin:
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
    attacher:
      image:
        repository: dhi.io/csi-attacher
        tag: "4.11.0-debian13"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
    provisioner:
      image:
        repository: dhi.io/csi-provisioner
        tag: "6.1.1-debian13"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
    resizer:
      image:
        repository: dhi.io/csi-resizer
        tag: "2.1.0-debian13"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi

  node:
    plugin:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 200m
          memory: 256Mi
    driverRegistrar:
      image:
        repository: dhi.io/csi-node-driver-registrar
        tag: "2.16.0-debian13"
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 100m
          memory: 64Mi
    kubeletDir: /var/lib/kubelet
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/unschedulable
        operator: Exists
        effect: NoSchedule
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule

  livenessprobe:
    image:
      repository: dhi.io/livenessprobe
      tag: "2.17.0-debian13"
    resources:
      requests:
        cpu: 10m
        memory: 16Mi
      limits:
        cpu: 100m
        memory: 64Mi

  # Use existing SealedSecret for config.yaml
  existingConfigSecret: csi-proxmox

  # Disable chart-managed StorageClasses; we define them explicitly below.
  storageClass: []

# Wrapper-owned primitives (used by apps/cluster/proxmox-csi/templates/*)
proxmoxCsi:
  storageIds:
    nvme_fast: k8s-nvme-fast
    nvme_general: k8s-nvme-general
    nvme_object: k8s-nvme-object
    # AI/LLM model storage — ZFS dataset with 1M recordsize, zstd compression,
    # optimized for large sequential reads (mmap'd model files).
    # Requires Proxmox storage ID 'k8s-nvme-ai' backed by a dedicated ZFS dataset.
    nvme_ai: k8s-nvme-ai
    sata_general: k8s-sata-general
    sata_object: k8s-sata-object

  mountOptions:
    - noatime

  parameters:
    ssd: "true"
    storageFormat: "raw"
    cache: "none" # default/fallback for classes not listed below
    cacheByClass:
      nvme_fast: "directsync"
      nvme_general: "none"
      nvme_object: "none"
      nvme_ai: "none"
      sata_general: "none"
      sata_object: "none"
  snapshots:
    enabled: false
    deletionPolicy: Delete

  examples:
    enabled: false

backup:
  enabled: true
  volumeAttributesClass:
    name: proxmox-csi-backup
    parameters:
      backup: "true"
