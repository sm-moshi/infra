apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    # Standard HTTP/HTTPS traffic (UI, API, grpc-web).
    # Forwarded as HTTP/1.1 so cmux routes to the HTTP handler.
    - kind: Rule
      match: Host(`argocd.m0sh1.cc`)
      priority: 10
      services:
        - name: argocd-server
          port: 80
          responseForwarding:
            flushInterval: 1ms
    # Native gRPC traffic (CLI without --grpc-web).
    # Forwarded as h2c so cmux routes to the gRPC handler.
    - kind: Rule
      match: Host(`argocd.m0sh1.cc`) && Header(`Content-Type`, `application/grpc`)
      priority: 11
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
          responseForwarding:
            flushInterval: 1ms
  tls:
    secretName: wildcard-m0sh1-cc
