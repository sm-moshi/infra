apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: argocd-server
  namespace: argocd
spec:
  entryPoints:
    - websecure
  routes:
    # Single h2c route serves both HTTP (UI/API) and native gRPC (CLI).
    # ArgoCD server uses cmux on port 8080 to multiplex both protocols;
    # Traefik just needs to forward everything as HTTP/2 cleartext.
    - kind: Rule
      match: Host(`argocd.m0sh1.cc`)
      services:
        - name: argocd-server
          port: 80
          scheme: h2c
  tls:
    secretName: wildcard-m0sh1-cc
