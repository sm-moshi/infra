argo-cd:
  global:
    image:
      repository: quay.io/argoproj/argocd
      tag: "v3.3.2"
    imagePullSecrets:
      - name: kubernetes-dhi
    priorityClassName: m0sh1-core
    # Explicit pod-level security context for all Argo CD components.
    # This avoids relying on chart defaults and addresses KSV118.
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

  crds:
    annotations:
      argocd.argoproj.io/sync-options: Replace=true
  server:
    # Argo CD listens in plain HTTP; TLS is terminated at Traefik.
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
    replicas: 1
    revisionHistoryLimit: 2
    pdb:
      enabled: true
      minAvailable: 0
    extraArgs:
      - --insecure
    service:
      type: ClusterIP
    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        kubernetes.io/ingress.class: traefik
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
        traefik.ingress.kubernetes.io/router.tls: "true"
        external-dns.alpha.kubernetes.io/ignore: "true"
      hostname: argocd.m0sh1.cc
      path: /
      pathType: Prefix
      tls: false
      extraTls:
        - hosts:
            - argocd.m0sh1.cc
          secretName: wildcard-m0sh1-cc
    # tolerations:
    # - key: workload.m0sh1.cc
    #   operator: Exists
    #   effect: NoSchedule
    # affinity:
    #   podAntiAffinity:
    #     requiredDuringSchedulingIgnoredDuringExecution:
    #     - topologyKey: kubernetes.io/hostname
    #       labelSelector:
    #         matchLabels:
    #           app.kubernetes.io/name: argocd-server
    #   nodeAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #     - weight: 80
    #       preference:
    #         matchExpressions:
    #         - key: topology.kubernetes.io/zone
    #           operator: In
    #           values:
    #           - pve-01
    #           - pve-02
    #     - weight: 60
    #       preference:
    #         matchExpressions:
    #         - key: topology.kubernetes.io/zone
    #           operator: In
    #           values:
    #           - pve-01
    # topologySpreadConstraints:
    # - maxSkew: 1
    #   topologyKey: kubernetes.io/hostname
    #   whenUnsatisfiable: ScheduleAnyway
    #   labelSelector:
    #     matchLabels:
    #       app.kubernetes.io/name: argocd-server
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 1Gi
    extensions:
      enabled: true
      image:
        repository: harbor.m0sh1.cc/quay/argoprojlabs/argocd-extension-installer
        tag: "v0.0.9"
      extensionList:
        - name: extension-trivy
          env:
            - name: EXTENSION_URL
              value: https://github.com/mziyabo/argocd-trivy-extension/releases/download/v0.2.0/extension-trivy.tar
            - name: EXTENSION_CHECKSUM_URL
              value: https://github.com/mziyabo/argocd-trivy-extension/releases/download/v0.2.0/extension-trivy_checksums.txt
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          cpu: 50m
          memory: 64Mi

  configs:
    cm:
      # External URL used by CLI/UI redirects; keep HTTPS to match Traefik ingress.
      url: "https://argocd.m0sh1.cc"
      # Allow CLI SSO login to redirect back to localhost callback.
      additionalUrls: '["http://localhost:8085"]'
      application.instanceLabelKey: argocd.argoproj.io/instance
      # Local service account for Holmes CLI token generation (read-only by policy.default).
      accounts.holmesgpt: apiKey
      # Extend upstream default exclusions with wildcard for all Cilium CRDs.
      # Without this, the ArgoCD UI crashes in ResourceIcon when rendering
      # Cilium resources it has no icon mapping for.
      resource.exclusions: |
        - apiGroups:
          - ''
          - discovery.k8s.io
          kinds:
          - Endpoints
          - EndpointSlice
        - apiGroups:
          - coordination.k8s.io
          kinds:
          - Lease
        - apiGroups:
          - authentication.k8s.io
          - authorization.k8s.io
          kinds:
          - SelfSubjectReview
          - TokenReview
          - LocalSubjectAccessReview
          - SelfSubjectAccessReview
          - SelfSubjectRulesReview
          - SubjectAccessReview
        - apiGroups:
          - certificates.k8s.io
          kinds:
          - CertificateSigningRequest
        - apiGroups:
          - cert-manager.io
          kinds:
          - CertificateRequest
        - apiGroups:
          - cilium.io
          kinds:
          - '*'
        - apiGroups:
          - kyverno.io
          - reports.kyverno.io
          - wgpolicyk8s.io
          kinds:
          - PolicyReport
          - ClusterPolicyReport
          - EphemeralReport
          - ClusterEphemeralReport
          - AdmissionReport
          - ClusterAdmissionReport
          - BackgroundScanReport
          - ClusterBackgroundScanReport
          - UpdateRequest
      dex.config: |
        connectors:
          - type: oidc
            id: authentik
            name: Authentik
            config:
              issuer: https://auth.m0sh1.cc/application/o/argocd/
              clientID: $argocd-dex-authentik:client_id
              clientSecret: $argocd-dex-authentik:client_secret
              scopes:
                - openid
                - profile
                - email
                - groups
              insecureEnableGroups: true
              getUserInfo: true
    rbac:
      policy.default: role:readonly
      policy.matchMode: glob
      scopes: "[sub, groups]"
      policy.csv: |
        p, role:admin, applications, *, */*, allow
        p, role:admin, applicationsets, *, */*, allow
        p, role:admin, projects, *, *, allow
        p, role:admin, clusters, *, *, allow
        p, role:admin, repositories, *, *, allow
        p, role:admin, write-repositories, *, *, allow
        p, role:admin, certificates, *, *, allow
        p, role:admin, accounts, *, *, allow
        p, role:admin, gpgkeys, *, *, allow
        p, role:admin, logs, get, */*, allow
        p, role:admin, exec, create, */*, allow
        p, role:admin, extensions, invoke, */*, allow
        p, role:admin, extensions, action, */*, allow
        g, admin, role:admin
        g, m0sh1, role:admin
        g, ArgoCD Admins, role:admin

    params:
      # Ensure reconciles keep the server in HTTP mode behind ingress to avoid redirect loops.
      server.insecure: "true"
      # Disable submodule recursion — no ArgoCD app needs tools/cli content,
      # and nested submodule history can reference force-pushed (orphaned) commits
      # that break incremental git fetch.
      reposerver.enable.git.submodule: "false"
    # Trivy UI extension responsiveness overrides:
    # upstream extension charts are rendered at fixed widths and can force horizontal
    # scrolling on narrower viewports. Keep this scoped to extension class names.
    styles: |
      .vulnerability-report__wrapper {
        max-width: 100%;
        overflow-x: auto;
        box-sizing: border-box;
      }

      .vulnerability-charts__wrapper {
        display: flex !important;
        flex-wrap: wrap !important;
        gap: 12px;
        max-width: 100%;
        overflow: hidden;
        box-sizing: border-box;
      }

      .vulnerability-charts__wrapper > div {
        flex: 1 1 420px;
        min-width: 0;
        max-width: 100%;
        box-sizing: border-box;
      }

      .vulnerability-report__wrapper .recharts-wrapper {
        max-width: 100% !important;
        width: 100% !important;
      }

      .vulnerability-report__wrapper .recharts-surface {
        max-width: 100% !important;
        width: 100% !important;
        height: auto !important;
      }

  controller:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
    # tolerations:
    #   - key: workload.m0sh1.cc
    #     operator: Exists
    #     effect: NoSchedule
    # affinity:
    #   nodeAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 80
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01
    #                 - pve-02
    #       - weight: 60
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 1
        memory: 2Gi

  repoServer:
    replicas: 1
    revisionHistoryLimit: 2
    pdb:
      enabled: true
      minAvailable: 0
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
    # Upstream chart hard-codes repo-server liveness to `/healthz?full=true` (expensive).
    # We can't change the path via values, so we make it less brittle and less frequent.
    livenessProbe:
      timeoutSeconds: 10
      failureThreshold: 6
      periodSeconds: 30
    readinessProbe:
      timeoutSeconds: 5
      failureThreshold: 6
    # tolerations:
    #   - key: workload.m0sh1.cc
    #     operator: Exists
    #     effect: NoSchedule
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 1
        memory: 2Gi
    # affinity:
    #   podAntiAffinity:
    #     requiredDuringSchedulingIgnoredDuringExecution:
    #       - topologyKey: kubernetes.io/hostname
    #         labelSelector:
    #           matchLabels:
    #             app.kubernetes.io/name: argocd-repo-server
    #   nodeAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 80
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01
    #                 - pve-02
    #       - weight: 60
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01
    # topologySpreadConstraints:
    #   - maxSkew: 1
    #     topologyKey: kubernetes.io/hostname
    #     whenUnsatisfiable: ScheduleAnyway
    #     labelSelector:
    #       matchLabels:
    #         app.kubernetes.io/name: argocd-repo-server

  applicationSet:
    enabled: true
    # tolerations:
    #   - key: workload.m0sh1.cc
    #     operator: Equal
    #     value: batch
    #     effect: NoSchedule
    # affinity:
    #   nodeAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 80
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01
    #                 - pve-02
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  dex:
    enabled: true
    image:
      repository: dhi.io/dex
      tag: "2.45.0"
    containerSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 300Mi

  redis:
    enabled: true
    image:
      repository: dhi.io/valkey
      tag: "9.0.3"
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        memory: 512Mi
    # tolerations:
    #   - key: workload.m0sh1.cc
    #     operator: Exists
    #     effect: NoSchedule
    # affinity:
    #   nodeAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 60
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01

  redisSecretInit:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  redis-ha:
    enabled: false
  # Run the notifications controller here while config/secret stay managed via dedicated app + SealedSecret.
  notifications:
    enabled: true
    argocdUrl: "https://argocd.m0sh1.cc"
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 300m
        memory: 300Mi
    # tolerations:
    #   - key: workload.m0sh1.cc
    #     operator: Exists
    #     effect: NoSchedule
    # affinity:
    #   nodeAffinity:
    #     preferredDuringSchedulingIgnoredDuringExecution:
    #       - weight: 80
    #         preference:
    #           matchExpressions:
    #             - key: topology.kubernetes.io/zone
    #               operator: In
    #               values:
    #                 - pve-01
    #                 - pve-02
    cm:
      create: false
    secret:
      create: false
      name: argocd-notifications-secret
