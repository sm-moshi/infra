global:
  kubeSystemNamespace: kube-system
  kubeApiCidr: null
  kubeApiPort: 6443
policySets:
  - namespace: garage
    enabled: true
    labels: {}
    defaults:
      defaultDeny: true
      allowDnsEgress: true
      allowKubeApiEgress: true
      allowIntraNamespace: true
    ingressRules:
      - name: allow-from-traefik-webui
        podSelector:
          matchLabels:
            app.kubernetes.io/name: garage-webui
        fromNamespaceSelector:
          kubernetes.io/metadata.name: traefik
        ports:
          - protocol: TCP
            port: 3909
      - name: allow-from-apps-s3-admin
        fromNamespaceSelector:
          kubernetes.io/metadata.name: apps
        ports:
          - protocol: TCP
            port: 3900
          - protocol: TCP
            port: 3903
      - name: allow-from-monitoring-admin
        fromNamespaceSelector:
          kubernetes.io/metadata.name: monitoring
        ports:
          - protocol: TCP
            port: 3903
    egressRules:
      - name: allow-to-garage-peer-rpc
        toNamespaceSelector:
          kubernetes.io/metadata.name: garage
        ports:
          - protocol: TCP
            port: 3901
  - namespace: garage-system
