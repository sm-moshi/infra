{{- range $set := .Values.policySets }}
{{- if and $set.enabled $set.ingressRules }}
{{- range $rule := $set.ingressRules }}
{{- if not $rule.name }}
{{- fail (printf "ingress rule in namespace %s is missing required field: name" $set.namespace) }}
{{- end }}
{{- if not $rule.ports }}
{{- fail (printf "ingress rule %s/%s is missing required field: ports" $set.namespace $rule.name) }}
{{- end }}
{{- $hasNs := hasKey $rule "fromNamespaceSelector" }}
{{- $hasPod := hasKey $rule "fromPodSelector" }}
{{- $selectorCount := add (ternary 1 0 $hasNs) (ternary 1 0 $hasPod) }}
{{- if ne $selectorCount 1 }}
{{- fail (printf "ingress rule %s/%s must define exactly one of fromNamespaceSelector or fromPodSelector" $set.namespace $rule.name) }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cluster-network-policies.policyName" (dict "namespace" $set.namespace "suffix" (printf "ing-%s" $rule.name)) }}
  namespace: {{ $set.namespace }}
  labels:
{{ include "cluster-network-policies.commonLabels" $ | indent 4 }}
{{- with $set.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  podSelector:
{{- if $rule.podSelector }}
{{ toYaml $rule.podSelector | indent 4 }}
{{- else }}
    {}
{{- end }}
  policyTypes:
    - Ingress
  ingress:
    - from:
{{- if $hasNs }}
        - namespaceSelector:
            matchLabels:
{{ toYaml $rule.fromNamespaceSelector | indent 14 }}
{{- else if $hasPod }}
        - podSelector:
            matchLabels:
{{ toYaml $rule.fromPodSelector | indent 14 }}
{{- end }}
      ports:
{{- range $idx, $port := $rule.ports }}
{{- if not (hasKey $port "port") }}
{{- fail (printf "ingress rule %s/%s ports[%d] is missing required field: port" $set.namespace $rule.name $idx) }}
{{- end }}
        - protocol: {{ default "TCP" $port.protocol }}
          port: {{ $port.port }}
{{- end }}
---
{{- end }}
{{- end }}
{{- end }}
