{{- range $set := .Values.policySets }}
{{- if and $set.enabled ($set.defaults.allowIntraNamespace | default false) }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cluster-network-policies.policyName" (dict "namespace" $set.namespace "suffix" "allow-intra-namespace") }}
  namespace: {{ $set.namespace }}
  labels:
{{ include "cluster-network-policies.commonLabels" $ | indent 4 }}
{{- with $set.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
  egress:
    - to:
        - podSelector: {}
---
{{- end }}
{{- end }}
