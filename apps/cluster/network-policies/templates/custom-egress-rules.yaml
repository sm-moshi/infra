{{- range $set := .Values.policySets }}
{{- if and $set.enabled $set.egressRules }}
{{- range $rule := $set.egressRules }}
{{- if not $rule.name }}
{{- fail (printf "egress rule in namespace %s is missing required field: name" $set.namespace) }}
{{- end }}
{{- if not $rule.ports }}
{{- fail (printf "egress rule %s/%s is missing required field: ports" $set.namespace $rule.name) }}
{{- end }}
{{- $hasNs := hasKey $rule "toNamespaceSelector" }}
{{- $hasPod := hasKey $rule "toPodSelector" }}
{{- $hasIp := hasKey $rule "toIpBlock" }}
{{- $selectorCount := add (ternary 1 0 $hasNs) (ternary 1 0 $hasPod) (ternary 1 0 $hasIp) }}
{{- if ne $selectorCount 1 }}
{{- fail (printf "egress rule %s/%s must define exactly one of toNamespaceSelector, toPodSelector, or toIpBlock" $set.namespace $rule.name) }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cluster-network-policies.policyName" (dict "namespace" $set.namespace "suffix" (printf "eg-%s" $rule.name)) }}
  namespace: {{ $set.namespace }}
  labels:
{{ include "cluster-network-policies.commonLabels" $ | indent 4 }}
{{- with $set.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  podSelector:
{{- if $rule.podSelector }}
{{ toYaml $rule.podSelector | indent 4 }}
{{- else }}
    {}
{{- end }}
  policyTypes:
    - Egress
  egress:
    - to:
{{- if $hasNs }}
        - namespaceSelector:
            matchLabels:
{{ toYaml $rule.toNamespaceSelector | indent 14 }}
{{- else if $hasPod }}
        - podSelector:
            matchLabels:
{{ toYaml $rule.toPodSelector | indent 14 }}
{{- else if $hasIp }}
        - ipBlock:
{{- if kindIs "string" $rule.toIpBlock }}
            cidr: {{ $rule.toIpBlock | quote }}
{{- else }}
{{ toYaml $rule.toIpBlock | indent 12 }}
{{- end }}
{{- end }}
      ports:
{{- range $idx, $port := $rule.ports }}
{{- if not (hasKey $port "port") }}
{{- fail (printf "egress rule %s/%s ports[%d] is missing required field: port" $set.namespace $rule.name $idx) }}
{{- end }}
        - protocol: {{ default "TCP" $port.protocol }}
          port: {{ $port.port }}
{{- end }}
---
{{- end }}
{{- end }}
{{- end }}
