{{- if and (eq (default "stable" .Values.global.policyMode) "stable") (.Values.global.allowNodeIngressInStable | default true) }}
{{- range $set := .Values.policySets }}
{{- if $set.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "cluster-network-policies.policyName" (dict "namespace" $set.namespace "suffix" "allow-node-subnet-stable") }}
  namespace: {{ $set.namespace }}
  labels:
{{ include "cluster-network-policies.commonLabels" $ | indent 4 }}
{{- with $set.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: {{ $.Values.global.nodeSubnetCidr | quote }}
---
{{- end }}
{{- end }}
{{- end }}
