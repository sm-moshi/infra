reflector:
  replicaCount: 1
  revisionHistoryLimit: 1
  image:
    repository: ghcr.io/emberstack/kubernetes-reflector
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    kubernetes.io/hostname: lab-ctrl
  configuration:
    logging:
      minimumLevel: Information
  resources:
    requests:
      cpu: 10m
      memory: 192Mi
    limits:
      cpu: 300m
      memory: 384Mi

pdb:
  enabled: true
  minAvailable: 1
