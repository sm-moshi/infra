coredns:
  # Match k3s label convention so Service selector aligns with existing kube-dns
  k8sAppLabelOverride: "kube-dns"

  image:
    repository: dhi.io/coredns
    tag: "1.14.1"
    pullSecrets:
      - name: kubernetes-dhi

  replicaCount: 2
  revisionHistoryLimit: 2

  rollingUpdate:
    maxUnavailable: 1
    maxSurge: 0

  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: kubernetes.io/hostname
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: 'coredns'

  podDisruptionBudget:
    minAvailable: 1

  serviceType: ClusterIP

  serviceAccount:
    create: true
    name: coredns

  resources:
    requests:
      cpu: 100m
      memory: 100Mi
    limits:
      cpu: 300m
      memory: 256Mi

  # Full Corefile — replaces cluster/environments/lab/coredns-configmap.yaml
  servers:
    - zones:
        - zone: .
          use_tcp: true
      port: 53
      plugins:
        - name: errors
        - name: health
          configBlock: |-
            lameduck 10s
        - name: ready
        - name: hosts
          configBlock: |-
            10.0.10.11 pve01.m0sh1.cc pve01
            10.0.10.12 pve02.m0sh1.cc pve02
            10.0.10.13 pve03.m0sh1.cc pve03
            10.0.10.11 pve01-vlan10.m0sh1.cc
            10.0.10.12 pve02-vlan10.m0sh1.cc
            10.0.10.13 pve03-vlan10.m0sh1.cc
            fallthrough
        - name: kubernetes
          parameters: cluster.local in-addr.arpa ip6.arpa
          configBlock: |-
            pods insecure
            fallthrough in-addr.arpa ip6.arpa
            ttl 30
        - name: prometheus
          parameters: :9153
        - name: forward
          parameters: . 10.0.30.1 1.1.1.1 8.8.8.8
          configBlock: |-
            policy sequential
        - name: cache
          parameters: "30"
        - name: loop
        - name: reload
        - name: loadbalance

  service:
    name: kube-dns
    clusterIP: 10.43.0.10
    clusterIPs:
      - 10.43.0.10
      - "fd00:43::a"
    ipFamilyPolicy: PreferDualStack
