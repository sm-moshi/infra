# apps/cluster/valkey/values.yaml
#
# Shared Valkey service for app workloads. Access is controlled via ACL users.
valkey:
  global:
    imagePullSecrets:
    - kubernetes-dhi

  image:
    registry: dhi.io
    repository: valkey
    tag: 9.0.2
    pullPolicy: IfNotPresent

  auth:
    enabled: false

  replica:
    enabled: false
    replicas: 1
    replicationUser: replication
    minReplicasToWrite: 0
    minReplicasMaxLag: 10
    persistence:
      size: 10Gi
      storageClass: proxmox-csi-zfs-nvme-fast-retain
      accessModes:
      - ReadWriteOnce

  dataStorage:
    enabled: true
    requestedSize: 10Gi
    className: proxmox-csi-zfs-nvme-fast-retain

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi

  pdb:
    enabled: true
    minAvailable: 1

  service:
    type: ClusterIP
    port: 6379

  nodeSelector:
    node-role.kubernetes.io/worker: "true"

  podSecurityContext:
    fsGroup: 1000
    runAsUser: 1000
    runAsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  securityContext:
    capabilities:
      drop:
      - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false

  tolerations: []

  # Use Recreate strategy to avoid multi-attach errors with ReadWriteOnce PVC
  deploymentStrategy: Recreate
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: valkey
  topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: valkey
