crowdsecBouncer:
  enabled: true
  lapiHost: "crowdsec-service.crowdsec.svc.cluster.local:8080"
  lapiScheme: http
  lapiKeyFile: "/crowdsec/api-key"
  mode: stream
  updateIntervalSeconds: 60
  # AppSec WAF — inspects HTTP request bodies/headers in real time
  appsecEnabled: true
  appsecHost: "crowdsec-appsec-service.crowdsec.svc.cluster.local:7422"
  appsecFailureBlock: true
  appsecUnreachableBlock: true
  # clientTrustedIPs: IPs that bypass ALL bouncer checks (IP bans + AppSec).
  # Previously contained all local subnets, which caused every request to
  # skip security (Cilium LB SNATs to node IPs in 10.0.20.0/24).
  # Empty list = all requests are checked. Source IP preservation (Cilium
  # DSR or externalTrafficPolicy: Local) is needed for accurate IP banning.
  trustedIPs: []

traefik:
  # Traefik Helm Chart Values Configuration
  priorityClassName: m0sh1-core

  deployment:
    replicas: 2
    revisionHistoryLimit: 2
    imagePullSecrets:
      - name: kubernetes-dhi
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 0

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  resources:
    requests:
      cpu: 150m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

  # Prefer workers but allow light scheduling on labctrl.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 80
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/worker
                operator: Exists
        - weight: 40
          preference:
            matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            topologyKey: topology.kubernetes.io/zone
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: traefik

  # Topology spread for zone distribution
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: traefik

  ports:
    web:
      port: 80
      expose:
        default: true
        lan: true
      exposedPort: 80

    websecure:
      port: 443
      expose:
        default: true
        lan: true
      exposedPort: 443
      # Trust X-Forwarded-For from these source IPs (after OPNsense NAT / Cilium SNAT).
      # Cloudflare sets XFF with real client IP; Traefik will use it as ClientHost.
      # NOTE: This does NOT bypass any security checks — it only controls header trust.
      forwardedHeaders:
        trustedIPs:
          - "10.0.30.1"       # OPNsense VLAN 30 gateway (external traffic after NAT)
          - "10.0.20.0/24"    # K8s node IPs (Cilium LB backend SNAT)
          - "10.42.0.0/16"    # Pod CIDR (cluster-internal with proxy headers)
          - "fd00:1:30::1"    # OPNsense IPv6 gateway
          - "fd00:42::/48"    # IPv6 pod CIDR

    metrics:
      port: 9100
      expose:
        default: false
      exposedPort: 9100

  ingressClass:
    enabled: true
    isDefaultClass: true

  providers:
    kubernetesCRD:
      enabled: true
      allowExternalNameServices: true
    kubernetesIngress:
      enabled: true
      allowExternalNameServices: true
      publishedService:
        pathOverride: traefik/traefik-lan

  logs:
    general:
      level: INFO
    access:
      enabled: true
      format: json

  metrics:
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        additionalLabels:
          release: kube-prometheus-stack

  service:
    enabled: true
    type: ClusterIP
    ipFamilyPolicy: PreferDualStack
    additionalServices:
      lan:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "10.0.30.10,fd00:1:30::10"

  # CrowdSec bouncer API key (SealedSecret: crowdsec-bouncer-key in traefik ns)
  volumes:
    - name: crowdsec-bouncer-key
      mountPath: "/crowdsec"
      type: secret

  experimental:
    plugins:
      crowdsec-bouncer-traefi-plugin:
        moduleName: "github.com/maxlerebourg/crowdsec-bouncer-traefik-plugin"
        version: "v1.5.1"

  additionalArguments:
    - --entrypoints.web.address=:80
    - --entrypoints.web.http.redirections.entrypoint.to=websecure
    - --entrypoints.web.http.redirections.entrypoint.scheme=https
    - --entrypoints.web.http.redirections.entrypoint.permanent=true
    - --entrypoints.websecure.address=:443
    # Global security response headers (OWASP baseline)
    - --entrypoints.websecure.http.middlewares=traefik-crowdsec-bouncer@kubernetescrd,traefik-security-headers@kubernetescrd
    # Harbor UI uses encoded slashes (%2F) and percents (%25) in repo paths.
    - --entrypoints.websecure.http.encodedCharacters.allowEncodedSlash=true
    - --entrypoints.websecure.http.encodedCharacters.allowEncodedPercent=true
    # Allow large image pushes (e.g., Harbor) without 60s disconnects.
    - --entrypoints.websecure.transport.respondingTimeouts.readTimeout=15m
    - --entrypoints.websecure.transport.respondingTimeouts.writeTimeout=15m
    - --entrypoints.websecure.transport.respondingTimeouts.idleTimeout=15m
  tlsStore:
    default:
      defaultCertificate:
        secretName: wildcard-m0sh1-cc
