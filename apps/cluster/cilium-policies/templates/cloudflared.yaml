{{- if .Values.namespaces.cloudflared.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: cloudflared
  namespace: cloudflared
spec:
  enableDefaultDeny:
    ingress: {{ .Values.namespaces.cloudflared.enforce }}
    egress: {{ .Values.namespaces.cloudflared.enforce }}
  endpointSelector: {}
  ingress:
{{- include "cilium-policies.probe-ingress" . | nindent 4 }}
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
{{- include "cilium-policies.kube-api-egress" . | nindent 4 }}
    # Cloudflare edge (QUIC tunnel + HTTPS control plane)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "7844"
              protocol: UDP
    # Origin requests to Traefik (all ingress routes via traefik-lan:443)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{- end }}
