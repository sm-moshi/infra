{{- if .Values.namespaces.kured.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kured
  namespace: kured
spec:
  enableDefaultDeny:
    ingress: {{ .Values.namespaces.kured.enforce }}
    egress: {{ .Values.namespaces.kured.enforce }}
  endpointSelector: {}
  ingress:
{{- include "cilium-policies.probe-ingress" . | nindent 4 }}
    # Prometheus scrapes kured metrics over the pod's metrics port.
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
{{- include "cilium-policies.kube-api-egress" . | nindent 4 }}
{{- end }}
