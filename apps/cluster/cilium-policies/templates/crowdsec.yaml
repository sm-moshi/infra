{{- if .Values.namespaces.crowdsec.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crowdsec
  namespace: crowdsec
spec:
  enableDefaultDeny:
    ingress: {{ .Values.namespaces.crowdsec.enforce }}
    egress: {{ .Values.namespaces.crowdsec.enforce }}
  endpointSelector: {}
  ingress:
{{- include "cilium-policies.probe-ingress" . | nindent 4 }}
    # Intra-namespace: agent/appsec → LAPI registration and heartbeat
    - fromEndpoints:
        - {}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Traefik bouncer → LAPI (decision stream)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Traefik bouncer → AppSec (WAF requests)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "7422"
              protocol: TCP
    # Monitoring → CrowdSec metrics
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
{{- include "cilium-policies.kube-api-egress" . | nindent 4 }}
    # Intra-namespace: agent/appsec → LAPI
    - toEndpoints:
        - {}
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # CrowdSec services: CAPI, hub downloads, version checks, console
    - toFQDNs:
        - matchPattern: "*.crowdsec.net"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # GitHub raw content — hub collection downloads
    - toFQDNs:
        - matchPattern: "raw.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{- end }}
