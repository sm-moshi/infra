{{- if .Values.namespaces.monitoring.enabled }}
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: monitoring
  namespace: monitoring
spec:
  enableDefaultDeny:
    ingress: {{ .Values.namespaces.monitoring.enforce }}
    egress: {{ .Values.namespaces.monitoring.enforce }}
  endpointSelector: {}
  ingress:
{{- include "cilium-policies.probe-ingress" . | nindent 4 }}
    # Intra-namespace (Prometheusâ†’Grafanaâ†’Lokiâ†’Alertmanager, etc.)
    - fromEndpoints:
        - {}
    # Traefik â†’ Grafana, Loki, Grafana MCP, Prometheus
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
            - port: "3100"
              protocol: TCP
            - port: "8000"
              protocol: TCP
            - port: "8080"
              protocol: TCP
  egress:
{{- include "cilium-policies.dns-egress" . | nindent 4 }}
{{- include "cilium-policies.kube-api-egress" . | nindent 4 }}
{{- include "cilium-policies.world-https-egress" . | nindent 4 }}
    # Intra-namespace (Prometheusâ†’Grafanaâ†’Lokiâ†’Alertmanager)
    - toEndpoints:
        - {}
    # Cross-namespace scrape targets: apps
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: apps
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
            - port: "9187"
              protocol: TCP
            - port: "3903"
              protocol: TCP
    # Cross-namespace scrape targets: garage
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: garage
      toPorts:
        - ports:
            - port: "3900"
              protocol: TCP
            - port: "3903"
              protocol: TCP
    # Cross-namespace scrape targets: garage-system (operator)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: garage-system
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
    # Cross-namespace scrape targets: argocd (all components)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: argocd
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
            - port: "8082"
              protocol: TCP
            - port: "8083"
              protocol: TCP
            - port: "8084"
              protocol: TCP
            - port: "8443"
              protocol: TCP
            - port: "9001"
              protocol: TCP
    # Cross-namespace scrape targets: traefik
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: traefik
      toPorts:
        - ports:
            - port: "9100"
              protocol: TCP
    # Cross-namespace scrape targets: cert-manager
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cert-manager
      toPorts:
        - ports:
            - port: "9402"
              protocol: TCP
    # Cross-namespace scrape targets: sealed-secrets
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: sealed-secrets
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
    # Cross-namespace scrape targets: kube-system (CoreDNS â€” regular pods)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "9153"
              protocol: TCP
    # hostNetwork targets: Cilium, Hubble, kubelet, node-exporter
    # These pods/services bind to host IPs (10.0.20.x) and get reserved:host
    # identity â€” toEndpoints with namespace labels won't match them.
    - toEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9100"
              protocol: TCP
            - port: "9962"
              protocol: TCP
            - port: "9963"
              protocol: TCP
            - port: "9965"
              protocol: TCP
            - port: "10250"
              protocol: TCP
    # Cross-namespace scrape targets: crowdsec (LAPI, agent, appsec metrics)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: crowdsec
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
    # External scrape targets: OPNsense node-exporter + CrowdSec
    - toCIDR:
        - 10.0.10.1/32
      toPorts:
        - ports:
            - port: "6060"
              protocol: TCP
            - port: "9100"
              protocol: TCP
    # Cross-namespace scrape targets: kured
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kured
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Cross-namespace scrape targets: renovate-operator
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: renovate-operator
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Cross-namespace scrape targets: cnpg-system (operator PodMonitor)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: cnpg-system
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
{{- end }}
