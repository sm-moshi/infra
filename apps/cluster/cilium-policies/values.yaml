# CiliumNetworkPolicy configuration for cluster namespaces.
# enforce: false → policies are loaded but don't trigger implicit deny.
# enforce: true  → enables default deny for that namespace.

namespaces:
  # --- Tier 1: Simple single-workload namespaces (enforced) ---
  reflector:
    enabled: true
    enforce: true
  kured:
    enabled: true
    enforce: true
  origin-ca-issuer:
    enabled: true
    enforce: true
  sealed-secrets:
    enabled: true
    enforce: true
  external-dns:
    enabled: true
    enforce: true

  # --- Tier 2: Moderate complexity, isolated (enforced) ---
  crowdsec:
    enabled: true
    enforce: true
  cloudflared:
    enabled: true
    enforce: true
  cert-manager:
    enabled: true
    enforce: true
  renovate-operator:
    enabled: true
    enforce: true
  cnpg-system:
    enabled: true
    enforce: true
  csi-proxmox:
    enabled: true
    enforce: true
  garage-system:
    enabled: true
    enforce: true
  metallb-system:
    enabled: true
    enforce: true
  woodpecker:
    enabled: true
    enforce: true

  # --- Tier 3: Critical infra (enforced) ---
  garage:
    enabled: true
    enforce: true
  monitoring:
    enabled: true
    enforce: true
  traefik:
    enabled: true
    enforce: true
  argocd:
    enabled: true
    enforce: true
