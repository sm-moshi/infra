apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cnpg-cluster-metrics
  namespace: cnpg-system
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - apps
  selector:
    matchLabels:
      cnpg.io/cluster: cnpg-main
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 30s
