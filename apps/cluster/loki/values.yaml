# Wrapper values for grafana/loki
#
# Goals:
# - SingleBinary deployment mode (homelab-scale)
# - Object storage in Garage S3
# - DHI Loki image (dhi.io/loki:3.6.5)
# - GitOps-friendly: credentials injected via Secret + config env expansion
#
# Secret requirements:
# - Secret name: monitoring-loki-s3
# - Keys:
#   - LOKI_S3_ENDPOINT (example: garage.garage.svc.cluster.local:3900)
#   - LOKI_S3_REGION (example: garage)
#   - LOKI_S3_ACCESS_KEY_ID
#   - LOKI_S3_SECRET_ACCESS_KEY

# All settings are for the upstream `grafana/loki` dependency chart (also named `loki`).
loki:
  # Ensure stable resource names for Grafana datasource URLs etc.
  fullnameOverride: loki

  deploymentMode: SingleBinary

  # Homelab-scale: disable chunks cache (default requests ~10Gi memory, which
  # cannot be scheduled in this cluster).
  chunksCache:
    enabled: false

  # Fix gateway CrashLoopBackOff: nginx expects a resolver address; using the
  # kube-dns Service IP avoids startup DNS resolution issues.
  gateway:
    nginxConfig:
      # CoreDNS is configured to return NXDOMAIN for AAAA; nginx can treat that
      # as resolution failure. Force A-only resolution.
      enableIPv6: false
      resolver: "10.43.0.10 valid=10s ipv6=off"

  imagePullSecrets:
    - name: kubernetes-dhi

  loki:
    # This is a single-tenant homelab deployment; disable multi-tenancy to avoid
    # requiring X-Scope-OrgID headers on every client (Grafana datasource, Alloy, etc).
    auth_enabled: false

    image:
      registry: dhi.io
      repository: loki
      tag: "3.6.7"

    commonConfig:
      replication_factor: 1

    storage:
      bucketNames:
        chunks: loki-chunks
        ruler: loki-ruler
        admin: loki-admin
      type: s3
      s3:
        endpoint: ${LOKI_S3_ENDPOINT}
        region: ${LOKI_S3_REGION}
        accessKeyId: ${LOKI_S3_ACCESS_KEY_ID}
        secretAccessKey: ${LOKI_S3_SECRET_ACCESS_KEY}
        s3ForcePathStyle: true
        insecure: true

    # Real install schema (avoid useTestSchema)
    schemaConfig:
      configs:
        # NOTE: date must be <= "now" when Loki starts.
        - from: 2026-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

  singleBinary:
    # Required for ${ENV_VAR} expansion in the rendered Loki config.
    extraArgs:
      - -config.expand-env=true
    extraEnvFrom:
      - secretRef:
          name: monitoring-loki-s3

    replicas: 1

    resources:
      requests:
        cpu: 125m
        memory: 600Mi

    nodeSelector:
      node-role.kubernetes.io/worker: "true"

    # Prefer the nodes recommended in docs/cluster-placement.md for Loki single-binary.
    affinity:
      nodeAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 60
            preference:
              matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - horse02
                    - horse03

    persistence:
      enabled: true
      size: 10Gi
      storageClass: proxmox-csi-zfs-nvme-fast-retain

  monitoring:
    serviceMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack

  # Sidecar for ruler rules (DHI hardened image)
  sidecar:
    image:
      registry: dhi.io
      repository: k8s-sidecar
      tag: "2.5.1-debian13"
      # Pin to digest for deterministic pull provenance.
      sha: "0df9e24ad6010427ac81fd51f25bee0c420404fc9f7d6ce97997c7ec53ec1469"

  # Avoid deploying the SSD targets in SingleBinary mode.
  write:
    replicas: 0
  read:
    replicas: 0
  backend:
    replicas: 0

  # Results cache image hardening:
  # Use Docker Hardened Images memcached for improved supply-chain posture.
  memcached:
    image:
      repository: dhi.io/memcached
      tag: 1.6.40-debian13
      # Alternative if Debian variant shows runtime incompatibility:
      # tag: 1.6.38-alpine3.23

  # Trigger a bounded no-op rollout of results-cache so Trivy receives a fresh
  # StatefulSet revision event and regenerates vulnerability evidence.
  resultsCache:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    podAnnotations:
      trivy-refresh-rev: "20260223-5"
