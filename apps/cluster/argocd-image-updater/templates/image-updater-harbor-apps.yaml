apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: harbor-apps
  namespace: argocd
spec:
  namespace: argocd

  # Reuse ArgoCD's existing GitHub repo credentials for git write-back
  writeBackConfig:
    method: "git:repocreds"
    gitConfig:
      branch: "main"
      writeBackTarget: "helmvalues"

  # Update strategy: newest-build selects the most recently pushed image
  commonUpdateSettings:
    updateStrategy: "newest-build"
    ignoreTags: ["latest"]
    pullSecret: "pullsecret:argocd/argocd-image-updater-harbor"

  applicationRefs:
    # basic-memory — keep all livesync-bridge consumers pinned to the same tag
    - namePattern: "basic-memory"
      images:
        - alias: "livesync-shim"
          imageName: "harbor.m0sh1.cc/apps/livesync-bridge"
          manifestTargets:
            helm:
              name: "mcpShim.image.repository"
              tag: "mcpShim.image.tag"
        - alias: "livesync-runtime"
          imageName: "harbor.m0sh1.cc/apps/livesync-bridge"
          manifestTargets:
            helm:
              name: "livesync.image.repository"
              tag: "livesync.image.tag"
        - alias: "livesync-config-init"
          imageName: "harbor.m0sh1.cc/apps/livesync-bridge"
          manifestTargets:
            helm:
              name: "livesync.configInitImage.repository"
              tag: "livesync.configInitImage.tag"

    # uptime-kuma — custom image with playwright
    - namePattern: "uptime-kuma"
      images:
        - alias: "kuma"
          imageName: "harbor.m0sh1.cc/apps/uptime-kuma"
          manifestTargets:
            helm:
              name: "uptime-kuma.image.repository"
              tag: "uptime-kuma.image.tag"

    # cloudflared — CVE-patched image (DHI debian-base + Go binary)
    - namePattern: "cloudflared"
      images:
        - alias: "cloudflared"
          imageName: "harbor.m0sh1.cc/apps/cloudflared"
          manifestTargets:
            helm:
              name: "cloudflared.image.repository"
              tag: "cloudflared.image.tag"

    # vaultwarden — CVE-patched image
    - namePattern: "vaultwarden"
      images:
        - alias: "vaultwarden"
          imageName: "harbor.m0sh1.cc/apps/vaultwarden"
          manifestTargets:
            helm:
              name: "vaultwarden.image.repository"
              tag: "vaultwarden.image.tag"

    # netbox — custom image with plugins
    - namePattern: "netbox"
      images:
        - alias: "netbox"
          imageName: "harbor.m0sh1.cc/apps/netbox"
          manifestTargets:
            helm:
              name: "netbox.image.repository"
              tag: "netbox.image.tag"

    # pgadmin4 — CVE-patched image (Alpine + pip upgrade)
    - namePattern: "pgadmin4"
      images:
        - alias: "pgadmin4"
          imageName: "harbor.m0sh1.cc/apps/pgadmin4"
          manifestTargets:
            helm:
              name: "pgadmin4.image.repository"
              tag: "pgadmin4.image.tag"

    # forgejo — CVE-patched image (Alpine + apk upgrade)
    # Wrapper chart overrides gitea.image to drop the -rootless tag suffix,
    # so standard repository + tag paths work without fullOverride.
    - namePattern: "forgejo"
      images:
        - alias: "forgejo"
          imageName: "harbor.m0sh1.cc/apps/forgejo"
          manifestTargets:
            helm:
              name: "forgejo.image.repository"
              tag: "forgejo.image.tag"

    # headlamp — plugins initContainer image (baked plugins bundle)
    # initContainer uses :latest with Always pull policy. Image Updater
    # writes the detected tag to the pod annotation, triggering a restart
    # which pulls the fresh :latest image.
    - namePattern: "headlamp"
      images:
        - alias: "headlamp-plugins"
          imageName: "harbor.m0sh1.cc/apps/headlamp-plugins"
          manifestTargets:
            helm:
              tag: "headlamp.podAnnotations.plugins-image-version"
