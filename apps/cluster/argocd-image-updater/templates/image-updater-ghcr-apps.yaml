apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: ghcr-apps
  namespace: argocd
spec:
  namespace: argocd

  writeBackConfig:
    method: "git:repocreds"
    gitConfig:
      branch: "main"
      writeBackTarget: "helmvalues"

  commonUpdateSettings:
    updateStrategy: "newest-build"
    ignoreTags: ["latest"]
    pullSecret: "pullsecret:argocd/argocd-image-updater-ghcr"

  applicationRefs:
    - namePattern: "netzbremse"
      images:
        - alias: "netzbremse-measurement"
          imageName: "ghcr.io/sm-moshi/netzbremse-measurement"
          manifestTargets:
            helm:
              name: "measurement.postgresImage.repository"
              tag: "measurement.postgresImage.tag"
        - alias: "netzbremse-dashboard"
          imageName: "ghcr.io/sm-moshi/netzbremse-dashboard"
          manifestTargets:
            helm:
              name: "dashboard.postgresImage.repository"
              tag: "dashboard.postgresImage.tag"
