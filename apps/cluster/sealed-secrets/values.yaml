# apps/cluster/sealed-secrets/values.yaml
# DHI (upstream) schema — migrated from Bitnami 2.18.1
# Key schema changes:
#   keyRenewPeriod  → keyrenewperiod (lowercase)
#   commandArgs     → args
#   podDisruptionBudget → pdb (with create: true)
#   replicaCount    → removed (upstream is single-replica)
#   topologySpreadConstraints → removed (not in upstream chart)
#   alias removed from Chart.yaml — parent name == alias breaks Helm value routing
sealed-secrets-chart:
  fullnameOverride: sealed-secrets-controller
  revisionHistoryLimit: 2
  keyrenewperiod: "0"

  image:
    pullSecrets:
    - kubernetes-dhi

  priorityClassName: m0sh1-core

  pdb:
    create: true
    minAvailable: 1

  # Prefer workers but allow light scheduling on labctrl.
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 80
        preference:
          matchExpressions:
          - key: node-role.kubernetes.io/worker
            operator: Exists
      - weight: 40
        preference:
          matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: DoesNotExist
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          topologyKey: topology.kubernetes.io/zone
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sealed-secrets

  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
