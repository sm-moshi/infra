apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: {{ index .Values "csi-s3" "storageClass" "name" }}
provisioner: ch.ctrox.csi.s3-driver
parameters:
  mounter: geesefs
  options: {{ index .Values "csi-s3" "storageClass" "mountOptions" | quote }}
  bucket: {{ index .Values "csi-s3" "storageClass" "singleBucket" }}
  csi.storage.k8s.io/provisioner-secret-name: {{ index .Values "csi-s3" "secret" "name" }}
  csi.storage.k8s.io/provisioner-secret-namespace: {{ .Release.Namespace }}
  csi.storage.k8s.io/controller-publish-secret-name: {{ index .Values "csi-s3" "secret" "name" }}
  csi.storage.k8s.io/controller-publish-secret-namespace: {{ .Release.Namespace }}
  csi.storage.k8s.io/node-stage-secret-name: {{ index .Values "csi-s3" "secret" "name" }}
  csi.storage.k8s.io/node-stage-secret-namespace: {{ .Release.Namespace }}
  csi.storage.k8s.io/node-publish-secret-name: {{ index .Values "csi-s3" "secret" "name" }}
  csi.storage.k8s.io/node-publish-secret-namespace: {{ .Release.Namespace }}
reclaimPolicy: Delete
volumeBindingMode: Immediate
