replicaCount: 2
revisionHistoryLimit: 2

external-dns:
  global:
    imagePullSecrets:
      - name: kubernetes-dhi

  provider: cloudflare
  env:
    - name: CF_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: external-dns-cloudflare
          key: cloudflare_api_token
  domainFilters:
    - m0sh1.cc
  zoneIdFilters:
    - e8973bc460a6a285af6804c388f06b49
  extraArgs:
    - --cloudflare-dns-records-per-page=5000
    # Prevent CNAME/A conflicts when targets expose both hostname and VIP (e.g. Tailscale LB).
    # This forces External-DNS to only manage A records (and TXT registry records).
    - --managed-record-types=A
    # Skip ingresses annotated with external-dns.alpha.kubernetes.io/ignore: "true"
    # (e.g. status pages served via Cloudflare Tunnel instead of direct A records).
    - --annotation-filter=external-dns.alpha.kubernetes.io/ignore notin (true)
  sources:
    - ingress
    - traefik-proxy
  policy: upsert-only
  registry: txt
  txtOwnerId: m0sh1-cc-lab
  logLevel: info
  logFormat: text
  rbac:
    create: true
  serviceAccount:
    create: true
    name: external-dns
  service:
    ipFamilyPolicy: PreferDualStack
  metrics:
    enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 356Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
  nodeSelector:
    kubernetes.io/hostname: lab-ctrl
