{{- range .Values.keys }}
---
apiVersion: garage.rajsingh.info/v1alpha1
kind: GarageKey
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
spec:
  clusterRef:
    name: {{ $.Values.cluster.name }}
  {{- if .secretTemplate }}
  secretTemplate:
    {{- toYaml .secretTemplate | nindent 4 }}
  {{- end }}
  {{- if .allBuckets }}
  allBuckets:
    {{- toYaml .allBuckets | nindent 4 }}
  {{- end }}
  {{- if .buckets }}
  bucketPermissions:
    {{- range .buckets }}
    - bucketRef: {{ .name }}
      read: {{ .read }}
      write: {{ .write }}
      {{- if .owner }}
      owner: {{ .owner }}
      {{- end }}
    {{- end }}
  {{- end }}
{{- end }}
