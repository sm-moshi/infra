{{- if .Values.s3Ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: garage-s3-api
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: garage
    app.kubernetes.io/component: s3-api

spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - {{ .Values.s3Ingress.host }}
      secretName: {{ .Values.s3Ingress.tls.secretName }}
  rules:
    - host: {{ .Values.s3Ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: garage
                port:
                  number: 3900
{{- end }}
