# Garage cluster configuration
cluster:
  name: garage
  image: dxflrs/garage:v2.2.0
  layoutPolicy: Manual

  replication:
    factor: 2
    consistencyMode: consistent

  # Default storage (used by GarageCluster base; nodes override individually)
  storage:
    data:
      size: 100Gi
      storageClassName: proxmox-csi-zfs-sata-object-retain
    metadata:
      size: 15Gi
      storageClassName: proxmox-csi-zfs-sata-general-retain

  s3Api:
    region: garage

  admin:
    enabled: true

  database:
    engine: lmdb

# GarageNode CRDs — one per physical storage target
# Each node gets its own StatefulSet with independent storage and node affinity.
nodes:
  - name: garage-nvme
    zone: pve-01
    capacity: 100Gi
    nodeSelector:
      kubernetes.io/hostname: horse01
    storage:
      data:
        size: 100Gi
        storageClassName: proxmox-csi-zfs-nvme-object-retain
      metadata:
        size: 15Gi
        storageClassName: proxmox-csi-zfs-nvme-general-retain

  - name: garage-sata-01
    zone: pve-01
    capacity: 75Gi
    nodeSelector:
      kubernetes.io/hostname: horse01
    storage:
      data:
        size: 75Gi
        storageClassName: proxmox-csi-zfs-sata-object-retain
      metadata:
        size: 15Gi
        storageClassName: proxmox-csi-zfs-sata-general-retain

  - name: garage-sata-02
    zone: pve-02
    capacity: 75Gi
    nodeSelector:
      kubernetes.io/hostname: horse02
    storage:
      data:
        size: 75Gi
        storageClassName: proxmox-csi-zfs-sata-object-retain
      metadata:
        size: 15Gi
        storageClassName: proxmox-csi-zfs-sata-general-retain

  - name: garage-sata-03
    zone: pve-03
    capacity: 75Gi
    nodeSelector:
      kubernetes.io/hostname: horse03
    storage:
      data:
        size: 75Gi
        storageClassName: proxmox-csi-zfs-sata-object-retain
      metadata:
        size: 15Gi
        storageClassName: proxmox-csi-zfs-sata-general-retain

# Buckets — one per S3 consumer
buckets:
  - name: cnpg-backups
  - name: harbor-registry
  - name: loki-chunks
  - name: loki-ruler
  - name: loki-admin
  - name: authentik-media
  - name: kopia-backups
  - name: netbox-media
  - name: pbs-backups
  - name: openwebui-data
  - name: buildkit-cache

# Access keys — one per consumer application
keys:
  - name: cnpg-key
    buckets:
      - name: cnpg-backups
        read: true
        write: true
        owner: true
  - name: loki-key
    buckets:
      - name: loki-chunks
        read: true
        write: true
        owner: true
      - name: loki-ruler
        read: true
        write: true
        owner: true
      - name: loki-admin
        read: true
        write: true
        owner: true
  - name: harbor-key
    buckets:
      - name: harbor-registry
        read: true
        write: true
        owner: true
  - name: authentik-key
    buckets:
      - name: authentik-media
        read: true
        write: true
        owner: true
  - name: kopia-key
    secretTemplate:
      name: kopia-garage-s3
      namespace: apps
      includeEndpoint: true
      includeRegion: true
      accessKeyIdKey: access-key-id
      secretAccessKeyKey: secret-access-key
      endpointKey: endpoint
      regionKey: region
      additionalData:
        bucket: kopia-backups
    buckets:
      - name: kopia-backups
        read: true
        write: true
        owner: true
  - name: netbox-key
    buckets:
      - name: netbox-media
        read: true
        write: true
        owner: true
  - name: admin-key
    allBuckets:
      read: true
      write: true
      owner: true
  - name: pbs-key
    buckets:
      - name: pbs-backups
        read: true
        write: true
        owner: true
  - name: openwebui-key
    buckets:
      - name: openwebui-data
        read: true
        write: true
        owner: true
  - name: buildkit-cache-key
    secretTemplate:
      name: buildkit-cache-s3
      namespace: woodpecker
      accessKeyIdKey: AWS_ACCESS_KEY_ID
      secretAccessKeyKey: AWS_SECRET_ACCESS_KEY
      includeEndpoint: true
      includeRegion: true
      endpointKey: S3_ENDPOINT
      regionKey: S3_REGION
    buckets:
      - name: buildkit-cache
        read: true
        write: true
        owner: true
# Admin token for operator + garage-webui
adminToken:
  name: garage-admin-token

# S3 API ingress for external access (e.g., PBS)
s3Ingress:
  enabled: true
  host: s3.m0sh1.cc
  tls:
    secretName: wildcard-m0sh1-cc
