# Wrapper values for grafana/alloy
#
# Goals:
# - Run as a DaemonSet to collect node-local pod logs
# - Ship logs to Loki via the in-cluster gateway
# - Expose Alloy metrics for Prometheus (ServiceMonitor)
alloy:
  fullnameOverride: alloy

  # Disable upstream service — replaced by wrapper template with ipFamilyPolicy.
  service:
    enabled: false

  # Alloy chart includes optional CRDs for monitoring.grafana.com; we don't
  # need them for file-based pod log collection.
  crds:
    create: false

  controller:
    type: daemonset
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

  serviceMonitor:
    enabled: true
    additionalLabels:
      release: kube-prometheus-stack

  global:
    image:
      pullSecrets:
        - name: kubernetes-dhi

  alloy:
    # Pod log files are owned root:root with mode 640 (-rw-r-----).
    # supplementalGroups grants GID 0 so Alloy (UID 473) can read them.
    securityContext:
      supplementalGroups: [0]

    mounts:
      # Required for `/var/log/pods/...` file tailing.
      varlog: true

    configMap:
      content: |-
        logging {
          level = "info"
        }

        // ── Kubernetes pod log collection ──────────────────────────
        // Discover pods via the K8s API, enrich with metadata labels,
        // then tail their CRI log files from /var/log/pods/.
        discovery.kubernetes "pods" {
          role = "pod"
        }

        discovery.relabel "pods" {
          targets = discovery.kubernetes.pods.targets

          // Drop non-running pods.
          rule {
            source_labels = ["__meta_kubernetes_pod_phase"]
            regex         = "Pending|Succeeded|Failed|Unknown"
            action        = "drop"
          }

          // Build __path__ = /var/log/pods/<ns>_<pod>_<uid>/<container>/*.log
          rule {
            source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name", "__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
            separator     = ";"
            regex         = "(.+);(.+);(.+);(.+)"
            target_label  = "__path__"
            replacement   = "/var/log/pods/$1_$2_$3/$4/*.log"
          }

          // Standard Kubernetes labels.
          rule {
            source_labels = ["__meta_kubernetes_namespace"]
            target_label  = "namespace"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_name"]
            target_label  = "pod"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_container_name"]
            target_label  = "container"
          }
          rule {
            source_labels = ["__meta_kubernetes_pod_node_name"]
            target_label  = "node"
          }

          // Propagate common app label.
          rule {
            source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
            target_label  = "app"
          }

          // Static job label for Grafana queries.
          rule {
            replacement  = "kubernetes-pods"
            target_label = "job"
          }
        }

        local.file_match "pods" {
          path_targets = discovery.relabel.pods.output
        }

        loki.source.file "pods" {
          targets    = local.file_match.pods.targets
          forward_to = [loki.process.pods.receiver]
        }

        loki.process "pods" {
          forward_to = [loki.write.default.receiver]

          // Parse CRI log format and normalize timestamps.
          stage.cri {}
        }

        loki.write "default" {
          endpoint {
            url = "http://loki-gateway.monitoring.svc.cluster.local/loki/api/v1/push"
          }
        }

        // ── OPNsense syslog ingestion ──────────────────────────────────
        // Receives RFC 5424 / RFC 3164 syslog from OPNsense via TCP.
        // Sources: Suricata EVE JSON, filter log, auth, general system logs.
        //
        // relabel_rules must be applied inside the syslog source because
        // __syslog_* internal labels are stripped before forwarding.
        loki.source.syslog "opnsense" {
          listener {
            address  = "0.0.0.0:1514"
            protocol = "tcp"
            labels   = {
              job = "opnsense-syslog",
            }
          }
          relabel_rules = loki.relabel.opnsense.rules
          forward_to    = [loki.write.default.receiver]
        }

        // Promote __syslog_* internal labels to visible Loki labels.
        // Used via .rules export (not .receiver) so rules run inside the
        // syslog source before __ labels are stripped.
        loki.relabel "opnsense" {
          forward_to = [loki.write.default.receiver]

          rule {
            source_labels = ["__syslog_message_hostname"]
            target_label  = "hostname"
          }
          rule {
            source_labels = ["__syslog_message_app_name"]
            target_label  = "app"
          }
          rule {
            source_labels = ["__syslog_message_severity"]
            target_label  = "level"
          }
          rule {
            source_labels = ["__syslog_message_facility"]
            target_label  = "facility"
          }
        }

syslog:
  port: 1514
  loadBalancerIP: 10.0.30.14
  loadBalancerIPv6: "fd00:1:30::14"
