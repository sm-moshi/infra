cilium:
  # --- DHI images (dhi.io pulls directly, falls back from Harbor mirror) ---
  # Agent: no DHI available, keep upstream quay.io/cilium/cilium
  imagePullSecrets:
    - name: kubernetes-dhi

  # --- Prometheus metrics (agent) ---
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      labels:
        release: kube-prometheus-stack
      trustCRDsExist: true

  # --- Grafana dashboards (agent) ---
  dashboards:
    enabled: true
    namespace: monitoring

  # --- IPAM: cluster-pool mode ---
  # Cilium manages its own pod CIDRs independently of Kubernetes node.spec.podCIDRs.
  # This bypasses the flannel chicken-and-egg problem with retroactive IPv6 allocation.
  ipam:
    mode: cluster-pool
    operator:
      clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]
      clusterPoolIPv4MaskSize: 24
      clusterPoolIPv6PodCIDRList: ["fd00:42::/48"]
      clusterPoolIPv6MaskSize: 64

  # --- IPv6 ---
  ipv6:
    enabled: true

  # --- Routing: Native (direct L2, all nodes on VLAN 20) ---
  routingMode: native
  autoDirectNodeRoutes: true
  ipv4NativeRoutingCIDR: "10.42.0.0/16"
  ipv6NativeRoutingCIDR: "fd00:42::/48"

  # --- Replace kube-proxy with Cilium eBPF datapath ---
  kubeProxyReplacement: true
  k8sServiceHost: "10.0.20.20"
  k8sServicePort: "6443"

  # --- Operator: DHI image ---
  operator:
    replicas: 1  # single control-plane cluster
    image:
      override: "dhi.io/cilium-operator-generic:1.19.1"
      useDigest: false
    # --- Prometheus metrics (operator) ---
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
    # --- Grafana dashboards (operator) ---
    dashboards:
      enabled: true
      namespace: monitoring

  # --- Policy enforcement ---
  # "default" mode: Cilium evaluates policies and reports verdicts in Hubble,
  # but only enforces implicit deny on pods selected by a policy that has
  # enableDefaultDeny set to true. All current CNPs have enableDefaultDeny: false,
  # so no traffic is denied — this is observe-only until enforcement is phased in.
  policyEnforcementMode: "default"

  # --- LB-IPAM: replaces MetalLB ---
  lbIPAM:
    enabled: true

  # --- L2 Announcements: replaces MetalLB speaker ---
  l2announcements:
    enabled: true

  externalIPs:
    enabled: true

  # --- BPF datapath masquerade ---
  # Required for BPF host routing, which in turn is required for correct
  # IPv6 native routing (without it, Cilium falls back to legacy host
  # routing and remote-pod IPv6 identities resolve to reserved:world-ipv6).
  bpf:
    masquerade: true
  enableIPv6Masquerade: true
  enableIPv4Masquerade: true

  # --- Hubble: network observability ---
  hubble:
    enabled: true
    # --- Hubble flow metrics ---
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - flow
        - icmp
        - port-distribution
        - httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction
      dashboards:
        enabled: true
        namespace: monitoring
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
    relay:
      enabled: true
      image:
        override: "dhi.io/hubble-relay:1.19.1"
        useDigest: false
    ui:
      enabled: true
      ingress:
        enabled: false  # handled by hubbleIngress (Traefik IngressRoute + Authentik)
      backend:
        image:
          override: "dhi.io/hubble-ui-backend:0.13.4"
          useDigest: false

# Expose Hubble UI on https://hubble.m0sh1.cc via Traefik IngressRoute.
# Protected by Authentik forwardAuth SSO.
hubbleIngress:
  enabled: true
  host: hubble.m0sh1.cc
  entryPoints:
    - websecure
  tls:
    secretName: wildcard-m0sh1-cc
  forwardAuth:
    enabled: true
    address: http://authentik-server.apps.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-uid
      - X-authentik-username
      - X-authentik-email
      - X-authentik-name
