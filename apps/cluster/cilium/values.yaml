cilium:
  # --- DHI images (dhi.io pulls directly, falls back from Harbor mirror) ---
  # Agent: no DHI available, keep upstream quay.io/cilium/cilium
  imagePullSecrets:
    - name: kubernetes-dhi

  # --- IPAM: cluster-pool mode ---
  # Cilium manages its own pod CIDRs independently of Kubernetes node.spec.podCIDRs.
  # This bypasses the flannel chicken-and-egg problem with retroactive IPv6 allocation.
  ipam:
    mode: cluster-pool
    operator:
      clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]
      clusterPoolIPv4MaskSize: 24
      clusterPoolIPv6PodCIDRList: ["fd00:42::/48"]
      clusterPoolIPv6MaskSize: 64

  # --- IPv6 ---
  ipv6:
    enabled: true

  # --- Routing: VXLAN encapsulation (matches previous flannel behavior) ---
  routingMode: tunnel
  tunnelProtocol: vxlan

  # --- Replace kube-proxy with Cilium eBPF datapath ---
  kubeProxyReplacement: true
  k8sServiceHost: "10.0.20.20"
  k8sServicePort: "6443"

  # --- Operator: DHI image ---
  operator:
    replicas: 1  # single control-plane cluster
    image:
      override: "dhi.io/cilium-operator-generic:1.19.1"
      useDigest: false

  # --- Masquerading (required for ULA non-routable IPv6) ---
  enableIPv6Masquerade: true
  enableIPv4Masquerade: true

  # --- Hubble: network observability ---
  hubble:
    enabled: true
    relay:
      enabled: true
      image:
        override: "dhi.io/hubble-relay:1.19.1"
        useDigest: false
    ui:
      enabled: true
      ingress:
        enabled: false  # handled by hubbleIngress (Traefik IngressRoute + Authentik)
      backend:
        image:
          override: "dhi.io/hubble-ui-backend:0.13.3"
          useDigest: false

# Expose Hubble UI on https://hubble.m0sh1.cc via Traefik IngressRoute.
# Protected by Authentik forwardAuth SSO.
hubbleIngress:
  enabled: true
  host: hubble.m0sh1.cc
  entryPoints:
    - websecure
  tls:
    secretName: wildcard-m0sh1-cc
  forwardAuth:
    enabled: true
    address: https://hubble.m0sh1.cc/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-uid
      - X-authentik-username
      - X-authentik-email
      - X-authentik-name
