{{- if and .Values.hubbleIngress.enabled .Values.hubbleIngress.forwardAuth.enabled }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: hubble-ui-forwardauth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hubble-ui
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  forwardAuth:
    address: {{ .Values.hubbleIngress.forwardAuth.address | quote }}
    trustForwardHeader: {{ .Values.hubbleIngress.forwardAuth.trustForwardHeader }}
    maxBodySize: 4096
    authResponseHeaders:
      {{- range .Values.hubbleIngress.forwardAuth.authResponseHeaders }}
      - {{ . | quote }}
      {{- end }}
{{- end }}
