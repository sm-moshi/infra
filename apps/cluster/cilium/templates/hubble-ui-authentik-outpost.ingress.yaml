{{- if and .Values.hubbleIngress.enabled .Values.hubbleIngress.forwardAuth.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hubble-ui-authentik-outpost
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: hubble-ui
    app.kubernetes.io/component: auth
  annotations:
    kubernetes.io/ingress.class: traefik
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    external-dns.alpha.kubernetes.io/ignore: "true"
    # Do NOT attach forwardAuth middleware here; this is the auth endpoint itself.
spec:
  rules:
    - host: {{ .Values.hubbleIngress.host }}
      http:
        paths:
          - path: /outpost.goauthentik.io
            pathType: Prefix
            backend:
              service:
                name: authentik-server
                port:
                  number: 80
  tls:
    - hosts:
        - {{ .Values.hubbleIngress.host }}
      secretName: {{ .Values.hubbleIngress.tls.secretName }}
{{- end }}
