apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-csi-s3
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kube-prometheus-stack
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/storage
data:
  csi-s3.json: |-
{{ printf "%s" `
{
  "__inputs": [
    {
      "name": "DS_PROMETHEUS",
      "label": "Prometheus",
      "type": "datasource",
      "pluginId": "prometheus",
      "pluginName": "Prometheus"
    },
    {
      "name": "DS_LOKI",
      "label": "Loki",
      "type": "datasource",
      "pluginId": "loki",
      "pluginName": "Loki"
    }
  ],
  "__requires": [
    { "type": "grafana", "id": "grafana", "name": "Grafana", "version": "12.3.2" },
    { "type": "datasource", "id": "prometheus", "name": "Prometheus", "version": "1.0.0" },
    { "type": "datasource", "id": "loki", "name": "Loki", "version": "1.0.0" },
    { "type": "panel", "id": "timeseries", "name": "Time series", "version": "" },
    { "type": "panel", "id": "stat", "name": "Stat", "version": "" },
    { "type": "panel", "id": "logs", "name": "Logs", "version": "" }
  ],
  "title": "CSI-S3 / GeeseFS",
  "uid": "csi-s3-geesefs",
  "schemaVersion": 41,
  "version": 1,
  "editable": true,
  "refresh": "30s",
  "time": {
    "from": "now-6h",
    "to": "now"
  },
  "templating": {
    "list": [
      {
        "name": "namespace",
        "type": "constant",
        "label": "Namespace",
        "query": "csi-s3",
        "current": { "text": "csi-s3", "value": "csi-s3" }
      }
    ]
  },
  "panels": [
    {
      "id": 1,
      "type": "stat",
      "title": "Provisioner Up",
      "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
      "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
      "targets": [
        {
          "expr": "max(up{namespace=\"$namespace\",service=\"csi-s3-provisioner\"})",
          "refId": "A"
        }
      ],
      "options": {
        "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
        "colorMode": "value",
        "graphMode": "none",
        "justifyMode": "auto"
      },
      "fieldConfig": {
        "defaults": {
          "mappings": [
            { "type": "value", "options": { "0": { "text": "down" }, "1": { "text": "up" } } }
          ],
          "thresholds": {
            "mode": "absolute",
            "steps": [
              { "color": "red", "value": null },
              { "color": "green", "value": 1 }
            ]
          }
        },
        "overrides": []
      }
    },
    {
      "id": 2,
      "type": "stat",
      "title": "S3-backed PVCs Bound",
      "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
      "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
      "targets": [
        {
          "expr": "count(kube_persistentvolumeclaim_status_phase{namespace=\"apps\",persistentvolumeclaim=~\"paperless-ngx-(media|export|consume)|renovate-cache.*\",phase=\"Bound\"} == 1)",
          "refId": "A"
        }
      ],
      "options": {
        "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
        "colorMode": "value",
        "graphMode": "none",
        "justifyMode": "auto"
      }
    },
    {
      "id": 3,
      "type": "timeseries",
      "title": "Provisioner Operations",
      "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
      "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
      "targets": [
        {
          "expr": "sum(rate(csi_sidecar_operations_seconds_count{namespace=\"$namespace\",pod=~\"csi-s3-provisioner-.*\"}[5m])) by (method_name, grpc_status)",
          "legendFormat": "{{method_name}} / {{grpc_status}}",
          "refId": "A"
        }
      ]
    },
    {
      "id": 4,
      "type": "timeseries",
      "title": "Provisioner Latency P95",
      "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
      "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
      "targets": [
        {
          "expr": "histogram_quantile(0.95, sum(rate(csi_sidecar_operations_seconds_bucket{namespace=\"$namespace\",pod=~\"csi-s3-provisioner-.*\"}[5m])) by (le, method_name))",
          "legendFormat": "{{method_name}}",
          "refId": "A"
        }
      ]
    },
    {
      "id": 5,
      "type": "timeseries",
      "title": "Bound PVs by StorageClass",
      "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
      "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
      "targets": [
        {
          "expr": "count(kube_persistentvolume_info{storageclass=~\"garage-s3-rwx|garage-s3-rwx-retain\"}) by (storageclass)",
          "legendFormat": "{{storageclass}}",
          "refId": "A"
        }
      ]
    },
    {
      "id": 6,
      "type": "logs",
      "title": "CSI-S3 Errors",
      "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
      "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
      "targets": [
        {
          "expr": "{namespace=\"$namespace\"} |~ \"ProvisioningFailed|FailedMount|MountVolume|Failed to remove finalizer|Transport endpoint is not connected|error|panic|fatal\"",
          "refId": "A"
        }
      ],
      "options": {
        "dedupStrategy": "none",
        "enableLogDetails": true,
        "prettifyLogMessage": false,
        "showCommonLabels": false,
        "showLabels": false,
        "showTime": true,
        "sortOrder": "Descending"
      }
    }
  ]
}
` | nindent 4 }}
