        "name": "Annotations & Alerts",
        "showIn": 0,
        "type": "dashboard"
      }
    ]
  },
  "description": "Forgejo instance monitoring dashboard",
  "editable": true,
  "graphTooltip": 1,
  "id": null,
  "links": [],
