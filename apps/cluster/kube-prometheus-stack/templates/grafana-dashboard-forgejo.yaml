apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-forgejo
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: kube-prometheus-stack
  annotations:
    k8s-sidecar-target-directory: /tmp/dashboards/Forgejo
data:
  forgejo.json: |-
{{ printf "%s" `
