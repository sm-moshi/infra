apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-pod-health-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
  - name: pod_health_enhanced
    interval: 30s
    rules:
    # Alert 1: PodFailed - Detects pods stuck in Failed phase
    - alert: PodFailed
      expr: kube_pod_status_phase{phase="Failed"} == 1
      for: 0m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is in Failed state"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has entered Failed state.
          This usually indicates a container exited with an error or the pod was terminated.
        runbook_url: "https://m0sh1.cc/runbooks/pod-failed"

    # Alert 2: PodNotReady - Pods stuck not ready for >5 minutes
    - alert: PodNotReady
      expr: |
        kube_pod_status_phase{phase=~"Pending|Unknown"} == 1
        or
        (kube_pod_status_ready{condition="true"} == 0
         and kube_pod_status_phase{phase="Running"} == 1)
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is not ready"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has been not ready for more than 5 minutes.
          Check pod events and logs for startup issues.
        runbook_url: "https://m0sh1.cc/runbooks/pod-not-ready"

    # Alert 3: ContainerImagePullBackOff - Image pull failures
    - alert: ContainerImagePullBackOff
      expr: kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} == 1
      for: 2m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} cannot pull image"
        description: |
          Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
          is stuck in ImagePullBackOff. Check image name, registry access, and imagePullSecrets.
        runbook_url: "https://m0sh1.cc/runbooks/image-pull-backoff"

    # Alert 4: ContainerOOMKilled - Out of memory kills
    - alert: ContainerOOMKilled
      expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} was OOMKilled"
        description: |
          Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
          was killed due to out of memory. Increase memory limits or investigate memory leaks.
        runbook_url: "https://m0sh1.cc/runbooks/oom-killed"

    # Alert 5: ContainerWaiting - Containers stuck waiting
    - alert: ContainerWaiting
      expr: |
        kube_pod_container_status_waiting{container!=""} == 1
        and
        kube_pod_container_status_waiting_reason{reason!="ContainerCreating"} == 1
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is stuck waiting"
        description: |
          Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
          has been waiting for more than 5 minutes. Reason: {{`{{ $labels.reason }}`}}.
        runbook_url: "https://m0sh1.cc/runbooks/container-waiting"

    # Alert 6: JobFailed - Failed Kubernetes jobs
    - alert: JobFailed
      expr: kube_job_status_failed{condition="true"} == 1
      for: 0m
      labels:
        severity: critical
        component: job
      annotations:
        summary: "Job {{`{{ $labels.namespace }}`}}/{{`{{ $labels.job_name }}`}} failed"
        description: |
          Job {{`{{ $labels.namespace }}`}}/{{`{{ $labels.job_name }}`}} has failed.
          Check job logs with: kubectl logs -n {{`{{ $labels.namespace }}`}} -l job-name={{`{{ $labels.job_name }}`}}
        runbook_url: "https://m0sh1.cc/runbooks/job-failed"

    # Alert 7: StatefulSetReplicasUnavailable - StatefulSet issues
    - alert: StatefulSetReplicasUnavailable
      expr: |
        kube_statefulset_status_replicas_available
        !=
        kube_statefulset_status_replicas
      for: 5m
      labels:
        severity: warning
        component: statefulset
      annotations:
        summary: "StatefulSet {{`{{ $labels.namespace }}`}}/{{`{{ $labels.statefulset }}`}} has unavailable replicas"
        description: |
          StatefulSet {{`{{ $labels.namespace }}`}}/{{`{{ $labels.statefulset }}`}} has unavailable replicas.
          Current: {{`{{ $value }}`}} replicas unavailable.
        runbook_url: "https://m0sh1.cc/runbooks/statefulset-unavailable"

    # Alert 8: PodCrashLoopingEnhanced - Improved crash detection
    - alert: PodCrashLoopingEnhanced
      expr: |
        rate(kube_pod_container_status_restarts_total[10m]) > 0
        and
        kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
      for: 2m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is crash looping"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} container {{`{{ $labels.container }}`}}
          is in CrashLoopBackOff. Recent restart rate: {{`{{ $value | humanize }}`}} restarts/second.
        runbook_url: "https://m0sh1.cc/runbooks/pod-crash-loop"
