apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-pod-health-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
  - name: pod_health_enhanced
    interval: 30s
    rules:
    # PodFailed - Detects pods stuck in Failed phase.
    # Excludes trivy-operator scan pods (exit 1 is normal when vulnerabilities are found).
    # Upstream KubeJobFailed covers failed Jobs; this catches non-Job pod failures.
    - alert: PodFailed
      expr: |
        kube_pod_status_phase{phase="Failed"} == 1
        unless on (namespace, pod)
        kube_pod_labels{label_app_kubernetes_io_managed_by="trivy-operator"}
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is in Failed state"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has been in Failed state for 5+ minutes.
          This usually indicates a container exited with an error or the pod was terminated.

    # ContainerImagePullBackOff - Image pull failures.
    # No upstream equivalent — unique value.
    - alert: ContainerImagePullBackOff
      expr: kube_pod_container_status_waiting_reason{reason="ImagePullBackOff"} == 1
      for: 5m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} cannot pull image"
        description: |
          Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
          is stuck in ImagePullBackOff. Check image name, registry access, and imagePullSecrets.

    # ContainerOOMKilled - Recent out-of-memory kills.
    # Uses rate of restarts combined with OOMKilled reason so the alert auto-resolves
    # once restarts stop (unlike the raw last_terminated_reason which persists forever).
    - alert: ContainerOOMKilled
      expr: |
        increase(kube_pod_container_status_restarts_total[15m]) > 0
        and on (namespace, pod, container)
        kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
      for: 0m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} was OOMKilled"
        description: |
          Container {{`{{ $labels.container }}`}} in pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
          was killed due to out of memory. Increase memory limits or investigate memory leaks.
