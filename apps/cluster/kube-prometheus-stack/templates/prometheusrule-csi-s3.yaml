apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-csi-s3-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
  - name: csi-s3
    interval: 60s
    rules:
    - alert: CsiS3ProvisionerMetricsMissing
      expr: absent(up{namespace="csi-s3",service="csi-s3-provisioner"} == 1)
      for: 15m
      labels:
        severity: warning
        component: csi-s3
      annotations:
        summary: "CSI-S3 provisioner metrics are missing"
        description: |
          Prometheus has not scraped csi-s3-provisioner metrics in namespace csi-s3
          for more than 15 minutes.

    - alert: CsiS3ProvisionerErrors
      expr: sum(rate(csi_sidecar_operations_seconds_count{namespace="csi-s3",pod=~"csi-s3-provisioner-.*",grpc_status!="OK"}[10m])) > 0
      for: 15m
      labels:
        severity: warning
        component: csi-s3
      annotations:
        summary: "CSI-S3 provisioner is returning non-OK gRPC responses"
        description: |
          The CSI-S3 provisioner has returned non-OK gRPC responses for at least 15 minutes.
          Check csi-s3 provisioner logs in Loki for provisioning and finalizer failures.

    - alert: CsiS3PVCPendingTooLong
      expr: kube_persistentvolumeclaim_status_phase{namespace="apps",persistentvolumeclaim=~"paperless-ngx-(media|export|consume)|renovate-cache.*",phase="Pending"} == 1
      for: 10m
      labels:
        severity: warning
        component: csi-s3
      annotations:
        summary: "S3-backed PVC pending too long"
        description: |
          PVC {{`{{ $labels.namespace }}`}}/{{`{{ $labels.persistentvolumeclaim }}`}} has been pending
          for more than 10 minutes on the CSI-S3 storage path.
