apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: custom-pod-restart-alerts
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
spec:
  groups:
  - name: pod_health_custom
    interval: 30s
    rules:
    # Alert on high restart rate (frequency)
    - alert: HighPodRestartRate
      expr: rate(kube_pod_container_status_restarts_total[1h]) > 0.1
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has high restart rate"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} container {{`{{ $labels.container }}`}}
          has been restarting {{`{{ $value | humanize }}`}} times per second over the last hour.
          This indicates an unstable workload.

    # Alert on excessive total restarts (threshold)
    - alert: ExcessivePodRestarts
      expr: increase(kube_pod_container_status_restarts_total[24h]) > 10
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} has excessive restarts"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} container {{`{{ $labels.container }}`}}
          has restarted {{`{{ $value }}`}} times in the last 24 hours.
          Investigate pod logs and events immediately.

    # Alert on CrashLoopBackOff state
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total[15m]) > 0
        and
        kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} == 1
      for: 5m
      labels:
        severity: critical
        component: pod
      annotations:
        summary: "Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} is crash looping"
        description: |
          Pod {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}} container {{`{{ $labels.container }}`}}
          is in CrashLoopBackOff state and has restarted multiple times in the last 15 minutes.
