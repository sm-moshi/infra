      "options": {
        "legend": {
          "showLegend": true,
          "displayMode": "table",
          "placement": "bottom",
          "calcs": ["lastNotNull"]
        },
        "tooltip": {
          "mode": "multi"
        }
      },
      "pluginVersion": "12.3.2"
    },
    {
      "id": 9,
      "title": "Git & Controller",
      "type": "row",
      "collapsed": false,
      "gridPos": {
        "h": 1,
        "w": 24,
        "x": 0,
        "y": 14
      },
      "panels": []
    },
    {
      "id": 10,
      "title": "Git Request Duration",
      "type": "timeseries",
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "gridPos": {
        "h": 8,
        "w": 12,
        "x": 0,
        "y": 15
      },
      "targets": [
        {
          "expr": "histogram_quantile(0.95, sum(rate(argocd_git_request_duration_seconds_bucket[5m])) by (le, request_type))",
          "format": "time_series",
          "intervalFactor": 1,
          "legendFormat": "{{request_type}} p95",
          "refId": "A"
