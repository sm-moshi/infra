              }
            ]
          },
          "mappings": [],
          "custom": {
            "drawStyle": "line",
            "lineWidth": 2,
            "fillOpacity": 10,
            "spanNulls": false,
            "showPoints": "never",
            "stacking": {
              "mode": "none",
              "group": "A"
