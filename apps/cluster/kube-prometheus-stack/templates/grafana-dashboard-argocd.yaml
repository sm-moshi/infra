      "type": "stat",
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "gridPos": {
        "h": 4,
        "w": 6,
        "x": 18,
        "y": 1
      },
      "targets": [
        {
          "expr": "count(argocd_app_info{sync_status=\"OutOfSync\"}) OR vector(0)",
          "format": "time_series",
          "intervalFactor": 1,
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {
                "color": "green",
                "value": null
              },
              {
                "color": "orange",
                "value": 1
              }
            ]
          },
          "mappings": []
        },
        "overrides": []
      },
      "options": {
        "reduceOptions": {
          "calcs": ["lastNotNull"],
          "fields": "",
          "values": false
        },
        "orientation": "auto",
        "textMode": "auto",
        "colorMode": "value",
        "graphMode": "none"
      },
      "pluginVersion": "12.3.2"
    },
    {
      "id": 6,
      "title": "Operations",
      "type": "row",
      "collapsed": false,
      "gridPos": {
        "h": 1,
        "w": 24,
        "x": 0,
        "y": 5
      },
      "panels": []
    },
    {
      "id": 7,
      "title": "Sync Operations",
      "type": "timeseries",
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "gridPos": {
        "h": 8,
        "w": 12,
        "x": 0,
        "y": 6
      },
      "targets": [
        {
          "expr": "sum(rate(argocd_app_sync_total[5m])) by (name, phase)",
          "format": "time_series",
          "intervalFactor": 1,
          "legendFormat": "{{name}} - {{phase}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {
                "color": "green",
                "value": null
              }
            ]
          },
          "mappings": [],
          "custom": {
            "drawStyle": "line",
            "lineWidth": 2,
            "fillOpacity": 10,
            "spanNulls": false,
            "showPoints": "never",
            "stacking": {
              "mode": "none",
              "group": "A"
            }
          }
        },
        "overrides": []
      },
      "options": {
        "legend": {
          "showLegend": true,
          "displayMode": "table",
          "placement": "bottom",
          "calcs": ["lastNotNull"]
        },
        "tooltip": {
          "mode": "multi"
        }
      },
      "pluginVersion": "12.3.2"
    },
    {
      "id": 8,
      "title": "Reconciliation Duration P99",
      "type": "timeseries",
      "datasource": {"type": "prometheus", "uid": "${datasource}"},
      "gridPos": {
        "h": 8,
        "w": 12,
        "x": 12,
        "y": 6
      },
      "targets": [
        {
          "expr": "histogram_quantile(0.99, sum(rate(argocd_app_reconcile_bucket[5m])) by (le))",
          "format": "time_series",
          "intervalFactor": 1,
          "legendFormat": "p99",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "s",
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {
                "color": "green",
                "value": null
              }
            ]
          },
          "mappings": [],
          "custom": {
            "drawStyle": "line",
            "lineWidth": 2,
            "fillOpacity": 10,
            "spanNulls": false,
            "showPoints": "never",
            "stacking": {
              "mode": "none",
              "group": "A"
            }
