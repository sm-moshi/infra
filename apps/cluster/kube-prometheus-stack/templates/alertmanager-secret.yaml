apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config-secret
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'namespace', 'pod', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: default
      routes:
        - matchers:
            - 'severity="critical"'
          receiver: critical-alerts
          group_interval: 1m
          repeat_interval: 1h
        - matchers:
            - 'component="pod"'
          receiver: pod-alerts-multi
          continue: true
        - matchers:
            - 'component="job"'
          receiver: pod-alerts-multi
          continue: true
        - matchers:
            - 'component="statefulset"'
          receiver: pod-alerts-multi
          continue: true
    receivers:
      - name: default
      - name: critical-alerts
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
            chat_id: 87961678
            message: |
              {{ "{{" }} if eq .Status "firing" {{ "}}" }}🚨{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .GroupLabels.alertname {{ "}}" }} ({{ "{{" }} .GroupLabels.severity {{ "}}" }})
              {{ "{{" }} range .Alerts {{ "}}" }}
              ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              {{ "{{" }} if .Labels.pod {{ "}}" }}📦 Pod: {{ "{{" }} .Labels.namespace {{ "}}" }}/{{ "{{" }} .Labels.pod {{ "}}" }}
              {{ "{{" }} if .Labels.container {{ "}}" }}🔧 Container: {{ "{{" }} .Labels.container {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
              {{ "{{" }} if eq .Labels.severity "critical" {{ "}}" }}📊 Impact: Service disruption likely{{ "{{" }} end {{ "}}" }}

              📝 {{ "{{" }} .Annotations.summary {{ "}}" }}

              {{ "{{" }} if .Labels.pod {{ "}}" }}🔍 Troubleshooting:
              • kubectl logs {{ "{{" }} .Labels.pod {{ "}}" }} -n {{ "{{" }} .Labels.namespace {{ "}}" }} --previous
              • kubectl describe pod {{ "{{" }} .Labels.pod {{ "}}" }} -n {{ "{{" }} .Labels.namespace {{ "}}" }}
              • kubectl get events -n {{ "{{" }} .Labels.namespace {{ "}}" }} --field-selector involvedObject.name={{ "{{" }} .Labels.pod {{ "}}" }}

              {{ "{{" }} end {{ "}}" }}{{ "{{" }} end {{ "}}" }}
            send_resolved: true
      - name: pod-alerts-multi
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/discord-webhook-url
            channel: alerts
            title: '{{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} end {{ "}}" }}'
            text: '{{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}'
            send_resolved: true
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
            chat_id: 87961678
            message: |
              {{ "{{" }} if eq .Status "firing" {{ "}}" }}⚠️{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .GroupLabels.alertname {{ "}}" }} ({{ "{{" }} .GroupLabels.severity {{ "}}" }})
              {{ "{{" }} range .Alerts {{ "}}" }}
              {{ "{{" }} if .Labels.pod {{ "}}" }}📦 Pod: {{ "{{" }} .Labels.namespace {{ "}}" }}/{{ "{{" }} .Labels.pod {{ "}}" }}
              {{ "{{" }} if .Labels.container {{ "}}" }}🔧 Container: {{ "{{" }} .Labels.container {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
              📝 {{ "{{" }} .Annotations.summary {{ "}}" }}

              {{ "{{" }} if .Labels.pod {{ "}}" }}🔍 Commands:
              • kubectl logs {{ "{{" }} .Labels.pod {{ "}}" }} -n {{ "{{" }} .Labels.namespace {{ "}}" }} --previous
              • kubectl describe pod {{ "{{" }} .Labels.pod {{ "}}" }} -n {{ "{{" }} .Labels.namespace {{ "}}" }}

              {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .Annotations.runbook_url {{ "}}" }}📖 Runbook: {{ "{{" }} .Annotations.runbook_url {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - 'severity="critical"'
        target_matchers:
          - 'severity="warning"'
        equal: ['alertname', 'namespace', 'pod']
