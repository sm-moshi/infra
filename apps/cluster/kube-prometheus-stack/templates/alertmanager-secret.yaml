apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config-secret
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'namespace', 'pod', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: default
      routes:
        - match:
            severity: critical
          receiver: critical-alerts
          continue: true
          group_interval: 1m
          repeat_interval: 1h
        - match:
            component: pod
          receiver: pod-alerts-multi
          continue: true
        - match:
            component: job
          receiver: pod-alerts-multi
          continue: true
        - match:
            component: statefulset
          receiver: pod-alerts-multi
          continue: true
    receivers:
      - name: default
      - name: critical-alerts
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
            chat_id: 87961678
            message: |
              {{ "{{" }} if eq .Status "firing" {{ "}}" }}🚨{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .GroupLabels.alertname {{ "}}" }} ({{ "{{" }} .GroupLabels.severity {{ "}}" }})
              {{ "{{" }} range .Alerts {{ "}}" }}
              ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              📦 Pod: {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}
              {{ "{{" }} if $labels.container {{ "}}" }}🔧 Container: {{ "{{" }} $labels.container {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} if eq .Labels.severity "critical" {{ "}}" }}📊 Impact: Service disruption likely{{ "{{" }} end {{ "}}" }}

              📝 {{ "{{" }} .Annotations.summary {{ "}}" }}

              🔍 Troubleshooting:
              • kubectl logs {{ "{{" }} $labels.pod {{ "}}" }} -n {{ "{{" }} $labels.namespace {{ "}}" }} --previous
              • kubectl describe pod {{ "{{" }} $labels.pod {{ "}}" }} -n {{ "{{" }} $labels.namespace {{ "}}" }}
              • kubectl get events -n {{ "{{" }} $labels.namespace {{ "}}" }} --field-selector involvedObject.name={{ "{{" }} $labels.pod {{ "}}" }}

              {{ "{{" }} if .Annotations.runbook_url {{ "}}" }}📖 Runbook: {{ "{{" }} .Annotations.runbook_url {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              📊 Grafana: https://grafana.m0sh1.cc/d/kubernetes-pod-health
              {{ "{{" }} end {{ "}}" }}
            send_resolved: true
      - name: pod-alerts-multi
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/discord-webhook-url
            channel: alerts
            title: '{{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} .Annotations.summary {{ "}}" }}{{ "{{" }} end {{ "}}" }}'
            text: '{{ "{{" }} range .Alerts {{ "}}" }}{{ "{{" }} .Annotations.description {{ "}}" }}{{ "{{" }} end {{ "}}" }}'
            send_resolved: true
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
            chat_id: 87961678
            message: |
              {{ "{{" }} if eq .Status "firing" {{ "}}" }}⚠️{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .GroupLabels.alertname {{ "}}" }} ({{ "{{" }} .GroupLabels.severity {{ "}}" }})
              {{ "{{" }} range .Alerts {{ "}}" }}
              📦 Pod: {{ "{{" }} $labels.namespace {{ "}}" }}/{{ "{{" }} $labels.pod {{ "}}" }}
              {{ "{{" }} if $labels.container {{ "}}" }}🔧 Container: {{ "{{" }} $labels.container {{ "}}" }}{{ "{{" }} end {{ "}}" }}

              📝 {{ "{{" }} .Annotations.summary {{ "}}" }}

              🔍 Commands:
              • kubectl logs {{ "{{" }} $labels.pod {{ "}}" }} -n {{ "{{" }} $labels.namespace {{ "}}" }} --previous
              • kubectl describe pod {{ "{{" }} $labels.pod {{ "}}" }} -n {{ "{{" }} $labels.namespace {{ "}}" }}

              {{ "{{" }} if .Annotations.runbook_url {{ "}}" }}📖 Runbook: {{ "{{" }} .Annotations.runbook_url {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
            send_resolved: true
    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace', 'pod']
