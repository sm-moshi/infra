apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config-secret
  namespace: monitoring
  labels:
    app: kube-prometheus-stack
    release: kube-prometheus-stack
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 24h
      receiver: telegram-ops
      routes:
        # Silence Watchdog (heartbeat) and info-severity alerts
        - matchers:
            - 'alertname="Watchdog"'
          receiver: drop
        - matchers:
            - 'alertname="InfoInhibitor"'
          receiver: drop
        - matchers:
            - 'severity="info"'
          receiver: drop
        # Trivy scan job failures are expected when namespace quota is tight
        # or during node drains — not actionable at 3 AM.
        - matchers:
            - 'alertname="PodFailed"'
            - 'pod=~"scan-vulnerabilityreport-.*"'
          receiver: drop
        # Critical → DM escalation (continues to ops group via default)
        - matchers:
            - 'severity="critical"'
          receiver: telegram-critical
          repeat_interval: 4h
          continue: true
    receivers:
      - name: drop
      - name: telegram-critical
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
            chat_id: 87961678
            message: |
              {{ "{{" }} if eq .CommonLabels.severity "critical" {{ "}}" }}🚨{{ "{{" }} else {{ "}}" }}⚠️{{ "{{" }} end {{ "}}" }} {{ "{{" }} .GroupLabels.alertname {{ "}}" }}{{ "{{" }} with .CommonLabels.severity {{ "}}" }} ({{ "{{" }} . {{ "}}" }}){{ "{{" }} end {{ "}}" }}
              {{ "{{" }} range .Alerts {{ "}}" }}
              ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              {{ "{{" }} if .Labels.namespace {{ "}}" }}📂 {{ "{{" }} .Labels.namespace {{ "}}" }}{{ "{{" }} if .Labels.job_name {{ "}}" }}/{{ "{{" }} .Labels.job_name {{ "}}" }}{{ "{{" }} else if .Labels.pod {{ "}}" }}/{{ "{{" }} .Labels.pod {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .Labels.job_name {{ "}}" }}🧰 Job: {{ "{{" }} .Labels.job_name {{ "}}" }}
              {{ "{{" }} else if .Labels.container {{ "}}" }}🔧 {{ "{{" }} .Labels.container {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .Labels.node {{ "}}" }}🖥️ Node: {{ "{{" }} .Labels.node {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
              📝 {{ "{{" }} .Annotations.summary {{ "}}" }}

              {{ "{{" }} if .Labels.job_name {{ "}}" }}🔍 kubectl logs -n {{ "{{" }} .Labels.namespace {{ "}}" }} -l job-name={{ "{{" }} .Labels.job_name {{ "}}" }} --tail=200
              {{ "{{" }} else if .Labels.pod {{ "}}" }}🔍 kubectl logs {{ "{{" }} .Labels.pod {{ "}}" }} -n {{ "{{" }} .Labels.namespace {{ "}}" }} --previous
              {{ "{{" }} end {{ "}}" }}{{ "{{" }} end {{ "}}" }}
            send_resolved: false
      - name: telegram-ops
        telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
            chat_id: -5057851926
            message: |
              {{ "{{" }} if eq .Status "firing" {{ "}}" }}{{ "{{" }} if eq .CommonLabels.severity "critical" {{ "}}" }}🚨{{ "{{" }} else {{ "}}" }}⚠️{{ "{{" }} end {{ "}}" }}{{ "{{" }} else {{ "}}" }}✅{{ "{{" }} end {{ "}}" }} {{ "{{" }} .GroupLabels.alertname {{ "}}" }}{{ "{{" }} with .CommonLabels.severity {{ "}}" }} ({{ "{{" }} . {{ "}}" }}){{ "{{" }} end {{ "}}" }}
              {{ "{{" }} range .Alerts {{ "}}" }}
              ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
              {{ "{{" }} if .Labels.namespace {{ "}}" }}📂 {{ "{{" }} .Labels.namespace {{ "}}" }}{{ "{{" }} if .Labels.job_name {{ "}}" }}/{{ "{{" }} .Labels.job_name {{ "}}" }}{{ "{{" }} else if .Labels.pod {{ "}}" }}/{{ "{{" }} .Labels.pod {{ "}}" }}{{ "{{" }} end {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .Labels.job_name {{ "}}" }}🧰 Job: {{ "{{" }} .Labels.job_name {{ "}}" }}
              {{ "{{" }} else if .Labels.container {{ "}}" }}🔧 {{ "{{" }} .Labels.container {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}{{ "{{" }} if .Labels.node {{ "}}" }}🖥️ Node: {{ "{{" }} .Labels.node {{ "}}" }}
              {{ "{{" }} end {{ "}}" }}
              📝 {{ "{{" }} .Annotations.summary {{ "}}" }}

              {{ "{{" }} if .Labels.job_name {{ "}}" }}🔍 kubectl logs -n {{ "{{" }} .Labels.namespace {{ "}}" }} -l job-name={{ "{{" }} .Labels.job_name {{ "}}" }} --tail=200
              {{ "{{" }} else if .Labels.pod {{ "}}" }}🔍 kubectl logs {{ "{{" }} .Labels.pod {{ "}}" }} -n {{ "{{" }} .Labels.namespace {{ "}}" }} --previous
              {{ "{{" }} end {{ "}}" }}{{ "{{" }} end {{ "}}" }}
            send_resolved: false
        webhook_configs:
          - url_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/discord-webhook-url
            send_resolved: true
    inhibit_rules:
      - source_matchers:
          - 'severity="critical"'
        target_matchers:
          - 'severity="warning"'
        equal: ['alertname', 'namespace', 'pod']
