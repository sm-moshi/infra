kube-prometheus-stack:
  fullnameOverride: kube-prometheus-stack
  namespaceOverride: monitoring

  global:
    imagePullSecrets:
      - name: kubernetes-dhi

  # Disable bundled CRDs sub-chart — CRDs managed by separate prometheus-crds app.
  crds:
    enabled: false

  prometheusOperator:
    # Manage CRDs separately to control upgrade order.
    crds:
      enabled: false
    # Keep the control plane light: schedule monitoring components on workers.
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    # Images managed by DHI chart defaults.

  prometheus:
    enabled: true
    prometheusSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      # DHI image tags include sha256 digests that break operator semver parsing.
      version: "3.9.1"
      retention: 15d
      retentionSize: "45GB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    alertmanagerSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      # DHI image tags include sha256 digests that break operator semver parsing.
      version: "0.31.1"
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      secrets:
        - alertmanager-notification-secrets
      configSecret: alertmanager-config-secret

  grafana:
    enabled: true
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    # Images managed by DHI chart defaults.
    persistence:
      enabled: true
      storageClassName: proxmox-csi-zfs-nvme-fast-retain
      size: 10Gi
    admin:
      existingSecret: monitoring-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    sidecar:
      # Images managed by DHI chart defaults.
      dashboards:
        provider:
          foldersFromFilesStructure: true
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  # k3s embeds these in the server binary — no separate pods/endpoints to scrape.
  # Disable to prevent false KubeProxyDown/KubeSchedulerDown/KubeControllerManagerDown alerts.
  kubeProxy:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false

  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    # Images managed by DHI chart defaults.

  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    # Images managed by DHI chart defaults.
    prometheus:
      monitor:
        attachMetadata:
          node: true

ingressRoutes:
  grafana:
    enabled: true
    host: grafana.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
  prometheus:
    enabled: true
    host: prometheus.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
    basicAuth:
      enabled: true
      secretName: monitoring-prometheus-basic-auth
      realm: Prometheus
