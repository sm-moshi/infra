kube-prometheus-stack:
  fullnameOverride: kube-prometheus-stack
  namespaceOverride: monitoring

  global:
    imagePullSecrets:
      - name: kubernetes-dhi

  prometheusOperator:
    # Manage CRDs separately to control upgrade order.
    crds:
      enabled: false
    # Keep the control plane light: schedule monitoring components on workers.
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: prometheus-operator
      tag: "0.89.0@sha256:ca8efe793487702f384e209a7abade763d2b6eb58b024c5ddf5f17ef6f498972"
    imagePullSecrets:
      - name: kubernetes-dhi
    podAnnotations:
      m0sh1.cc/restart-at: "2026-02-05T10:40:00Z"
    prometheusConfigReloader:
      image:
        registry: dhi.io
        repository: prometheus-config-reloader
        tag: "0.89.0@sha256:2ed3c5e3d910d1f1e38eb00618e7c9a3c08e7cb11b8d6b127477a223f1c0a1b5"

  prometheus:
    enabled: true
    prometheusSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      image:
        registry: dhi.io
        repository: prometheus
        tag: "3.9.1"
      imagePullSecrets:
        - name: kubernetes-dhi
      retention: 15d
      retentionSize: "45GB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    alertmanagerSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      image:
        registry: dhi.io
        repository: alertmanager
        tag: "0.31.0"
      imagePullSecrets:
        - name: kubernetes-dhi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      secrets:
        - alertmanager-notification-secrets
    config:
      global:
        resolve_timeout: 5m
      route:
        group_by: ['alertname', 'cluster', 'namespace', 'pod', 'severity']
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
        receiver: default
        routes:
          - match:
              severity: critical
            receiver: critical-alerts
            continue: true
            group_interval: 1m
            repeat_interval: 1h
          - match:
              component: pod
            receiver: pod-alerts-multi
            continue: true
          - match:
              component: job
            receiver: pod-alerts-multi
            continue: true
          - match:
              component: statefulset
            receiver: pod-alerts-multi
            continue: true
      receivers:
        - name: default
        - name: critical-alerts
          telegram_configs:
            - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
              chat_id: 87961678
              message: |
                {{`{{ if eq .Status "firing" }}`}}🚨{{`{{ else }}`}}✅{{`{{ end }}`}} {{`{{ .GroupLabels.alertname }}`}} ({{`{{ .GroupLabels.severity | upper }}`}})
                {{`{{ range .Alerts }}`}}
                ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
                📦 Pod: {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
                {{`{{ if $labels.container }}`}}🔧 Container: {{`{{ $labels.container }}`}}{{`{{ end }}`}}
                {{`{{ if eq .Labels.severity "critical" }}`}}📊 Impact: Service disruption likely{{`{{ end }}`}}

                📝 {{`{{ .Annotations.summary }}`}}

                🔍 Troubleshooting:
                • kubectl logs {{`{{ $labels.pod }}`}} -n {{`{{ $labels.namespace }}`}} --previous
                • kubectl describe pod {{`{{ $labels.pod }}`}} -n {{`{{ $labels.namespace }}`}}
                • kubectl get events -n {{`{{ $labels.namespace }}`}} --field-selector involvedObject.name={{`{{ $labels.pod }}`}}

                {{`{{ if .Annotations.runbook_url }}`}}📖 Runbook: {{`{{ .Annotations.runbook_url }}`}}{{`{{ end }}`}}
                📊 Grafana: https://grafana.m0sh1.cc/d/kubernetes-pod-health
                {{`{{ end }}`}}
              send_resolved: true
        - name: pod-alerts-multi
          slack_configs:
            - api_url_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/discord-webhook-url
              channel: alerts
              title: '{{`{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}`}}'
              text: '{{`{{ range .Alerts }}{{ .Annotations.description }}{{ end }}`}}'
              send_resolved: true
          telegram_configs:
            - bot_token_file: /etc/alertmanager/secrets/alertmanager-notification-secrets/telegram-bot-token
              chat_id: 87961678
              message: |
                {{`{{ if eq .Status "firing" }}`}}⚠️{{`{{ else }}`}}✅{{`{{ end }}`}} {{`{{ .GroupLabels.alertname }}`}} ({{`{{ .GroupLabels.severity | upper }}`}})
                {{`{{ range .Alerts }}`}}
                📦 Pod: {{`{{ $labels.namespace }}`}}/{{`{{ $labels.pod }}`}}
                {{`{{ if $labels.container }}`}}🔧 Container: {{`{{ $labels.container }}`}}{{`{{ end }}`}}

                📝 {{`{{ .Annotations.summary }}`}}

                🔍 Commands:
                • kubectl logs {{`{{ $labels.pod }}`}} -n {{`{{ $labels.namespace }}`}} --previous
                • kubectl describe pod {{`{{ $labels.pod }}`}} -n {{`{{ $labels.namespace }}`}}

                {{`{{ if .Annotations.runbook_url }}`}}📖 Runbook: {{`{{ .Annotations.runbook_url }}`}}{{`{{ end }}`}}
                {{`{{ end }}`}}
              send_resolved: true
      inhibit_rules:
        - source_match:
            severity: 'critical'
          target_match:
            severity: 'warning'
          equal: ['alertname', 'namespace', 'pod']

  grafana:
    enabled: true
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    image:
      registry: dhi.io
      repository: grafana
      tag: "12.3.2"
    imagePullSecrets:
      - name: kubernetes-dhi
    persistence:
      enabled: true
      storageClassName: proxmox-csi-zfs-nvme-fast-retain
      size: 10Gi
    admin:
      existingSecret: monitoring-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    sidecar:
      image:
        registry: dhi.io
        repository: k8s-sidecar
        tag: "2.5-debian13"
      dashboards:
        provider:
          foldersFromFilesStructure: true
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: kube-state-metrics
      tag: "2.18.0"
    imagePullSecrets:
      - name: kubernetes-dhi

  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: node-exporter
      tag: "1.10.2"
    imagePullSecrets:
      - name: kubernetes-dhi
    prometheus:
      monitor:
        attachMetadata:
          node: true

ingressRoutes:
  grafana:
    enabled: true
    host: grafana.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
  prometheus:
    enabled: true
    host: prometheus.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
    basicAuth:
      enabled: true
      secretName: monitoring-prometheus-basic-auth
      realm: Prometheus
