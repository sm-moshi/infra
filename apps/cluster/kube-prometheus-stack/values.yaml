kube-prometheus-stack:
  fullnameOverride: kube-prometheus-stack
  namespaceOverride: monitoring

  global:
    imagePullSecrets:
      - name: kubernetes-dhi

  prometheusOperator:
    # Manage CRDs separately to control upgrade order.
    crds:
      enabled: false
    # Keep the control plane light: schedule monitoring components on workers.
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: prometheus-operator
      tag: "0.89.0@sha256:ca8efe793487702f384e209a7abade763d2b6eb58b024c5ddf5f17ef6f498972"
    imagePullSecrets:
      - name: kubernetes-dhi
    podAnnotations:
      m0sh1.cc/restart-at: "2026-02-05T10:40:00Z"
    prometheusConfigReloader:
      image:
        registry: dhi.io
        repository: prometheus-config-reloader
        tag: "0.89.0@sha256:2ed3c5e3d910d1f1e38eb00618e7c9a3c08e7cb11b8d6b127477a223f1c0a1b5"

  prometheus:
    enabled: true
    prometheusSpec:
      # Required: DHI Prometheus Operator v0.89.0 cannot parse digest-pinned tags (x.y.z@sha256:...).
      # Explicit version bypasses tag-based semver detection and unblocks reconciliation.
      version: "3.9.1"
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      image:
        registry: dhi.io
        repository: prometheus
        tag: "3.9.1@sha256:f7df79fc7568c8c994431cd513e6226f809d87e1413d8a320a73b57dce364e0c"
      imagePullSecrets:
        - name: kubernetes-dhi
      retention: 15d
      retentionSize: "45GB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    alertmanagerSpec:
      # Required: same DHI Prometheus Operator digest-pinned tag issue as prometheusSpec above.
      version: "0.31.0"
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      image:
        registry: dhi.io
        repository: alertmanager
        tag: "0.31.0@sha256:e6e12a22fa3abebb5097581c03060bdbf2e01beccd69d8a427e7da5b5f1988d8"
      imagePullSecrets:
        - name: kubernetes-dhi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      secrets:
        - alertmanager-notification-secrets
      configSecret: alertmanager-config-secret

  grafana:
    enabled: true
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    image:
      registry: dhi.io
      repository: grafana
      tag: "12.3.2@sha256:45c1fa3b005645eec1b7dd5e73af8afabde9cd12a308eab3a8958090c3b3d04a"
    imagePullSecrets:
      - name: kubernetes-dhi
    persistence:
      enabled: true
      storageClassName: proxmox-csi-zfs-nvme-fast-retain
      size: 10Gi
    admin:
      existingSecret: monitoring-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    sidecar:
      image:
        registry: dhi.io
        repository: k8s-sidecar
        tag: "2.5-debian13@sha256:dda956db656b5366106d9b058ef2522fd843359c17d4333d4004a564454b0319"
      dashboards:
        provider:
          foldersFromFilesStructure: true
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  # k3s embeds these in the server binary — no separate pods/endpoints to scrape.
  # Disable to prevent false KubeProxyDown/KubeSchedulerDown/KubeControllerManagerDown alerts.
  kubeProxy:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false

  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: kube-state-metrics
      tag: "2.18.0@sha256:885365968fd517aa40e2a29443d72bb0ff1568b2eeed0358f0441cf0ac689602"
    imagePullSecrets:
      - name: kubernetes-dhi

  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    # Required by prometheus-node-exporter semver checks when tag includes digest pinning.
    version: "1.10.2"
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: node-exporter
      tag: "1.10.2@sha256:0a8cb383755a49895ea60551f46e0f0424b5d33ab0a17423b90a203357d9c64c"
    imagePullSecrets:
      - name: kubernetes-dhi
    prometheus:
      monitor:
        attachMetadata:
          node: true

ingressRoutes:
  grafana:
    enabled: true
    host: grafana.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
  prometheus:
    enabled: true
    host: prometheus.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
    basicAuth:
      enabled: true
      secretName: monitoring-prometheus-basic-auth
      realm: Prometheus
