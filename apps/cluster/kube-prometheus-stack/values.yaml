kube-prometheus-stack:
  fullnameOverride: kube-prometheus-stack
  namespaceOverride: monitoring

  global:
    imagePullSecrets:
      - name: kubernetes-dhi

  # Disable bundled CRDs sub-chart — CRDs managed by separate prometheus-crds app.
  crds:
    enabled: false

  prometheusOperator:
    # Manage CRDs separately to control upgrade order.
    crds:
      enabled: false
    # Keep the control plane light: schedule monitoring components on workers.
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    # Images managed by DHI chart defaults.
    service:
      ipDualStack:
        enabled: true
        ipFamilyPolicy: PreferDualStack
        ipFamilies: [IPv4, IPv6]

  prometheus:
    enabled: true
    service:
      ipDualStack:
        enabled: true
        ipFamilyPolicy: PreferDualStack
        ipFamilies: [IPv4, IPv6]
    prometheusSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      # DHI image tags include sha256 digests that break operator semver parsing.
      version: "3.9.1"
      resources:
        requests:
          cpu: 150m
          memory: 1.5Gi
        limits:
          memory: 3Gi
      # External scrape targets (outside k8s cluster)
      additionalScrapeConfigs:
        - job_name: opnsense-node-exporter
          static_configs:
            - targets: ["10.0.10.1:9100"]
              labels:
                instance: opnsense
          scrape_interval: 30s
          metrics_path: /metrics
        - job_name: smb-node-exporter
          static_configs:
            - targets: ["10.0.10.100:9100"]
              labels:
                instance: smb
          scrape_interval: 30s
          metrics_path: /metrics
        - job_name: opnsense-crowdsec
          static_configs:
            - targets: ["10.0.10.1:6060"]
              labels:
                instance: opnsense
          scrape_interval: 30s
          metrics_path: /metrics
      retention: 15d
      retentionSize: "45GB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    service:
      ipDualStack:
        enabled: true
        ipFamilyPolicy: PreferDualStack
        ipFamilies: [IPv4, IPv6]
    alertmanagerSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: topology.kubernetes.io/zone
                    operator: In
                    values: [ "pve-03" ]
      # DHI image tags include sha256 digests that break operator semver parsing.
      version: "0.31.1"
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
      secrets:
        - alertmanager-notification-secrets
      configSecret: alertmanager-config-secret

  grafana:
    enabled: true
    service:
      ipFamilyPolicy: PreferDualStack
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    # Images managed by DHI chart defaults.
    resources:
      requests:
        cpu: 50m
        memory: 425Mi
    persistence:
      enabled: true
      storageClassName: proxmox-csi-zfs-nvme-fast-retain
      size: 10Gi
    admin:
      existingSecret: monitoring-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    sidecar:
      # Images managed by DHI chart defaults.
      dashboards:
        provider:
          foldersFromFilesStructure: true
    # Use -dev tag for the download init container — DHI runtime images
    # strip /bin/sh, but the download script requires a shell.
    downloadDashboardsImage:
      registry: dhi.io
      repository: curl
      tag: 8.14.1-debian13-dev
    # Community dashboards downloaded from grafana.com by gnetId at pod startup.
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: 'argocd'
            orgId: 1
            folder: 'ArgoCD'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/argocd
          - name: 'traefik'
            orgId: 1
            folder: 'Traefik'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/traefik
          - name: 'database'
            orgId: 1
            folder: 'Database'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/database
          - name: 'certificates'
            orgId: 1
            folder: 'Certificates'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/certificates
          - name: 'infrastructure'
            orgId: 1
            folder: 'Infrastructure'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/infrastructure
          - name: 'logging'
            orgId: 1
            folder: 'Logging'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/logging
          - name: 'forgejo'
            orgId: 1
            folder: 'Forgejo'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/forgejo
          - name: 'opnsense'
            orgId: 1
            folder: 'OPNsense'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/opnsense
          - name: 'security'
            orgId: 1
            folder: 'Security'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/security
          - name: 'dns'
            orgId: 1
            folder: 'DNS'
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/dns
    dashboards:
      argocd:
        argocd-overview:
          gnetId: 14584
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      traefik:
        traefik-overview:
          gnetId: 17346
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      database:
        cnpg-overview:
          gnetId: 20417
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      certificates:
        cert-manager-overview:
          gnetId: 20842
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      forgejo:
        forgejo-overview:
          gnetId: 17802
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      infrastructure:
        pve-overview:
          gnetId: 10347
          revision: 5
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      logging:
        loki-metrics:
          gnetId: 17781
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      opnsense:
        opnsense-exporter:
          gnetId: 21113
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        opnsense-node-exporter:
          gnetId: 4260
          revision: 9
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
      security:
        crowdsec-metrics:
          gnetId: 21419
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        crowdsec-insights:
          gnetId: 21689
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
        suricata-eve:
          gnetId: 22247
          revision: 1
          datasource:
            - name: DS_LOKI
              value: Loki
      dns:
        unbound-dns:
          gnetId: 18703
          revision: 1
          datasource:
            - name: DS_PROMETHEUS
              value: Prometheus
    envFromSecrets:
      - name: monitoring-grafana-oidc
    grafana.ini:
      server:
        root_url: https://grafana.m0sh1.cc
      auth.generic_oauth:
        enabled: true
        name: Authentik
        allow_sign_up: true
        scopes: openid profile email
        auth_url: https://auth.m0sh1.cc/application/o/authorize/
        token_url: https://auth.m0sh1.cc/application/o/token/
        api_url: https://auth.m0sh1.cc/application/o/userinfo/
        role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || 'Viewer'"
        signout_redirect_url: https://auth.m0sh1.cc/application/o/grafana/end-session/
    deleteDatasources:
      - name: prometheus-1
        orgId: 1
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  # k3s embeds these in the server binary — no separate pods/endpoints to scrape.
  # Disable to prevent false KubeProxyDown/KubeSchedulerDown/KubeControllerManagerDown alerts.
  kubeProxy:
    enabled: false
  kubeControllerManager:
    enabled: false
  kubeScheduler:
    enabled: false
  kubeEtcd:
    enabled: false

  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    # Images managed by DHI chart defaults.
    service:
      ipDualStack:
        enabled: true
        ipFamilyPolicy: PreferDualStack
        ipFamilies: [IPv4, IPv6]

  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule
    # Images managed by DHI chart defaults.
    service:
      ipDualStack:
        enabled: true
        ipFamilyPolicy: PreferDualStack
        ipFamilies: [IPv4, IPv6]
    prometheus:
      monitor:
        attachMetadata:
          node: true

ingressRoutes:
  grafana:
    enabled: true
    host: grafana.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
  prometheus:
    enabled: true
    host: prometheus.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
    basicAuth:
      enabled: true
      secretName: monitoring-prometheus-basic-auth
      realm: Prometheus
