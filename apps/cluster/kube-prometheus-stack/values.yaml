kube-prometheus-stack:
  fullnameOverride: kube-prometheus-stack
  namespaceOverride: monitoring

  global:
    imagePullSecrets:
      - name: kubernetes-dhi

  prometheusOperator:
    # Manage CRDs separately to control upgrade order.
    crds:
      enabled: false
    # Keep the control plane light: schedule monitoring components on workers.
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: prometheus-operator
      tag: "0.89.0@sha256:ca8efe793487702f384e209a7abade763d2b6eb58b024c5ddf5f17ef6f498972"
    imagePullSecrets:
      - name: kubernetes-dhi
    podAnnotations:
      m0sh1.cc/restart-at: "2026-02-05T10:40:00Z"
    prometheusConfigReloader:
      image:
        registry: dhi.io
        repository: prometheus-config-reloader
        tag: "0.89.0@sha256:2ed3c5e3d910d1f1e38eb00618e7c9a3c08e7cb11b8d6b127477a223f1c0a1b5"

  prometheus:
    enabled: true
    prometheusSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      image:
        registry: dhi.io
        repository: prometheus
        tag: "3.9.1"
      imagePullSecrets:
        - name: kubernetes-dhi
      retention: 15d
      retentionSize: "45GB"
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 50Gi

  alertmanager:
    enabled: true
    alertmanagerSpec:
      nodeSelector:
        node-role.kubernetes.io/worker: "true"
      image:
        registry: dhi.io
        repository: alertmanager
        tag: "0.31.0@sha256:e6e12a22fa3abebb5097581c03060bdbf2e01beccd69d8a427e7da5b5f1988d8"
      imagePullSecrets:
        - name: kubernetes-dhi
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: proxmox-csi-zfs-nvme-fast-retain
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi


  grafana:
    enabled: true
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    # Grafana uses an RWO PVC. When moving it across nodes, prevent Deployment surge
    # so the old pod is terminated (volume detached) before the new pod starts.
    deploymentStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 0
        maxUnavailable: 1
    image:
      registry: dhi.io
      repository: grafana
      tag: "12.3.2"
    imagePullSecrets:
      - name: kubernetes-dhi
    persistence:
      enabled: true
      storageClassName: proxmox-csi-zfs-nvme-fast-retain
      size: 10Gi
    # Admin credentials via SealedSecret (apps/cluster/secrets-cluster/)
    # admin-user should be set to "monitoring_admin" in the secret data.
    admin:
      existingSecret: monitoring-grafana-admin
      userKey: admin-user
      passwordKey: admin-password
    # Dashboard provisioning notes:
    # - Dashboards are provisioned via k8s-sidecar (ConfigMaps labeled grafana_dashboard=1).
    # - The Proxmox dashboard (10347) is rendered as a ConfigMap template in this repo, avoiding
    #   runtime downloads from grafana.com.
    #
    # To place the Proxmox dashboard into its own Grafana folder without adding a second provider
    # (which causes duplicate dashboard UIDs), we enable foldersFromFilesStructure.
    sidecar:
      dashboards:
        provider:
          foldersFromFilesStructure: true
    # Provision Loki datasource (Loki app is deployed separately as `loki` in `monitoring`).
    additionalDataSources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.monitoring.svc.cluster.local:3100
        isDefault: false
        jsonData:
          maxLines: 1000

  kubeStateMetrics:
    enabled: true
  kube-state-metrics:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: kube-state-metrics
      tag: "2.18.0"
    imagePullSecrets:
      - name: kubernetes-dhi

  nodeExporter:
    enabled: true
  prometheus-node-exporter:
    nodeSelector:
      node-role.kubernetes.io/worker: "true"
    image:
      registry: dhi.io
      repository: node-exporter
      tag: "1.10.2"
    imagePullSecrets:
      - name: kubernetes-dhi
    prometheus:
      monitor:
        attachMetadata:
          node: true

ingressRoutes:
  grafana:
    enabled: true
    host: grafana.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
  prometheus:
    enabled: true
    host: prometheus.m0sh1.cc
    entryPoints:
      - websecure
    tls:
      secretName: wildcard-m0sh1-cc
    basicAuth:
      enabled: true
      secretName: monitoring-prometheus-basic-auth
      realm: Prometheus
