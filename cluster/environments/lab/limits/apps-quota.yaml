apiVersion: v1
kind: ResourceQuota
metadata:
  name: apps-quota
  namespace: apps
spec:
  hard:
    requests.cpu: "12"
    # Bumped from 20Gi→24Gi: steady requests at ~19Gi (93%) left no headroom
    # for concurrent rolling updates (old+new pods coexist during rollout).
    requests.memory: 24Gi
    # Bumped from 48→56: rolling updates spike CPU limits when old+new replicas
    # overlap (harbor-core + harbor-registry rollout hit 100% at 45750m/48000m).
    limits.cpu: "56"
    # Lowered from 72Gi→64Gi after right-sizing the worst offenders in apps.
    # 64Gi preserves rollout/bootstrap headroom and avoids treating raw physical
    # memory as safe namespace ceiling (pve01=32Gi + pve02=24Gi + pve03=16Gi).
    limits.memory: 64Gi
