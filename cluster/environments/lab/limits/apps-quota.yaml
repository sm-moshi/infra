apiVersion: v1
kind: ResourceQuota
metadata:
  name: apps-quota
  namespace: apps
spec:
  hard:
    requests.cpu: "12"
    # Bumped from 20Gi→24Gi: steady requests at ~19Gi (93%) left no headroom
    # for concurrent rolling updates (old+new pods coexist during rollout).
    requests.memory: 24Gi
    # Bumped from 48→56: rolling updates spike CPU limits when old+new replicas
    # overlap (harbor-core + harbor-registry rollout hit 100% at 45750m/48000m).
    limits.cpu: "56"
    # Keep at raw physical ceiling for now while rollout stabilization finishes.
    # We will lower this incrementally after the namespace has settled on the
    # reduced workload limits and we have a few quiet rollout cycles.
    limits.memory: 72Gi
