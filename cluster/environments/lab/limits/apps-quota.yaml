apiVersion: v1
kind: ResourceQuota
metadata:
  name: apps-quota
  namespace: apps
spec:
  hard:
    requests.cpu: "12"
    # Bumped from 20Gi→24Gi: steady requests at ~19Gi (93%) left no headroom
    # for concurrent rolling updates (old+new pods coexist during rollout).
    requests.memory: 24Gi
    # Bumped from 48→56: rolling updates spike CPU limits when old+new replicas
    # overlap (harbor-core + harbor-registry rollout hit 100% at 45750m/48000m).
    limits.cpu: "56"
    # Bumped from 64Gi→72Gi: steady limits at ~62.8Gi (98%) blocked FailedCreate
    # for open-webui (2Gi), harbor-core (768Mi), harbor-registry (1536Mi) during
    # rolling updates. 72Gi matches total physical RAM (pve01=32 + pve02=24 + pve03=16).
    limits.memory: 72Gi
