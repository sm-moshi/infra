apiVersion: v1
kind: ResourceQuota
metadata:
  name: apps-quota
  namespace: apps
spec:
  hard:
    requests.cpu: "12"
    # Bumped from 20Gi→24Gi: steady requests at ~19Gi (93%) left no headroom
    # for concurrent rolling updates (old+new pods coexist during rollout).
    requests.memory: 24Gi
    # Bumped from 48→56: rolling updates spike CPU limits when old+new replicas
    # overlap (harbor-core + harbor-registry rollout hit 100% at 45750m/48000m).
    limits.cpu: "56"
    # Bumped from 72Gi→80Gi: steady limits at ~73Gi blocked FailedCreate for
    # paperless-ai (1536Mi) and authentik db-init hooks. Growth from new apps
    # (paperless-ai, paperless-gpt, basic-memory) plus LimitRange 2Gi defaults
    # on containers without explicit limits consumed all headroom.
    limits.memory: 80Gi
