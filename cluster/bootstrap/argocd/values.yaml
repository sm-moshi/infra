global:
  image:
    repository: quay.io/argoproj/argocd
    tag: "v3.3.3"
  imagePullSecrets:
    - name: kubernetes-dhi
  priorityClassName: m0sh1-core
  dualStack:
    ipFamilyPolicy: PreferDualStack
  # Explicit pod-level security context for all Argo CD components.
  # This avoids relying on chart defaults and addresses KSV118.
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

crds:
  annotations:
    argocd.argoproj.io/sync-options: Replace=true
server:
  # Argo CD listens in plain HTTP; TLS is terminated at Traefik.
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  replicas: 1
  revisionHistoryLimit: 2
  pdb:
    enabled: true
    minAvailable: 0
  extraArgs:
    - --insecure
  service:
    type: ClusterIP
  # Ingress disabled — replaced by IngressRoute in templates/ingressroute.yaml
  # to support both HTTP and native gRPC (h2c) on the same hostname.
  ingress:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi
  extensions:
    enabled: true
    image:
      repository: quay.io/argoprojlabs/argocd-extension-installer
      tag: "v0.0.9"
    extensionList:
      - name: extension-trivy
        env:
          - name: EXTENSION_URL
            value: https://github.com/mziyabo/argocd-trivy-extension/releases/download/v0.2.0/extension-trivy.tar
          - name: EXTENSION_CHECKSUM_URL
            value: https://github.com/mziyabo/argocd-trivy-extension/releases/download/v0.2.0/extension-trivy_checksums.txt
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 50m
        memory: 64Mi

configs:
  cm:
    # External URL used by CLI/UI redirects; keep HTTPS to match Traefik ingress.
    url: "https://argocd.m0sh1.cc"
    # Allow CLI SSO login to redirect back to localhost callback.
    additionalUrls: '["http://localhost:8085"]'
    application.instanceLabelKey: argocd.argoproj.io/instance
    # Extend upstream default exclusions with wildcard for all Cilium CRDs.
    # Without this, the ArgoCD UI crashes in ResourceIcon when rendering
    # Cilium resources it has no icon mapping for.
    # Global ignore for dual-stack Service fields patched via kubectl.
    # Prevents selfHeal from reverting ipFamilyPolicy on charts whose
    # upstream Helm templates don't render it.
    resource.customizations.ignoreDifferences.Service: |
      jqPathExpressions:
      - .spec.ipFamilyPolicy
      - .spec.ipFamilies
      - .spec.clusterIPs
    resource.exclusions: |
      - apiGroups:
        - ''
        - discovery.k8s.io
        kinds:
        - Endpoints
        - EndpointSlice
      - apiGroups:
        - coordination.k8s.io
        kinds:
        - Lease
      - apiGroups:
        - authentication.k8s.io
        - authorization.k8s.io
        kinds:
        - SelfSubjectReview
        - TokenReview
        - LocalSubjectAccessReview
        - SelfSubjectAccessReview
        - SelfSubjectRulesReview
        - SubjectAccessReview
      - apiGroups:
        - certificates.k8s.io
        kinds:
        - CertificateSigningRequest
      - apiGroups:
        - cert-manager.io
        kinds:
        - CertificateRequest
      - apiGroups:
        - cilium.io
        kinds:
        - CiliumIdentity
        - CiliumEndpoint
        - CiliumNode
        - CiliumCIDRGroup
        - CiliumNodeConfig
        - CiliumPodIPPool
      - apiGroups:
        - kyverno.io
        - reports.kyverno.io
        - wgpolicyk8s.io
        kinds:
        - PolicyReport
        - ClusterPolicyReport
        - EphemeralReport
        - ClusterEphemeralReport
        - AdmissionReport
        - ClusterAdmissionReport
        - BackgroundScanReport
        - ClusterBackgroundScanReport
        - UpdateRequest
    # Local service account for ArgoCD MCP server (read-only API access).
    accounts.argocd-mcp: apiKey
    accounts.argocd-mcp.enabled: "true"
    dex.config: |
      connectors:
        - type: oidc
          id: authentik
          name: Authentik
          config:
            issuer: https://auth.m0sh1.cc/application/o/argocd/
            clientID: $argocd-dex-authentik:client_id
            clientSecret: $argocd-dex-authentik:client_secret
            scopes:
              - openid
              - profile
              - email
              - groups
            insecureEnableGroups: true
            getUserInfo: true
  rbac:
    policy.default: role:readonly
    policy.matchMode: glob
    scopes: "[sub, groups]"
    policy.csv: |
      p, role:admin, applications, *, */*, allow
      p, role:admin, applicationsets, *, */*, allow
      p, role:admin, projects, *, *, allow
      p, role:admin, clusters, *, *, allow
      p, role:admin, repositories, *, *, allow
      p, role:admin, write-repositories, *, *, allow
      p, role:admin, certificates, *, *, allow
      p, role:admin, accounts, *, *, allow
      p, role:admin, gpgkeys, *, *, allow
      p, role:admin, logs, get, */*, allow
      p, role:admin, exec, create, */*, allow
      p, role:admin, extensions, invoke, */*, allow
      p, role:admin, extensions, action, */*, allow
      p, role:mcp-readonly, applications, get, */*, allow
      p, role:mcp-readonly, applications, list, */*, allow
      p, role:mcp-readonly, projects, get, *, allow
      p, role:mcp-readonly, clusters, get, *, allow
      p, role:mcp-readonly, logs, get, */*, allow
      g, admin, role:admin
      g, m0sh1, role:admin
      g, ArgoCD Admins, role:admin
      g, argocd-mcp, role:mcp-readonly

  params:
    # Ensure reconciles keep the server in HTTP mode behind ingress to avoid redirect loops.
    server.insecure: "true"
    # Disable submodule recursion — no ArgoCD app needs tools/cli content,
    # and nested submodule history can reference force-pushed (orphaned) commits
    # that break incremental git fetch.
    reposerver.enable.git.submodule: "false"
  # Trivy UI extension responsiveness overrides:
  # upstream extension charts are rendered at fixed widths and can force horizontal
  # scrolling on narrower viewports. Keep this scoped to extension class names.
  styles: |
    .vulnerability-report__wrapper {
      max-width: 100%;
      overflow-x: auto;
      box-sizing: border-box;
    }

    .vulnerability-charts__wrapper {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 12px;
      max-width: 100%;
      overflow: hidden;
      box-sizing: border-box;
    }

    .vulnerability-charts__wrapper > div {
      flex: 1 1 420px;
      min-width: 0;
      max-width: 100%;
      box-sizing: border-box;
    }

    .vulnerability-report__wrapper .recharts-wrapper {
      max-width: 100% !important;
      width: 100% !important;
    }

    .vulnerability-report__wrapper .recharts-surface {
      max-width: 100% !important;
      width: 100% !important;
      height: auto !important;
    }

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  affinity:
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["horse02"]
        - weight: 60
          preference:
            matchExpressions:
              - key: kubernetes.io/hostname
                operator: In
                values: ["horse01"]
  resources:
    requests:
      cpu: 250m
      memory: 1280Mi
    limits:
      cpu: 1
      memory: 2Gi

repoServer:
  replicas: 1
  revisionHistoryLimit: 2
  pdb:
    enabled: true
    minAvailable: 0
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  # Upstream chart hard-codes repo-server liveness to `/healthz?full=true` (expensive).
  # We can't change the path via values, so we make it less brittle and less frequent.
  livenessProbe:
    timeoutSeconds: 10
    failureThreshold: 6
    periodSeconds: 30
  readinessProbe:
    timeoutSeconds: 5
    failureThreshold: 6
  resources:
    requests:
      cpu: 250m
      memory: 192Mi
    limits:
      cpu: 1
      memory: 2Gi

applicationSet:
  enabled: true
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack

dex:
  enabled: true
  image:
    repository: dhi.io/dex
    tag: "2.45.1"
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 300Mi

redis:
  enabled: true
  image:
    repository: dhi.io/valkey
    tag: "9.0.3"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 512Mi
redisSecretInit:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

redis-ha:
  enabled: false
# Run the notifications controller here while config/secret stay managed via dedicated app + SealedSecret.
notifications:
  enabled: true
  argocdUrl: "https://argocd.m0sh1.cc"
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      additionalLabels:
        release: kube-prometheus-stack
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 300m
      memory: 300Mi
  cm:
    create: false
  secret:
    create: false
    name: argocd-notifications-secret
